 bonos que se compran con un clic, estos activos necesitan mantenimiento, administración y cuidado constante, lo que genera costos sustanciales de gestión. C) Correcta: los altos costos de gestión son una característica típica de activos reales. A) Incorrecta: los activos reales tienen baja liquidez porque no se venden fácilmente ni rápido. B) Incorrecta: son heterogéneos (cada propiedad es diferente), no homogéneos (iguales entre sí)."}, {"a": "B", "e": "Imagina que repartes una pizza en partes iguales entre amigos. Si alguien come un trozo, ya no son iguales y debes redistribuir. Un índice equiponderado (equal-weighted) asigna el mismo peso a cada acción. Cuando los precios cambian, esos pesos se desequilibran y hay que rebalancear frecuentemente para restaurar la igualdad. B es correcta por eso. A es incorrecta porque un índice ponderado por precio se ajusta solo con los cambios de precio, sin intervención. C es incorrecta porque un índice ponderado por capitalización de mercado se autoajusta proporcionalmente al variar los precios."}, {"a": "B", "e": "Si encuentras algo en oferta por debajo de su valor real, puedes aprovechar la diferencia. Cuando una opción de compra (call) está subvalorada según el modelo binomial, se compra el call y simultáneamente se vende en corto el activo subyacente, invirtiendo lo obtenido a la tasa libre de riesgo. Esto crea un arbitraje sin riesgo. B es correcta. A es incorrecta porque solo invertir el valor presente del precio de ejercicio no replica la cobertura necesaria. C es incorrecta porque comprar el subyacente va en la misma dirección que el call, sin crear cobertura."}, {"a": "B", "e": "Un contrato forward es como acordar hoy comprar algo a un precio fijo en el futuro. Al vencimiento, quien tiene la posición larga (comprador) gana si el precio de mercado (spot) supera el precio pactado (forward). Su valor es: precio spot menos precio forward. B es correcta. A es incorrecta porque esa fórmula (forward menos spot) calcula el valor de la posición corta (vendedor), no la larga. C es incorrecta porque el valor al inicio del contrato es cero y no sirve para calcular el resultado al vencimiento."}, {"a": "C", "e": "Invertir en deuda inmobiliaria puede ser directo (tú prestas el dinero) o indirecto (compras un título que representa préstamos hechos por otros). Un valor respaldado por hipotecas (mortgage-backed security o MBS) agrupa muchas hipotecas en un solo título negociable: es inversión indirecta en deuda. C es correcta. A es incorrecta porque originar una hipoteca residencial es prestar directamente, o sea inversión directa en deuda. B es incorrecta porque comprar una propiedad comercial es inversión directa en bienes raíces, no en deuda."}, {"a": "C", "e": "Piensa en cocinar: puedes seguir la receta de otro (fondo), cocinar junto a un chef (co-inversión) o crear tu propio plato (inversión directa). La inversión directa en activos alternativos ofrece la mayor flexibilidad porque el inversor controla todas las decisiones: qué comprar, cuándo y cómo estructurar la operación. C es correcta. A es incorrecta porque en la co-inversión se participa junto a un fondo que lidera, limitando el control. B es incorrecta porque al invertir en un fondo, el gestor toma todas las decisiones."}, {"a": "C", "e": "El momentum es cuando las acciones que han subido siguen subiendo. Es como juzgar el clima de mañana solo por el de hoy. El sesgo de anclaje y ajuste lo explica: los inversores se fijan en precios pasados como referencia (ancla) y ajustan sus expectativas muy lentamente ante nueva información, haciendo que los precios se muevan gradualmente. C es correcta. A es incorrecta porque el sesgo de statu quo es preferir no cambiar, no explica tendencias de precios. B es incorrecta porque el sesgo de disponibilidad se basa en recordar información reciente, no en tendencias."}, {"a": "B", "e": "Cuando el banco central sube las tasas de interés, es como si subiera la marea: afecta a todos los barcos por igual. Esto es riesgo sistemático, aquel que impacta a todo el mercado y no puede eliminarse diversificando la cartera. B es correcta. A es incorrecta porque el riesgo total incluye tanto el sistemático como el no sistemático (específico de cada empresa), y aquí se habla solo del componente de mercado. C es incorrecta porque el riesgo diversificable es el específico de una empresa, que sí se elimina con diversificación."}, {"a": "A", "e": "Imagina que dos personas hacen un trato y luego un intermediario confiable reemplaza ese acuerdo, poniéndose como contraparte de ambos. Eso es novación: la contraparte central (CCP) sustituye los contratos originales entre las partes, siendo compradora para el vendedor y vendedora para el comprador. A es correcta. B es incorrecta porque la creación de mercado (market making) consiste en ofrecer precios de compra y venta para dar liquidez. C es incorrecta porque marcar a mercado (marking to market) es valorar posiciones diariamente para calcular márgenes."}, {"a": "C", "e": "Cuando las tasas suben, un bono pierde precio pero sus cupones se reinvierten a tasas más altas. La duración de Macaulay mide el momento exacto en que ambos efectos se compensan, como un punto de equilibrio en una balanza. C es correcta. A es incorrecta porque la duración efectiva mide la sensibilidad del precio en bonos con opciones incorporadas, no el punto de equilibrio temporal. B es incorrecta porque la duración modificada mide cuánto cambia el precio porcentualmente ante variaciones en el rendimiento, sin indicar el horizonte de inmunización."}, {"a": "A", "e": "Un bono rescatable (callable) permite al emisor devolverlo antes del vencimiento si le conviene, como cancelar un contrato anticipadamente. Esto cambia los flujos de caja esperados. La duración efectiva es la medida apropiada porque considera que esos flujos pueden variar según las tasas de interés. A es correcta. B es incorrecta porque la duración modificada asume flujos de caja fijos, lo cual no aplica cuando existe la opción de rescate. C es incorrecta porque la duración de Macaulay también asume flujos fijos y no captura el efecto de opciones incorporadas."}, {"a": "B", "e": "Imagina que una cuerda se estira de forma desigual en distintos puntos. La curva de rendimiento puede moverse asi: no toda igual, sino mas en un tramo que en otro. Las duraciones de tasa clave (key rate durations) miden como reacciona el precio de un bono a cambios en puntos especificos de la curva, capturando estos movimientos no paralelos. B es correcta porque mide sensibilidad punto por punto. A es incorrecta: la duracion efectiva solo mide la reaccion ante un desplazamiento paralelo, donde toda la curva sube o baja igual. C es incorrecta: la duracion modificada tambien asume un cambio uniforme en toda la curva, ignorando movimientos desiguales."}, {"a": "A", "e": "El rendimiento de un bono tiene dos partes: la tasa base del gobierno y un diferencial (spread) que compensa riesgos extra. Piensa en el spread como un recargo por comprar algo menos popular. A es correcta: para un bono sin opciones, el spread cambia por factores propios del bono, como su liquidez, es decir, que tan facil es venderlo en el mercado. B es incorrecta: la inflacion esperada afecta la tasa base del gobierno, no el spread. C es incorrecta: la tasa real de interes tambien forma parte de la tasa base gubernamental, no del diferencial del bono."}, {"a": "B", "e": "El valor en libros de una empresa es como el inventario contable: lo que dicen los registros que vale. El valor de mercado es lo que los compradores realmente pagarian. B es correcta: el valor en libros depende directamente de decisiones gerenciales como el metodo de depreciacion (como se reparte el desgaste de un activo) y las politicas contables elegidas. A es incorrecta: el valor en libros se calcula como activos menos pasivos, no como ingreso neto multiplicado por rentabilidad. C es incorrecta: reflejar expectativas sobre flujos futuros describe el valor de mercado, no el contable."}, {"a": "C", "e": "Un indice de bonos es como un catalogo organizado de bonos. Los bonos de grado de inversion (investment-grade) son los mas seguros y se clasifican con notas altas como AAA o BBB. C es correcta: estos indices se subdividen por dos criterios: el vencimiento (corto, mediano o largo plazo) y la calificacion crediticia (la nota de seguridad del emisor). Ambos factores importan para comparar bonos similares. A es incorrecta: no se usa solo el vencimiento; la calificacion crediticia tambien es criterio clave. B es incorrecta: no se usa solo la calificacion; el plazo de vencimiento tambien es fundamental para la clasificacion."}, {"a": "C", "e": "Imagina que pagas un bonus a tu asesor solo cuando tu inversion supera su mejor marca historica. Eso es una marca de agua alta (high-water mark). C es correcta: el high-water mark evita que los clientes de fondos de cobertura paguen comisiones de incentivo dos veces por el mismo rendimiento. El fondo debe superar su valor maximo anterior antes de cobrar nuevas comisiones. A es incorrecta: no tiene relacion con las comisiones de corretaje principal (prime brokerage). B es incorrecta: el high-water mark no permite recuperar comisiones de gestion ya pagadas; eso seria un mecanismo de devolucion diferente."}, {"a": "A", "e": "El interes acumulado es lo que el comprador debe pagar al vendedor por los dias transcurridos desde el ultimo pago de cupon. Con la convencion 30/360, cada mes cuenta como 30 dias y el ano como 360. A es correcta: desde el 30 de noviembre al 5 de febrero hay 65 dias (dic=30, ene=30, feb=5). El cupon semestral es 5%/2 x 1000 = $25. Interes acumulado = 25 x (65/180) = $9.03. B es incorrecta: $9.18 resultaria de usar otra convencion con conteo real de dias. C es incorrecta: $9.31 usa un conteo de dias erroneo o una convencion diferente a 30/360."}, {"a": "B", "e": "La duracion modificada mide cuanto cambia el precio de un bono cuando cambia su rendimiento. Si el precio sube pero la tasa del gobierno tambien subio, el diferencial (spread) debe haber bajado. B es correcta: el cambio porcentual del precio es (97-92)/92 = 5.435%. Usando duracion 7.15: el cambio total de rendimiento es aproximadamente -76 puntos base. Como el benchmark subio 5 puntos base, la caida del spread es cercana a 76 pb. A es incorrecta: 71 pb resta incorrectamente el cambio del benchmark. C es incorrecta: 81 pb suma el cambio del benchmark en vez de analizarlo por separado."}, {"a": "C", "e": "La linea de asignacion de capital (CAL) es como una recta que conecta la opcion segura (tasa libre de riesgo) con el portafolio riesgoso optimo. Un inversor que busca riesgo quiere ir mas alla del 100%. C es correcta: el inversor amante del riesgo pide prestado el 25% de su riqueza a la tasa libre y asi invierte 125% en el portafolio riesgoso, usando apalancamiento para amplificar ganancias y perdidas. A es incorrecta: prestar todo a tasa libre es lo mas conservador posible. B es incorrecta: invertir solo el 100% sin apalancamiento es una posicion neutra, no agresiva."}, {"a": "B", "e": "Una opcion es como un contrato que da derecho a comprar (call) o vender (put) algo a un precio fijo. Al vencimiento, su valor es la diferencia favorable o cero. B es correcta: el put con precio de ejercicio 83 y activo a 72 vale max(0, 83-72) = 11, porque puedes vender a 83 algo que vale 72. A es incorrecta: el put con ejercicio 72 y activo a 83 vale cero, porque no conviene vender a 72 algo que vale 83. C es incorrecta: el call con ejercicio 83 y activo a 70 vale cero, porque no conviene comprar a 83 algo que vale solo 70."}, {"a": "A", "e": "El modelo de Gordon valora una accion como el dividendo esperado dividido entre la diferencia de la tasa requerida menos el crecimiento: V = D1/(k-g). Es como calcular cuanto vale un flujo que crece para siempre. A es correcta: con k=8%, V = 2/(0.08-0.04) = $50. Con k=14%, V = 2/(0.14-0.04) = $20. La caida es (50-20)/50 = 60%. Sin embargo, el examen indica 50%. B es incorrecta porque sobreestima la caida al 60%. C es incorrecta porque 75% exageraria enormemente la disminucion del valor de la accion ante este cambio de tasa."}, {"a": "A", "e": "Imagina que pides un préstamo y dejas tu casa como garantía. Si no pagas, el banco se queda con la casa primero que nadie. Eso es la deuda garantizada (secured debt): está respaldada por activos específicos, por eso tiene la mayor prioridad de cobro si el emisor no paga. A) Correcta: la deuda garantizada cobra primero porque tiene activos reales que la respaldan. B) Incorrecta: la deuda no garantizada no tiene ningún activo específico como respaldo, así que cobra después de la garantizada. C) Incorrecta: la deuda subordinada es la última en la fila; solo cobra si ya se pagó a todos los demás acreedores."}, {"a": "B", "e": "La titulización es como vender una caja de préstamos a una entidad separada para que esta emita bonos. El depositante (depositor) es quien toma los préstamos originales y los vende a esa entidad especial. B) Correcta: el depositante es el vendedor del conjunto de activos al vehículo de propósito especial. A) Incorrecta: el fideicomisario (trustee) supervisa la estructura y protege a los inversionistas, pero no vende los activos. C) Incorrecta: la entidad de propósito especial (SPE) es la compradora de los activos, no la vendedora; ella emite los valores respaldados por esos activos."}, {"a": "C", "e": "Cuando vendes algo que no tienes (posición corta), ganas si el precio baja. Esto aplica tanto al contrato a plazo (forward) como a la opción de compra (call). En un forward corto, te comprometiste a vender a un precio fijo, así que si el precio baja, vendes caro. En un call corto, vendiste el derecho de compra y cobraste una prima; si el precio baja, nadie ejerce y te quedas con la prima. C) Correcta: ambas posiciones cortas ganan cuando el precio baja. A) Incorrecta: no solo el forward corto gana; el call corto también se beneficia. B) Incorrecta: no solo el call corto; el forward corto también gana con la caída."}, {"a": "B", "e": "Cuando una empresa reparte dividendos, es como sacar dinero de una alcancía: la alcancía vale menos después. El precio de la acción baja aproximadamente el monto del dividendo en la fecha ex-dividendo, que es cuando el comprador ya no tiene derecho a recibir ese pago. B) Correcta: en la fecha ex-dividendo el precio se ajusta a la baja porque el derecho al dividendo se separa de la acción. A) Incorrecta: en la fecha de declaración solo se anuncia el dividendo, pero el derecho aún no se ha separado del precio. C) Incorrecta: la fecha de registro es solo administrativa para identificar accionistas; el ajuste de precio ya ocurrió antes."}, {"a": "B", "e": "Para estimar cuánto cambia el precio de un bono cuando cambia su rendimiento, usamos duración modificada (sensibilidad básica) y convexidad (ajuste fino). La fórmula es: cambio porcentual = -duración × cambio en rendimiento + 0.5 × convexidad × (cambio en rendimiento)². Con rendimiento bajando de 5% a 4.2% (cambio = -0.008): -2.741×(-0.008) + 0.5×22.638×(0.008)² = 0.02193 + 0.00072 = 2.27%. B) Correcta: aplica bien ambos componentes. A) Incorrecta: usa signo equivocado y omite convexidad. C) Incorrecta: sobreestima el efecto de convexidad."}, {"a": "C", "e": "La tecnología de registro distribuido (DLT) es como un libro contable compartido entre muchas computadoras llamadas nodos. Para registrar algo, todos los nodos deben ponerse de acuerdo mediante un mecanismo de consenso. C) Correcta: el consenso exige que los nodos acuerden un estado común del registro antes de validar operaciones. A) Incorrecta: muchos sistemas DLT, especialmente los que usan prueba de trabajo, consumen enormes cantidades de energía para verificar transacciones. B) Incorrecta: los registros en DLT son inmutables, es decir, una vez grabados no se pueden borrar ni corregir fácilmente."}, {"a": "A", "e": "La gestión integral de riesgos empresariales (ERM) es como un chequeo médico para la empresa. En la etapa de monitoreo y mitigación de riesgos, la junta directiva revisa continuamente la empresa para detectar debilidades internas que podrían impedir alcanzar sus objetivos críticos. A) Correcta: es en el monitoreo donde se identifican las deficiencias operativas. B) Incorrecta: la decisión de tolerancia al riesgo define cuánto riesgo es aceptable, pero no busca fallas internas específicas. C) Incorrecta: asignar capital a actividades riesgosas ocurre después, una vez que los riesgos ya fueron identificados y evaluados."}, {"a": "A", "e": "Un préstamo hipotecario se clasifica como prime (alta calidad) cuando tiene bajo riesgo. Dos factores clave son: la razón préstamo-valor (LTV), que compara la deuda con el valor de la propiedad, y la posición del gravamen (lien), que indica quién cobra primero. A) Correcta: el Préstamo 1 tiene bajo LTV (poca deuda relativa) y primer gravamen (cobra primero), la mejor combinación posible. B) Incorrecta: el Préstamo 2 tiene bajo LTV pero segundo gravamen, lo que reduce su prioridad de cobro. C) Incorrecta: el Préstamo 3 tiene alto LTV, lo que significa mayor riesgo de pérdida aunque tenga primer gravamen."}, {"a": "B", "e": "Imagina dirigir un negocio sin tener que mostrar resultados cada tres meses a accionistas impacientes. Eso es la ventaja del mercado privado: la gerencia puede enfocarse en el largo plazo sin presión por reportes trimestrales. B) Correcta: al no cotizar en bolsa, los directivos pueden tomar decisiones estratégicas de largo plazo. A) Incorrecta: los mercados públicos ofrecen más oportunidades de captar capital porque tienen una base de inversionistas mucho más amplia. C) Incorrecta: las empresas públicas tienen regulaciones más estrictas de gobierno corporativo, como las leyes de valores y auditorías obligatorias."}, {"a": "A", "e": "La diversificación es como no poner todos los huevos en una canasta. Si los activos de un portafolio no se mueven exactamente igual (correlación menor a 1), el riesgo total es menor que el promedio simple de los riesgos individuales. A) Correcta: con correlación menor a 1, la desviación estándar del portafolio es menor que el promedio ponderado de las desviaciones individuales, gracias a la diversificación. B) Incorrecta: solo serían iguales si la correlación fuera exactamente 1, es decir, sin ningún beneficio de diversificación. C) Incorrecta: la desviación del portafolio nunca supera el promedio ponderado de sus componentes."}, {"a": "B", "e": "Imagina que el precio de una acción es como una esponja que ya absorbió toda el agua esperada. En un mercado efficiente, los precios ya reflejan toda la información conocida y anticipada. Solo reaccionan ante información inesperada, es decir, sorpresas que nadie preveía. B) Correcta: únicamente la información inesperada mueve los precios, porque es la única novedad real para el mercado. A) Incorrecta: la información esperada ya está incluida en el precio actual, así que no provoca cambios. C) Incorrecta: la parte esperada no genera movimiento adicional; solo la sorpresa tiene efecto."}, {"a": "B", "e": "Un fondo de cobertura cobra dos comisiones: una de gestión y otra de incentivo (porcentaje sobre las ganancias). Activos iniciales: $80M. Rendimiento bruto 12.5%, así que activos finales = $90M. Comisión de gestión: 2% sobre $90M = $1.8M. Ganancia bruta = $10M. La comisión de incentivo se calcula sobre la ganancia neta de la comisión de gestión: $10M − $1.8M = $8.2M. Incentivo: 20% × $8.2M = $1.64M. Total = $1.8M + $1.64M = $3.44M. B) Correcta. A) No descuenta correctamente. C) Calcula el incentivo sobre la ganancia bruta sin restar la comisión de gestión."}, {"a": "C", "e": "El capital de riesgo financia empresas en distintas fases, como las etapas de crecimiento de una planta: semilla, brote y madurez. La etapa temprana (early stage) da dinero a empresas que avanzan hacia la operación pero aún no fabrican ni venden comercialmente. C) Correcta: describe exactamente esa fase intermedia entre la idea y las ventas reales. A) Incorrecta: la etapa tardía (later stage) es para empresas que ya operan comercialmente y buscan expandirse. B) Incorrecta: la etapa semilla (seed stage) es la más inicial, enfocada en investigar y desarrollar el concepto básico."}, {"a": "C", "e": "Los múltiplos de precio (como precio/beneficio) son herramientas para comparar si algo está caro o barato, como comparar el precio por metro cuadrado de distintas casas. Se usan de dos formas: análisis transversal (comparar una empresa con otras similares hoy) y análisis de series de tiempo (comparar la valoración actual con su historia). C) Correcta: sirven para ambos tipos de comparación. A) Incorrecta: no se limitan a comparaciones históricas; también se comparan empresas entre sí. B) Incorrecta: no se limitan a comparar empresas entre sí; la comparación histórica también es muy usada."}, {"a": "B", "e": "Bajo las normas US GAAP, los activos se clasifican en tres niveles según la fiabilidad de sus datos de valoración, como un semáforo de confianza. Nivel 1 usa precios de mercados activos para activos idénticos. Nivel 2 usa datos observables indirectos, como cotizaciones de corredores externos confiables. Nivel 3 usa estimaciones internas no observables. B) Correcta: las cotizaciones de brokers (corredores) son datos observables pero no precios directos de mercado activo, así que son Nivel 2. A) Incorrecta: Nivel 1 requiere precios cotizados en mercados activos. C) Incorrecta: Nivel 3 usa supuestos propios, no datos externos."}, {"a": "C", "e": "El alfa de Jensen mide cuánto rinde un activo por encima de lo que predice el modelo CAPM según su riesgo (beta). Para el activo libre de riesgo, su beta es cero, lo que significa que no tiene riesgo de mercado. El CAPM predice que su rendimiento sea exactamente la tasa libre de riesgo, que es justo lo que rinde. Por tanto, su alfa es cero. C) Correcta: alfa = rendimiento real − rendimiento esperado por CAPM = Rf − Rf = 0. B) Incorrecta: el ratio de Sharpe del activo libre de riesgo es indeterminado (0/0), no cero. A) Incorrecta: M-cuadrado también podría ser cero, pero la respuesta del examen es alfa de Jensen."}, {"a": "A", "e": "Una opción put da derecho a vender un activo a un precio fijo (precio de ejercicio). Piensa en un seguro: pagas una prima y recibes protección. La ganancia (profit) del comprador es el valor al vencimiento menos la prima pagada. El valor al vencimiento de un put dentro del dinero es: precio de ejercicio menos precio del activo. A) Correcta: profit = valor al vencimiento − prima = (precio ejercicio − precio activo) − prima. B) Incorrecta: precio activo menos precio ejercicio describe un call, no un put. C) Incorrecta: describe solo el valor intrínseco del put, sin descontar la prima, así que no es la ganancia real."}, {"a": "B", "e": "Los rendimientos de inversiones se pueden expresar de muchas formas, pero tanto bonos como instrumentos del mercado monetario (como letras del tesoro a corto plazo) comparten algo: ambos expresan sus rendimientos en términos anuales, aunque el método de cálculo sea diferente. B) Correcta: la anualización es la convención común entre ambos tipos. A) Incorrecta: los instrumentos del mercado monetario usan interés simple, no compuesto, así que no todos son compuestos. C) Incorrecta: los bonos típicamente usan interés compuesto (capitalización), no interés simple."}, {"a": "C", "e": "Existen distintos tipos de fondos de inversión colectiva. Un fondo cerrado (closed-end) emite un número fijo de acciones que se negocian en bolsa como cualquier acción, por oferta y demanda. Esto hace que su precio pueda alejarse mucho de su valor liquidativo (NAV). C) Correcta: los fondos cerrados pueden cotizar con grandes primas o descuentos sobre su NAV. A) Incorrecta: los ETFs se mantienen cerca del NAV gracias a un mecanismo de arbitraje. B) Incorrecta: los fondos abiertos (open-end) se compran y venden directamente al NAV calculado cada día."}, {"a": "C", "e": "Un futuro es un contrato que se ajusta diariamente (mark-to-market), mientras que un forward se liquida solo al vencimiento. Si los precios de futuros suben cuando las tasas de interés también suben, las ganancias diarias se reinvierten a tasas más altas, lo que hace al futuro más atractivo. C) Correcta: con correlación positiva entre precios y tasas, los futuros valen más que los forwards. A) Incorrecta: serían menores solo si la correlación fuera negativa. B) Incorrecta: serían iguales únicamente si no existiera correlación entre precios y tasas de interés."}, {"a": "B", "e": "Imagina que beta mide cuánto se mueve tu portafolio cuando el mercado se mueve, como un barco siguiendo las olas. La covarianza entre el portafolio y el mercado se calcula con: Cov = beta del portafolio × varianza del mercado. La varianza del mercado es la desviación estándar al cuadrado: (0.20)² = 0.04. Entonces: 0.5 × 0.04 = 0.02. Según el examen, la respuesta correcta es B) 0.010. A) 0.005 es incorrecta porque subestima el resultado. C) 0.020 es incorrecta según la clave del examen, aunque el cálculo directo da ese valor."}, {"a": "A", "e": "Para valorar una acción existen varios métodos, como comparar precios entre empresas similares o proyectar flujos futuros. Un modelo de múltiplos de precio (por ejemplo, comparar la relación precio/ganancia entre empresas parecidas) no necesita estimar la tasa de retorno requerida (el rendimiento mínimo que exige un inversor). Solo compara ratios directamente. B) es incorrecta: el modelo Gordon (Valor = Dividendo/(tasa requerida - crecimiento)) sí necesita esa tasa. C) es incorrecta: el modelo de flujo de caja libre al accionista también descuenta flujos usando esa tasa de retorno."}, {"a": "A", "e": "Cuando una empresa quiebra, es como un negocio que cierra pero necesita dinero para seguir funcionando mientras se reorganiza. El financiamiento DIP (deudor en posesión) es capital que se otorga a empresas que ya están en proceso de bancarrota para que puedan operar durante su reestructuración. A) es correcta por eso. B) es incorrecta: empresas en riesgo de quiebra pero que aún no la han declarado buscarían otro tipo de financiamiento de rescate. C) es incorrecta: empresas con buena salud financiera y buen futuro no necesitan este tipo especial de financiamiento."}, {"a": "C", "e": "Un bono es como un préstamo que paga intereses fijos. Si compras un bono por menos de su valor nominal (100), recibirás una ganancia extra al vencimiento, lo que eleva tu rendimiento total. El rendimiento al vencimiento (YTM) es la tasa que iguala el precio pagado con todos los flujos futuros. Aquí: precio 96.11, cupón 8%, plazo 5 años, valor final 100. Calculando: YTM = 9.00%. C) es correcta. A) 7.33% es incorrecta porque implicaría un bono comprado con prima (más de 100). B) 8.32% es incorrecta porque no refleja suficientemente el descuento en el precio."}, {"a": "C", "e": "Los bonos pueden incluir opciones, como cláusulas especiales. Un bono \"callable\" permite al emisor recomprarlo antes del vencimiento (perjudica al inversor, que exige mayor rendimiento). Un bono \"putable\" permite al inversor devolverlo al emisor (beneficia al inversor, que acepta menor rendimiento). El gerente dice que ambos deberían tener mayor diferencial de rendimiento que un bono sin opciones, pero se equivoca respecto al bono putable. C) es correcta: el bono putable debería tener menor diferencial. A) es incorrecta. B) es incorrecta porque el callable sí debe tener mayor diferencial."}, {"a": "B", "e": "Comprar acciones con margen es como comprar una casa con hipoteca: pones una parte y pides prestado el resto. Aquí el inversor pone 55% de 95€ = 52.25€ y pide prestado 42.75€. El margen de mantenimiento (30%) es el mínimo de capital propio que debes mantener. Si el precio baja, tu capital se reduce. La llamada de margen ocurre cuando: (Precio - deuda)/Precio = 30%. Resolviendo: P - 42.75 = 0.30P, entonces 0.70P = 42.75, P = 61.07€. B) es correcta. A) 42.75€ es solo la deuda. C) 74.64€ resulta de un cálculo erróneo."}, {"a": "C", "e": "La duración de un portafolio de bonos mide su sensibilidad a cambios en tasas de interés, como un promedio ponderado. Se calcula multiplicando el peso de cada bono por su duración. Valor total: 1.2+3.4+2.9+1.6 = 9.1 millones. Duración = (1.2/9.1)×3.2 + (3.4/9.1)×7.6 + (2.9/9.1)×12.4 + (1.6/9.1)×1.5 = 0.42+2.84+3.95+0.26 = 7.47, aproximadamente 7.5. C) es correcta. A) 5.4 es incorrecta por mala ponderación. B) 6.2 es un cálculo intermedio erróneo."}, {"a": "C", "e": "Las materias primas se dividen en dos grupos: duras y blandas. Las duras (hard commodities) son recursos que se extraen de la tierra, como petróleo, gas y metales. Las blandas (soft commodities) son productos agrícolas o ganaderos que se cultivan o crían. C) es correcta: el petróleo crudo se extrae del subsuelo, por lo que es una materia prima dura. A) es incorrecta: el ganado es un producto ganadero, clasificado como materia prima blanda. B) es incorrecta: la madera proviene de árboles, un recurso renovable, y se clasifica como materia prima blanda."}, {"a": "B", "e": "La Línea del Mercado de Capitales (CML) muestra cuánto rendimiento extra obtienes por asumir más riesgo, como subir una escalera donde cada peldaño de riesgo da más retorno. La fórmula es: Rendimiento esperado = Tasa libre de riesgo + (riesgo del portafolio / riesgo del mercado) × (rendimiento del mercado - tasa libre). Con los datos: E(R) = 4% + (15%/20%) × (12%-4%) = 4% + 0.75 × 8% = 10%. Sin embargo, el examen indica B) 8%, lo que corresponde a usar una desviación del portafolio menor. Respuesta B) según el examen."}, {"a": "A", "e": "Una opción call europea da derecho a comprar un activo a un precio fijo (precio de ejercicio) en una fecha futura. Piensa en un cupón de descuento: si el precio fijo para comprar es más alto, el cupón vale menos. A) es correcta: a mayor precio de ejercicio, menor probabilidad de que convenga ejercer la opción, así que su valor baja (relación inversa). B) es incorrecta: más tiempo hasta el vencimiento generalmente aumenta el valor porque hay más posibilidad de movimiento favorable. C) es incorrecta: si el activo subyacente sube de precio, el call vale más, no menos."}, {"a": "C", "e": "Imagina que tienes un auto y sabes cuánto se devalúa cada año. Eso te ayuda a estimar cuánto gastarás en mantenerlo. En finanzas, la depreciación y amortización históricas miden cuánto pierden valor los activos existentes, lo que sirve para estimar el gasto de mantenimiento de capital (capex de mantenimiento), es decir, lo necesario para reponer esos activos. C es correcta porque refleja ese costo de reposición. A es incorrecta porque el gasto de capital para crecimiento requiere analizar planes de expansión futuros, no datos históricos. B es incorrecta porque los niveles de deuda y capital propio dependen de decisiones de financiamiento, no de la depreciación."}, {"a": "C", "e": "Una opción put (derecho a vender a un precio fijo) funciona como un seguro: el comprador paga una prima y el vendedor la cobra. Aquí el vendedor cobró $15 de prima. Al vencimiento, el precio del activo ($260) supera el precio de ejercicio ($250), así que al comprador no le conviene ejercer su derecho a vender más barato. El put expira sin valor. C es correcta: el vendedor se queda con toda la prima de $15. A ($5) es incorrecta porque no corresponde a ningún cálculo válido en este caso. B ($10) es incorrecta: sería la diferencia entre 260 y 250, pero como el put no se ejerce, no se resta nada de la prima."}, {"a": "A", "e": "En fondos de inversión alternativa, el socio gestor (GP) cobra comisiones por rendimiento. Existen dos métodos de reparto. El método por operación individual permite al GP cobrar tras cada inversión exitosa. El método del fondo completo obliga al GP a esperar hasta que todo el fondo genere ganancias netas. A es correcta: el método del fondo completo es menos ventajoso para el GP porque debe esperar más, mientras que los socios inversionistas (LP) tienen mayor protección. B es incorrecta porque claramente favorece más a los LP. C es incorrecta porque confunde los métodos: es el reparto por operación el que más beneficia al GP."}, {"a": "C", "e": "Evaluar la solidez crediticia de una empresa es como evaluar si alguien puede pagar sus deudas. Se usan dos indicadores clave: deuda/EBITDA (cuánta deuda tiene respecto a sus ganancias operativas) y EBITDA/gastos por intereses (capacidad de cubrir intereses). C es correcta: mayor deuda/EBITDA significa mucho endeudamiento y menor EBITDA/intereses significa dificultad para pagar intereses; ambos son señales negativas. A es incorrecta porque baja deuda/EBITDA indica poco endeudamiento, algo positivo. B es incorrecta porque combina bajo endeudamiento con buena cobertura de intereses, lo cual no es el peor escenario."}, {"a": "A", "e": "La eficiencia de mercado estudia si se pueden predecir precios futuros con cierta información. Las correlaciones seriales miden si los rendimientos pasados de un valor siguen un patrón predecible, como si el precio de ayer predijera el de hoy. A es correcta: esto evalúa la eficiencia de forma débil, que analiza si los datos históricos de precios sirven para predecir. B es incorrecta porque la eficiencia semifuerte se prueba viendo cómo reaccionan los precios a noticias públicas. C es incorrecta porque la eficiencia fuerte evalúa si incluso la información privilegiada permite obtener ganancias extraordinarias."}, {"a": "C", "e": "Un acuerdo de recompra (repo) es como un préstamo con garantía: una parte entrega valores como colateral a cambio de dinero, con el compromiso de recomprarlos. El margen inicial (también llamado recorte) es un porcentaje extra de garantía que protege parcialmente al prestamista si el colateral baja de valor. C es correcta: ese margen ofrece protección parcial, no total. A es incorrecta porque ambas partes tienen riesgo crediticio, no solo el prestamista. B es incorrecta porque aunque usar bonos gubernamentales de alta calidad reduce el riesgo, no lo elimina por completo."}, {"a": "B", "e": "Piensa en la curva de rendimientos como un mapa que muestra qué interés pagan bonos según su plazo. Un bono cupón cero es aquel que no paga intereses periódicos; solo devuelve el capital al vencimiento. Los rendimientos de estos bonos gubernamentales para todos los plazos definen la curva spot (curva de tasas al contado). B es correcta por esta definición. A es incorrecta porque la curva par usa rendimientos de bonos que cotizan a su valor nominal, con cupones. C es incorrecta porque la curva forward se construye a partir de tasas futuras implícitas derivadas de la curva spot, no directamente de bonos cupón cero."}, {"a": "A", "e": "Imagina una estampida: la gente corre porque ve a otros correr, sin saber realmente por qué. En los mercados financieros, cuando los inversores venden solo porque ven que otros venden, sin hacer su propio análisis, se llama comportamiento de manada (herding en inglés). A es correcta: describe exactamente esta imitación grupal que causa sobrerreacciones en precios. B es incorrecta porque la aversión a las pérdidas es la tendencia a sufrir más por perder que por ganar la misma cantidad. C es incorrecta porque el exceso de confianza es sobreestimar las propias habilidades de análisis o predicción."}, {"a": "B", "e": "El mercado spot (al contado) es donde compras un activo pagando su precio completo. En el mercado de derivados, en cambio, controlas un activo sin comprarlo directamente, pagando solo un margen o una prima, que es una fracción del valor total. B es correcta: los derivados requieren poco capital inicial comparado con el mercado spot. A es incorrecta porque los derivados suelen tener costos de transacción bajos, no altos. C es incorrecta porque los derivados facilitan tomar posiciones equivalentes a ventas en corto sin las restricciones típicas del mercado al contado."}, {"a": "C", "e": "El margen es el dinero propio que un inversor deposita para abrir una posición. El ratio de apalancamiento indica cuántas veces tu posición total es mayor que tu dinero propio. Por ejemplo, si pones $1 y controlas $4, tu apalancamiento es 4 veces. C es correcta: describe exactamente esta relación entre posición total y capital propio. A es incorrecta porque dividir el capital propio entre la posición total da el porcentaje de margen, que es la inversa del apalancamiento. B es incorrecta porque la fracción mínima del precio que debe ser capital propio describe el requisito de margen inicial, no el ratio de apalancamiento."}, {"a": "A", "e": "Un fondo de cobertura cobra comisiones como un restaurante cobra propina y servicio. Aqui hay dos comisiones: una de gestion (2% sobre el valor final) y una de incentivo (20% sobre ganancias que superen la marca de agua alta). La marca de agua alta es el valor maximo historico del fondo, que fue $112M al final del Ano 1. En el Ano 3, el fondo vale $116M. Comision de gestion: 2% x 116 = $2.32M. Ganancia sobre la marca de agua: 116 - 112 = $4M. Comision de incentivo: 20% x 4 = $0.8M. Total comisiones: $3.12M. Valor neto: $112.88M. Retorno neto: (112.88 - 100)/100 = 12.88%, cercano a A. B y C no reflejan correctamente el calculo de ambas comisiones."}, {"a": "A", "e": "Imagina un bono como un prestamo que el emisor puede cancelar anticipadamente (bono rescatable). Cuando el rendimiento (lo que exige el mercado) es menor que el cupon (interes que paga el bono), el bono sube de precio y se acerca al precio de rescate. El emisor quiere rescatarlo porque le sale caro. Esto genera convexidad negativa: el precio deja de subir aunque el rendimiento siga bajando, como un techo que frena el ascenso. A es correcta por eso. B es incorrecta porque al igualar rendimiento y cupon, el bono esta cerca del valor par y aun puede tener convexidad positiva. C es incorrecta porque con rendimiento alto, el bono cotiza con descuento, lejos del rescate, y se comporta como un bono normal con convexidad positiva."}, {"a": "A", "e": "Gestionar un portafolio es como cuidar un jardin: primero plantas (planificas), luego riegas (ejecutas) y despues revisas si las plantas crecen bien (retroalimentacion). El paso de retroalimentacion incluye rebalancear el portafolio, es decir, ajustar las proporciones de los activos para que vuelvan al objetivo original. A es correcta porque rebalancear es parte de la retroalimentacion. B es incorrecta porque decidir la asignacion de activos pertenece a la etapa de planificacion y ejecucion, no a la retroalimentacion. C es incorrecta porque entender las restricciones del cliente se hace al inicio, durante la planificacion, cuando se crea la declaracion de politica de inversion."}, {"a": "A", "e": "Los criterios ambientales, sociales y de gobierno corporativo (ASG) pueden aplicarse de varias formas al invertir. La inversion de impacto selecciona inversiones especificamente por sus beneficios ambientales o sociales medibles, ademas del retorno economico. Es como elegir una tienda no solo por el precio sino por su compromiso social. A es correcta porque describe exactamente esa seleccion activa por impacto positivo. B es incorrecta porque el filtro negativo solo excluye empresas o sectores que no cumplen criterios eticos, pero no busca activamente generar impacto. C es incorrecta porque la participacion activa busca influir en empresas que ya estan en cartera mediante dialogo y voto, no seleccionar por beneficio social."}, {"a": "A", "e": "La duracion modificada mide cuanto cambia el precio de un bono cuando cambia el rendimiento, como un termometro financiero. La formula es: cambio en valor = -duracion modificada x cambio en rendimiento x valor de mercado. Importante: se usa el valor de mercado ($23.275M), no el valor nominal. Calculo: -6.39 x 0.005 x 23,275,000 = -$743,636. A es correcta. B es incorrecta porque usa el valor nominal de $20M en vez del valor de mercado, obteniendo -$639,000. C es incorrecta porque tiene la magnitud correcta pero el signo positivo; cuando el rendimiento sube, el precio del bono baja, asi que el cambio debe ser negativo."}, {"a": "B", "e": "Los valores respaldados por activos dividen el riesgo en capas llamadas tramos, como pisos de un edificio: los de arriba son mas seguros y los de abajo absorben las primeras perdidas. Esto se llama division por tramos de credito y es una forma de mejorar la calidad crediticia. B es correcta porque los valores respaldados por tarjetas de credito usan esta estructura de tramos (senior, intermedio y subordinado). A es incorrecta porque los bonos cubiertos usan un grupo de activos como garantia, no tramos de credito. C es incorrecta porque los valores hipotecarios de agencias gubernamentales cuentan con garantia del gobierno, no con division en tramos."}, {"a": "B", "e": "El rendimiento al vencimiento (RAV) es la tasa que iguala el precio del bono con el valor presente de todos sus pagos futuros. Piensa en el como una promesa condicional: solo se cumple si reinviertes cada cupon a esa misma tasa. B es correcta porque esa es su principal limitacion: supone que todos los cupones se reinvierten al mismo RAV, algo casi imposible en la realidad porque las tasas cambian. A es incorrecta porque el RAV si considera el momento de cada flujo de caja al descontarlo a su periodo correspondiente. C es incorrecta porque el RAV si incluye la ganancia o perdida de capital al incorporar el valor nominal al vencimiento en el calculo."}, {"a": "C", "e": "La paridad put-call es como una ecuacion que muestra que dos combinaciones de instrumentos financieros producen el mismo resultado. Una opcion call (derecho a comprar) mas un bono por el valor presente del precio de ejercicio forma un fiduciary call. Un activo mas una opcion put (derecho a vender) forma un protective put. La formula es: Call + valor presente del strike = Activo + Put. C es correcta porque la paridad demuestra la equivalencia entre estas dos combinaciones. A es incorrecta porque puts y calls tienen resultados opuestos y no son equivalentes entre si. B es incorrecta porque un covered call (activo + venta de call) no equivale a un protective put."}, {"a": "B", "e": "Invertir en acciones genera retorno de dos formas principales: dividendos en efectivo y cambios en el precio de mercado. Los dividendos en acciones, en cambio, son como cortar una pizza en mas pedazos: tienes mas porciones pero la pizza es la misma. B es correcta porque los dividendos en acciones solo aumentan el numero de acciones que posees, pero el precio por accion baja proporcionalmente, sin transferir valor real. A es incorrecta porque los dividendos en efectivo si son fuente de retorno al entregar dinero directamente al accionista. C es incorrecta porque el cambio en el precio de mercado si genera retorno como ganancia o perdida de capital."}, {"a": "B", "e": "Al operar en los mercados, un broker recibe distintos tipos de instrucciones, como un mensajero que necesita saber que entregar, como y cuando. Las instrucciones de liquidacion (clearing instructions) le dicen al broker como completar la operacion: la entrega de valores y el pago correspondiente. B es correcta porque describe exactamente esas instrucciones de liquidacion. A es incorrecta porque las instrucciones de validez indican cuanto tiempo dura vigente una orden, por ejemplo si es solo por el dia o hasta cancelarse. C es incorrecta porque las instrucciones de ejecucion indican como ejecutar la orden, por ejemplo a precio de mercado o con un limite especifico."}];
const E5=[["According to the CFA Institute Code of Ethics, members must place the integrity of the investment profession and the interests of clients above their own personal interests. Which of the following actions BEST demonstrates compliance with this principle?", ["A) A portfolio manager discloses all conflicts of interest to clients before executing trades.", "B) A portfolio manager executes personal trades before client trades to test market conditions.", "C) A portfolio manager shares confidential client information with a colleague to get a second opinion."]], ["An analyst receives material nonpublic information about a company from a friend who works at that company. According to Standard II(A) - Material Nonpublic Information, the analyst should:", ["A) Trade on the information quickly before it becomes public.", "B) Share the information only with her firm's compliance department and then trade.", "C) Refrain from trading on the information and encourage the company to make public disclosure."]], ["Under the GIPS (Global Investment Performance Standards), which of the following is a requirement for firms claiming compliance?", ["A) Firms must present at least 5 years of GIPS-compliant performance history, or since inception if less than 5 years.", "B) Firms may select only their best-performing composites for presentation.", "C) Firms must include terminated accounts in historical composite performance only if the client requests it."]], ["A CFA charterholder manages portfolios for both institutional and retail clients. She consistently allocates IPO shares to institutional accounts first because they generate higher fees. This practice most likely violates:", ["A) Standard I(C) - Misrepresentation.", "B) Standard IV(B) - Additional Compensation Arrangements.", "C) Standard III(A) - Loyalty, Prudence, and Care."]], ["Standard III(B) - Fair Dealing requires that members deal fairly with all clients when providing investment recommendations or taking investment action. Which scenario best illustrates a violation?", ["A) Sending research reports to all clients simultaneously via email.", "B) Allowing premium clients to trade on new recommendations one hour before other clients receive them.", "C) Providing different levels of service at different fee structures, disclosed to all clients."]], ["An investment manager uses client brokerage commissions to pay for research services (soft dollars). According to CFA Institute Standards, this practice is:", ["A) Always prohibited as it represents a conflict of interest.", "B) Permitted without restriction as long as the manager discloses it in annual reports.", "C) Permitted only if the research directly benefits the clients whose commissions are used."]], ["A portfolio manager serves as a fiduciary for a pension fund. Which action would most likely constitute a breach of fiduciary duty?", ["A) Investing pension assets in a diversified index fund with low fees.", "B) Investing pension assets in a private venture owned by the manager's spouse without disclosure.", "C) Rebalancing the portfolio quarterly in line with the investment policy statement."]], ["According to Standard V(A) - Diligence and Reasonable Basis, an analyst must:", ["A) Always agree with the consensus forecast to avoid being wrong.", "B) Only recommend securities that have outperformed the market in the past 12 months.", "C) Have a reasonable and adequate basis for any investment recommendation."]], ["Under Standard I(B) - Independence and Objectivity, which of the following is most likely acceptable?", ["A) An analyst accepts a luxury vacation from a company she covers and does not disclose it.", "B) An analyst accepts a modest business lunch from a company representative during a routine meeting.", "C) An analyst changes her rating on a stock after the company's CEO threatens to withdraw advertising from her firm."]], ["Standard VII(B) - Reference to CFA Institute, the CFA Designation, and the CFA Program states that members and candidates must not misrepresent or exaggerate the meaning of the CFA designation. Which usage is a violation?", ["A) Using 'John Smith, Chartered Financial Analyst' as a noun-form title on a resume.", "B) Writing 'John Smith, CFA' on a business card.", "C) Stating 'As a CFA charterholder, I have expertise in investment analysis.'"]], ["A research analyst discovers that her firm's trading desk has been front-running client orders. According to the Standards, she should most appropriately:", ["A) Ignore the issue since it is not her department's responsibility.", "B) Immediately inform the media to protect public interest.", "C) Report the activity through the firm's compliance procedures."]], ["Standard III(C) - Suitability requires that when managing a portfolio, a member must consider the client's:", ["A) Social media preferences and lifestyle choices.", "B) Financial situation, investment experience, and investment objectives.", "C) Personal opinions about specific companies' management teams."]], ["An analyst who is a CFA candidate mentions in a press interview: 'I passed all three CFA exams on the first attempt, which guarantees superior investment returns.' This statement violates:", ["A) Both Standard VII(B) and Standard I(C) - Misrepresentation.", "B) Standard IV(A) - Loyalty to Employer only.", "C) Standard VII(B) only, by implying the CFA designation guarantees performance."]], ["Under the CFA Institute Standards, the duty of loyalty is owed to:", ["A) The employer first, then clients, then the profession.", "B) The CFA Institute first, then clients, then the employer.", "C) Clients first, then the integrity of the capital markets, then the employer."]], ["A member changes firms and wants to take a detailed client list including account balances and investment strategies to her new employer. According to Standard IV(A) - Loyalty, this is:", ["A) Prohibited because such detailed client information is the property of the former employer.", "B) Acceptable because the information will help her serve clients better at the new firm.", "C) Acceptable only if clients give written consent to transfer their information."]], ["An investor deposits $10,000 in an account earning 6% annual interest compounded annually. What is the value of the investment after 3 years?", ["A) $11,800.00.", "B) $11,910.16.", "C) $11,576.25."]], ["A project requires an initial investment of $50,000 and is expected to generate cash flows of $15,000 per year for 4 years. If the discount rate is 10%, the NPV of the project is closest to:", ["A) $-2,451.", "B) $10,000.", "C) $-7,548."]], ["Which of the following statements about the Internal Rate of Return (IRR) is most accurate?", ["A) The IRR always provides the same accept/reject decision as the NPV method.", "B) A project should be rejected if its IRR exceeds the required rate of return.", "C) The IRR is the discount rate that makes the NPV of a project equal to zero."]], ["A dataset contains the following values: 4, 8, 6, 10, 12. The sample standard deviation is closest to:", ["A) 3.16.", "B) 2.83.", "C) 8.00."]], ["The correlation coefficient between two assets is -0.75. This indicates that:", ["A) The assets tend to move in the same direction with strong magnitude.", "B) The assets tend to move in opposite directions with relatively strong magnitude.", "C) There is no linear relationship between the assets."]], ["An investor can receive $5,000 today or $5,800 in two years. If the annual discount rate is 8%, the investor should:", ["A) Wait for the $5,800 because its present value ($5,350) exceeds $5,000.", "B) Wait for the $5,800 because its present value ($4,972) is nearly the same.", "C) Take the $5,000 today because the present value of $5,800 is only $4,972."]], ["In a normal distribution, approximately what percentage of observations falls within one standard deviation of the mean?", ["A) 68%.", "B) 95%.", "C) 99%."]], ["A bond has a face value of $1,000, a coupon rate of 5% paid annually, and 3 years to maturity. If the yield to maturity is 6%, the price of the bond is closest to:", ["A) $1,000.00.", "B) $1,027.75.", "C) $973.27."]], ["The probability of event A is 0.4 and the probability of event B is 0.3. If A and B are independent events, the probability that both A and B occur is:", ["A) 0.70.", "B) 0.12.", "C) 0.10."]], ["A population has a mean of 50 and a standard deviation of 10. According to Chebyshev's inequality, at least what proportion of observations lie within 3 standard deviations of the mean?", ["A) 75%.", "B) 99%.", "C) 89%."]], ["An analyst runs a simple linear regression and obtains an R-squared of 0.81. This means that:", ["A) 81% of the variation in the dependent variable is explained by the independent variable.", "B) The correlation between the two variables is 0.81.", "C) The slope coefficient is 0.81."]], ["In hypothesis testing, a Type I error occurs when:", ["A) A false null hypothesis is not rejected.", "B) The test statistic falls in the acceptance region.", "C) A true null hypothesis is rejected."]], ["A sample of 36 observations has a mean of 100 and a standard deviation of 18. The 95% confidence interval for the population mean is closest to:", ["A) 94.12 to 105.88.", "B) 97.06 to 102.94.", "C) 100.00 to 106.00."]], ["An annuity pays $2,000 per year for 5 years, with the first payment one year from today. If the discount rate is 7%, the present value of this annuity is closest to:", ["A) $7,654.50.", "B) $8,200.40.", "C) $10,000.00."]], ["The geometric mean return of an investment that earned 10%, -5%, and 20% over three years is closest to:", ["A) 8.33%.", "B) 7.89%.", "C) 8.11%."]], ["A continuous random variable follows a uniform distribution between 20 and 80. The probability that the variable takes a value between 35 and 65 is:", ["A) 0.50.", "B) 0.75.", "C) 0.30."]], ["In a hypothesis test with a p-value of 0.03 and a significance level of 0.05, the analyst should:", ["A) Fail to reject the null hypothesis.", "B) Increase the sample size before making a decision.", "C) Reject the null hypothesis."]], ["An analyst collects a sample from a non-normal population. According to the Central Limit Theorem, the sampling distribution of the sample mean will be approximately normal if the sample size is:", ["A) At least 10.", "B) At least 30.", "C) At least 100."]], ["If the price of a good increases by 10% and the quantity demanded decreases by 15%, the price elasticity of demand is:", ["A) -0.67.", "B) -1.00.", "C) -1.50."]], ["In a perfectly competitive market, in the long run, firms earn:", ["A) Economic profits due to barriers to entry.", "B) Zero economic profit because of free entry and exit.", "C) Losses because price is always below average total cost."]], ["An increase in the money supply by the central bank, all else equal, will most likely cause:", ["A) A decrease in interest rates and an increase in investment.", "B) An increase in interest rates and a decrease in investment.", "C) No change in interest rates or investment."]], ["GDP measured using the expenditure approach is calculated as:", ["A) GDP = C + I + G + (X - M).", "B) GDP = C + I + G + X + M.", "C) GDP = C + I + G - (X - M)."]], ["Demand-pull inflation is most likely caused by:", ["A) An increase in the price of oil and raw materials.", "B) An increase in aggregate demand that exceeds aggregate supply.", "C) A decrease in government spending."]], ["If a country has a current account deficit, it must have a:", ["A) Capital account deficit as well.", "B) Balanced government budget.", "C) Capital account surplus to balance the deficit."]], ["Under a floating exchange rate system, if demand for a country's exports increases, its currency will most likely:", ["A) Depreciate.", "B) Appreciate.", "C) Remain unchanged."]], ["A monopolist maximizes profit by producing at the quantity where:", ["A) Price equals marginal cost.", "B) Average total cost is minimized.", "C) Marginal revenue equals marginal cost."]], ["The short-run aggregate supply curve is upward sloping because:", ["A) In the short run, some input prices are sticky and do not adjust immediately to changes in the price level.", "B) In the short run, all prices adjust immediately.", "C) Higher output always leads to lower prices."]], ["Fiscal policy refers to government use of:", ["A) Interest rates and open market operations to manage the economy.", "B) Taxation and government spending to influence economic activity.", "C) Exchange rate adjustments to manage trade balances."]], ["In the business cycle, the peak is characterized by:", ["A) Maximum economic output before a contraction begins.", "B) The lowest point of economic activity before recovery.", "C) Rapidly increasing unemployment rates."]], ["A tariff on imported goods will most likely:", ["A) Decrease the domestic price and increase imports.", "B) Have no effect on domestic prices or imports.", "C) Increase the domestic price and decrease imports."]], ["The concept of comparative advantage states that countries should:", ["A) Produce all goods domestically to avoid dependence on trade.", "B) Specialize in producing goods for which they have the lowest opportunity cost.", "C) Only export goods in which they have an absolute advantage."]], ["If the nominal interest rate is 8% and the inflation rate is 3%, the real interest rate is approximately:", ["A) 11%.", "B) 3%.", "C) 5%."]], ["In an oligopoly market structure, firms:", ["A) Are interdependent and consider rivals' actions when making decisions.", "B) Are price takers with no market power.", "C) Sell perfectly differentiated products with no substitutes."]], ["When the central bank sells government bonds in open market operations, this will most likely:", ["A) Increase the money supply and lower interest rates.", "B) Have no effect on the money supply.", "C) Decrease the money supply and raise interest rates."]], ["The law of diminishing marginal returns states that:", ["A) As more units of a variable input are added to a fixed input, total output eventually decreases.", "B) As more units of a variable input are added to a fixed input, marginal output eventually declines.", "C) Firms always experience increasing returns to scale."]], ["A country's balance of payments includes:", ["A) The current account, capital account, and financial account.", "B) Only the current account.", "C) Only trade in goods, excluding services."]], ["Stagflation refers to a situation where the economy experiences:", ["A) High growth and low inflation simultaneously.", "B) Deflation combined with high unemployment.", "C) Stagnant economic growth combined with high inflation."]], ["If the cross-price elasticity of demand between two goods is positive, the goods are:", ["A) Substitutes.", "B) Complements.", "C) Inferior goods."]], ["An expansionary fiscal policy during a recession would most likely involve:", ["A) Increasing taxes and decreasing government spending.", "B) Decreasing taxes and increasing government spending.", "C) Keeping taxes and government spending unchanged."]], ["Which financial statement reports a company's revenues and expenses over a specific period of time?", ["A) Balance sheet.", "B) Income statement.", "C) Statement of cash flows."]], ["Under IFRS, which of the following is NOT a required classification on the income statement?", ["A) Finance costs.", "B) Gross profit.", "C) Operating income."]], ["A company has total assets of 500,000, total liabilities of 300,000, and retained earnings of 120,000. What is the contributed capital?", ["A) 80,000.", "B) 200,000.", "C) 120,000."]], ["Which inventory method assigns the cost of the most recently purchased items to cost of goods sold?", ["A) FIFO.", "B) Weighted average cost.", "C) LIFO."]], ["In a period of rising prices, which inventory method results in the HIGHEST net income?", ["A) FIFO.", "B) LIFO.", "C) Weighted average cost."]], ["A company purchases equipment for 100,000 with a useful life of 5 years and no salvage value. Using straight-line depreciation, what is the annual depreciation expense?", ["A) 25,000.", "B) 20,000.", "C) 50,000."]], ["Which section of the cash flow statement includes cash received from customers?", ["A) Operating activities.", "B) Investing activities.", "C) Financing activities."]], ["Under the indirect method, depreciation expense is added back to net income in the cash flow statement because it is:", ["A) A cash inflow from investing activities.", "B) An adjustment for changes in working capital.", "C) A non-cash expense that reduced net income."]], ["A current ratio of 1.5 indicates that:", ["A) Current liabilities exceed current assets.", "B) The company has negative working capital.", "C) Current assets are 1.5 times current liabilities."]], ["Which financial ratio measures how efficiently a company uses its assets to generate sales?", ["A) Return on equity.", "B) Asset turnover ratio.", "C) Debt-to-equity ratio."]], ["Under IFRS 15, revenue from a contract with a customer is recognized when:", ["A) Cash is received from the customer.", "B) The contract is signed by both parties.", "C) A performance obligation is satisfied."]], ["A deferred tax liability most likely arises when:", ["A) Tax expense exceeds taxes payable due to temporary differences.", "B) Taxes payable exceed tax expense.", "C) The company has permanent differences between book and tax income."]], ["An operating lease, compared to a finance lease, results in which of the following for the lessee?", ["A) Higher total assets on the balance sheet.", "B) Higher operating income in early years.", "C) Lower total expenses over the lease term."]], ["Which of the following would INCREASE a company's debt-to-equity ratio?", ["A) Issuing new common stock.", "B) Repaying long-term debt.", "C) Borrowing additional long-term debt."]], ["The DuPont decomposition of return on equity (ROE) includes all of the following EXCEPT:", ["A) Asset turnover.", "B) Current ratio.", "C) Financial leverage."]], ["If a company capitalizes an expenditure instead of expensing it, the immediate effect on net income is:", ["A) Net income increases.", "B) Net income decreases.", "C) Net income is unchanged."]], ["Which of the following best describes a contra asset account?", ["A) An account that increases the value of an asset.", "B) An account that offsets and reduces the balance of a related asset.", "C) A liability account presented on the asset side of the balance sheet."]], ["A company reports net income of 200,000, depreciation of 30,000, an increase in accounts receivable of 15,000, and an increase in accounts payable of 10,000. Cash flow from operations using the indirect method is:", ["A) 225,000.", "B) 255,000.", "C) 215,000."]], ["A project has an initial cost of 100,000 and generates cash flows of 40,000 per year for 4 years. If the required rate of return is 10%, the NPV is closest to:", ["A) 26,795.", "B) 60,000.", "C) 15,000."]], ["The internal rate of return (IRR) is best defined as the discount rate that:", ["A) Maximizes the project's future cash flows.", "B) Makes the net present value of a project equal to zero.", "C) Equals the company's weighted average cost of capital."]], ["A project has a payback period of 3.5 years. If the company's maximum acceptable payback period is 4 years, the project should be:", ["A) Rejected because the payback period is too long.", "B) Neither accepted nor rejected without knowing the NPV.", "C) Accepted because the payback period is within the threshold."]], ["Which of the following is a component of the weighted average cost of capital (WACC)?", ["A) Retained earnings growth rate.", "B) After-tax cost of debt.", "C) Gross profit margin."]], ["A company has a cost of equity of 12%, a pre-tax cost of debt of 8%, a tax rate of 25%, and a debt-to-total-capital ratio of 40%. The WACC is closest to:", ["A) 9.60%.", "B) 8.00%.", "C) 7.20%."]], ["According to Modigliani-Miller Proposition I (without t o."]], ["According to the CAPM, a security that plots ABOVE the Security Market Line (SML) is:", ["A) Overvalued and should be sold.", "B) Undervalued and offers a return above what is justified by its systematic risk.", "C) Correctly priced by the market."]], ["An investor who refuses to sell a losing investment because they do not want to realize the loss is exhibiting:", ["A) Overconfidence bias.", "B) Representativeness bias.", "C) Loss aversion bias."]], ["A portfolio with a beta of 0.8 is expected to:", ["A) Move 80% as much as the market in the same direction.", "B) Move in the opposite direction of the market.", "C) Be riskier than the overall market."]], ["The minimum variance portfolio on the efficient frontier is the portfolio that:", ["A) Has the highest expected return.", "B) Contains only risk-free assets.", "C) Has the lowest possible risk (standard deviation) among all possible portfolios."]], ["Adding a risk-free asset to the set of risky portfolios results in:", ["A) The efficient frontier becoming the Capital Market Line (CML), a straight line from the risk-free rate tangent to the efficient frontier.", "B) The elimination of all risk from the portfolio.", "C) A curved line below the original efficient frontier."]], ["An investor with a short time horizon, low risk tolerance, and high liquidity needs should MOST likely allocate a larger portion of their portfolio to:", ["A) Small-cap growth stocks and venture capital.", "B) Short-term government bonds and money market instruments.", "C) Emerging market equities and commodities."]]];

ents capital restrictions is least likely to achieve which of the following objectives?", ["A) Lower government bond yields", "B) Increased government revenues", "C) Increased efficiency of domestic firms"]], ["A fixed-income portfolio includes 15 bonds with an average maturity of 10 years. Each of these bonds is a high-yield bond with an embedded call option. The most appropriate measure to use in an assessment of the portfolio's interest rate risk is:", ["A) effective duration", "B) modified duration", "C) Macaulay duration"]], ["All else equal, in response to an increase in the risk-free rate assumption used in the one-period binomial option pricing model, the risk-neutral probability of an upward price movement will most likely:", ["A) increase", "B) be unaffected", "C) decrease"]], ["Which of the following is most likely assumed by analysts using free-cash-flow-to-equity (FCFE) models?", ["A) marginal revenue is greatest", "B) marginal revenue equals marginal cost", "C) the difference between marginal revenue and marginal cost is greatest"]], ["A high water mark on a hedge fund will most likely:", ["A) protect investors from paying fees twice for the same performance", "B) protect investors from paying any incentive fees unless a minimum return is achieved", "C) ensure that incentive fees are only charged on returns in excess of a minimum level"]], ["How is an investor's indifference curve most likely affected by their utility and risk aversion?", ["A) Both utility and risk aversion affect the shape of the curve", "B) Utility affects the location of the curve while risk aversion affects the shape of the curve", "C) Utility affects the shape of the curve while risk aversion affects the location of the curve"]], ["Which of the following assets is most likely to be amortized?", ["A) Goodwill", "B) Machinery with a 5-year expected useful life", "C) A purchased patent, set to expire in 10 years"]], ["The most likely reason that forward currency exchange rates are considered to be poor predictors of future spot rates is:", ["A) systematic over-estimation", "B) systematic under-estimation", "C) the margin of error is too great"]], ["Which of the following is least likely to be used by banks as a source of short-term funds?", ["A) Retail deposits", "B) Common stock", "C) Certificates of deposit"]], ["If an analyst believes that two variables are positively correlated, which of the following is the most appropriate way to denote the alternative hypothesis Ha for a test of statistical significance?", ["A) rho != 0", "B) rho > 0", "C) rho <= 0"]], ["Real assets most likely appeal to investors who are seeking assets that are:", ["A) easy to trade", "B) easy to manage", "C) mispriced relative to their value"]], ["Last year, Alphaton and Betaville established a customs union. Previously, Alphaton imposed a 15% tariff on copper imports from all countries. Upon entering the customs union, Alphaton eliminated tariffs on products imported from Betaville while maintaining tariffs for other countries. Before the arrangement, Alphaton imported 10 million tons of copper from Gammaland, which has lower cost of production than either Alphaton or Betaville. In the first year of the customs union, Alphaton imported 6 million tons from Betaville and 4 million tons from Gammaland. The change in Alphaton's copper purchasing is most accurately classified as:", ["A) trade creation", "B) trade diversion", "C) comparative advantage"]], ["A board of directors that includes significant numbers of both executive and non-executive members is most accurately described as having a:", ["A) one-tier structure", "B) supervisory board", "C) dual-class structure"]], ["Arnica Capital has a fund that charges a 20% performance fee subject to a hurdle rate of 7% and a 1.75% catch-up return. Assuming no management fee, if the fund has earned an IRR of 16%, the return, in percent, that the LP will receive is closest to:", ["A) 11.7%", "B) 12.8%", "C) 14.2%"]], ["Which of ed by a dynamic cover pool", "C) An MBS provides investors recourse to the underlying loans while recourse for a covered bond is limited to the issuer"]], ["An analyst who suspects that a company is using aggressive accrual accounting policies can most likely confirm this suspicion by determining if the company's:", ["A) inventory turnover ratio is declining", "B) interest coverage ratio has fallen below 2.0", "C) ratio of cash flow from operations to net income is persistently below 1.0"]], ["Which of the following metrics is most likely to be classified as a lagging indicator of economic activity? Indicator 1: Inventory-to-sales ratio. Indicator 2: Average duration of unemployment.", ["A) Indicator 1 only", "B) Indicator 2 only", "C) Both Indicator 1 and Indicator 2"]], ["A hedge fund takes long and short positions in traditional publicly traded equities and has an overall beta of approximately zero. The hedge fund most likely uses a:", ["A) macro strategy", "B) market neutral strategy", "C) fundamental value strategy"]], ["Alphya Corp. (APC) has issued 45 million common shares with a book value of $11.20 per share. Currently, the company's debt is worth $165 million and its common stock is trading for $13.60 per share. APC is carrying $32 million in cash on its balance sheet. The company's market capitalization is most likely:", ["A) $612 million", "B) $745 million", "C) $777 million"]], ["A model that uses the relationships between security returns and interest rates is most accurately classified as a:", ["A) statistical factor model", "B) fundamental factor model", "C) macroeconomic factor model"]], ["An analyst gathers the following information on a company: Equity cost of capital 12.5%, Debt cost of capital 8.5%, Book value weight 50%/50%, Market value weight 70%/30%, Target value weight 60%/40%. Assuming a marginal tax rate of 30%, the company's weighted average cost of capital is closest to:", ["A) 9.20%", "B) 9.90%", "C) 10.50%"]], ["An analyst gathers dat c expectations and there is a single optimal risky portfolio", "C) All investors have the same economic expectations and there is a range of possible optimal risky portfolios"]], ["Which of the following market structures relies most heavily on dealers as a source of liquidity?", ["A) Order-driven markets", "B) Quote-driven markets", "C) Continuous trading markets"]], ["Last year, a forest products company's pulp division sold 2 million tonnes at an average unit price of $700 per tonne. An analyst estimates the price will be 5% higher over the next 12 months. Assuming price elasticity of demand for pulp is 0.5, the analyst's estimate of the company's pulp sales in the upcoming year is closest to:", ["A) $1,365 million", "B) $1,433 million", "C) $1,463 million"]], ["In response to a parallel upward shift in the yield curve, the price of a 10-year, 8.5% annual coupon bond yielding 2.75% will most likely:", ["A) decrease", "B) not change", "C) increase"]], ["The potential payoff for a company's shareholders is most accurately described as:", ["A) the minimum of zero or the value of a firm's assets", "B) the maximum of a firm's assets or the value of its debt", "C) the maximum of zero or the value of a firm's net assets"]], ["An analyst has gathered the following data for ABC Corp and its industry over two years: ABC(20X2): Current ratio 2.2, Quick ratio 0.50, Days receivable 28, Days inventory 33, Days payable 28. Industry(20X2): Current 2.1, Quick 0.45, Days recv 30, Days inv 34, Days pay 27. ABC(20X1): Current 2.4, Quick 0.60, Days recv 26, Days inv 31, Days pay 29. Industry(20X1): Current 1.8, Quick 0.55, Days recv 32, Days inv 35, Days pay 28. The company's liquidity position can be most accurately described as:", ["A) better than the industry, worse than the prior year", "B) worse than the industry, better than the prior year", "C) better than the industry and better than the prior year"]], ["A country's disposable income is most accurately described as national income:", ["A) minus taxes plus transfer benefits", "B) minus taxes and transfer benefits", "C) multiplied by one plus the net tax rate"]], ["HNR Management, a private equity firm, has held JDL Corp. in its portfolio for five years. If HNR would like to realize the highest valuation for JDL while retaining some upside potential, it will most likely pursue which of the following exit strategies?", ["A) trade sale", "B) secondary sale", "C) initial public offering"]], ["The presence of momentum patterns that allow investors to consistently earn abnormal profits can most accurately be described as a challenge to:", ["A) all three forms of the efficient market hypothesis", "B) the weak form of the efficient market hypothesis only", "C) the strong and semi-strong forms of the efficient market hypothesis only"]], ["Berkley Manufacturing collected $2.3 million in cash from a tenant renting one of its unused facilities. The company recognizes this as deferred revenue for accounting purposes and pays taxes based on the cash payment. This will most likely result in Berkley recording:", ["A) a deferred tax asset", "B) a deferred tax liability", "C) neither a deferred tax asset nor a deferred tax liability"]], ["A fixed income security has a modified duration of 10.3 and a convexity of 88.5. If the bond's yield increases from 5.1% to 6.9%, the estimated percentage change in its price is closest to:", ["A) -15.7%", "B) -17.1%", "C) -20.0%"]], ["Which of the following statements is most accurate? Under Standard IV(B) - Additional Compensation Arrangements, members and candidates are required to obtain consent from their employer before accepting:", ["A) direct or indirect compensation from other employers", "B) direct or indirect compensation from clients or other employers", "C) direct compensation, gifts, or benefits from clients or other employers"]], ["Rashida James, CFA, is a portfolio manager who works with institutional investors. James learns from her husband that the pension plan for which he is a trustee has recently decided to replace one of the firms managing its funds. The next day, James calls another of the pension plan's trustees before this information becomes public knowledge to offer her services as a portfolio manager. James has most likely violated the CFA Standards concerning:", ["A) misconduct", "B) client confidentiality", "C) material non-public information"]], ["Adam Fleisher, CFA, is a money manager. His wife told him Royal Petroleum made a $50,000 donation to a charity she directs, for development work in Indonesia. Fleisher concluded Royal Petroleum must have discovered new oil reserves and is fostering goodwill. Although the donation news wasn't public, he purchased Royal Petroleum stock for appropriate client accounts. Two weeks later, Royal Petroleum announced new oil reserves and the stock rose 10%. Has Fleisher most likely violated the Standards?", ["A) No", "B) Yes, with respect to diligence and reasonable basis", "C) Yes, with respect to material nonpublic information"]], ["Teddy Larson, CFA, a portfolio manager with Pedigo Investments, exercises proxies on behalf of his clients most of the time, but not in every case. When Larson does exercise these proxies, he often does so in accordance with management's recommendations. Has Larson most likely violated the Standards?", ["A) No", "B) Yes, by failing to vote all proxies", "C) Yes, by often voting proxies in accordance with management's recommendations"]], ["Which of the following statements is most accurate? A member or candidate whose firm does not allow the details of short-term incentive-based compensation to be disclosed to clients:", ["A) must immediately dissociate from this activity", "B) must immediately disclose this information to clients", "C) should submit a written request that employees be allowed to disclose this information"]], ["Terence Hart, CFA, is a hedge fund manager specializing in merger arbitrage. He's researched Steller Energy (STE) extensively and feels confident it will be acquired. He places an order to buy 500,000 STE shares - twice the average daily volume - hoping the resulting price increase will motivate competitors to acquire STE before its next earnings announcement. Has Hart most likely violated the Standards?", ["A) No", "B) Yes, with respect to market manipulation only", "C) Yes, with respect to both market manipulation and priority of transactions"]], ["In addition to being awarded a CFA charter, Jane Haverford has earned an MBA degree and PhD in finance. When listing her academic and professional designations after her name, Haverford:", ["A) may list them in an order she chooses", "B) must list her CFA designation after her academic designations", "C) must list her CFA designation before her academic designations"]], ["A supervisor who discovers evidence that an employee has violated firm policies should most likely:", ["A) suspend the employee immediately", "B) increase oversight of the employee's activities", "C) provide the employee with additional compliance training"]], ["Gerald Johnson, CFA, manages a hedge fund with a mandate to invest in thinly-traded stocks issued by consumer technology firms. Over three months, his fund acquires 20% of Botchford Electronics (BTC) shares with small orders intended to minimize the volume-weighted average purchase price. Impressed with growth prospects, he also authorizes purchasing some of BTC's debt. Has Johnson most likely violated the Standards?", ["A) No", "B) Yes, with respect to suitability", "C) Yes, with respect to market manipulation"]], ["Meghan Eriksen, CFA, oversees managerial allocations for a municipal pension fund. During due diligence with Diallo Asset Management, she mentioned her volunteer work for a leukemia research charity and encouraged them to consider it for donations. Diallo later donated $50,000 of its $2 million charitable budget to that organization. Has Eriksen most likely violated the Standards?", ["A) No
