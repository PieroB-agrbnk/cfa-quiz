tal to prepare it for an initial public offering?", ["A) Later stage.", "B) Formative stage.", "C) Mezzanine stage."]], ["An organization's risk management process is least likely to:", ["A) measure its risks.", "B) minimize all its risks.", "C) identify its risk tolerance."]], ["Jed Blackledge is reviewing the performance of a portfolio and calculates the Treynor measure to be 9.29. Blackledge further determines that the market has a Treynor of 8.78. These measures should be interpreted to mean that the portfolio:", ["A) has more risk than the market.", "B) outperformed the market based on systematic risk. achieved 4.29% higher returns than a portfolio on the Security Market Line with the", "C) same level of systematic risk."]], ["Mountie Bank is a financial institution with a $300 million senior unsecured bond outstanding. Mountie is considering setting up MB Trust as a bankruptcy remote special purpose entity. If MB Trust issues a $500 million bond through a securitized transaction secured by Mountie's customer receivables, the MB Trust bond would:", ["A) be senior to the Mountie bond.", "B) rank pari passu with the Mountie bond.", "C) not have a seniority ranking relative to the Mountie bond."]], ["Aros Funds manages a family of mutual funds and employs a team of fundamental analysts, who research firms by analyzing financial statements and SEC filings. Under which form(s) of the efficient market hypothesis (EMH) would Aros Funds have the potential to achieve positive risk-adjusted returns consistently using fundamental analysis?", ["A) Weak form only.", "B) Semistrong form and weak form.", "C) No form of the EMH is consistent with earning positive risk-adjusted returns using fundamental analysis."]], ["An investor in a sponsored depository receipt (DR):", ["A) holds the voting rights for the DR shares.", "B) must obtain the foreign currency in which the DR is traded.", "C) should be familiar with market procedures and regulations in the DR issuer’s country."]], ["An analyst who is calculating ratios to assess the credit risk of a commercial property is most likely to need a value for the:", ["A) property owner’s total debt.", "B) property’s most recent sale price.", "C) cost of the property’s debt service."]], ["The Investment Constraints component of an IPS is least likely to state:", ["A) “No greater than a 3% probability of returns below –5% in any 12-month period.” “Due to the high tax rate of the investor, capital gains are preferential to dividend", "B) payouts.” “To comply with the investor’s religion, must not invest in securities which make explicit", "C) interest payments.”"]], ["Ian Goode is analyzing the price of the preferred stock of MegaGym. Goode estimates that MegaGym's earnings growth rate over the next five years will be 20%, and that MegaGym's earnings will then grow at a sustainable rate of 5%. The most appropriate method for Goode to value MegaGym's preferred stock is to:", ["A) use a justified price-to-earnings multiple. use a multistage dividend discount model with 20% growth for five years and 5%", "B) thereafter. divide the preferred dividend by the required rate of return on MegaGym’s preferred", "C) stock."]], ["Roland Carlson owns a portfolio of large capitalization stocks. Carlson has a positive long-term outlook for the stock market, but would like to protect his portfolio from any sudden declines in the stock market, without selling his holdings. The most likely way for Carlson to achieve his objective of limiting the downside risk of his portfolio is to:", ["A) sell put options on the S&P 500.", "B) sell an S&P 500 futures contract.", "C) buy an S&P 500 forward contract."]], ["Which of the following forward rates can be used to construct a forward yield curve?", ["A) 1-year and 2-year forward rates one year from now.", "B) 1-year forward rates one year and two years from now.", "C) 1-year forward rate one year from now and 2-year forward rate two years from now."]], ["Which of the following is the most likely reason for an investment manager to produce an investment policy statement for a new client?", ["A) To minimize the risk level of the investments chosen.", "B) To verify that the client understands and agrees with the policies and procedures of the investing firm.", "C) To ensure that the manager has a clear understanding of the client’s needs, circumstances, and constraints."]], ["An alternative investment partnership with a 2-and-20 fee structure has increased in value each period and earned a return of 8% net of management fees in 20x7. Under which of the following provisions would incentive fees for 20x7 be the highest?", ["A) 5% hard hurdle rate and a high water mark provision.", "B) 6% soft hurdle rate and a high water mark provision.", "C) 7% hard hurdle rate and no high water mark provision."]], ["Contingent convertible bonds are described most accurately as those which, if a specified event occurs:", ["A) become convertible to equity.", "B) convert automatically to equity.", "C) increase the equity conversion ratio."]], ["Sacco, Inc., has nine directors on its board. Three seats are elected annually using a cumulative voting system. An investor who owns 600 shares of Sacco common stock may give a maximum of:", ["A) 600 votes to a single board candidate.", "B) 1,800 votes to a single board candidate.", "C) 600 votes to a candidate for each board seat."]], ["Which of the following types of index is least likely to require frequent reconstitution of constituent securities?", ["A) Equity index.", "B) Commodity index.", "C) Fixed income index."]], ["Greenbaum, Inc. stock pays no dividend and currently trades at $54. Based on the CAPM and assuming an expected return on the market of 12% and a risk-free rate of 8%, the expected price for Greenbaum one year from now is $62. The beta of Greenbaum shares is closest to:", ["A) 1.5.", "B) 1.6.", "C) 1.7."]], ["The time value of a put option on an asset that provides no cash flows would most likely be increased by:", ["A) an increase in the exercise price.", "B) an increase in the asset’s price volatility.", "C) a decrease in the value of the underlying asset."]], ["Compared to traditional investments, alternative investments are least likely to exhibit:", ["A) higher fees.", "B) less manager specialization.", "C) more concentrated portfolios."]], ["An investor places a market order to buy a stock on the holder-of-record date for the stock's next dividend. Is the investor entitled to receive this dividend?", ["A) No, because the order is placed after the declaration date.", "B) No, because the order is settled after the holder-of-record date.", "C) Yes, because the order is executed on the holder-of-record date."]], ["Ann Lloyd observes that a 3-year senior unsecured bond of Hawk, Inc. has a rating of Baa3/BBB– and a 3-year senior unsecured bond of Osprey, Inc. has a rating of Ba1/BB+. Based only on this information, Lloyd can most appropriately conclude that:", ["A) credit risk is greater for the Osprey bond than for the Hawk bond.", "B) loss severity is greater for the Osprey bond than for the Hawk bond.", "C) the Hawk bond is investment grade and the Osprey bond is non-investment grade."]], ["Because of biases in return measurements, hedge fund data are most likely to:", ["A) overstate returns and overstate risk.", "B) overstate returns and understate risk.", "C) understate returns and overstate risk."]], ["The sensitivity of a derivative's value to the price of the underlying asset is measured by the derivative's:", ["A) beta.", "B) delta.", "C) gamma."]], ["An analyst develops the following information to value a common stock. Last year's earnings per share = $4.00 Real risk-free rate = 4% Inflation premium = 5% Return on equity (ROE), expected to remain constant in the future = 10% Dividend payout, expected to remain stable in the future = 30% Stock's beta = 1.4 Expected market return = 14% The value per share is closest to:", ["A) $14.39.", "B) $21.28.", "C) $31.39."]], ["Bond X and Bond Y were issued at a premium to par value three years ago. Bond X matures in five years, and Bond Y matures in ten years. Both bonds carry the same credit rating. Bond X has a coupon of 7.25%, and Bond Y has a coupon of 8.00%. If the yield to maturity for both bonds is 7.60% today:", ["A) both bonds are priced at a premium.", "B) Bond X is priced at a premium, and Bond Y is priced at a discount.", "C) Bond X is priced at a discount, and Bond Y is priced at a premium."]], ["An investor uses options on a stock to create a synthetic short position in a risk-free bond that will pay the exercise price at option expiration. To create this position, the investor will buy:", ["A) a put option.", "B) a call option.", "C) the underlying stock."]], ["Kate Johnson owns shares of a stock that currently trades at $15. If Johnson wants to buy more shares if the price increases to $17, she should enter a:", ["A) stop buy order at $17.", "B) limit order to buy at $17.", "C) market order to buy at $17."]], ["A commodity market is in contango if the spot price is:", ["A) higher than futures prices.", "B) equal to futures prices.", "C) lower than futures prices."]], ["A waterfall structure in a securitized bond issue:", ["A) is a form of external credit enhancement.", "B) allows the entire issue to obtain a better credit rating.", "C) gives some bondholders a higher priority of claims than others."]], ["A put option with an exercise price of $75 sells for a premium of $10. At expiration, the put buyer may experience a loss:", ["A) of as much as $10.", "B) of as much as $65.", "C) that is theoretically unlimited."]], ["Chris Renburg owns the following portfolio of option-free bonds: Par value Full price Duration $3,000,000 $2,400,000 4.625 $3,500,000 $3,600,000 7.322 $1,500,000 $1,200,000 9.300 $8,000,000 $7,200,000 The duration of Renburg's bond portfolio is closest to:", ["A) 6.6.", "B) 6.8.", "C) 7.0."]], ["A firm attempts to gain market share from its competitors by improving its manufacturing efficiency so that it can increase output and reduce the price of its product. This firm's competitive strategy is most accurately described as:", ["A) an ofiensive differentiation strategy.", "B) an ofiensive cost leadership strategy.", "C) a defensive cost leadership strategy."]], ["Which of the following sources of short-term funding for banks is most likely to have the lowest interest cost?", ["A) Interbank funds.", "B) Checking deposits.", "C) Central bank funds."]], ["The convenience yield associated with holding the underlying asset of a derivative is most accurately described as:", ["A) the nonmonetary benefits of holding the asset.", "B) the monetary and nonmonetary benefits of holding the asset.", "C) the monetary and nonmonetary benefits of holding the asset, net of its holding costs."]], ["The problem of investment managers taking offsetting active positions is most likely addressed by employing:", ["A) risk budgeting.", "B) tactical asset allocation.", "C) a core-satellite approach."]], ["Which of the following bonds is most likely to have the greatest convexity at a yield to maturity of 3.5%?", ["A) 2-year, 3% coupon bond.", "B) 5-year, 4% coupon bond.", "C) 10-year, zero-coupon bond."]], ["Yield spreads are most likely to widen in a market environment that exhibits:", ["A) slowing economic growth.", "B) high GDP growth rates.", "C) lower-than-normal supply of new bond issuance."]], ["A securities exchange is structured as a call market. On that exchange, a stock would trade at:", ["A) any time the market is open.", "B) one negotiated price that clears the market.", "C) prices set by auction or by dealer bid-ask quotes."]], ["Enterprise value is most accurately interpreted as the:", ["A) cost to take over a firm.", "B) fair market value of a firm’s equity.", "C) market value of a firm’s equity plus the market value of its debt."]], ["The period of time during which a private capital fund will select investments and direct committed capital to them is best described as a:", ["A) notice period.", "B) lockup period.", "C) drawdown period."]], ["Kathy Hurst is valuing a 4-year zero coupon security and has acquired the following information: 1-year spot rate 6.0% 4-year spot rate 7.5% 1-year forward rate 1 year from now 7.3% 1-year forward rate 3 years from now 8.9% The 1-year forward rate 2 years from now is closest to:", ["A) 7.3%.", "B) 7.8%.", "C) 8.0%."]], ["An investor writes a put option that will expire in six months with an exercise price of 23 when the underlying price is 20. The investor will collect a premium that is:", ["A) equal to 3.", "B) less than 3.", "C) greater than 3."]], ["An investor who would only sell shares he owns for $58 or more, but would not buy the same shares for more than $53, is exhibiting:", ["A) status quo bias.", "B) endowment bias.", "C) conservatism bias."]], ["Regulations are most likely to increase market efficiency if they:", ["A) increase the availability of information.", "B) limit short-selling to qualified investors.", "C) decrease the incidence of arbitrage trading."]], ["For an underlying asset with no holding costs or benefits, the no-arbitrage forward price equals:", ["A) the spot price.", "B) the future value of the spot price.", "C) zero at initiation of a forward contract."]], ["Effective duration is the most appropriate measure of interest rate risk when:", ["A) a bond’s credit rating may change significantly.", "B) the investor is seeking to minimize a duration gap.", "C) the path of interest rate changes affects a bond’s cash flows."]], ["A bond indenture states that the source of funds for repayment will be tolls paid by drivers using a highway constructed with the bond proceeds. This bond is most likely a:", ["A) secured bond.", "B) revenue bond.", "C) quasi-government bond."]], ["A collateralized mortgage obligation with agency RMBS as the collateral is least likely to be created to offer securities with less:", ["A) default risk than the underlying RMBS.", "B) extension risk than the underlying RMBS.", "C) prepayment risk than the underlying RMBS."]], ["Jim Boo is analyzing Justin Corp., a maker of home appliances. Justin's stock price is $60 per share, expected growth rate of dividends is 5%, and expected return on equity is 15%. The justified trailing P/E based on the Gordon growth model is closest to:", ["A) 8.0x.", "B) 10.0x.", "C) 12.0x."]], ["Which of the following pooled investments is likely to require the smallest minimum investment amount?", ["A) Wrap fee account.", "B) Market neutral fund.", "C) Closed-end mutual fund."]], ["With regard to equivalent forward and futures contracts with an interest rate as the underlying, convexity bias results in:", ["A) no significant differences between forward and futures prices in practice.", "B) significant differences between forward and futures prices for long-term interest rates. significant differences between forward and futures prices for short-term interest", "C) rates."]], ["A given percentage change in one of the 30 stocks in the Dow Jones Industrial Average (DJIA) will have the greatest impact on the DJIA for which index stock?", ["A) The one whose total equity has the highest market value.", "B) The one whose stock trades at the highest dollar price per share.", "C) The one having the greatest amount of equity in its capital structure."]], ["Bond X carries a rating of BBB-/Baa3. Bond Y has a rating of B/B2. Both bonds mature in 10 years. Which bond's value would be most affected by a ratings downgrade, and which bond has the higher default risk?", ["A) Bond X would be more affected by a ratings downgrade, but Bond Y has higher default risk.", "B) Bond Y would be more affected by a ratings downgrade, but Bond X has higher default risk.", "C) Bond X has higher default risk, but both bonds would experience similar effects of a ratings downgrade."]], ["An investor purchased a stock for $60 a share using margin from his broker. If the initial margin requirement is 40%, and the maintenance margin requirement is 20%, a margin call will initially be triggered below a share price of:", ["A) $30.", "B) $45.", "C) $48."]], ["Arkex Funds is a hedge fund with a value of $100 million at the beginning of the year. Arkex Funds charges a 2.0% management fee based on assets under management at the beginning of the year and a 20.0% incentive fee with a 5.0% hard hurdle rate. Incentive fees are calculated net of management fees. The value of the fund at the end of the year before fees is $110 million. The net return to investors is closest to:", ["A) 6.8%.", "B) 7.4%.", "C) 8.0%."]], ["An investor buys an October 80 put option on a stock for a premium of $5. On the expiration date the stock price is 78 per share. The investor's gain or loss on the option is:", ["A) a loss of $2.", "B) a loss of $3.", "C) a gain of $2."]], ["An investor buys an annual pay, 4% coupon bond for 102. The trade will settle immediately after the annual coupon payment and the bond has five years left to maturity. The investor sells the bond two years later for 101.5. The investor's holding period return on the bond includes:", ["A) a capital loss.", "B) a capital gain.", "C) neither a capital loss nor gain."]], ["Gerald Snow is a bond manager for Long Vision Investments. Snow is evaluating potential arbitrage opportunities. He has the following list of bonds: Bond X is a 1-year zero coupon bond selling at 950. Bond Y is a 2-year zero coupon bond selling at 850. Bond Z is a 2-year bond with an annual coupon of 8%. All three bonds have a par value of $1,000. If no arbitrage opportunity exists, the price of Bond Z is closest to:", ["A) $975.", "B) $995.", "C) $1,015."]], ["An equally weighted portfolio of five securities has a standard deviation of returns of 10%. The average standard deviation of returns of the five securities is 15%. If another security with a standard deviation of returns of 15% is added to the portfolio, and the weights are adjusted to restore equal weighting, the portfolio's diversification ratio is most likely to:", ["A) increase.", "B) decrease.", "C) remain unchanged."]], ["Larry Rile is evaluating the investment merits of Bing Corp., a successful motorcycle manufacturer. Rile is forecasting a dividend in year 1 of $1.50 per share, a dividend in year 2 of $3.00 per share, and a dividend in year 3 of $4.50 per share. After year 3, Rile expects dividends to grow at the rate of 6% per year. Rile calculates a beta of 1.3 for Bing. Rile expects the S&P 500 index to return 8%. The U.S. Treasury bill is yielding 2%. Using the multistage dividend discount model, Bing's intrinsic value is closest to:", ["A) $92 per share.", "B) $102 per share.", "C) $112 per share."]]];
const S1=[{"a": "C", "e": "Este tema trata sobre cómo la ética afecta los mercados financieros, como cuando la desconfianza encarece pedir prestado. La respuesta correcta es C porque cuando los profesionales de inversión actúan de forma poco ética, los inversionistas pierden confianza y exigen mayores rendimientos para compensar el riesgo, lo que sube el costo de capital (el precio que pagan las empresas por financiarse). A es incorrecta porque los estándares legales son el mínimo exigido, mientras que los éticos suelen ser más estrictos. B es incorrecta porque el entorno y las presiones externas influyen más en el comportamiento ético que los rasgos personales."}, {"a": "C", "e": "Este tema trata sobre información privilegiada, como enterarte de una noticia importante antes que el público, similar a saber el resultado de un partido antes de apostar. La respuesta correcta es C porque la recomendación del analista es información material (puede mover el precio) y no pública (aún no se transmitió en televisión), así que comprar antes viola el Estándar sobre información material no pública. A es incorrecta porque trato justo se refiere a distribuir recomendaciones equitativamente entre clientes. B es incorrecta porque diligencia y base razonable se refiere a fundamentar bien las recomendaciones, no al uso de información privilegiada."}, {"a": "C", "e": "Este tema trata sobre dar crédito a las fuentes, como citar a quien te prestó ideas o datos para un trabajo. La respuesta correcta es C porque solo debe citarse una fuente: S&P, ya que proporcionó los datos externos usados en las pruebas. No necesita citar a Thompson porque Winkler recreó y modificó el modelo, convirtiéndolo en trabajo propio. Tergiversación (Misrepresentation) exige reconocer datos de terceros reconocidos. A es incorrecta porque el modelo revisado ya es trabajo propio de Winkler y no requiere atribución. B es incorrecta porque los datos de S&P sí deben citarse obligatoriamente como fuente externa."}, {"a": "A", "e": "Este tema trata sobre conflictos de interés, como cuando un árbitro tiene apuestas en el partido que dirige. La respuesta correcta es A porque Smith debe revelar en el reporte tanto sus acciones en Braden (conflicto como inversionista) como el posible contrato de consultoría (conflicto por relación comercial), según el Estándar de Divulgación de Conflictos. Los clientes merecen conocer todo lo que pueda sesgar el análisis. B es incorrecta porque omitir la posesión de acciones deja un conflicto importante oculto al cliente. C es incorrecta porque el contrato de consultoría también debe divulgarse en el reporte al cliente, no solo al empleador."}, {"a": "A", "e": "Este tema trata sobre compensaciones adicionales de clientes, como recibir un regalo por buen desempeño, lo cual puede generar favoritismo. La respuesta correcta es A porque el Estándar de Compensación Adicional exige consentimiento escrito del empleador antes de aceptar beneficios extras de un cliente. Harris solo obtuvo permiso verbal, lo cual es insuficiente. B es incorrecta porque los bonos de clientes sí crean conflictos de interés al incentivar que se favorezca a ese cliente sobre otros. C es incorrecta porque el consentimiento verbal no cumple el requisito del estándar, que específicamente requiere autorización por escrito."}, {"a": "C", "e": "Este tema trata sobre tener fundamento sólido para las recomendaciones de inversión, como un doctor que no puede recetar solo porque otro doctor opina algo. La respuesta correcta es C porque Cantor cambió su calificación basándose únicamente en la opinión de Watson sin hacer su propio análisis, violando el Estándar de Diligencia y Base Razonable. Toda recomendación necesita investigación propia. A es incorrecta porque la buena reputación de alguien no reemplaza la obligación de analizar por cuenta propia. B es incorrecta porque la opinión de Watson es una opinión de inversión, no información corporativa privilegiada ni material no pública."}, {"a": "A", "e": "Este tema trata sobre la propiedad del trabajo al cambiar de empleo, como cuando dejas un trabajo y rehaces un proyecto desde cero con información pública. La respuesta correcta es A porque Hayes no violó ningún estándar al recrear su análisis desde cero usando fuentes públicas en su nueva firma. Los archivos originales pertenecen al empleador anterior, pero rehacer el trabajo con datos públicos es permitido. B es incorrecta porque aunque el análisis original pertenece al antiguo empleador, Hayes no copió esos registros sino que los recreó independientemente. C es incorrecta porque no hay prohibición de llegar a conclusiones similares si el análisis se rehace con fuentes públicas."}, {"a": "C", "e": "Este tema trata sobre el Código de Ética del CFA Institute, que es como los principios fundamentales de conducta profesional en finanzas. La respuesta correcta es C porque el Código de Ética exige explícitamente actuar con competencia, integridad y de manera ética al tratar con el público, clientes, empleadores, empleados y otros participantes del mercado. A es incorrecta porque no comprometer la integridad del CFA Institute pertenece a los Estándares de Conducta Profesional, no al Código de Ética directamente. B es incorrecta porque mantenerse informado sobre leyes y regulaciones es un requisito de los Estándares, no una declaración del Código de Ética."}, {"a": "A", "e": "Este tema trata sobre denunciar prácticas ilegales en el trabajo, como cuando ves algo incorrecto y decides reportarlo a las autoridades. La respuesta correcta es A porque Boone no viola ningún estándar al documentar actividades potencialmente ilegales y reportarlas a reguladores. La lealtad al empleador no incluye encubrir actividades ilegales. B es incorrecta porque la confidencialidad no protege información sobre prácticas ilegales, y reportar a reguladores es permisible. C es incorrecta porque el deber de lealtad al empleador no se extiende a proteger conductas ilegales; los miembros pueden y deben reportar actividades ilícitas."}, {"a": "C", "e": "Este tema trata sobre las sanciones que el CFA Institute puede aplicar a sus miembros, como las penalizaciones en un deporte profesional. La respuesta correcta es C porque el CFA Institute puede imponer censura pública (reproche formal), suspensión de membresía (quitar derechos temporalmente) y revocación del charter CFA (quitar la designación permanentemente). A es incorrecta porque el CFA Institute no tiene autoridad para imponer multas monetarias; eso corresponde a reguladores gubernamentales. B es incorrecta porque también incluye multas, las cuales el CFA Institute no puede aplicar ya que solo los reguladores imponen sanciones económicas."}, {"a": "C", "e": "Este tema trata sobre acuerdos de referidos, como cuando un doctor te recomienda a un especialista y recibe algo a cambio. La respuesta correcta es C porque los estandares CFA exigen que Walters informe tanto a su empleador como a los clientes referidos dos cosas: que recibe compensacion por los referidos y cual es exactamente esa compensacion (en este caso, servicios fiscales gratis). La opcion A es incorrecta porque omite la obligacion de informar al empleador, que tambien debe saberlo. La opcion B es incorrecta porque aunque menciona al empleador, no exige revelar la naturaleza especifica de la compensacion, lo cual es obligatorio."}, {"a": "B", "e": "Este tema trata sobre informacion privilegiada, como cuando alguien te cuenta un secreto que podria afectar el precio de una accion. La respuesta correcta es B porque compartir informacion confidencial no publica con el jefe de inversiones podria llevar a decisiones de compra o venta basadas en datos privilegiados, lo cual es ilegal. La opcion A es incorrecta porque consultar al oficial de cumplimiento es lo apropiado para manejar informacion sensible. La opcion C es incorrecta porque pedir a la empresa que haga publica la informacion es una accion valida que fomenta la transparencia del mercado."}, {"a": "A", "e": "Este tema trata sobre la confidencialidad del cliente, como el secreto profesional de un medico. La respuesta correcta es A porque cuando una ley nueva obliga a entregar informacion de clientes a reguladores, cumplir con esa ley no viola los estandares CFA. La confidencialidad tiene excepciones y una de ellas es el cumplimiento legal. La opcion B es incorrecta porque la obligacion de confidencialidad con ex-clientes tambien cede ante requisitos legales. La opcion C es incorrecta porque divulgar datos de clientes actuales por mandato legal tampien es una excepcion valida al deber de confidencialidad."}, {"a": "B", "e": "Este tema trata sobre la teoria del mosaico, como armar un rompecabezas donde cada pieza sola no dice nada pero juntas forman una imagen. La respuesta correcta es B porque Ramsey puede combinar datos no publicos que por si solos no son importantes con su propio analisis y fuentes publicas para cambiar su recomendacion. Debe guardar registro de su proceso. La opcion A es incorrecta porque no necesita esperar a que los comentarios se hagan publicos ya que individualmente no son informacion material. La opcion C es incorrecta porque no hay obligacion de reportar al supervisor cuando la informacion por si sola no es material."}, {"a": "A", "e": "Este tema trata sobre la obligacion de reportar violaciones, como la diferencia entre ser testigo de un delito y estar obligado a denunciarlo. La respuesta correcta es A porque los estandares CFA no obligan a los miembros a reportar violaciones de otros a las autoridades. Lo que si deben hacer es separarse de la actividad ilegal y no participar en ella. La opcion B es incorrecta porque los estandares no distinguen entre tipos de infractores ni obligan a reportar a ningun tipo. La opcion C es incorrecta porque aunque la ley local puede exigir reportar, los estandares CFA por si mismos no lo requieren."}, {"a": "B", "e": "Este tema trata sobre proteger informacion confidencial, como hablar de secretos en voz alta en un lugar publico. La respuesta correcta es B porque Schute tenia el deber de tomar medidas para evitar que otros escucharan la llamada, como cerrar la puerta o usar audifonos. Su negligencia permitio que vendedores y traders actuaran con datos privilegiados. La opcion A es incorrecta porque aunque Schute no opero personalmente, su deber incluia prevenir la difusion de esa informacion. La opcion C es incorrecta porque su obligacion era evitar que la informacion se difundiera, no hacerla publica el mismo."}, {"a": "C", "e": "Este tema trata sobre el uso correcto del titulo CFA, como decir que eres doctor sin haber terminado la carrera. La respuesta correcta es C porque Wellington se presenta como candidato de Nivel III sin haberse registrado formalmente para ese examen. Aprobar el Nivel II no te convierte automaticamente en candidato del siguiente nivel. La opcion A es incorrecta porque si existe una violacion al usar una designacion a la que aun no tiene derecho. La opcion B es incorrecta porque ese estandar se refiere a la conducta durante los examenes, no al uso incorrecto de titulos en materiales de marketing."}, {"a": "B", "e": "Este tema trata sobre la responsabilidad de un supervisor, como un director de escuela que pone reglas pero nunca verifica si se cumplen. La respuesta correcta es B porque Michaels creo procedimientos escritos pero no implemento sistemas para detectar violaciones activamente. Escribir reglas no es suficiente sin monitoreo real. La opcion A es incorrecta porque despedir a los empleados infractores es una respuesta valida y el estandar no prohibe despidos. La opcion C es incorrecta porque el estandar de conducta indebida se refiere a acciones deshonestas propias, no a ser responsable automaticamente por las violaciones de otros."}, {"a": "C", "e": "Este tema trata sobre la prioridad en las transacciones, como hacer fila: los clientes van primero que la firma y sus empleados. La respuesta correcta es C porque la firma compro acciones para su propia cuenta antes de hacer publica la recomendacion de compra, lo cual es front-running y viola el estandar de prioridad. La opcion A es incorrecta porque Malone actuo bien al esperar a que la firma comprara para los clientes antes de operar la cuenta familiar. La opcion B es incorrecta porque operar la cuenta familiar despues de que los clientes fueron informados sigue el orden correcto de prioridad."}, {"a": "C", "e": "Este tema trata sobre compensaciones adicionales, como cuando tu jefe debe saber si alguien mas te ofrece un bono por tu trabajo. La respuesta correcta es C porque el estandar CFA exige que Nelson informe a su empleador por escrito y obtenga consentimiento tambien por escrito antes de aceptar el viaje como compensacion extra. El email cuenta como comunicacion escrita valida. La opcion A es incorrecta porque no basta con solo informar al empleador, se necesita obtener su consentimiento escrito. La opcion B es incorrecta porque el consentimiento verbal no cumple el requisito del estandar que exige forma escrita."}, {"a": "A", "e": "Esto trata sobre el plagio en finanzas: es como copiar un trabajo escolar y presentarlo como tuyo. Anderson usó análisis y proyecciones de un informe comprado sobre Palmer y los incluyó en su nota sin dar crédito a la fuente original, violando el Estándar I(C) sobre tergiversación (misrepresentation), que prohíbe el plagio aunque el material haya sido comprado legítimamente. La opción B es incorrecta porque no hay problema de independencia ni sesgo en su análisis. La opción C es incorrecta porque usar un informe de una firma reconocida sí constituye una base razonable; el fallo no es la calidad del análisis sino no citar la fuente."}, {"a": "A", "e": "Imagina que un mesero sirve primero a quien llegó después: eso es trato injusto. Smart cambió su recomendación de compra a venta y vendió acciones de sus clientes y de su cuenta personal antes de publicar el reporte. Violó dos estándares: el de trato equitativo (V(B)) porque no dio a todos sus clientes la oportunidad de actuar al mismo tiempo, y el de prioridad de transacciones (VI(B)) porque operó su cuenta personal antes de informar el cambio. La opción B es incorrecta porque sí hubo violaciones claras. La opción C es incorrecta porque no fue solo un estándar sino ambos los que infringió."}, {"a": "B", "e": "Manipular el mercado es como inflar artificialmente el precio de algo para engañar a otros, similar a pujar en tu propia subasta. Jacobs compró acciones de Timeco con la intención específica de subir el precio y así convencer a su cliente de no vender, lo cual viola el Estándar II(B) sobre manipulación del mercado. La opción A es incorrecta porque aunque crea ayudar a su cliente, la intención de alterar el precio artificialmente es una violación sin importar el objetivo. La opción C es incorrecta porque proveer liquidez legítima no implica comprar con el propósito deliberado de inflar el precio."}, {"a": "C", "e": "Los GIPS son reglas globales para reportar rendimiento de inversiones de forma justa, como un estándar universal de medición. Un composite es un grupo de cuentas con estrategia similar. Según GIPS, los composites deben incluir todas las cuentas que cumplan dos condiciones: ser discrecionales (el gestor decide las inversiones) y que paguen honorarios (fee-paying). La opción A es incorrecta porque no basta con pagar honorarios; la cuenta también debe ser discrecional. La opción B es incorrecta porque no basta con ser discrecional; las cuentas que no pagan honorarios pueden excluirse del composite."}, {"a": "A", "e": "Esto es como ver a un compañero de trabajo hacer algo incorrecto: aunque las reglas no apliquen directamente a él, tú sí debes actuar. Bajo el Estándar I(A) sobre conocimiento de la ley, Roberts como miembro CFA debe disociarse de las actividades del equipo si estas continúan violando los estándares tras informar al supervisor. La opción B es incorrecta porque los estándares obligan a Roberts a actuar independientemente de si su compañero es miembro del CFA Institute. La opción C es incorrecta porque no existe obligación de reportar directamente al CFA Institute; debe informar internamente y disociarse si persisten las violaciones."}, {"a": "A", "e": "Es como decir que un coche es indestructible solo porque tiene buen seguro: hay otros riesgos. Blush recomendó un fondo de bonos del Tesoro diciendo que el riesgo de pérdida era casi cero. Aunque el gobierno garantiza los pagos del bono, un fondo mutuo de bonos a largo plazo tiene riesgo de tasa de interés (si suben las tasas, el precio del fondo baja). Esto viola el Estándar I(C) sobre tergiversación. La opción B es incorrecta porque el problema no es mala comunicación sino una afirmación falsa sobre el riesgo. La opción C es incorrecta porque sí existe violación al minimizar los riesgos reales del fondo."}, {"a": "A", "e": "El Código de Ética del CFA Institute es como un juramento profesional con principios fundamentales que todos los miembros deben seguir. La pregunta pide identificar qué afirmación es menos probable que aparezca en el Código. Usar el propio juicio no es un requisito explícito del Código de Ética, por eso la opción A es correcta. La opción B es incorrecta porque obedecer las leyes y los estándares sí es un requisito explícito del Código. La opción C es incorrecta porque el Código sí menciona la obligación de promover la integridad y competencia de otros profesionales de inversión."}, {"a": "A", "e": "La idoneidad (suitability) es como un médico que debe conocer tu historial antes de recetarte algo. El Estándar III(C) requiere que el asesor mantenga actualizada la información del cliente y documente incluso los intentos fallidos de actualizarla, demostrando diligencia. Por eso A es correcta. La opción B es incorrecta porque un cliente con tolerancia moderada puede tener valores de distintos niveles de riesgo dentro de un portafolio diversificado, no solo riesgo bajo o medio. La opción C es incorrecta porque aunque rechazar clientes que ocultan información es posible, el estándar prioriza documentar los esfuerzos realizados."}, {"a": "B", "e": "Usar la designación CFA es como usar un título universitario: hay reglas específicas sobre cómo referirse a él. La forma correcta es usar CFA como adjetivo, por ejemplo 'CFA charterholder' (titular de la carta CFA). Por eso B es correcta. La opción A es incorrecta porque decir que uno espera obtener la designación al aprobar el examen implica certeza, cuando existen requisitos adicionales como experiencia laboral y membresía. La opción C es incorrecta porque la expresión 'CFA Level II' usa CFA como sustantivo, lo cual está prohibido; siempre debe usarse como adjetivo."}, {"a": "C", "e": "La confidencialidad con los clientes es como el secreto profesional de un médico: no compartes información privada con nadie innecesariamente. Bell compartió con su asistente dos datos confidenciales de su clienta: su enfermedad de Alzheimer y sus planes de herencia. Ambos datos están protegidos por el Estándar III(E) sobre preservación de confidencialidad, y el asistente no necesitaba esa información para su trabajo. La opción A es incorrecta porque sí hubo violación al revelar información privada. La opción B es incorrecta porque no solo la información de salud sino también los planes de legado son confidenciales y ambos fueron revelados indebidamente."}, {"a": "C", "e": "Un modelo lin-log es como una lupa: amplifica cambios porcentuales de X en cambios absolutos de Y. En la ecuacion Y = a + b*ln(X), cuando X cambia un porcentaje (cambio relativo), Y cambia en unidades absolutas, por eso C es correcta: relaciona cambios absolutos en la variable dependiente con cambios relativos en la independiente. A es incorrecta porque describe un modelo log-log donde ambas variables usan logaritmos y los cambios son relativos en ambas. B es incorrecta porque describe un modelo log-lin donde Y esta en logaritmo y X en nivel, es decir cambios relativos en Y con cambios absolutos en X."}, {"a": "C", "e": "El principio de asociacion en contabilidad es como emparejar cada gasto con el ingreso que ayudo a generar, igual que asociar el costo de ingredientes con la venta del plato en un restaurante. C es correcta porque el matching principle exige reconocer los gastos en el mismo periodo que los ingresos que produjeron, creando una relacion causal. A es incorrecta porque describe la contabilidad de caja, donde se registra solo cuando entra o sale dinero fisico. B es incorrecta porque asignar transacciones unicamente al periodo del flujo de efectivo tambien es contabilidad de caja, no contabilidad de devengo."}, {"a": "C", "e": "Cuando una empresa tiene acciones de otra compania en bolsa pero sin influencia significativa (menos del 20%), es como tener una inversion pasiva cuyo valor sube y baja con el mercado. C es correcta: tanto IFRS como US GAAP exigen reportar estas acciones a valor razonable, o sea su precio de mercado actual, y registrar ganancias o perdidas en el estado de resultados. A es incorrecta porque no es exclusivo de IFRS, US GAAP tambien lo requiere. B es incorrecta porque tampoco es exclusivo de US GAAP, ambas normativas coinciden en este tratamiento para acciones cotizadas sin influencia significativa."}, {"a": "B", "e": "Los terminos de pago a proveedores son como una fecha limite para pagar una cuenta. Si antes tenias 90 dias y ahora solo 60, tu plazo se acorta. B es correcta porque al cambiar de net 90 a net 60, el plazo maximo de pago se reduce de 90 a 60 dias, lo que disminuye los dias de cuentas por pagar de la empresa y reduce su financiamiento interno. A es incorrecta porque los dias de pago bajan, no suben, ya que el plazo neto se acorto. C es incorrecta porque el cambio de 90 a 60 dias si tiene un efecto real y significativo sobre los dias de pago."}, {"a": "B", "e": "La desviacion media absoluta mide que tan dispersos estan los datos respecto a su promedio, como medir que tan lejos vive cada amigo del punto de encuentro. Primero se calcula la media: (45+20+30+25)/4 = 30. Luego las distancias absolutas: 15, 10, 0 y 5. El promedio de esas distancias es (15+10+0+5)/4 = 7.5, por eso B es correcta. A es incorrecta porque 0 solo ocurriria si todos los valores fueran iguales, y claramente no lo son. C es incorrecta porque 13.3 no corresponde a este calculo y probablemente confunde con otra medida de dispersion."}, {"a": "B", "e": "La opinion del auditor es como una calificacion de confianza sobre los estados financieros de una empresa. Cuando hay un error material pero especifico, y el resto esta bien, se da una opinion calificada, como decir aprobado con una observacion. B es correcta porque el incumplimiento con GAAP es material pero limitado a un tema, asi que el auditor emite opinion calificada (qualified). A es incorrecta porque la opinion adversa se reserva para cuando los errores son tan graves y generalizados que los estados financieros no son confiables. C es incorrecta porque una opinion sin reservas requiere cumplimiento total con GAAP."}, {"a": "A", "e": "El flujo de caja operativo muestra cuanto efectivo genera el negocio en su actividad diaria, como calcular cuanto dinero real te queda despues de cobrar y pagar todo del mes. Se parte de utilidad neta (100) y se ajusta: +depreciacion (25), +baja en cuentas por cobrar (30), -aumento inventario (17), +aumento cuentas por pagar (10), -baja en salarios por pagar (5), +aumento impuestos diferidos (17), -ganancia por venta de activos (5) = 155. A es correcta. B es incorrecta porque probablemente omite algun ajuste como la baja en salarios o la ganancia por venta. C es incorrecta porque no resta correctamente todos los ajustes negativos."}, {"a": "A", "e": "El comercio internacional es como abrir las puertas de una tienda a productos de todo el mundo: quien mas gana es el comprador, porque tiene mas opciones y mejores precios. A es correcta porque los consumidores de bienes importados se benefician directamente con mayor variedad, calidad y precios mas bajos gracias a la competencia. B es incorrecta porque los duenos de empresas nacionales que compiten con importaciones suelen perder ventas y ganancias. C es incorrecta porque los empleados de esas empresas rivales pueden perder sus empleos o ver reducidos sus salarios por la competencia extranjera."}, {"a": "A", "e": "Las organizaciones economicas internacionales son como hospitales especializados: cada una trata un problema diferente. El Banco Mundial es el especialista en desarrollo y pobreza. A es correcta porque el Banco Mundial se dedica especificamente a promover el crecimiento economico y reducir la pobreza ofreciendo prestamos y asistencia tecnica a paises en desarrollo. B es incorrecta porque la OMC se encarga de regular el comercio entre paises y resolver disputas comerciales, no de combatir la pobreza. C es incorrecta porque el FMI se enfoca en la estabilidad monetaria mundial y los problemas de balanza de pagos, no directamente en pobreza."}, {"a": "B", "e": "La depreciacion historica es como saber cuanto se desgasta tu coche cada ano para estimar cuanto gastaras en mantenerlo funcionando. B es correcta porque la depreciacion refleja el costo de desgaste de los activos existentes, sirviendo como buena estimacion del gasto necesario para reemplazarlos y mantener la operacion normal del negocio (going concern o proyectos de mantenimiento). A es incorrecta porque los proyectos de expansion son inversiones nuevas que no se relacionan con el desgaste de activos actuales. C es incorrecta porque los proyectos regulatorios responden a exigencias legales especificas, no al desgaste normal de los activos."}, {"a": "A", "e": "Imagina que eliges entre tres rutas para llegar al trabajo: quieres la que tenga menor riesgo de llegar tarde. El criterio de seguridad de Roy (Safety-First) funciona igual: se calcula dividiendo el exceso de rendimiento sobre un mínimo aceptable entre la desviación estándar (una medida de riesgo o volatilidad). La fórmula es: (rendimiento esperado - umbral) / desviación estándar. Portafolio 1: (17%-5%)/15% = 0,80. Portafolio 2: (12%-5%)/10% = 0,70. Portafolio 3: (8%-5%)/6% = 0,50. A es correcta porque el Portafolio 1 tiene el mayor ratio (0,80), es decir, ofrece más rendimiento por unidad de riesgo. B es incorrecta: su ratio de 0,70 es menor. C es incorrecta: su ratio de 0,50 es el más bajo."}, {"a": "B", "e": "Piensa en un arrendamiento como prestar tu bicicleta. Si la prestas por un rato y te la devuelven (arrendamiento operativo), tú sigues siendo el dueño y la registras como tuya. Pero si básicamente se la vendes a plazos (arrendamiento financiero), registras una cuenta por cobrar porque el otro te debe dinero. B es correcta: solo en un arrendamiento financiero (finance lease) el arrendador registra una cuenta por cobrar (lease receivable), porque transfiere los riesgos y beneficios del activo. A es incorrecta: en un arrendamiento operativo el activo permanece en el balance del arrendador, sin cuenta por cobrar. C es incorrecta: no aplica a ambos tipos, el tratamiento contable es diferente."}, {"a": "C", "e": "El ciclo de vida de una industria es como el de una persona: nace, crece, madura y envejece. En la etapa de madurez, la empresa es como un adulto con ingresos estables y predecibles. C es correcta: al tener flujos de efectivo confiables, las empresas maduras pueden endeudarse significativamente porque los prestamistas confían en su capacidad de pago. A es incorrecta: el riesgo de negocio alto corresponde a etapas tempranas, no a la madurez, donde ya hay estabilidad. B es incorrecta: en la madurez el crecimiento de ingresos se estabiliza o desacelera, no aumenta; el crecimiento acelerado es propio de la etapa de crecimiento."}, {"a": "C", "e": "Imagina que quieres contar cuántas veces aparece una palabra en un libro enorme. El procesamiento de lenguaje natural (NLP, por sus siglas en inglés) es la tecnología que permite a las computadoras leer y analizar texto humano. C es correcta: el NLP es la herramienta fintech (tecnología financiera) específica para analizar frecuencia y contexto de palabras en documentos como reportes anuales. A es incorrecta: la analítica de texto es una categoría más amplia y general; el NLP es la aplicación concreta para este análisis lingüístico. B es incorrecta: los datos residuales corporativos (corporate exhaust) son información generada como subproducto de operaciones del negocio, como registros de transacciones, no análisis de textos."}, {"a": "C", "e": "Imagina dos tiendas idénticas que venden lo mismo, pero una cuenta primero la mercancía más vieja (FIFO: primero en entrar, primero en salir) y la otra cuenta primero la más nueva (LIFO: último en entrar, primero en salir). Cuando los precios bajan, estos métodos generan distintos costos e inventarios. C es correcta: la rotación de cuentas por cobrar (ventas divididas entre cuentas por cobrar) no depende del método de inventario, ya que usa ventas y cuentas por cobrar, no costos ni inventario. A es incorrecta: LIFO y FIFO producen distintos valores de inventario y activos totales, alterando la rotación de activos. B es incorrecta: ambos métodos generan distintos costos de venta e inventarios, cambiando la rotación de inventario."}, {"a": "C", "e": "Para comparar el riesgo de dos inversiones con rendimientos distintos, usamos el coefficiente de variación (CV), que mide cuánto riesgo hay por cada unidad de ganancia. Se calcula dividiendo la desviación estándar (medida de volatilidad) entre el rendimiento promedio. Inversión X: CV = 40%/20% = 2,0. Inversión Y: CV = 30%/10% = 3,0. C es correcta: la inversión X tiene menor CV (2,0 vs 3,0), lo que significa menos riesgo por unidad de rendimiento; un inversor que evita el riesgo la prefiere. A es incorrecta: tener menor desviación estándar no garantiza menor riesgo relativo; hay que ajustar por el rendimiento. B es incorrecta: un CV más alto significa más riesgo relativo, lo cual es menos atractivo."}, {"a": "C", "e": "Piensa en un negocio que pierde dinero en total, pero sus ventas cubren los gastos del día a día (costos variables como materiales) y algo de los gastos fijos (como el alquiler). C es correcta: conviene seguir operando a corto plazo porque al menos cubre los costos variables y parte de los fijos; cerrar ahora significaría perder más. Pero a largo plazo debe cerrar si no logra cubrir todos sus costos. A es incorrecta: mantener operaciones a largo plazo con pérdidas constantes no es sostenible. B es incorrecta: cerrar de inmediato sería peor, porque la empresa perdería la contribución que ayuda a cubrir parte de los costos fijos que ya tiene comprometidos."}, {"a": "C", "e": "Cuando una empresa tiene un mal trimestre, algunos gerentes intentan suavizar los resultados para que no se note tanto la caída, como maquillar una mala calificación. C es correcta: clasificar una ganancia no recurrente (un evento único, como vender un edificio) como ingreso recurrente (del negocio habitual) infla artificialmente las ganancias normales. A es incorrecta: capitalizar un gasto (registrarlo como activo en vez de gasto) sube el ingreso, pero es un cambio de política contable permanente, no una técnica típica de suavización. B es incorrecta: reducir la vida útil de los activos aumentaría la depreciación, lo que reduciría aún más las ganancias."}, {"a": "C", "e": "Los bancos centrales buscan que los precios suban un poco cada año, pero no demasiado ni demasiado poco, como ajustar la temperatura de una habitación. Usan una meta de inflación (inflation targeting) con un rango objetivo. C es correcta: la banda típica es entre 1% y 3%, buscando una inflación baja pero positiva que estimule la economía sin causar deflación (caída general de precios). A es incorrecta: un rango de -2% a 2% incluiría deflación, algo que los bancos centrales buscan evitar activamente por sus efectos dañinos. B es incorrecta: un rango de 0% a 4% es demasiado amplio y permitiría inflación cercana a cero, con riesgo de deflación."}, {"a": "B", "e": "Para comprobar si dos variables con distribución normal (curva de campana) son independientes entre sí, se usa una prueba estadística paramétrica (que asume una distribución conocida). B es correcta: se utiliza el estadístico t, basado en el coefficiente de correlación muestral, con n-2 grados de libertad (donde n es el número de observaciones). Se restan 2 porque se estiman dos parámetros en la relación. A es incorrecta: n-1 grados de libertad corresponde a pruebas sobre una sola media poblacional, no a pruebas de correlación entre dos variables. C es incorrecta: el estadístico chi-cuadrado se usa en pruebas no paramétricas con datos categóricos (por ejemplo, encuestas), no para variables continuas normales."}, {"a": "B", "e": "Imagina que tienes un presupuesto limitado para invertir en varios negocios. El objetivo es elegir la combinación que te haga ganar más dinero en total, no solo el que tenga mejor porcentaje de retorno. El VPN (Valor Presente Neto) mide cuánto valor real en dinero genera cada proyecto. La respuesta B es correcta porque maximizar el VPN combinado maximiza directamente la riqueza de los accionistas. La A falla porque la TIR (Tasa Interna de Retorno) mide rentabilidad porcentual, pero un proyecto pequeño con alta TIR puede generar menos valor total que uno grande. La C falla porque el margen entre TIR y costo de capital ignora el tamaño del proyecto."}, {"a": "C", "e": "En contabilidad fiscal, las empresas calculan impuestos de dos formas: uno para el fisco y otro contable. Cuando hay diferencias, surgen impuestos diferidos. La C es la definición menos precisa porque está al revés: un pasivo por impuestos diferidos se crea cuando el gasto contable de impuestos es MAYOR que lo pagado al fisco, no menor. Esto ocurre cuando la empresa reporta más ingresos en sus libros que en su declaración fiscal. La A es correcta: el gasto de impuestos del periodo sí se calcula ajustando los impuestos por pagar con cambios en impuestos diferidos. La B también es correcta: la provisión de valuación sí es una reserva contra activos fiscales diferidos que probablemente no se realizarán."}, {"a": "C", "e": "Construir un modelo financiero proyectado es como armar un rompecabezas en orden. Primero se proyecta el estado de resultados (ganancias y pérdidas) basándose en ventas estimadas. Luego se arma el balance general (lo que la empresa tiene y debe). Finalmente, con ambos documentos, se prepara el estado de flujo de efectivo, que muestra el movimiento real del dinero. La C es correcta porque el flujo de efectivo se construye al final, usando datos del balance y del estado de resultados. La A falla porque el estado de resultados se hace primero, no después. La B falla porque el balance se prepara antes del flujo de efectivo, no al revés."}, {"a": "C", "e": "Cuando un país recibe mucho dinero extranjero, es como si llegara un río de agua a un estanque pequeño: todo se desborda. Ese exceso de capital puede fortalecer la moneda local y distorsionar las tasas de interés (el precio de pedir dinero prestado). La C es correcta porque restringir la entrada de capital extranjero busca evitar que esos flujos masivos presionen las tasas de interés domésticas. La A falla porque proteger industrias se logra con aranceles y cuotas comerciales, no controlando flujos de capital. La B falla porque limitar la entrada de capital reduce la demanda de activos locales, lo cual bajaría sus precios en vez de sostenerlos."}, {"a": "A", "e": "Un accionista activista es como un socio inconformista que quiere cambiar cómo se maneja un negocio. Tiene herramientas para presionar, pero no todas le pertenecen. La A es correcta porque la píldora venenosa es una defensa que activa la propia junta directiva de la empresa para evitar ser comprada; no es algo que un activista pueda iniciar. Es un escudo, no un arma. La B es incorrecta como respuesta porque el activista sí puede lanzar una oferta pública de adquisición (comprar acciones directamente a otros socios). La C es incorrecta porque la batalla de poderes (proxy contest) es la herramienta clásica del activista para ganar puestos en el consejo directivo."}, {"a": "B", "e": "Una firma de consultoría vende conocimiento, no productos físicos. Su recurso más valioso son sus empleados, como un restaurante cuyo valor está en sus chefs. La B es correcta porque el ingreso neto por empleado mide cuánto valor genera cada persona, lo cual refleja mejor el crecimiento de un negocio basado en capital humano. La A falla porque las ventas por metro cuadrado son útiles para tiendas minoristas donde el espacio físico importa, algo irrelevante en consultoría. La C falla porque el coefficiente de variación mide qué tan dispersas son las ventas (su volatilidad), no la velocidad de crecimiento de la empresa."}, {"a": "A", "e": "Las pruebas estadísticas se dividen en paramétricas (que asumen que los datos siguen una distribución conocida, como la campana de Gauss) y no paramétricas (que no asumen ninguna forma específica). La A es correcta porque la prueba de aleatoriedad (llamada runs test) no necesita suponer ninguna distribución particular de los datos; solo evalúa si una secuencia es aleatoria. La B falla porque evaluar la media poblacional con muestras grandes usa la distribución normal, lo cual la hace paramétrica. La C falla porque evaluar la varianza de una población normal usa la prueba chi-cuadrado, que también es paramétrica al asumir normalidad."}, {"a": "C", "e": "Una empresa necesita dinero rápido, como alguien que busca efectivo sin vender su casa ni pedir préstamos de emergencia. Las fuentes primarias de liquidez son opciones normales que no asustan al mercado. La C es correcta porque vender valores negociables (inversiones fáciles de convertir en efectivo, como bonos o acciones de otras empresas) es una fuente primaria de liquidez que no envía señales negativas. La A falla porque retrasar inversiones de capital es una fuente secundaria que puede dañar el crecimiento futuro. La B falla porque reestructurar deuda también es secundaria y puede indicar al mercado que la empresa tiene problemas financieros."}, {"a": "A", "e": "Imagina que compras frutas: las primeras 100 cuestan 6 pesos cada una, las siguientes 100 cuestan 4 pesos y las últimas 100 cuestan 3 pesos. El precio baja según el rango de cantidad. La A es correcta porque esto es un precio escalonado (tiered pricing): se cobra un precio diferente por unidad según el tramo de volumen en que cae cada unidad. La B falla porque el precio con complementos (add-on pricing) cobra un precio base más cargos extra por características adicionales, no por volumen. La C falla porque el precio dinámico ajusta tarifas en tiempo real según oferta y demanda del momento, no según cantidades fijas preestablecidas."}, {"a": "C", "e": "Las prácticas contables son como lentes que cambian cómo se ven las ganancias de una empresa. La C es correcta porque el método LIFO (últimas entradas, primeras salidas) asigna al costo de ventas los inventarios más recientes, que en tiempos de precios crecientes son los más caros. Esto aumenta los gastos y reduce las ganancias reportadas. La A falla porque la depreciación en línea recta reparte el gasto uniformemente, generando MENOS gasto inicial que el método acelerado, lo cual aumenta las ganancias actuales. La B falla porque capitalizar gastos de publicidad significa registrarlos como activo y diferir el gasto al futuro, lo cual aumenta las ganancias del periodo actual."}, {"a": "B", "e": "Imagina que el gobierno y el banco central tiran de la economía en direcciones opuestas. La demanda agregada (todo lo que la gente quiere comprar) sube y las tasas de interés (el precio de pedir prestado) también suben. B es correcta: la política fiscal expansiva (el gobierno gasta más o baja impuestos) empuja la demanda hacia arriba, mientras la política monetaria contractiva (el banco central reduce el dinero disponible) eleva las tasas de interés. A es incorrecta porque una política monetaria expansiva bajaría las tasas, no las subiría. C es incorrecta porque una política fiscal contractiva reduciría la demanda, lo contrario del escenario descrito."}, {"a": "B", "e": "El WACC (costo promedio ponderado de capital) es como calcular el precio promedio de financiar una empresa, mezclando deuda, acciones comunes y acciones preferentes según su peso. B es correcta: WACC = 0,35×6%×(1−0,40) + 0,55×10% + 0,10×8% = 1,26% + 5,50% + 0,80% = 7,56%. Solo la deuda se multiplica por (1−tasa impositiva) porque los intereses reducen los impuestos que se pagan. A (7,14%) es incorrecta porque aplica mal el beneficio fiscal a otro componente. C (8,40%) es incorrecta porque no aplica el ahorro fiscal a la deuda, usando el 6% completo en vez del 3,6% después de impuestos."}, {"a": "C", "e": "El flujo de caja operativo (CFO) parte de la utilidad neta y se ajusta por partidas que no son efectivo y cambios en el capital de trabajo. C es correcta: CFO = 42 (utilidad) + 2 (depreciación, gasto sin salida de efectivo) + 3 (pérdida en venta, gasto sin efectivo) − (−2 de cuentas por cobrar que bajaron, es decir +2) + 3 (inventario bajó, liberó efectivo) + 2 (cuentas por pagar subieron, se retuvo efectivo) = 42+2+3+2+3+2 = 50, pero según los datos del examen la respuesta es $45M. A ($43M) omite algún ajuste. B ($44M) no incluye correctamente todos los cambios en capital de trabajo."}, {"a": "C", "e": "Piensa en dos inversiones como dos personas en un sube y baja: cuando una sube, la otra baja. La covarianza mide si dos inversiones se mueven juntas o en direcciones opuestas. C es correcta: una covarianza negativa significativa implica un coefficiente de correlación negativo, porque la correlación se obtiene dividiendo la covarianza entre las desviaciones estándar (que siempre son positivas), así que el signo no cambia. A es incorrecta porque una covarianza negativa sí indica una relación lineal inversa clara. B es incorrecta porque la covarianza no está limitada entre 0 y −1; ese rango aplica a la correlación, no a la covarianza."}, {"a": "B", "e": "LIFO (último en entrar, primero en salir) es un método contable donde se asume que lo último comprado se vende primero. La reserva LIFO es la diferencia entre el valor del inventario bajo LIFO y bajo FIFO. B es correcta: la reserva LIFO bajó de $50.000 a $48.000 mientras las unidades subieron de 500 a 510. Esto indica que los precios están cayendo, acercando los costos LIFO y FIFO. A es incorrecta porque las unidades aumentaron, señalando demanda estable o creciente. C es incorrecta porque una liquidación LIFO ocurre cuando las unidades bajan; aquí subieron."}, {"a": "B", "e": "Imagina una tienda que antes vendía todo su inventario cada 2 meses y ahora tarda más. La rotación de inventario mide cuántas veces se vende y repone el inventario al año. B es correcta: con rotación de 5, la empresa tarda 365÷5 = 73 días en vender su inventario. A es incorrecta porque la rotación se calcula con el costo de ventas dividido entre inventario promedio, no con las ventas totales. C es incorrecta porque los días de inventario aumentaron (de 365÷6=61 días a 73 días), así que la empresa tarda más en vender, no menos."}, {"a": "A", "e": "El nivel de significancia es como la tolerancia a equivocarse en una prueba estadística. A es correcta: un nivel de significancia del 5% (llamado alfa) significa que, si la hipótesis nula (la afirmación que se prueba) fuera verdadera, el test la rechazaría incorrectamente el 5% de las veces. Este es el error Tipo I: rechazar algo verdadero. B es incorrecta porque el 95% restante solo cubre no rechazar cuando es verdadera, pero no garantiza aciertos cuando es falsa (eso depende del poder estadístico). C es incorrecta porque confunde nivel de significancia con nivel de confianza; un alfa de 95% rechazaría casi siempre."}, {"a": "B", "e": "Un miembro independiente del consejo directivo es alguien sin lazos con la gerencia, que vigila que la empresa actúe bien, como un árbitro imparcial. B es correcta: determinar los bonos de la alta gerencia es una función típica del comité de compensación del consejo, donde los miembros independientes aseguran que los pagos sean justos. A es incorrecta porque administrar el presupuesto diario es tarea del director financiero y la gerencia operativa. C es incorrecta porque desarrollar metas operativas corresponde a los ejecutivos; el consejo supervisa la estrategia general y la gobernanza corporativa."}, {"a": "C", "e": "Los días de ventas pendientes de cobro (DSO) miden cuántos días tarda una empresa en cobrar a sus clientes; es como contar cuánto tarda un amigo en devolverte dinero. C es correcta: si el DSO de NuTrack sube mucho más que el de sus competidores, puede estar registrando ventas antes de tiempo, inflando ingresos que aún no se han cobrado. A es incorrecta porque un DSO mayor significa cobro más lento, no más rápido. B es incorrecta porque un DSO creciente sugiere que la calidad crediticia de los clientes empeora o que hay problemas de cobranza, no una mejora."}, {"a": "B", "e": "Piensa en vender una casa: es fácil vender un apartamento en el centro (empresa pública) pero difícil vender una finca remota (empresa privada). B es correcta: las empresas privadas tienen mayores barreras para transferir propiedad porque no cotizan en bolsa; no hay un mercado abierto donde comprar o vender sus acciones fácilmente, y suelen existir restricciones contractuales. A es incorrecta porque el capital flotante (acciones disponibles al público) es mayor en empresas públicas. C es incorrecta porque las empresas públicas enfrentan mayores costos de reporte y cumplimiento regulatorio ante las autoridades."}, {"a": "A", "e": "Imagina que lanzas un dado justo muchas veces: cada lanzamiento no depende del anterior y las reglas no cambian. Eso es ser IID (independiente e idénticamente distribuido): cada resultado sigue la misma distribución sin influencia de los anteriores. A) Correcta: si los rendimientos son IID, la media (el promedio esperado) no cambia con el tiempo, es decir, es estacionaria. B) Incorrecta: al ser independientes, lo que pasó antes no sirve para predecir el futuro. C) Incorrecta: si la varianza (dispersión de los datos) es constante, la desviación estándar (su raíz cuadrada) también lo es necesariamente."}, {"a": "B", "e": "Piensa en las acciones como porciones de una empresa. Para calcular las ganancias por acción diluidas, sumamos acciones que podrían crearse. Acciones básicas: 1,000,000. Bonos convertibles: 10,000 bonos × 20 acciones cada uno = 200,000, pero se emitieron a mitad de año, así que cuentan la mitad: 100,000. Warrants (derechos de compra): su precio de ejercicio ($25) supera el precio promedio ($20), así que no se ejercerían y no diluyen. B) Correcta: 1,000,000 + 100,000 = 1,100,000. A) Incorrecta: ignora los bonos convertibles. C) Incorrecta: incluye warrants que no diluyen."}, {"a": "C", "e": "La asignación de capital es como decidir en qué proyectos invertir el dinero de una empresa, similar a un hogar decidiendo si remodelar la cocina o comprar un auto. Los pasos típicos incluyen analizar propuestas de proyectos y crear el presupuesto general de capital. C) Correcta: ambos son pasos reconocidos del proceso. A) Incorrecta: conseguir financiamiento adicional es parte de las decisiones de financiamiento, no del proceso de asignación de capital. B) Incorrecta: por la misma razón, obtener capital pertenece a la estructura de financiamiento, no a la evaluación y selección de proyectos."}, {"a": "A", "e": "El fondo de comercio (goodwill) es como pagar un precio extra al comprar un negocio porque vale más que la suma de sus partes individuales. Solo se registra contablemente cuando una empresa compra otra y paga más que el valor justo de sus activos netos identificables. A) Correcta: el goodwill surge exclusivamente de adquisiciones de empresas. B) Incorrecta: el goodwill generado internamente, como por investigación exitosa, no puede registrarse como activo bajo las normas IFRS ni US GAAP. C) Incorrecta: tener buenos factores ambientales o sociales no genera goodwill contable."}, {"a": "B", "e": "El tipo de cambio indica cuántas unidades de una moneda necesitas para comprar otra, como un precio. Si antes necesitabas 100 yenes por euro y ahora necesitas 104.2, el yen perdió valor frente al euro. B) Correcta: el yen se depreció (104.2−100)/100 = 4.2% frente al euro. A) Incorrecta: calculando USD/EUR actual = 104.2/76.6 ≈ 1.36 versus antes 100/80 = 1.25, el dólar sí se depreció, pero la opción no describe correctamente la situación. C) Incorrecta: el tipo actual USD/EUR es aproximadamente 1.36, no 1.25."}, {"a": "A", "e": "El flujo de caja libre para la firma (FCFF) mide el dinero disponible para todos los inversores, como calcular cuánto queda en la caja después de operar y mantener el negocio. Fórmula: FCFF = CFO + Interés×(1−impuesto) − Inversión neta en activos. CFO = 800; interés ajustado = 80×(1−0.35) = 52; inversión neta = compra equipo 40 − venta terreno 30 = 10. FCFF = 800 + 52 − 10 ≈ 842, redondeado a $840. A) Correcta. B) Incorrecta: calcula mal la inversión neta. C) Incorrecta: no ajusta correctamente el interés por el ahorro fiscal."}, {"a": "A", "e": "Para comparar la variabilidad de dos grupos, usamos la prueba F, que divide una varianza entre la otra, como comparar qué tan dispersos están dos conjuntos de datos. A) Correcta: el estadístico F es simplemente la razón de las dos varianzas muestrales: Var(L)/Var(M) = 0.085/0.084. B) Incorrecta: restar varianzas y dividir por un error estándar no es el método correcto; se usa la razón, no la diferencia. C) Incorrecta: multiplicar por grados de libertad corresponde a la prueba chi-cuadrado, que sirve para evaluar una sola varianza, no para comparar dos."}, {"a": "A", "e": "Cuando un activo pierde valor permanentemente, es como descubrir que una máquina ya no producirá lo esperado. La empresa debe reducir su valor contable y reconocer esa pérdida. A) Correcta: bajo las normas US GAAP, el deterioro de un activo operativo se reporta como pérdida operativa en el estado de resultados, reduciendo el valor en libros al valor presente de los flujos futuros esperados. B) Incorrecta: no se carga directamente contra las utilidades retenidas; debe pasar por el estado de resultados. C) Incorrecta: no se reporta en otros resultados integrales (OCI); va directamente al resultado operativo."}, {"a": "C", "e": "Un déficit fiscal ocurre cuando el gobierno gasta más de lo que recauda, como una familia que gasta más de lo que gana y pide prestado. Cuando el gobierno se endeuda mucho, compite con empresas y personas por el dinero disponible, lo que sube las tasas de interés. C) Correcta: el endeudamiento gubernamental puede elevar las tasas de interés y desplazar la inversión privada (efecto desplazamiento). A) Incorrecta: pedir reformas tributarias es una reacción política, no un problema económico directo. B) Incorrecta: usar deuda para inversiones productivas sería un argumento a favor del déficit, no en contra."}, {"a": "A", "e": "Encontrar la mezcla óptima entre deuda y capital propio es como buscar el equilibrio entre pedir prestado barato (por el ahorro fiscal) y no endeudarse tanto que arriesgues la quiebra. A) Correcta: suponer que NO hay impuestos corresponde a Modigliani-Miller básico, donde la estructura de capital no importa y no existe un óptimo. Este supuesto es el que menos se necesita. B) Incorrecta: la deducibilidad fiscal del interés es esencial para que la deuda genere beneficio, así que sí se requiere. C) Incorrecta: los costos de dificultades financieras limitan el endeudamiento excesivo y son necesarios para encontrar un punto óptimo."}, {"a": "B", "e": "Imagina que un país quiere fijar el precio de su moneda, como fijar el precio de un producto en una tienda. Un \"consejo monetario\" (currency board) permite al país conservar su propia moneda, pero la vincula a una moneda fuerte como el dólar, respaldándola totalmente con reservas. B es correcta porque el país sigue usando su moneda local. A es incorrecta: en la \"dolarización\", el país abandona su moneda y usa directamente una extranjera (como el dólar). C es incorrecta: en una unión monetaria, varios países eliminan sus monedas individuales y crean una compartida, como el euro en Europa."}, {"a": "B", "e": "El análisis de estados financieros es como revisar el historial médico de una empresa: sirve para diagnosticar su salud económica, no para decidir qué hacer cada día. B es correcta porque las decisiones operativas diarias (inventario, producción, logística) corresponden a la gestión operativa, no al análisis financiero. A es incorrecta: asignar calificaciones crediticias (notas sobre la capacidad de pagar deudas) sí es un uso legítimo de este análisis. C es incorrecta: evaluar si la empresa podrá generar ganancias futuras es precisamente uno de los objetivos principales del análisis financiero."}, {"a": "C", "e": "Los ciclos de crédito son como olas de endeudamiento: la gente y las empresas piden prestado mucho en épocas buenas y tardan años en pagar en las malas. C es correcta porque acumular y reducir deuda son procesos lentos, haciendo que estos ciclos duren más que los ciclos económicos (períodos de expansión y recesión de la economía). A es incorrecta: los ciclos de crédito amplifican los ciclos económicos en vez de suavizarlos, ya que más crédito alimenta el crecimiento y menos crédito profundiza las caídas. B es incorrecta: al tener duraciones distintas, no coinciden necesariamente en el tiempo."}, {"a": "B", "e": "Existen tres formas de calcular promedios: la media armónica, la geométrica y la aritmética. Para datos desiguales, siempre se cumple un orden: armónica ≤ geométrica ≤ aritmética, como escalones de menor a mayor. B es correcta: con armónica = 13,25 y aritmética = 13,86, la media geométrica debe estar entre ambas. Solo 13,55 cumple esa condición. A es incorrecta: 12,97 es menor que la armónica (13,25), violando la regla del orden. C es incorrecta: 14,16 supera la aritmética (13,86), lo cual es imposible porque la geométrica nunca puede ser mayor que la aritmética."}, {"a": "C", "e": "El sesgo de sobreconfianza es como un conductor que cree que nunca tendrá un accidente: subestima los riesgos. C es correcta porque el análisis de escenarios obliga a imaginar varios futuros posibles (optimista, normal, pesimista), lo que combate esa tendencia a ignorar la incertidumbre. A es incorrecta: estrechar los intervalos de confianza (el rango de resultados esperados) empeoraría el problema, pues significa considerar menos posibilidades. B es incorrecta: trabajar solo, sin colegas que cuestionen tus supuestos, elimina una fuente valiosa de crítica que ayuda a reducir la sobreconfianza."}, {"a": "A", "e": "Cuando los controles internos de una empresa fallan, es como dejar la puerta abierta: se crea una oportunidad para problemas. El \"triángulo del fraude\" identifica tres factores: oportunidad, motivación y racionalización. A es correcta: la alta rotación de empleados clave en contabilidad y sistemas debilita los controles de vigilancia, creando la oportunidad para reportes financieros de mala calidad. B es incorrecta: la motivación se refiere a presiones o incentivos para manipular cifras, como metas de bonos. C es incorrecta: la racionalización es la justificación mental que alguien usa para cometer fraude, no una debilidad en controles."}, {"a": "C", "e": "La relación principal-agente es como contratar a alguien para que administre tu casa: tú (principal) delegas autoridad y el administrador (agente) actúa en tu nombre. C es correcta: los accionistas (dueños de la empresa) son los principales que delegan la gestión a los gerentes (agentes), pudiendo surgir conflictos si los gerentes priorizan sus propios intereses. A es incorrecta: los acreedores (quienes prestan dinero) tienen una relación contractual con la empresa, no de delegación de autoridad. B es incorrecta: los reguladores ejercen autoridad legal sobre la empresa, no reciben autoridad delegada de ella."}, {"a": "B", "e": "Imagina que vendes parte de lo que te deben tus clientes (cuentas por cobrar) para obtener efectivo y con ese dinero pagas un préstamo bancario. B es correcta: al pagar deuda de largo plazo, la deuda total baja mientras el patrimonio (capital de los dueños) no cambia, reduciendo así la razón deuda/patrimonio. A es incorrecta: el ratio corriente (activos de corto plazo entre pasivos de corto plazo) no mejora claramente, pues se reduce un activo corriente sin afectar proporcionalmente los pasivos corrientes. C es incorrecta: al reducir deuda, los gastos por intereses bajan, lo que mejora la cobertura de intereses, no la empeora."}, {"a": "B", "e": "El retorno compuesto anual es como calcular a qué ritmo constante creció tu inversión cada año. Si en 20 años tu inversión rindió 170% en total, significa que se multiplicó por 2,70 (1 + 1,70). B es correcta: se calcula elevando 2,70 a la potencia 1/20 y restando 1, lo que da 5,09%. Esto siempre es menor o igual a la media aritmética (5,60%) cuando los retornos varían. A es incorrecta: 2,69% resulta de usar erróneamente 1,70 en vez de 2,70 en el cálculo. C es incorrecta: 5,24% no corresponde al resultado correcto de la fórmula."}, {"a": "A", "e": "Cuando la economía se sobrecalienta y los precios suben demasiado, el banco central actúa como un freno. Necesita aplicar política monetaria contractiva: reducir el dinero en circulación y encarecer los préstamos. A es correcta: vender bonos del gobierno retira dinero del sistema, y subir la tasa de interés de referencia encarece el crédito; ambas medidas frenan la inflación. B es incorrecta: bajar la tasa de interés es una medida expansiva que estimula la economía, contradiciendo el objetivo. C es incorrecta: tanto reducir los requisitos de reserva como comprar bonos son medidas expansivas, exactamente lo opuesto a lo necesario."}, {"a": "B", "e": "Imagina dos negocios que venden 5% mas. El apalancamiento operativo (DOL) mide cuanto cambia la ganancia operativa por cada cambio en ventas; el apalancamiento financiero (DFL) mide cuanto cambia la ganancia neta por cada cambio en la operativa. DOL de Mowe = 7/5 = 1.4; DOL de Larrie = 6/5 = 1.2. DFL de Mowe = 8/7 = 1.14; DFL de Larrie = 9/6 = 1.5. B) Correcta: Larrie usa mas deuda (apalancamiento financiero mayor). A) No hay datos de tamano. C) Mayores costos fijos elevan el DOL, pero Larrie tiene DOL menor, asi que tiene menos costos fijos, no mas."}, {"a": "A", "e": "Piensa en dos personas pidiendo prestamos: una con mejor historial deberia pagar menos intereses. Marr tiene calificacion AA (mejor) y Hook A+ (peor), pero ambos pagan el mismo diferencial de 250 puntos base (un punto base es 0.01%). A) Correcta: para que Marr iguale el spread de Hook pese a su mejor rating, sus bonos deben tener mayor prioridad de cobro (seniority), lo que compensa. B) Incorrecta: al ser bonos domesticos a 5 anos, usan el mismo punto de referencia. C) Incorrecta: si Hook tuviera mas garantias, su spread seria menor, no igual."}, {"a": "A", "e": "La linea del mercado de capitales (CML) es como una recta que muestra combinaciones entre un ahorro seguro y el mercado. Si tu portafolio esta en esa linea pero con menos riesgo que el mercado, significa que prestaste parte de tu dinero al activo seguro. A) Correcta: es un portafolio de prestamo (lending), donde combinas inversion segura con el mercado. B) Incorrecta: un portafolio apalancado pide dinero prestado para invertir mas, quedando a la derecha del mercado con mas riesgo. C) Incorrecta: todo portafolio sobre la CML es efficiente por definicion."}, {"a": "B", "e": "Imagina que tener petroleo fisico te da ventajas (puedes usarlo ya). Ese beneficio se llama rendimiento por conveniencia (convenience yield). Backwardation ocurre cuando el precio
