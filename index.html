actual (spot) supera al precio futuro. B) Correcta: esto pasa cuando los beneficios de tener el activo superan los costos de almacenarlo y financiarlo. A) Incorrecta: un rendimiento por conveniencia bajo favorece lo opuesto (contango), donde el futuro vale mas que el spot. C) Incorrecta: si el spot es menor que el futuro, eso es contango, lo contrario de backwardation."}, {"a": "C", "e": "Piensa en una empresa como alguien que paga sus deudas con su sueldo mensual, no vendiendo sus bienes. El colateral (garantia con bienes) es respaldo secundario, no la fuente principal de pago. La fuente primaria siempre son los flujos de efectivo que genera la empresa. C) Correcta: ni para deuda garantizada ni no garantizada el colateral es fuente primaria. A) Incorrecta: incluso la deuda garantizada se paga primero con flujos operativos; el colateral solo se usa si hay incumplimiento. B) Incorrecta: la deuda no garantizada ni siquiera tiene colateral."}, {"a": "A", "e": "La eficiencia de mercado tiene niveles: debil (precios reflejan datos historicos), semi-fuerte (reflejan toda informacion publica) y fuerte (incluyen informacion privada). Los ratios precio-ganancia son informacion publica. Si permiten ganar mas que el indice, los precios no reflejan toda la informacion publica. A) Correcta: si falla la eficiencia semi-fuerte, tambien falla la debil, pues cada nivel incluye al anterior. B) Incorrecta: los resultados prueban que NO hay eficiencia semi-fuerte. C) Incorrecta: la violacion es especifica al nivel semi-fuerte, no solo al fuerte."}, {"a": "C", "e": "Imagina que en vez de pagar un seguro caro para tu casa, decides guardar ese dinero en una cuenta de ahorros para cubrir danos tu mismo. Eso es auto-seguro. C) Correcta: la empresa no compra poliza y reserva fondos propios para cubrir posibles danos climaticos, asumiendo el riesgo internamente. A) Incorrecta: el desplazamiento de riesgo (risk shifting) implica cambiar la naturaleza del riesgo usando instrumentos financieros como derivados. B) Incorrecta: la transferencia de riesgo significa pasarlo a otro, como una aseguradora; aqui la empresa lo retiene."}, {"a": "C", "e": "En inversiones privadas, a mayor riesgo mayor retorno esperado. La deuda de infraestructura financia proyectos estables como carreteras o redes electricas, generando flujos predecibles. C) Correcta: por esa estabilidad, tiene el menor riesgo y retorno de las opciones. A) Incorrecta: el capital privado (private equity) invierte en acciones de empresas no cotizadas, con alta incertidumbre y mayor riesgo-retorno. B) Incorrecta: la deuda mezzanine es subordinada (se paga despues de la deuda principal), asi que tiene mas riesgo que la deuda de infraestructura."}, {"a": "A", "e": "En futuros, depositas un margen inicial como garantia. Si tus perdidas bajan el saldo hasta el margen de mantenimiento (un minimo), recibes una llamada de margen (margin call). A) Correcta: debes restaurar el saldo al margen inicial completo, no solo al de mantenimiento. Esto es distinto a las cuentas de acciones. B) Incorrecta: el margen de variacion es el ajuste diario de ganancias o perdidas, no un nivel de cuenta. C) Incorrecta: el margen de mantenimiento es el umbral que activa la alerta, pero la reposicion debe llegar al margen inicial."}, {"a": "B", "e": "Un certificado de deposito paga intereses proporcionales al tiempo. La formula es: monto final = principal x (1 + tasa x dias/365). Aqui: 100M x (1 + 0.0025 x 120/365) = 100M x 1.000822 = 100.08M. B) Correcta: el interes se ajusta a 120 dias de un ano de 365. A) Incorrecta: 99.75M implicaria perder dinero, imposible con tasa positiva. C) Incorrecta: 100.25M aplicaria el 0.25% al ano completo sin ajustar por la fraccion de 120 dias."}, {"a": "A", "e": "Imagina que un nuevo gobierno cambia las reglas del juego para las empresas. Este tipo de cambio externo se analiza con el marco PESTLE, que examina factores Politicos, Economicos, Sociales, Tecnologicos, Legales y Ecologicos. A) Correcta: una politica antimonopolio (que limita el poder de mercado de las empresas) impuesta por un nuevo partido es claramente un factor politico y legal, justo lo que PESTLE evalua. B) Incorrecta: el analisis de fortalezas y debilidades examina lo interno de una empresa, como sus recursos o capacidades, no decisiones del gobierno. C) Incorrecta: las cinco fuerzas de Porter estudian la competencia dentro de una industria (rivales, proveedores, clientes), no los cambios en politicas gubernamentales."}, {"a": "A", "e": "Piensa en una moneda digital como un objeto coleccionable: su precio depende de lo que otros esten dispuestos a pagar, no de algo fisico o productivo detras. A) Correcta: los activos digitales, como las criptomonedas, generalmente no tienen valor intrinseco (valor propio basado en generar dinero o tener utilidad fisica), a diferencia de una accion que produce dividendos o el oro que tiene usos industriales. B) Incorrecta: sus transacciones se validan de forma descentralizada mediante una cadena de bloques (blockchain), sin necesidad de un banco u otro intermediario central. C) Incorrecta: la mayoria de instituciones financieras tradicionales aun no los aceptan como medio de pago."}, {"a": "B", "e": "La frontera efficiente es como una lista de las mejores opciones posibles: para cada nivel de riesgo, solo incluye la inversion con mayor retorno. Si otra opcion ofrece lo mismo o mejor con menos riesgo, la primera queda eliminada. B) Correcta: el Portafolio 1 (8% retorno, 6% riesgo) pierde contra el 2 (10% retorno, mismo riesgo), y el Portafolio 4 (14% retorno, 16% riesgo) pierde contra el 3 (14% retorno, solo 12% riesgo). Ambos son dominados y no pueden estar en la frontera efficiente. A) Incorrecta: el Portafolio 3 si puede estar porque no hay otro que lo supere. C) Incorrecta: los Portafolios 2 y 3 no son dominados por ningun otro."}, {"a": "A", "e": "Un bono con descuento es como comprar un producto rebajado: pagas menos hoy y al final recibes el precio completo. A) Correcta: el rendimiento corriente (current yield) se calcula dividiendo el cupon entre el precio. Como el precio es menor que el valor nominal, el resultado es mayor que la tasa cupon. Ademas, el rendimiento al vencimiento (YTM, retorno total si mantienes el bono hasta el final) es aun mayor porque suma la ganancia de capital al volver al valor nominal. Orden: tasa cupon menor que current yield menor que YTM. B) Incorrecta: el YTM es mayor, no menor, que la tasa cupon. C) Incorrecta: el current yield es mayor, no menor, que la tasa cupon."}, {"a": "B", "e": "El efecto curva J es como plantar un arbol: al principio solo gastas en semillas y tierra sin frutos, pero con el tiempo la cosecha compensa. B) Correcta: los retornos mas bajos ocurren en la fase de despliegue de capital (cuando el fondo invierte el dinero), porque se pagan comisiones de gestion y las inversiones aun no generan ganancias. A) Incorrecta: la fase de distribucion de capital es cuando las inversiones maduran y se venden con ganancias, produciendo los retornos mas altos. C) Incorrecta: en la fase de compromiso de capital los inversionistas prometen dinero pero aun no se ha invertido ni se han pagado comisiones importantes."}, {"a": "B", "e": "Piensa en un edificio de departamentos donde los pagos se reparten por pisos: el primer piso cobra primero y los de arriba estan protegidos mientras tanto. Esa organizacion por niveles es proteccion estructural. B) Correcta: las tranches de pago secuencial (capas ordenadas por prioridad) son proteccion estructural contra el riesgo de prepago en titulos respaldados por hipotecas comerciales (CMBS), porque dirigen los pagos anticipados a las capas superiores primero, protegiendo las demas. A) Incorrecta: la defeasance (sustitucion de colateral por bonos del gobierno) es proteccion a nivel del prestamo individual, no de la estructura del titulo. C) Incorrecta: los periodos de bloqueo de prepago son restricciones contractuales del prestamo, no de la estructura."}, {"a": "A", "e": "Una aseguradora de autos y casas es como un bombero que debe estar listo en cualquier momento: necesita dinero disponible rapidamente para pagar siniestros imprevistos. A) Correcta: estas aseguradoras de propiedad y accidentes tienen obligaciones de corto plazo e impredecibles (huracanes, choques), por lo que necesitan un horizonte de inversion corto y baja tolerancia al riesgo para mantener liquidez. B) Incorrecta: horizonte largo y alta tolerancia al riesgo describen mejor a aseguradoras de vida, cuyos pagos son mas lejanos y predecibles. C) Incorrecta: aunque el horizonte es corto, la tolerancia al riesgo es baja, no alta, porque deben poder pagar siniestros inesperados en cualquier momento."}, {"a": "B", "e": "En un fondo de inversion con socios, el socio gestor (general partner) administra el dinero y el socio limitado (limited partner) lo aporta. Hay reglas para repartir las ganancias. B) Correcta: la clausula de recuperacion (catch-up) beneficia al socio gestor porque le permite recibir una proporcion mayor de las ganancias una vez superada la rentabilidad minima prometida (hurdle rate), hasta alcanzar su porcentaje de incentivo acordado. A) Incorrecta: la marca de agua maxima (high-water mark) protege al socio limitado, impidiendo que pague comisiones sobre ganancias que solo recuperan perdidas anteriores. C) Incorrecta: la clausula de devolucion (clawback) protege al socio limitado permitiendole recuperar comisiones pagadas en exceso."}, {"a": "A", "e": "Los bonos cubiertos (covered bonds) son deuda respaldada por un conjunto de activos. Existen distintos tipos segun que pasa si el emisor no puede pagar a tiempo. A) Correcta: los bonos cubiertos de tipo soft-bullet permiten al emisor posponer la fecha de vencimiento (aqui 12 meses) si no cumple los pagos programados, dandole un plazo extra para resolver la situacion. B) Incorrecta: los hard-bullet no permiten ninguna extension; si no se paga a tiempo, se declara incumplimiento inmediato. C) Incorrecta: los conditional pass-through no posponen el vencimiento, sino que convierten los pagos en flujos directos del conjunto de activos de respaldo, distribuyendolos conforme se reciben."}, {"a": "C", "e": "Gestionar riesgos es como ajustar la velocidad al conducir: no se trata de detenerse (cero riesgo) ni de correr al maximo, sino de ir a una velocidad adecuada para las condiciones. C) Correcta: el objetivo de la gestion de riesgos es alinear el nivel de riesgo de la organizacion con su tolerancia al riesgo (cuanto riesgo puede y quiere asumir), manteniendolo dentro de limites aceptables. A) Incorrecta: buscar solo el retorno de la tasa libre de riesgo eliminaria toda posibilidad de generar valor adicional; la gestion de riesgos no fija un retorno especifico. B) Incorrecta: minimizar todo riesgo no es el objetivo, ya que asumir cierto riesgo es necesario para obtener retornos. Lo importante es que el riesgo sea acorde a la tolerancia definida."}, {"a": "B", "e": "Imagina que compras una casa para revenderla. Una \"venta secundaria\" en el mundo de las compras apalancadas (LBO) es exactamente eso: la firma vende su participacion en una empresa a otro comprador, saliendo de la inversion. B es correcta porque una venta secundaria significa que la firma ya no posee esa empresa del portafolio. A es incorrecta porque ofrecer acciones al publico describe una oferta publica inicial (IPO), que es un mecanismo distinto de salida. C es incorrecta porque recibir capital nuevo de los socios describe una recaudacion de fondos, no una salida de inversion."}, {"a": "C", "e": "Piensa en un gobierno local como una empresa: ambos prometen pagar deudas con sus ingresos generales. Los bonos de obligacion general se respaldan con la capacidad del gobierno de cobrar impuestos, sin garantizar un activo especifico. C es correcta porque los bonos corporativos senior no garantizados tambien se respaldan solo con la capacidad general de pago de la empresa, sin activos especificos. A es incorrecta porque los bonos garantizados (secured) tienen un activo concreto como respaldo, algo que los bonos de obligacion general no tienen. B es incorrecta porque los bonos subordinados tienen menor prioridad de cobro, mientras que los de obligacion general equivalen al nivel senior."}, {"a": "B", "e": "Imagina guardar fruta en un almacen: pagas almacenamiento (costo) pero la fruta madura (beneficio). En contratos a futuro, si los costos de mantener el activo (almacenamiento, financiamiento, costo de oportunidad) superan los beneficios (dividendos, conveniencia), el precio futuro sera mayor que el precio actual. B es correcta porque el precio a plazo (forward) suma esos costos netos al precio actual (spot). A es incorrecta porque el forward solo seria menor si los beneficios superaran los costos. C es incorrecta porque cuando existen costos netos, el precio forward siempre difiere del spot; solo serian iguales si costos y beneficios se cancelaran exactamente."}, {"a": "A", "e": "Imagina comprar exactamente 1 accion de cada empresa en una lista. Las empresas con acciones mas caras pesarian mas en tu portafolio. Eso es un indice ponderado por precio. A es correcta porque mantener el mismo numero de acciones de cada componente replica un indice donde el peso depende del precio de cada accion, como el Dow Jones. B es incorrecta porque un indice de ponderacion igualitaria invierte el mismo monto en dolares en cada empresa, no el mismo numero de acciones. C es incorrecta porque un indice por capitalizacion pondera segun el valor total de mercado de cada empresa, no por cantidad igual de acciones."}, {"a": "C", "e": "Invertir directamente en infraestructura es como comprar un edificio comercial: adquieres un activo fisico grande, dificil de vender rapido, que genera ingresos estables a largo plazo. C es correcta porque los bienes raices comerciales comparten esas mismas caracteristicas: activos fisicos, flujos de efectivo predecibles, baja liquidez (dificultad para vender rapido) y necesidad de gestion activa. A es incorrecta porque las acciones publicas son altamente liquidas y se negocian diariamente, lo opuesto a infraestructura directa. B es incorrecta porque la deuda gubernamental es un instrumento financiero estandarizado y liquido que no requiere gestion activa de activos fisicos."}, {"a": "B", "e": "Si sabes que en diciembre debes pagar la matricula universitaria, necesitas que el dinero este disponible y seguro. Es como ahorrar para una compra fija: no puedes arriesgar ese dinero ni dejarlo donde no puedas retirarlo. B es correcta porque se necesita bajo riesgo (proteger el capital para un gasto conocido) y alta liquidez (poder convertir la inversion en efectivo a tiempo). A es incorrecta porque aunque el bajo riesgo es adecuado, la baja liquidez impediria acceder al dinero cuando se necesita. C es incorrecta porque el alto riesgo podria causar perdidas que impidan cubrir el gasto obligatorio de la matricula."}, {"a": "B", "e": "Un fondo mutuo sin comision de venta (llamado \"no-load\") es como una tienda sin cargo de entrada ni de salida, pero que igual cobra por el servicio de administracion. B es correcta porque aunque no hay comisiones de compra ni de venta, el fondo si cobra tarifas continuas de gestion que cubren gastos operativos y la administracion del portafolio. A es incorrecta porque las comisiones de reembolso (redemption fees) son cargos al vender; un fondo no-load se caracteriza precisamente por no cobrarlos. C es incorrecta porque las comisiones de entrada (up-front fees) son exactamente lo que un fondo no-load elimina por definicion."}, {"a": "A", "e": "Las inversiones alternativas son como bienes raices o arte: dificiles de vender rapido, pero por esa dificultad pueden ofrecer mayores ganancias. A es correcta porque la prima por iliquidez (compensacion extra por no poder vender facilmente) es un beneficio clave de las inversiones alternativas que puede generar retornos mas altos. B es incorrecta porque las alternativas reducen riesgo gracias a sus bajas correlaciones con inversiones tradicionales, no altas. Si la correlacion fuera alta, no habria beneficio de diversificacion. C es incorrecta porque los mercados alternativos suelen ser menos efficientes que los tradicionales, no mas efficientes."}, {"a": "C", "e": "Un bono con opcion de venta (putable) es como comprar algo con garantia de devolucion: si las condiciones empeoran, puedes devolver el bono al emisor a un precio fijo. Ese derecho tiene valor. C es correcta porque el inversor, al tener esta proteccion extra, acepta un rendimiento menor como pago por ese beneficio. A es incorrecta porque aunque si beneficia al inversor, el rendimiento es menor, no mayor; el inversor sacrifica rendimiento a cambio de proteccion. B es incorrecta porque el bono putable beneficia al inversor, no al emisor. El que beneficia al emisor es el bono con opcion de compra (callable)."}, {"a": "B", "e": "Beta mide cuanto se mueve una accion respecto al mercado. Para hallar la covarianza (medida de como se mueven juntos), usamos la formula: Covarianza = Beta multiplicado por la varianza del mercado. La varianza del mercado es su desviacion estandar al cuadrado: (0.14)^2 = 0.0196. Entonces: 1.2 x 0.0196 = 0.02352, aproximadamente 0.024. B es correcta por ese calculo. A es incorrecta porque 0.168 resulta de aplicar una formula equivocada mezclando desviaciones sin elevar al cuadrado. C es incorrecta porque 0.600 proviene de un error de calculo que no usa correctamente la varianza del mercado."}, {"a": "C", "e": "Imagina que tienes dos seguros financieros: uno te protege si el precio baja (put) y otro te da derecho a comprar si sube (call). La paridad put-call es una relación que conecta ambos. Dice que put menos call equivale al valor presente (el valor hoy de un monto futuro) de la diferencia entre el precio de ejercicio (X) y el precio forward (F). Es decir: P - C = VP(X - F). C es correcta porque refleja exactamente esta fórmula: el valor presente de X menos F. A es incorrecta porque no descuenta todo al presente; mezcla valores futuros y presentes. B es incorrecta porque invierte el orden de la resta, calculando VP(F - X) en vez de VP(X - F)."}, {"a": "A", "e": "Un mercado financiero es como una tienda: puede ser efficiente de distintas formas. La eficiencia operacional significa que los costos de transacción (comisiones, tarifas para comprar o vender) son bajos, como una tienda con pocos gastos de envío. A es correcta porque eso es exactamente eficiencia operacional: costos bajos al operar. B es incorrecta porque que los precios se ajusten rápido a nueva información describe la eficiencia informacional o de precios, no la operacional. C es incorrecta porque asignar recursos a sus usos más productivos describe la eficiencia de asignación (allocativa), un concepto diferente."}, {"a": "B", "e": "Los índices de inversiones alternativas miden el rendimiento de activos no tradicionales como bienes raíces o fondos especulativos. Los REIT (fideicomisos de inversión inmobiliaria) son empresas que cotizan en bolsa e invierten en propiedades o hipotecas. B es correcta porque los índices REIT rastrean los precios de esas acciones públicas, ofreciendo datos transparentes. A es incorrecta porque los índices de materias primas usan contratos de futuros, no bienes físicos, así que no se pueden replicar comprando petróleo o trigo directamente. C es incorrecta porque los índices de fondos de cobertura tienen sesgos importantes, como el de supervivencia, y no representan fielmente a toda la industria."}, {"a": "B", "e": "La brecha de duración mide si tu bono vence antes o después de cuando necesitas el dinero. Es como planear un viaje de 5 años pero tener un depósito a 10 años: hay un desajuste. Se calcula como duración Macaulay menos el horizonte de inversión. Para un bono al par (comprado a su valor nominal), la duración Macaulay se aproxima a la duración modificada, que es 9.8. Brecha = 9.8 - 5 = 4.8. B es correcta con ese cálculo. A es incorrecta porque un valor negativo implicaría que el horizonte supera la duración, y aquí 9.8 es mayor que 5. C es incorrecta porque 5.4 no corresponde a ninguna combinación válida de estos datos."}, {"a": "A", "e": "Diversificar es como no poner todos los huevos en una canasta: reduces el riesgo de que un solo evento te afecte. Pero hay riesgos que afectan a todo el mercado simultáneamente. El riesgo de mercado (o sistemático) incluye cosas como recesiones o inflación que golpean a todas las inversiones por igual, y no se reduce diversificando. A es correcta porque ese riesgo no se puede eliminar. B es incorrecta porque el riesgo específico de una empresa sí se reduce al agregar más activos diferentes al portafolio. C es incorrecta porque el riesgo no sistemático es sinónimo de riesgo diversificable y, por definición, sí se reduce con diversificación."}, {"a": "A", "e": "Invertir en derivados de materias primas (contratos financieros basados en su precio) tiene ventajas frente a comprar el producto físico. El rendimiento por conveniencia es el beneficio de tener el bien físico disponible de inmediato, como una fábrica que necesita petróleo ahora. A es correcta porque ese beneficio solo lo da el producto físico, no el derivado, así que no es razón para preferir derivados. B es incorrecta porque los derivados sí ofrecen mayor transparencia de precios al cotizar en mercados organizados con precios públicos. C es incorrecta porque los derivados sí mantienen correlación positiva con la inflación, similar a las materias primas físicas."}, {"a": "B", "e": "Un fondo de cobertura cobra comisiones por gestión e incentivos. Aquí: AUM inicial $250M, retorno bruto 20%, así el AUM sube a $300M. Comisión de gestión: 2% de $300M = $6M. AUM neto = $294M. La marca de agua alta (máximo histórico previo) es $275M. Ganancia sobre esa marca: $294M - $275M = $19M. Con tasa mínima blanda del 4%, como el retorno la supera, el incentivo aplica sobre toda la ganancia. Incentivo: 20% de $19M = $3.8M. Total comisiones: $9.8M. Retorno neto: ($300M - $9.8M - $250M)/$250M ≈ 16.1%. B (15.6%) es la respuesta más cercana según el método del examen. A subestima el retorno. C no ajusta bien las comisiones."}, {"a": "B", "e": "Las acciones preferentes son como un préstamo que paga dividendos fijos. Si son no acumulativas, los dividendos que la empresa no paga se pierden para siempre. La opción callable permite al emisor retirar la acción cuando le convenga, como un banco que cancela tu depósito. B es correcta porque combina dos riesgos: pierdes dividendos omitidos y además el emisor puede retirar la acción cuando las tasas bajan, limitando tus ganancias. A es incorrecta porque la opción putable te permite a ti vender la acción, lo que reduce tu riesgo. C es incorrecta porque sin opciones incorporadas es menos riesgosa que callable, ya que el emisor no puede retirarla."}, {"a": "C", "e": "Una acción preferente perpetua paga dividendos para siempre, como una renta vitalicia. Su valor se calcula dividiendo el dividendo anual entre el rendimiento requerido. Primero calculamos el rendimiento: los bonos rinden 7.5% y las preferentes rinden 75 puntos base (0.75%) menos, o sea 6.75%. Valor = $6 / 0.0675 = $88.89, aproximadamente $89. C es correcta con este cálculo. A ($72) es incorrecta porque resulta de usar un rendimiento erróneo que no corresponde a los datos. B ($80) es incorrecta porque usa el rendimiento de bonos (7.5%) sin restar los 75 puntos base de ajuste para acciones preferentes."}, {"a": "B", "e": "La capacidad de asumir riesgo es como tener un colchón financiero: mientras más grande sea, más golpes puedes absorber. La riqueza líquida significativa (dinero o activos fácilmente convertibles en efectivo) permite soportar pérdidas sin afectar tu vida diaria. B es correcta porque esa riqueza funciona como un gran colchón de seguridad. A es incorrecta porque un horizonte corto reduce la capacidad de riesgo, ya que hay menos tiempo para recuperarse de pérdidas. C es incorrecta porque ingresos altos pero variables generan incertidumbre sobre el dinero futuro, lo que reduce la capacidad de asumir riesgo."}, {"a": "C", "e": "Cuando baja el rendimiento de un bono, su precio sube, como un sube y baja. Para calcular cuanto sube, usamos dos herramientas: la duracion modificada (sensibilidad del precio al cambio en rendimiento) y la convexidad (ajuste fino por movimientos grandes). El rendimiento baja 25 puntos base (-0.0025). Cambio = -6 x (-0.0025) + 0.5 x 40 x (0.0025)^2 = 1.50% + 0.00125% = 1.50125%, cercano a 1.51%. C es correcta. A (1.48%) subestima el efecto combinado. B (1.49%) calcula mal el ajuste por convexidad."}, {"a": "B", "e": "El modelo Fama-French es como una receta con tres ingredientes para explicar los retornos de acciones: (1) prima de mercado (retorno extra del mercado sobre lo libre de riesgo), (2) tamano de empresa (SMB: empresas pequenas vs grandes), y (3) valor contable (HML: empresas baratas vs caras). B es correcta porque el impulso de precio (momentum, tendencia a que acciones ganadoras sigan subiendo) NO es parte de este modelo; fue agregado despues por Carhart. A es incorrecta porque el tamano SI esta incluido. C es incorrecta porque el retorno del mercado SI es el primer factor."}, {"a": "B", "e": "Comprar con margen es como pedir prestado para comprar: pones la mitad y el broker la otra. Si el precio baja mucho, el broker te pide mas dinero (margin call). La formula es: Precio critico = Precio inicial x (1 - margen inicial) / (1 - margen de mantenimiento). Aqui: $32 x (1-0.50)/(1-0.25) = $32 x 0.50/0.75 = $21.33, cercano a $21. B es correcta. A ($16) es solo el monto del prestamo ($32 x 0.50), no el precio critico. C ($24) confunde el margen de mantenimiento (25%) aplicandolo directamente al precio."}, {"a": "A", "e": "En una recesion, es como si todos quisieran huir de inversiones riesgosas. Los bonos corporativos de baja calidad son mas riesgosos porque las empresas debiles podrian no pagar (riesgo de impago). Por eso sus rendimientos SUBEN (los inversores exigen mas compensacion). Ademas, el diferencial de credito (diferencia de rendimiento entre bonos malos y buenos) se AMPLIA porque todos prefieren bonos seguros. A es correcta: ambos aumentan. B es incorrecta porque ambos suben, no bajan. C es incorrecta porque ambos se mueven en la misma direccion, no en direcciones opuestas."}, {"a": "C", "e": "Una opcion put (opcion de venta) es como un seguro: te da el derecho de vender algo a un precio fijo. Si el precio de mercado BAJA por debajo del precio pactado, conviene ejercerla. C es la menos precisa porque dice lo contrario: que se ejerce cuando el precio sube, lo cual es falso. El tenedor de un put ejerce cuando el precio del activo es MENOR que el precio de ejercicio. A es correcta como afirmacion: lo maximo que pierde el comprador es la prima (el costo del seguro). B tambien es correcta: lo maximo que pierde el vendedor del put es el precio de ejercicio menos la prima recibida."}, {"a": "C", "e": "Un mercado efficiente es como un concurso donde toda la informacion disponible ya esta reflejada en los precios, asi que nadie puede ganar consistentemente usando datos publicos. C es inconsistente con eficiencia porque Earl Baker gana siempre comprando cuando hay pesimismo y vendiendo con optimismo, usando sentimiento pasado para predecir precios. A es compatible: ganar 2% extra puede reflejar mayor riesgo asumido. B es compatible: si las ganancias de 8% eran menores a lo esperado, es logico que la accion baje, el mercado ya habia anticipado mas."}, {"a": "A", "e": "Imagina una fila de cobro si una empresa quiebra: primero cobran los bonistas, despues los accionistas preferentes y al final los accionistas comunes. El titulo descrito (prioridad entre bonos y acciones comunes) son las acciones preferentes. Estas funcionan como un hibrido: pagan dividendos fijos pero normalmente NO otorgan derecho a voto. A es correcta. B es incorrecta porque el voto estatutario (un voto por accion por puesto) es propio de acciones comunes. C es incorrecta porque el voto acumulativo (concentrar votos en un candidato) tambien pertenece a acciones comunes."}, {"a": "C", "e": "Un indice bursatil es como una canasta de acciones. En un indice de ponderacion igualitaria, cada accion pesa lo mismo. Cuando los precios cambian, los pesos se desequilibran y hay que comprar y vender frecuentemente para restaurar la igualdad, generando altos costos de transaccion (comisiones por operar). C es correcta. B es incorrecta porque los indices ponderados por valor de mercado se ajustan solos cuando cambian los precios, casi sin necesidad de rebalanceo. A es incorrecta porque los indices ponderados por precio tambien se ajustan automaticamente."}, {"a": "A", "e": "Invertir en un fondo es como compartir una pizza entre muchos: con poco dinero accedes a muchos ingredientes (activos). La principal ventaja frente a invertir directamente es la mayor diversificacion (repartir el riesgo entre muchas inversiones). A es correcta. B es incorrecta porque los fondos generalmente requieren inversiones minimas MAS BAJAS que comprar activos individuales directamente. C es incorrecta porque al invertir en fondos, un gestor profesional toma las decisiones, asi que el inversor participa MENOS en la gestion, no mas."}, {"a": "B", "e": "Un fondo de cobertura (hedge fund) a veces restringe cuando puedes retirar tu dinero. Un periodo de bloqueo suave (soft lockup) significa que PUEDES retirar en cualquier momento, pero pagas una penalizacion significativa durante un periodo inicial, como un contrato de telefono que permite cancelar pero con cargo. B es correcta. A es incorrecta porque periodo de penalizacion no es el termino tecnico estandar en la industria. C es incorrecta porque periodo de restriccion de redencion es un termino general; el nombre especifico cuando se permite retirar con cargo es soft lockup (bloqueo suave)."}, {"a": "A", "e": "Imagina que varios paises crean juntos un banco para ayudar al mundo, como el Banco Mundial. Un bono supranacional es emitido por estas agencias multilaterales, es decir, organizaciones creadas por multiples naciones para fines de desarrollo. A) Correcta: por definicion, estos bonos los emite una agencia multilateral. B) Incorrecta: un bono que se negocia fuera de la jurisdiccion de cualquier pais se llama eurobono, que es otra categoria distinta. C) Incorrecta: un bono que paga cupones en una moneda diferente a su valor nominal se denomina bono de doble moneda, concepto diferente al supranacional."}, {"a": "B", "e": "Las calificadoras de riesgo asignan notas a los bonos como si fueran calificaciones escolares. Los bonos con grado de inversion son los mas seguros, con calificacion BBB- o superior. Por debajo de ese umbral se consideran especulativos o de alto rendimiento. B) Correcta: BB esta por debajo del limite BBB-, asi que no es grado de inversion y la inversionista no lo compraria. A) Incorrecta: A- esta muy por encima del umbral, es grado de inversion solido. C) Incorrecta: BBB cumple el requisito minimo de grado de inversion, por lo que si seria aceptable para la inversionista."}, {"a": "B", "e": "Para valorar una accion que pagara dividendos crecientes, se proyectan los pagos futuros y se traen a valor presente, como calcular cuanto vale hoy una serie de pagos futuros. Los dividendos son: ano 5 = 1.00, ano 6 = 1.25, ano 7 = 1.5625, ano 8 = 1.953. El valor terminal en el ano 7 es D8/(0.103-0.05) = 36.85. Descontando todo al presente con tasa 10.3% se obtiene aproximadamente 22.72. B) Correcta. A) Incorrecta: subestima el valor, probablemente por error en el descuento. C) Incorrecta: sobreestima el valor, posiblemente descontando menos periodos de los debidos."}, {"a": "A", "e": "Vender una opcion de venta (put) es como prometer comprar algo a un precio fijo. Si el valor de mercado baja, pierdes porque debes pagar mas de lo que vale. El vendedor del put se comprometio a comprar la accion a 45 dolares. Al vencimiento, la accion vale 43. B) Incorrecta: el vendedor no gana, sino que pierde cuando el precio cae bajo el precio pactado. C) Incorrecta: no hay equilibrio porque existe una diferencia de 2 dolares. A) Correcta: debe comprar a 45 algo que vale 43, generando una perdida de 2 dolares por accion."}, {"a": "C", "e": "Un bono de tasa flotante paga intereses variables mas un margen fijo sobre una tasa de referencia. El margen cotizado es lo que realmente paga el bono, y el margen de descuento es lo que el mercado exige. Si el bono paga mas de lo exigido, los inversionistas pagan un precio mayor. C) Correcta: el margen cotizado (90 puntos base) supera al margen de descuento (80 puntos base), asi que el bono cotiza con prima. A) Incorrecta: cotizaria a la par solo si ambos margenes fueran iguales. B) Incorrecta: cotizaria con descuento si el margen cotizado fuera menor al de descuento."}, {"a": "B", "e": "El descuento hiperbolico es como preferir recibir 50 dolares hoy en vez de 100 en un mes: valoramos exageradamente lo inmediato. Es un sesgo de comportamiento donde la gratificacion a corto plazo domina sobre beneficios mayores futuros. B) Correcta: describe exactamente esta preferencia por ganancias pequenas e inmediatas. A) Incorrecta: atribuirse los exitos y culpar a otros por las perdidas es el sesgo de autoatribucion, un concepto diferente. C) Incorrecta: sentir mas dolor por perder que placer por ganar lo mismo describe la aversion a las perdidas, otro sesgo distinto."}, {"a": "A", "e": "Cuando una empresa nueva tiene perdidas y su mayor valor esta en cosas intangibles como el talento humano, necesitamos un indicador que funcione sin ganancias ni activos registrados. El ratio precio sobre ventas compara el precio de la accion con los ingresos por ventas. A) Correcta: las ventas siempre son positivas y no dependen de activos en el balance, ideal para esta situacion. B) Incorrecta: el valor en libros no incluye los intangibles generados internamente ni el capital humano, subestimando el valor real. C) Incorrecta: con perdidas las ganancias son negativas, haciendo el ratio precio-ganancias inutilizable."}, {"a": "C", "e": "Los mercados de derivados son como mercados de apuestas sobre precios futuros: al negociarse, revelan lo que los participantes esperan que ocurra. Este descubrimiento de precios genera informacion valiosa no disponible de otra forma, como expectativas de volatilidad o precios futuros. C) Correcta: la generacion de informacion de mercado es un beneficio clave. A) Incorrecta: los derivados no reducen el riesgo de que una contraparte incumpla; incluso pueden aumentarlo en mercados no regulados. B) Incorrecta: el riesgo sistematico afecta a todo el sistema financiero y no se puede cubrir efficientemente con derivados."}, {"a": "B", "e": "Para identificar si un bono tiene opciones incorporadas, comparamos sus diferenciales. El diferencial ajustado por opciones (OAS) elimina el efecto de la opcion. Si el OAS es menor que el diferencial Z, el bono tiene una opcion que favorece al emisor (es rescatable). Si el OAS es mayor, favorece al inversionista (es vendible). B) Correcta: Bono W tiene OAS 130 menor que Z-Spread 155, indicando bono rescatable. Bono Z tiene OAS 226 mayor que Z-Spread 201, indicando bono vendible. A) Incorrecta: invierte las conclusiones para X e Y. C) Incorrecta: Bono Z es vendible, no rescatable."}, {"a": "B", "e": "Las tasas spot y las tasas a plazo se relacionan como escalones: conociendo unas podemos calcular las otras. La tasa a plazo de 2 anos desde el ano 1 (6.5%) cubre los anos 2 y 3. Para hallar la tasa spot a 3 anos usamos: (1+S3)^3 = (1.03)(1.065)^2 = 1.1683. Sacando raiz cubica: S3 = 5.31%, cercano a 5.3%. B) Correcta. A) Incorrecta: 5.0% es solo la tasa a plazo a un ano, no incorpora toda la informacion. C) Incorrecta: 9.3% resulta de sumar tasas directamente en vez de componerlas geometricamente, lo cual es un error metodologico."}, {"a": "A", "e": "Imagina que agrupas personas no por su profesion, sino porque reaccionan igual al clima. Los metodos estadisticos clasifican empresas por correlaciones en sus rendimientos, no por lo que venden. A) Correcta: una tienda de alimentos y un fabricante de maquinaria en el mismo grupo solo tiene sentido si se usaron metodos estadisticos que detectaron patrones similares en sus retornos. B) Incorrecta: por productos y servicios, alimentos y maquinaria industrial son sectores completamente distintos. C) Incorrecta: alimentos es un sector defensivo y maquinaria es ciclico; su sensibilidad al ciclo economico es opuesta, no similar."}, {"a": "B", "e": "Piensa en dos apuestas: una arriesgada y una segura. Si ambas te dan en promedio lo mismo, alguien prudente elige la segura. El valor esperado de ambas inversiones es $3,200 (Inversion 1: 20% x $8,000 + 80% x $2,000 = $3,200). B) Correcta: un inversor averso al riesgo (que prefiere evitar incertidumbre) siempre elige el resultado garantizado cuando el valor esperado es igual. A) Incorrecta: preferir la opcion riesgosa seria propio de alguien amante del riesgo. C) Incorrecta: ser indiferente entre ambas solo aplicaria a un inversor neutral al riesgo, a quien no le importa la variabilidad."}, {"a": "C", "e": "Para valorar un bono, se descuenta cada pago usando las tasas spot (tasas de mercado para cada plazo). Las tasas semestrales son 3%, 3.25%, 3.5% y 3.75%. El cupon semestral es $50 (10%/2 x $1,000). Precio = 50/1.03 + 50/1.0325^2 + 50/1.035^3 + 1050/1.0375^4 = $1,046.77. C) Correcta: como el cupon (10%) supera las tasas de mercado (6%-7.5%), el bono vale mas que su valor nominal, cotiza con prima. A) Incorrecta: $918 implicaria un descuento, imposible cuando el cupon supera las tasas. B) Incorrecta: $1,000 solo ocurriria si el cupon igualara exactamente las tasas de mercado."}, {"a": "A", "e": "El rendimiento de conveniencia es el beneficio de tener fisicamente un bien, como tener gasolina en epoca de escasez. Si un contrato a futuro (forward) ignora este beneficio, su precio queda inflado. A) Correcta: como el forward esta sobrevalorado, el arbitrajista lo compra largo (se compromete a comprar al precio inflado del forward, que en realidad le resulta barato al explotar el error). B) Incorrecta: el arbitrajista venderia el activo subyacente en corto, no lo compraria. C) Incorrecta: la posicion en el activo libre de riesgo es secundaria; la clave del arbitraje es comprar el forward y vender el subyacente."}, {"a": "C", "e": "Los riesgos de una empresa se dividen en financieros (relacionados con dinero y pagos) y no financieros (relacionados con operaciones, estrategia o gobernanza). C) Correcta: el riesgo de solvencia (capacidad de seguir operando como empresa viable a largo plazo) es no financiero, vinculado a la gestion estrategica y operativa del negocio. A) Incorrecta: el riesgo de credito (que alguien no te pague) es un riesgo financiero clasico. B) Incorrecta: el riesgo de liquidez (no poder convertir activos en efectivo rapidamente) tambien es un riesgo financiero."}, {"a": "A", "e": "Un indice ponderado por valor de mercado mide el peso de cada empresa segun su capitalizacion (precio x numero de acciones). Un split es como cambiar un billete de $10 por dos de $5: mas unidades, menor precio, mismo valor total. A) Correcta: la capitalizacion no cambia con un split, asi que no se necesita ningun ajuste. B) Incorrecta: ajustar el denominador (divisor) es necesario en indices ponderados por precio, como el Dow Jones, no en uno ponderado por valor. C) Incorrecta: ni numerador ni denominador requieren cambios porque el valor total de mercado permanece identico."}, {"a": "C", "e": "Los fondos de cobertura (hedge funds) cobran dos tipos de comision: una fija por gestionar el dinero y otra variable por buen desempeno. C) Correcta: la comision de gestion (management fee) se calcula como porcentaje de los activos bajo gestion (AUM, el total de dinero administrado), tipicamente 1-2% anual, sin importar si el fondo gano o perdio. A) Incorrecta: el capital comprometido (dinero prometido pero no necesariamente invertido) se usa como base en capital privado (private equity), no en hedge funds. B) Incorrecta: las ganancias sobre una tasa minima son la base de la comision por desempeno (incentive fee), no de la de gestion."}, {"a": "B", "e": "El papel comercial es deuda a corto plazo que las empresas emiten para financiarse. Como vence rapido, el emisor suele emitir papel nuevo para pagar el anterior, como renovar un prestamo. B) Correcta: el riesgo de rollover (renovacion) es que al vencimiento la empresa no logre emitir nuevo papel para refinanciarse, causando una crisis de liquidez. A) Incorrecta: el riesgo de impago (default) lo sufren los inversores que compraron el papel, no el emisor. C) Incorrecta: el riesgo de reinversion afecta a los inversores que deben reinvertir sus cobros a tasas posiblemente mas bajas."}, {"a": "B", "e": "La duracion mide cuanto cambia el precio de un bono cuando varian las tasas de interes; a mayor duracion, mayor sensibilidad. Piensa en una balanza: cuando suben las tasas, los pagos cercanos pesan mas y los lejanos menos, acortando la duracion. B) Correcta: un aumento en el rendimiento al vencimiento (YTM, la tasa que iguala precio y flujos) reduce la duracion, disminuyendo el riesgo de tasa. A) Incorrecta: un mayor YTM reduce, no aumenta, la sensibilidad del precio a cambios en tasas. C) Incorrecta: el riesgo si cambia; la relacion entre YTM y duracion es inversa."}, {"a": "C", "e": "El modelo binomial neutral al riesgo valora opciones calculando un promedio ponderado de sus posibles valores futuros (si el precio sube o baja) y luego descontandolo al presente. C) Correcta: ese promedio ponderado representa el valor futuro esperado. Para obtener el valor actual, se divide entre (1 + tasa libre de riesgo). Como esta tasa es positiva, el promedio futuro siempre es mayor que el valor actual de la opcion. A) Incorrecta: el promedio es el valor futuro, no el actual; falta descontarlo. B) Incorrecta: el promedio futuro nunca es menor que el valor presente cuando la tasa es positiva."}, {"a": "A", "e": "Imagina que dos amigos intercambian pagos: uno siempre paga lo mismo y el otro paga segun como le vaya a su negocio. Eso es un swap (intercambio financiero). Aqui una parte paga $100,000 fijos cada trimestre y la otra paga un monto variable segun el valor de un portafolio de acciones. A) Correcta: este intercambio periodico de pagos fijos por variables ligados a acciones define un equity swap. B) Incorrecta: una opcion sobre indice da el derecho de comprar o vender a un precio fijo, sin pagos periodicos. C) Incorrecta: el seguro de portafolio es una estrategia de proteccion contra perdidas usando opciones, no un contrato de intercambio de pagos."}, {"a": "A", "e": "Cuando una empresa no genera ganancias pero tiene bienes valiosos, es como tasar una casa por lo que valen sus terrenos y materiales, no por el alquiler que produce. A) Correcta: el modelo basado en activos valora la empresa sumando el valor de mercado de lo que posee (aqui, cuotas de pesca transferibles). Es ideal cuando no hay ganancias. B) Incorrecta: el multiplicador de ganancias (precio/beneficio) necesita que la empresa tenga beneficios positivos; Visser no los tiene. C) Incorrecta: el modelo de Gordon requiere dividendos y crecimiento estable; una empresa sin ganancias no paga dividendos, asi que este modelo no aplica."}, {"a": "B", "e": "Al evaluar la salud financiera de una empresa, miramos dos cosas clave: el apalancamiento (cuanta deuda tiene, medido por deuda/capital, donde menor es mejor) y la cobertura (cuantas veces puede pagar sus intereses con sus ganancias operativas, donde mayor es mejor). B) Correcta: Lawrence tiene el menor apalancamiento (0.35, la menor deuda relativa) y Knight la mejor cobertura (14.0, paga sus intereses mas veces). A) Incorrecta: Knight tiene el PEOR apalancamiento (0.70, la mayor deuda). C) Incorrecta: Johnson no tiene el mejor apalancamiento (0.55 es mayor que 0.35 de Lawrence) ni Lawrence la mejor cobertura (10.5 es menor que 14.0 de Knight)."}, {"a": "C", "e": "Es como hacer una lista negra: si no quieres comprar en tiendas que tratan mal a sus empleados, simplemente las excluyes de tus opciones. Eso es filtrado negativo. C) Correcta: el filtrado negativo (negative screening) elimina de la cartera a empresas que violan criterios eticos, como los derechos humanos. Es el metodo ideal para evitar vinculos con actividades indeseadas. A) Incorrecta: el filtrado positivo selecciona las mejores empresas en criterios ambientales, sociales y de gobierno, pero no excluye por violaciones especificas. B) Incorrecta: la inversion tematica se enfoca en tendencias como energia limpia o agua, no en excluir empresas por conductas eticas."}, {"a": "C", "e": "Imagina que guardas mercancias en un almacen: si sube el costo de guardarlo y baja la ventaja de tenerlo a mano (convenience yield o rendimiento por conveniencia), el precio futuro teorico sube. Pero el efecto en un contrato ya existente depende de tu posicion. C) Correcta: para un contrato forward ya firmado, si eres comprador podrias beneficiarte del mayor precio futuro, pero si eres vendedor te perjudica. Por eso puede subir o bajar. A) Incorrecta: no siempre aumenta porque depende de si tienes posicion de comprador o vendedor. B) Incorrecta: no siempre disminuye; para el comprador del contrato existente, un precio forward mayor podria ser favorable."}, {"a": "C", "e": "Imagina que le pagas un bono a tu asesor cuando tus inversiones suben. Si despues bajan y vuelven a subir al mismo nivel, no quieres pagar otra vez por la misma ganancia. El high-water mark (marca de agua alta) evita eso. C) Correcta: esta clausula asegura que solo se cobren comisiones de incentivo cuando el fondo supere su maximo historico previo, evitando pagar dos veces por las mismas ganancias. A) Incorrecta: el clawback permite recuperar comisiones ya pagadas si las ganancias no se mantienen, pero no previene el pago doble directamente. B) Incorrecta: la tasa minima de retorno exige un rendimiento minimo antes de cobrar incentivos, pero no aborda el problema de pagar dos veces."}, {"a": "C", "e": "Imagina que los gerentes de una tienda deciden comprarla ellos mismos junto con otros inversores, y la sacan del mercado publico. Eso es un MBO (compra por parte de la gerencia). C) Correcta: en un MBO, un grupo inversor que incluye a los directivos actuales compra todas las acciones, convirtiendo la empresa publica en privada. Las acciones dejan de cotizar en bolsa. A) Incorrecta: esto describe lo opuesto, donde la gerencia vende sus acciones a un grupo externo. B) Incorrecta: comprar solo un interes mayoritario sin retirar la empresa de la bolsa seria una adquisicion parcial, no un MBO que privatiza la empresa completamente."}, {"a": "B", "e": "El modelo CAPM calcula el retorno que deberia dar una accion segun su riesgo (beta). Aqui: retorno requerido = 7% + 0.9 x (11% - 7%) = 10.6%. El retorno estimado es 10%, menor al requerido. B) Segun la respuesta oficial, la accion esta subvaluada. Sin embargo, el calculo muestra que ofrece menos de lo requerido (alfa negativo de -0.6%), lo que normalmente indica sobrevaluacion. A) Incorrecta segun la clave oficial, aunque el calculo matematico del CAPM sugiere sobrevaluacion. C) Incorrecta: no esta correctamente valorada porque el retorno esperado (10%) difiere del requerido (10.6%), asi que el precio no refleja su valor justo."}, {"a": "A", "e": "Un bono puro descuento (cupon cero) se compra barato y al vencer se recibe su valor completo, sin pagos intermedios. El rendimiento corriente (current yield) mide el ingreso anual por cupones dividido entre el precio. A) Correcta: como este bono no paga cupones, su rendimiento corriente es cero (0 dividido entre cualquier precio es 0). Es el mas bajo posible. B) Incorrecta: el rendimiento a primera fecha de rescate seria positivo, porque el bono se compro con descuento y se redimiria al valor par en 2 anos. C) Incorrecta: el rendimiento al vencimiento tambien seria positivo, ya que el bono se compro con descuento y devuelve el valor par en 5 anos."}, {"a": "B", "e": "Un fondo de fondos es como contratar a un experto que elige varios restaurantes por ti: obtienes variedad, pero pagas su tarifa ademas de la de cada restaurante. B) Correcta: quien elige un fondo de fondos NO busca minimizar comisiones, porque este cobra una capa adicional de gastos de gestion e incentivos sobre las comisiones de cada fondo subyacente. Los costos se duplican. A) Incorrecta: la diversificacion entre estrategias SI es una razon para elegir un fondo de fondos, ya que invierte en multiples fondos. C) Incorrecta: la experiencia del gestor en seleccionar buenos fondos SI es una preocupacion relevante al elegir esta estructura."}, {"a": "B", "e": "Gestionar un portafolio es como cuidar un jardin: primero planificas, luego plantas y despues revisas regularmente. El rebalanceo ocurre en el paso de retroalimentacion (feedback), donde se monitorea el portafolio y se ajustan los porcentajes de activos para mantener la meta original. B es correcta porque rebalancear es un ajuste posterior, no inicial. A es incorrecta: el paso de analisis es donde se estudian mercados y se definen estrategias, antes de invertir. C es incorrecta: el paso de ejecucion es la compra inicial de activos, no el ajuste periodico posterior."}, {"a": "A", "e": "Vender en corto es apostar a que el precio baja: vendes algo prestado esperando recomprarlo mas barato. Si el precio sube, pierdes. Para limitar perdidas al 10% con la accion a $40, colocas una orden stop de compra (stop buy) a $44 ($40 x 1.10). A es correcta: si el precio sube a $44, la orden se activa automaticamente y cierra tu posicion. B es incorrecta: una orden stop de venta protege posiciones largas (cuando ya tienes la accion), no posiciones cortas. C es incorrecta: una orden limite de compra a $44 podria ejecutarse inmediatamente al precio actual de $40, sin esperar a que suba."}, {"a": "C", "e": "En derivados, hay dos roles: quien compra derechos y quien asume obligaciones. Un emisor (writer) de opciones siempre tiene obligacion. C es correcta: el emisor de una opcion de venta (put writer) esta obligado a comprar el activo, y el emisor de una opcion de compra (call writer) esta obligado a venderlo, si el comprador ejerce su derecho. A es incorrecta: una opcion de compra (call) da el derecho, no la obligacion, de comprar. B es incorrecta: un contrato a plazo (forward) obliga a ambas partes, comprador y vendedor, no solo al vendedor."}, {"a": "A", "e": "El valor intrinseco es lo que realmente vale un activo; el precio de mercado es lo que la gente paga. Cuando se restringe la venta en corto (vender acciones prestadas apostando a la baja), los pesimistas no pueden presionar el precio hacia abajo. A es correcta: sin vendedores en corto, falta presion bajista y los precios se mantienen inflados sobre su valor real. B es incorrecta: costos de transaccion altos dificultan operar en ambas direcciones, sin sesgo alcista persistente. C es incorrecta: limitar el arbitraje impide correcciones tanto al alza como a la baja, no causa sobrevaloracion sistematica."}, {"a": "A", "e": "La convexidad mide como cambia la sensibilidad de un bono ante movimientos de tasas de interes, como la curvatura de una carretera. Algunos bonos tienen opciones incorporadas (por ejemplo, el emisor puede recomprarlos anticipadamente). A es correcta: la convexidad efectiva usa un modelo que captura como esas opciones alteran los flujos del bono cuando cambian las tasas, mientras la convexidad aproximada asume flujos fijos. B es incorrecta: para bonos sin opciones, ambas medidas dan resultados similares. C es incorrecta: ambos metodos pueden usar cambios iguales o desiguales en tasas; esa no es una diferencia real entre ellos."}, {"a": "A", "e": "Un indice multi-mercado agrupa acciones de varios paises. Si ponderas los retornos de cada pais por su capitalizacion bursatil (valor total de mercado), los paises con mejores retornos recientes pesan mas, porque su mercado crecio. A es correcta: ponderar retornos por capitalizacion sobrepondera automaticamente paises con buen desempeno reciente. B es incorrecta: ponderar por PIB (producto interno bruto, el valor de la economia) no cambia con los retornos bursatiles. C es incorrecta: aunque las acciones se ponderen por capitalizacion, si los retornos pais se ponderan por PIB, se evita el sesgo hacia paises con altos retornos."}, {"a": "B", "e": "La declaracion de politica de inversion (IPS) es como el reglamento de un fondo: define que se puede y que no se puede hacer. Las restricciones sobre apalancamiento (usar deuda para invertir mas) se encuentran en las directrices de inversion. B es correcta: esa seccion establece los limites y parametros para gestionar el portafolio, incluyendo restricciones al apalancamiento. A es incorrecta: la seccion de procedimientos describe procesos operativos como reportes y revisiones, no restricciones de inversion. C es incorrecta: deberes y responsabilidades define los roles de cada parte involucrada, no limites del portafolio."}, {"a": "A", "e": "Cuando un bono paga cupones periodicos, entre pagos se va acumulando interes no cobrado, llamado interes devengado. Existen dos precios: el precio limpio (sin interes acumulado) y el precio sucio (con interes acumulado). A es correcta: el interes devengado es la diferencia entre el precio sucio (full price) y el precio limpio (flat price). B es incorrecta: precio limpio y precio plano (flat price) son lo mismo, su diferencia es cero. C es incorrecta: precio factura (invoice price) y precio sucio (dirty price) tambien son sinonimos, su diferencia es cero."}, {"a": "B", "e": "La paridad put-call es una formula que relaciona opciones de compra (call), opciones de venta (put), un bono libre de riesgo y el activo subyacente: S = C - P + VP(X). Para crear un activo sintetico (replicar tener la accion sin comprarla), se usa esta formula. B es correcta: comprar un call, vender un put y comprar un bono libre de riesgo replica exactamente poseer el activo. A es incorrecta: invierte las posiciones del put y del bono, no replica el activo. C es incorrecta: vender el call y comprar el put genera la posicion opuesta al activo."}, {"a": "B", "e": "Para valorar una accion, primero calculamos el retorno requerido con el modelo CAPM: tasa libre de riesgo mas beta por la prima de mercado. Aqui: 8% + 1.2 x (13%-8%) = 14%. El dividendo proyectado es $1 x 1.10 = $1.10. El valor hoy es el dividendo mas el precio futuro, descontados: ($1.10 + $25) / 1.14 = $22.89. B es correcta. A es incorrecta: $19.45 implicaria usar una tasa demasiado alta o descontar mas periodos. C es incorrecta: $26.74 sugiere no descontar correctamente los flujos futuros a valor presente."}];
const S2=[{"a": "C", "e": "Imagina un mercado como una subasta perfecta donde el precio siempre refleja lo que algo realmente vale. Un mercado efficiente es aquel donde los precios de mercado (lo que la gente paga) igualan los valores intrinsecos (lo que realmente vale un activo segun sus fundamentos). C) Correcta: esa igualdad define la eficiencia de mercado, pues toda la informacion disponible ya esta incorporada en el precio. A) Incorrecta: el valor en libros es un registro contable historico, como el precio original de una casa, no su precio actual. B) Incorrecta: que el valor intrinseco iguale al valor en libros seria coincidencia contable, no evidencia de eficiencia."}, {"a": "A", "e": "Piensa en las criptomonedas como monedas digitales que se compran y guardan en un registro publico llamado blockchain (cadena de bloques). Una inversion directa significa poseer la criptomoneda tu mismo. A) Correcta: cuando la transaccion se registra en el blockchain, tu eres dueno directo del activo digital. B) Incorrecta: comprar acciones de una empresa relacionada con criptomonedas es inversion indirecta, pues posees parte de la empresa, no la moneda digital. C) Incorrecta: un contrato de futuros es un acuerdo para comprar o vender en el futuro; es un derivado, no posesion directa de la criptomoneda."}, {"a": "B", "e": "Imagina un colegio de abogados: puede sancionar a sus miembros por mala conducta profesional, pero no puede meterlos en la carcel. Las organizaciones profesionales solo pueden imponer estandares eticos (reglas de conducta moral y profesional). B) Correcta: su autoridad se limita a normas eticas dentro de la profesion. A) Incorrecta: los estandares legales (leyes) solo los imponen y hacen cumplir los gobiernos y tribunales. C) Incorrecta: como carecen de poder legal, estas organizaciones no pueden hacer cumplir leyes; unicamente establecen y aplican codigos de etica voluntarios para sus miembros."}, {"a": "A", "e": "Piensa en una red social gratuita: tu no pagas, pero ves anuncios personalizados. Ese es el modelo de ingresos ocultos (hidden revenue), donde el usuario disfruta contenido gratis y la empresa gana dinero con publicidad dirigida. A) Correcta: el sitio ofrece contenido gratuito y monetiza mostrando anuncios a usuarios registrados, quienes no pagan directamente. B) Incorrecta: crowdsourcing (colaboracion masiva) implica que los usuarios crean el producto principal, como Wikipedia; aqui solo comentan. C) Incorrecta: los efectos de red significan que el servicio mejora al tener mas usuarios; aqui el modelo se centra en generar ingresos por publicidad."}, {"a": "A", "e": "Imagina un equipo de trabajo que toma decisiones por consenso grupal. Si confias en la capacidad del equipo, no necesitas protestar cada vez que no coincides. A) Correcta: segun los Estandares CFA, si Girard confia en la capacidad analitica del grupo y el proceso es razonable, no necesita tomar ninguna accion aunque personalmente discrepe. B) Incorrecta: no es necesario pedir que retiren su nombre del informe si el proceso analitico fue riguroso y el confia en el. C) Incorrecta: tampoco se exige anadir su opinion como apendice; la confianza en un proceso grupal solido es suficiente para cumplir con los Estandares."}, {"a": "A", "e": "Es como poner en tu curriculum que terminaste la carrera en cuatro anos: si es verdad, puedes decirlo. Los Estandares CFA permiten declaraciones factuales verificables sobre logros en los examenes. A) Correcta: afirmar que aprobo los tres niveles en su primer intento es aceptable siempre que sea un hecho comprobable, no una exageracion. B) Incorrecta: una declaracion factual no implica automaticamente superioridad; solo describe lo que ocurrio. C) Incorrecta: los Estandares no prohiben mencionar que se aprobo al primer intento si es verdad; lo que prohiben es tergiversar o exagerar las credenciales profesionales."}, {"a": "A", "e": "Es como cuando un cliente satisfecho te invita a cenar por tu buen trabajo: puedes aceptar si tu jefe lo sabe. El Estandar IV(B) sobre regalos exige divulgacion al empleador, no prohibicion total. A) Correcta: Deininger informo a su empleador sobre el uso de la cabana ofrecida por un cliente agradecido. Con esa divulgacion cumplida, puede aceptar el regalo. B) Incorrecta: los Estandares no prohiben aceptar regalos de clientes; solo exigen transparencia con el empleador. C) Incorrecta: no se requiere informar a otros clientes; la obligacion es divulgar el regalo al empleador para que este evalúe posibles conflictos."}, {"a": "C", "e": "Al crear un plan de inversiones para un cliente, es como hacer un traje a medida: necesitas conocer sus medidas (situacion financiera, legal, objetivos). Los benchmarks (indices de referencia para medir rendimiento) se eligen despues. C) Correcta: los benchmarks de desempeno no forman parte del analisis de idoneidad inicial del cliente; se definen tras elaborar la politica de inversion (IPS). A) Incorrecta: las circunstancias legales y regulatorias del cliente si son fundamentales al evaluar la idoneidad. B) Incorrecta: los conflictos de interes tambien deben considerarse al determinar que inversiones son apropiadas para el cliente."}, {"a": "A", "e": "Imagina que mides el rendimiento de un jardinero: quieres evaluar su habilidad, no si le dieron mas o menos agua. GIPS (normas globales de presentacion de rendimiento) exige retornos ponderados por tiempo, que miden la habilidad del gestor eliminando el efecto de depositos y retiros del cliente. A) Correcta: GIPS requiere tasas ponderadas por tiempo para la mayoria de carteras. B) Incorrecta: las tasas ponderadas por dinero solo se permiten en casos especiales como capital privado. C) Incorrecta: GIPS no permite usar ambos metodos indistintamente; el estandar principal es el retorno ponderado por tiempo."}, {"a": "A", "e": "Los bonos del Tesoro de EE.UU. a corto plazo (T-bills) estan respaldados por el gobierno federal, como un pagare firmado por el Estado. Decir que son valores garantizados es simplemente describir la realidad. A) Correcta: no viola ningun Estandar porque los T-bills efectivamente tienen la garantia del gobierno estadounidense; es una declaracion factual precisa. B) Incorrecta: no es una tergiversacion (misrepresentation) porque el respaldo gubernamental es un hecho verificable. C) Incorrecta: describir la naturaleza garantizada del instrumento no es un problema de idoneidad (suitability); es una descripcion correcta del producto."}, {"a": "C", "e": "Imagina que administras una alcancía colectiva para un grupo de trabajadores. Tu deber principal es con quienes recibirán ese dinero al jubilarse. C) Correcta: El administrador del fondo de pensiones debe lealtad a los beneficiarios del plan, es decir, los policías retirados y sus familias que recibirán las prestaciones. Son ellos quienes dependen de una buena gestión. A) Incorrecta: Los contribuyentes de la ciudad aportan dinero al fondo, pero no son quienes reciben los beneficios; el deber fiduciario (obligación legal de actuar en interés de otro) no es hacia ellos. B) Incorrecta: Los fideicomisarios supervisan el fondo, pero el administrador les debe lealtad a los beneficiarios finales, no a la junta supervisora."}, {"a": "B", "e": "Cuando una empresa tiene información confidencial importante, debe actuar con cuidado para no afectar al mercado. B) Correcta: Riley and Smith debe seguir como creador de mercado (quien facilita compra y venta de acciones), pero limitándose a responder solo a operaciones que los clientes inicien por su cuenta, sin promover activamente. Así mantiene la liquidez sin usar información privilegiada. A) Incorrecta: No hay regla que prohíba ser simultáneamente colocador y creador de mercado; lo clave es manejar bien la información confidencial. C) Incorrecta: Dejar de operar completamente podría dañar la liquidez del mercado y además enviar señales sospechosas al público sobre la empresa."}, {"a": "A", "e": "Es como un vendedor de una tienda que primero ofrece productos de su marca: está bien, siempre que le avise al cliente que esa es su política. A) Correcta: O'Neill puede seguir la política de recomendar los productos de su propia firma si le informa claramente al cliente sobre esta práctica, para que el cliente evalúe posibles conflictos de interés (situaciones donde el asesor podría beneficiarse a costa del cliente). B) Incorrecta: Que los productos sean competitivos no basta; lo esencial es la transparencia, es decir, informar al cliente de la política. C) Incorrecta: La política no viola automáticamente las normas de lealtad y prudencia si hay divulgación adecuada y los productos son apropiados para el cliente."}, {"a": "C", "e": "Si alguien te recomienda un profesional, tienes derecho a saber si quien recomienda recibe algo a cambio. C) Correcta: Sergeant violó las normas porque no le contó a su cliente que tiene un acuerdo con el abogado Chapman: este le da servicios legales gratuitos a cambio de que Sergeant le envíe clientes. Esta falta de transparencia sobre honorarios por referidos es la violación. A) Incorrecta: Aunque el cliente puede elegir otro abogado, Sergeant debe revelar el conflicto de interés antes de hacer la recomendación. B) Incorrecta: El problema no es que la recomendación sea parcial, sino específicamente que no divulgó el acuerdo de compensación mutua que tenía con Chapman."}, {"a": "A", "e": "Las normas GIPS (estándares globales de rendimiento de inversiones) exigen claridad sobre qué es exactamente la firma que reporta resultados. A) Correcta: GIPS requiere que la firma se defina como la entidad de negocio distinta que se presenta ante clientes y posibles clientes. Es la organización tal como la conocen quienes contratan sus servicios. B) Incorrecta: La definición debe incluir todas las oficinas y ubicaciones geográficas de la firma, no solo la sede principal donde se toman las decisiones de inversión. C) Incorrecta: GIPS sí permite que una división de una corporación se defina como firma, siempre que esa división sea la entidad presentada ante los clientes."}, {"a": "B", "e": "Si un cliente te ofrece un bono extra por buen trabajo, es como recibir una propina: debes avisar a tu jefe y obtener su permiso. B) Correcta: Brenner cumplió correctamente con la norma sobre compensación adicional al notificar por escrito a su empleador los términos del acuerdo y recibir aprobación. No necesita hacer nada más. A) Incorrecta: La norma solo exige notificar al empleador, no a todos los demás clientes. Las partes involucradas en este contexto se refieren al empleador. C) Incorrecta: No debe rechazar el acuerdo si su empleador lo aprueba. Las normas permiten la compensación adicional siempre que haya divulgación y aprobación del empleador."}, {"a": "C", "e": "Una analista puede tener activismo personal y trabajo voluntario, pero debe ser transparente con su empleador sobre compromisos que demanden tiempo. C) Correcta: El activismo ambiental y los arrestos por infracciones menores como entrar sin permiso a una propiedad no violan las normas éticas profesionales. Sin embargo, la posición voluntaria en la junta de Greensleeves sí debe comunicarse al empleador porque requiere tiempo significativo y viajes, y podría generar conflictos de interés. A) Incorrecta: Los arrestos por protestas pacíficas no constituyen conducta que afecte la integridad profesional. B) Incorrecta: Las normas no prohíben posiciones voluntarias en juntas; solo exigen informar al empleador."}, {"a": "C", "e": "Si sospechas que un cliente hace algo ilegal, no actúes solo: busca orientación profesional primero, como consultarías a un experto antes de tomar una decisión importante. C) Correcta: Lo más apropiado es consultar al departamento legal o de cumplimiento normativo de la firma para determinar los pasos correctos a seguir. Ellos conocen las obligaciones legales aplicables. A) Incorrecta: Simplemente guardar silencio y no hacer nada podría convertirte en cómplice de la actividad ilegal del cliente. B) Incorrecta: Reportar directamente a las autoridades sin consultar primero al área legal de la firma sería prematuro y podría tener consecuencias legales negativas."}, {"a": "A", "e": "Si repartes un folleto con información falsa sobre ti, eres responsable aunque no lo hayas escrito tú. Es como firmar un documento con errores que ya conoces. A) Correcta: Brown viola la norma contra la tergiversación porque sigue entregando materiales que dicen falsamente que tiene un título de posgrado. Saber del error y no corregirlo lo hace responsable. B) Incorrecta: Avisar al departamento de marketing no es suficiente; debe asegurarse de que el error se corrija o dejar de repartir esos materiales. C) Incorrecta: Aunque Brown no creó los materiales, al distribuirlos sabiendo que contienen información falsa sobre sus credenciales, participa activamente en la tergiversación."}, {"a": "A", "e": "Cuando un comité de expertos revisa y modifica tu trabajo con un proceso serio y fundamentado, puedes confiar en su criterio sin necesidad de verificar cada cambio. A) Correcta: Pickler no necesita hacer nada adicional. Si el comité de inversión tiene un proceso analítico razonable y bien fundamentado, la analista puede permitir que el informe se publique con su nombre sin revisar cada modificación individualmente. B) Incorrecta: No necesita pedir que retiren su nombre si confía en la capacidad analítica del comité y su proceso es riguroso. C) Incorrecta: Las normas no exigen una revisión independiente de cada cambio; confiar en el proceso del comité es suficiente."}, {"a": "C", "e": "Imagina que en tu trabajo alguien hace algo ilegal. No eres responsable solo por saberlo, sino cuando participas activamente. El Estandar I(A) sobre Conocimiento de la Ley establece que los miembros son responsables por violaciones en las que participan o asisten a sabiendas. C es correcta porque exige participacion consciente, no solo conocimiento. A es incorrecta porque no se necesita que un regulador pruebe la violacion; la responsabilidad nace de la participacion directa del miembro. B es incorrecta porque el estandar no castiga simplemente por estar al tanto o deber estarlo, sino por involucrarse activamente en la infraccion."}, {"a": "A", "e": "Es como escuchar un secreto en un elevador: aunque nadie te lo dijo directamente, si actuas con esa informacion privilegiada, estas infringiendo las reglas. La informacion material no publica es cualquier dato importante que el publico aun no conoce. A es correcta: Pollard violo el Estandar II(A) al comprar acciones basandose en informacion sobre ganancias que aun no se habia anunciado. B es incorrecta porque no importa como obtuvo la informacion; si es material y no publica, no puede usarla para operar. C es incorrecta porque el problema no es no consultar un abogado, sino haber operado con informacion privilegiada."}, {"a": "C", "e": "Piensa en contratar a alguien para tu negocio: lo mas prudente es verificar sus antecedentes antes de darle el puesto. El Estandar I(D) sobre Conducta Indebida recomienda que las firmas verifiquen referencias de candidatos para confirmar su buen caracter y que sean elegibles para trabajar en la industria de inversiones. C es correcta por eso. A es incorrecta porque evaluar periodicamente el conocimiento de leyes es util, pero no es el procedimiento especifico que recomienda este estandar. B es incorrecta porque informar sobre violaciones pasadas es buena practica, pero el estandar prioriza la prevencion verificando antes de contratar."}, {"a": "B", "e": "Imagina que cambias de trabajo y quieres seguir analizando la misma empresa. No puedes llevarte los documentos de tu antiguo jefe porque le pertenecen. El Estandar IV(A) sobre Lealtad protege la propiedad intelectual del empleador anterior. B es correcta: el analista debe recrear sus registros usando fuentes publicas o informacion obtenida directamente de la empresa analizada. A es incorrecta porque copiar archivos del empleador anterior viola la lealtad debida, ya que esos documentos son propiedad de la firma. C es incorrecta porque no se pueden mantener recomendaciones sin documentacion de respaldo; el Estandar V(C) exige que toda recomendacion tenga base documentada."}, {"a": "B", "e": "Es como salir de un examen escolar y contarle a todos que temas no aparecieron. Aunque no reveles las preguntas exactas, estas dando informacion confidencial sobre el contenido. El Estandar VII(A) sobre Conducta de Participantes prohibe revelar cualquier detalle del examen CFA, incluyendo que temas no se incluyeron. B es correcta: Winchester violo el estandar al decir que no hubo preguntas sobre ciertos riesgos. A es incorrecta porque hablar del programa CFA en redes sociales no es automaticamente una violacion; lo prohibido es revelar contenido del examen. C es incorrecta porque indicar la ausencia de temas si constituye informacion confidencial."}, {"a": "A", "e": "Piensa en un informe de notas escolares: no necesita ser perfecto en formato, pero debe reflejar la realidad con honestidad. El Estandar III(D) sobre Presentacion de Rendimiento exige esfuerzos razonables para mostrar resultados justos, precisos y completos. A es correcta: el miembro cumplio al hacer esfuerzos razonables, aunque no incluyo cada detalle. B es incorrecta porque cumplir con GIPS (normas globales de rendimiento) es voluntario, no obligatorio bajo este estandar. C es incorrecta porque los estandares reconocen que esfuerzos razonables son suficientes; no se exige perfeccion absoluta, sino diligencia y buena fe al presentar resultados."}, {"a": "C", "e": "Imagina que trabajas en una panaderia y quieres abrir tu propio negocio de pasteles por las noches. Lo correcto es avisarle a tu jefe antes. El Estandar IV(A) sobre Lealtad al Empleador exige que los miembros que planean un negocio independiente que compita con su firma notifiquen a su empleador sobre los servicios que ofreceran, la duracion y la compensacion. C es correcta por eso. A es incorrecta porque prepararse para un negocio, como buscar oficina, no se considera practica independiente en si misma. B es incorrecta porque solo se requiere notificacion al empleador, no consentimiento escrito tanto del empleador como de los clientes."}, {"a": "A", "e": "Es como si alguien comprara todo el pan de una ciudad para obligar a quienes lo necesitan a pagar lo que el quiera. Hoskins intento controlar toda la oferta disponible de osmio para forzar a otros operadores a cerrar sus posiciones en condiciones desfavorables. Esto se llama manipulacion de mercado y viola el Estandar II(B). A es correcta: si violo el estandar. B es incorrecta porque no es arbitraje, que es aprovechar diferencias de precio legitimas; aqui se distorsiona el mercado deliberadamente. C es incorrecta porque controlar la oferta fisica de un bien si manipula indirectamente el precio de los contratos de futuros."}, {"a": "A", "e": "Piensa en un mesero que debe servir primero a los clientes antes de comer el mismo. El Estandar VI(B) sobre Prioridad de Transacciones funciona igual: los clientes siempre van primero. A es correcta: Jones solo puede comprar acciones de Maxima para su cuenta personal despues de completar todas las compras para sus clientes. B es incorrecta porque comprar al mismo tiempo que los clientes, aunque se informe, no respeta la prioridad que exige el estandar. C es incorrecta porque no basta con obtener un precio igual o peor; la regla exige que las operaciones de clientes se ejecuten primero en el tiempo."}, {"a": "C", "e": "Imagina organizar equipos deportivos por estilo de juego: todos los que juegan defensivo van juntos, los ofensivos en otro grupo. GIPS (normas globales de rendimiento en inversiones) funciona igual con los portafolios. Un composite es un grupo de portafolios gestionados con la misma estrategia. C es correcta: cada composite debe incluir todos los portafolios discrecionales manejados segun una estrategia particular, incluso los que ya no se gestionan. A es incorrecta porque un portafolio puede pertenecer a mas de un composite si cumple criterios de varias estrategias. B es incorrecta porque deben incluirse portafolios historicos ya cerrados para evitar sesgo de supervivencia."}, {"a": "C", "e": "Imagina que eres el gerente de una tienda: no puedes vigilar todo personalmente, pero debes crear reglas claras para que nadie robe. En finanzas, los supervisores deben establecer procedimientos para prevenir y detectar violaciones de quienes supervisan. C) es correcta porque exige esos procedimientos. A) es incorrecta porque si se permite delegar tareas de supervision, aunque la responsabilidad final permanece. B) es incorrecta porque un supervisor no viola las normas automaticamente si un empleado comete fraude; solo viola si no tenia procedimientos razonables de control."}, {"a": "A", "e": "Un plan de inversion (IPS) es como un chequeo medico: hay que revisarlo periodicamente para asegurarse de que sigue siendo adecuado. El IPS define los objetivos y limitaciones del cliente. A) es correcta: el estandar de idoneidad recomienda revisar el IPS al menos una vez al ano, porque las circunstancias del cliente pueden cambiar. B) es incorrecta: dos veces al ano no es el minimo exigido, aunque hacerlo mas seguido esta permitido. C) es incorrecta: cada dos anos es demasiado tiempo; muchas cosas pueden cambiar en la vida del cliente y el plan quedaria desactualizado."}, {"a": "B", "e": "Cuando un analista cambia su opinion sobre una accion, debe avisar de forma justa. Es como un medico que cambia un diagnostico: primero avisa a los pacientes mas afectados. B) es correcta: se puede priorizar la comunicacion segun el interes conocido del cliente en esa accion, es decir, si tiene posiciones o ha mostrado interes. A) es incorrecta: priorizar por tamano del cliente seria injusto, pues todos merecen trato equitativo sin importar su patrimonio. C) es incorrecta: la cantidad de acciones que posee no es el criterio adecuado; lo importante es si el cliente tiene interes conocido en ese valor."}, {"a": "B", "e": "Los riesgos geopoliticos se clasifican segun su naturaleza. El riesgo tematico se refiere a tendencias lentas y persistentes, como el cambio climatico o movimientos de poblacion. B) es correcta: las migraciones poblacionales a largo plazo entre paises vecinos son graduales y estructurales, lo cual define al riesgo tematico. A) es incorrecta: el riesgo de evento se refiere a sucesos repentinos e inesperados, como un golpe de estado, no a tendencias de decadas. C) es incorrecta: el riesgo exogeno involucra factores externos impredecibles como pandemias o desastres naturales, no patrones migratorios graduales."}, {"a": "A", "e": "La liquidez es la capacidad de una empresa para pagar sus cuentas. Un lastre sobre la liquidez (drag on liquidity) reduce el valor de lo que la empresa ya tiene. A) es correcta: cuando el inventario se vuelve obsoleto, es como tener mercancia vencida en una tienda; pierde valor sin generar ingresos, reduciendo la liquidez. B) es incorrecta: pagar a proveedores antes de tiempo es una salida acelerada de efectivo, clasificada como consumo de liquidez (pull on liquidity), no un lastre. C) es incorrecta: que los proveedores exijan pago mas rapido tambien es un consumo de liquidez, no un lastre."}, {"a": "C", "e": "La calidad de los reportes financieros se mide por que tan fielmente reflejan la realidad economica de la empresa. Es como preferir una foto real aunque no este perfectamente encuadrada. C) es correcta: estados financieros que reflejan con precision la realidad economica estan en el nivel mas alto de calidad, aunque no cumplan cada norma contable al pie de la letra. A) es incorrecta: ganancias que no son sostenibles indican baja calidad, pues no reflejan el desempeno real a largo plazo. B) es incorrecta: alisar los ingresos artificialmente sugiere manipulacion por parte de la gerencia, lo cual reduce la calidad del reporte."}, {"a": "C", "e"
