irigida a una organizacion benefica, no a Eriksen personalmente. No compromete su independencia ni constituye compensacion adicional. B y C son incorrectas porque la donacion no afecta la objetividad de Eriksen ni representa compensacion a ella."}, {"a": "C", "e": "Segun los estandares, si un miembro descubre que las politicas de cumplimiento son deficientes, debe rechazar por escrito aceptar responsabilidades de supervision hasta que se implementen procedimientos adecuados. A es incorrecta porque aceptar el puesto sin politicas adecuadas lo haria responsable de violaciones. B es incorrecta porque divulgar conflictos no resuelve el problema de politicas deficientes."}, {"a": "A", "e": "Boudreaux presento un resumen breve de rendimientos con un benchmark apropiado e indico que informacion mas detallada esta disponible para todos los clientes. Esto cumple con los estandares de presentacion de rendimientos. B y C son incorrectas porque no es necesario presentar todos los detalles en cada presentacion si la informacion completa esta disponible."}, {"a": "C", "e": "La gestora cambio un parametro importante de la politica de inversion sin informar al cliente oportunamente. Esperar hasta la revision programada del IPS no es suficiente; los cambios materiales deben comunicarse de manera oportuna. A es incorrecta porque si hubo violacion. B es incorrecta porque el problema es la falta de comunicacion, no la equidad en el trato."}, {"a": "C", "e": "Los miembros deben seguir la ley mas estricta aplicable. Aunque las nuevas leyes aun no entran en vigor, ya fueron aprobadas y son mas estrictas que el Codigo y los Estandares. Chan debe adherirse a las leyes recien aprobadas por ser las mas exigentes. A y B son incorrectas porque no representan el estandar mas estricto disponible."}];

let S={screen:'menu',mode:null,qs:[],ci:0,ans:{},tt:0,qt:0,qts:{},run:false,sel:null,stats:false,showExp:{},reviewed:false};
let TI=null;
const games=[['arcade','\u23F1 Contrarreloj','60 seg, \u00BFcu\u00E1ntas puedes?'],['survival','\u2764 Survival','3 vidas, un error te cuesta']];

function ss(u){Object.assign(S,u);R()}
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fm(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60)}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function tag(arr,sol,pre){return arr.map((q,i)=>({id:pre+(i+1),text:q[0],opts:q[1],src:pre==='E1-'?'Exam 1':pre==='E2-'?'Exam 2':pre==='E3-'?'Exam 3':'Mock 2026',sol:sol[i],topic:TOPICS[pre+(i+1)]||'Other'}))}

const ALL_RAW=[...tag(E1,S1,'E1-'),...tag(E2,S2,'E2-'),...tag(E3,S3,'E3-'),...tag(E4,S4,'E4-'),...tag(E5,S5,'E5-'),...tag(E6,S6,'E6-')];
const _ds=new Set();const ALL_UNIQ=ALL_RAW.filter(x=>{const k=x.text.trim().substring(0,80);if(_ds.has(k))return false;_ds.add(k);return true});
const TOPIC_LIST=['Ethics','Quant','Economics','FRA','Corporate','Equity','Fixed Income','Derivatives','Alternatives','Portfolio Mgmt'];
const TOPIC_COLORS=['#60a5fa','#a78bfa','#34d399','#f472b6','#fbbf24','#38bdf8','#fb923c','#e879f9','#4ade80','#f87171'];

function start(m){
  let q=[];
  const allS=shuf([...ALL_UNIQ]);
  if(m==='mock'){
    const W={'Ethics':33,'Quant':14,'Economics':14,'FRA':22,'Corporate':14,'Equity':22,'Fixed Income':22,'Derivatives':11,'Alternatives':8,'Portfolio Mgmt':20};
    q=[];
    for(const[tp,cnt] of Object.entries(W)){
      const pool=shuf(ALL_UNIQ.filter(x=>x.topic===tp));
      q.push(...pool.slice(0,Math.min(cnt,pool.length)));
    }
    if(q.length<180){const used=new Set(q.map(x=>x.id));const rest=shuf(ALL_UNIQ.filter(x=>!used.has(x.id)));q.push(...rest.slice(0,180-q.length))}
    q=shuf(q);
  }
  else if(m==='mix')q=allS;
  else if(m==='speed20')q=allS.slice(0,20);
  else if(m==='speed50')q=allS.slice(0,50);
  else if(m==='mock300')q=shuf([...tag(E6,S6,'E6-')]);
  else if(m.startsWith('topic_'))q=shuf(ALL_RAW.filter(x=>x.topic===m.slice(6)));
  else if(m==='custom'){const sel=S._customTopics||[];const n=S._customCount||20;q=shuf(ALL_RAW.filter(x=>sel.includes(x.topic))).slice(0,n);}
  ss({screen:'quiz',mode:m,qs:q,ci:0,ans:{},tt:0,qt:0,qts:{},run:true,sel:null,stats:false,showExp:{},reviewed:false});
  clearInterval(TI);
  TI=setInterval(()=>{S.tt++;S.qt++;R()},1000);
}

function pick(i){if(S.sel!==null)return;S.sel=i;S.ans[S.ci]=i;S.qts[S.ci]=S.qt;R()}
function nxt(){if(S.ci<S.qs.length-1){S.ci++;S.sel=S.ans[S.ci]??null;S.qt=0;R()}else{S.run=false;S.screen='results';clearInterval(TI);R()}}
function prv(){if(S.ci>0){S.ci--;S.sel=S.ans[S.ci]??null;S.qt=0;R()}}
function go(i){S.ci=i;S.sel=S.ans[i]??null;S.qt=0;R()}
function ext(){S.run=false;S.screen='menu';clearInterval(TI);R()}
function tglExp(){
  S.showExp[S.ci]=!S.showExp[S.ci];
  if(S.showExp[S.ci]&&S.sel!==null){
    const q=S.qs[S.ci],ml=q.opts[S.sel].trim()[0],cl=q.sol.a;
    if(ml!==cl)saveError(q);
    else removeError(q.id);
    if(!S._topicLogged)S._topicLogged={};
    if(q.topic&&!S._topicLogged[S.ci]){S._topicLogged[S.ci]=true;saveTopicStat(q.id,q.topic,ml===cl)}
  }
  R()
}

function score(){
  let c=0,t=0;
  for(let k in S.ans){
    let q=S.qs[k],a=S.ans[k],letter=q.opts[a].trim()[0],correct=q.sol.a;
    t++;if(letter===correct)c++;
  }
  return{c,t};
}


// ── Error Tracking ──
function getErrors(){try{return JSON.parse(localStorage.getItem('cfa_errors')||'[]')}catch(e){return[]}}
function saveError(q){
  let errs=getErrors();
  const exists=errs.find(e=>e.id===q.id);
  if(!exists)errs.push({id:q.id,text:q.text,opts:q.opts,src:q.src,sol:q.sol,wrongCount:1,lastWrong:Date.now()});
  else{exists.wrongCount++;exists.lastWrong=Date.now()}
  localStorage.setItem('cfa_errors',JSON.stringify(errs));
}
function removeError(qid){
  let errs=getErrors().filter(e=>e.id!==qid);
  localStorage.setItem('cfa_errors',JSON.stringify(errs));
}
function clearErrors(){localStorage.removeItem('cfa_errors');R()}

// ── Game: Contrarreloj (60s arcade) ──
function startGame(type){
  let allQ=shuf([...ALL_UNIQ]);
  if(type==='arcade'){
    S.screen='arcade';S.qs=allQ;S.ci=0;S.arcadeScore=0;S.arcadeWrong=0;S.countdown=60;S.run=true;S.sel=null;
    clearInterval(TI);
    TI=setInterval(()=>{
      S.countdown--;
      if(S.countdown<=0){S.run=false;clearInterval(TI);S.screen='arcade_end'}
      R();
    },1000);
    R();
  }else if(type==='survival'){
    S.screen='survival';S.qs=allQ;S.ci=0;S.lives=3;S.streak=0;S.bestStreak=0;S.survCorrect=0;S.run=true;S.sel=null;S.survFlash='';
    clearInterval(TI);R();
  }
}

function arcadePick(i){
  if(!S.run)return;
  const q=S.qs[S.ci];
  const letter=q.opts[i].trim()[0];
  const ok=letter===q.sol.a;
  if(ok){S.arcadeScore++;S.survFlash='ok'}
  else{S.arcadeWrong++;S.survFlash='no';saveError(q)}
  if(q.topic)saveTopicStat(q.id,q.topic,ok);
  S.ci++;
  if(S.ci>=S.qs.length)S.ci=0;
  setTimeout(()=>{S.survFlash='';R()},200);
  R();
}

function survPick(i){
  if(!S.run)return;
  const q=S.qs[S.ci];
  const letter=q.opts[i].trim()[0];
  const ok=letter===q.sol.a;
  if(ok){
    S.survCorrect++;S.streak++;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;
    S.survFlash='ok';
  }else{
    S.lives--;S.streak=0;S.survFlash='no';
    saveError(q);
  }
  if(q.topic)saveTopicStat(q.id,q.topic,ok);
  if(!ok&&S.lives<=0){S.run=false;S.screen='survival_end';R();return}
  S.ci++;
  if(S.ci>=S.qs.length)S.ci=0;
  setTimeout(()=>{S.survFlash='';R()},250);
  R();
}

// ── Error Review Mode ──
function startErrorReview(){
  let errs=getErrors();
  if(errs.length===0)return;
  errs=shuf(errs);
  S.qs=errs;S.ci=0;S.ans={};S.tt=0;S.qt=0;S.qts={};S.sel=null;S.showExp={};S.run=true;S.screen='quiz';S.mode='errors';
  clearInterval(TI);
  TI=setInterval(()=>{S.tt++;S.qt++;R()},1000);
  R();
}

// ── Render: Arcade ──

  const q=S.qs[S.ci];
  const flash=S.survFlash==='ok'?'flash-ok':S.survFlash==='no'?'flash-no':'';
  const danger=S.countdown<=10?'danger':'';

// ── Topic Stats ──
function getTopicStats(){try{return JSON.parse(localStorage.getItem('cfa_topic_stats')||'{}')}catch(e){return{}}}
function saveTopicStat(qid,topic,correct){
  let ts=getTopicStats();
  if(!ts[topic])ts[topic]={correct:0,total:0};
  ts[topic].total++;
  if(correct)ts[topic].correct++;
  localStorage.setItem('cfa_topic_stats',JSON.stringify(ts));
}
function clearTopicStats(){localStorage.removeItem('cfa_topic_stats');R()}

function toggleCustomTopic(t){
  if(!S._customTopics)S._customTopics=[];
  const idx=S._customTopics.indexOf(t);
  if(idx>=0)S._customTopics.splice(idx,1);
  else S._customTopics.push(t);
  R();
}

function totalAvailCustom(){
  const sel=S._customTopics||[];
  return ALL_RAW.filter(q=>sel.includes(q.topic)).length;
}

function rTopicStats(){
  const ts=getTopicStats();
  const topics=TOPIC_LIST;
  const colors=TOPIC_COLORS;
  const all=ALL_RAW;
  let totalC=0,totalT=0;
  topics.forEach(t=>{const s=ts[t];if(s){totalC+=s.correct;totalT+=s.total}});
  const globalPct=totalT>0?Math.round(totalC/totalT*100):0;
  const gCol=globalPct>=70?'var(--gn)':globalPct>=50?'var(--yl)':'var(--rd)';

  let h='<div class="rs"><div style="width:100%;max-width:600px">';
  h+='<div class="rh"><div class="ml">Rendimiento por Topic</div><div class="sp" style="color:'+gCol+'">'+globalPct+'%</div><p style="color:var(--mt);font-size:13px;margin-top:4px">'+totalC+' de '+totalT+' correctas en total</p></div>';

  // Bar chart
  h+='<div style="margin-bottom:24px">';
  topics.forEach((t,idx)=>{
    const stat=ts[t]||{correct:0,total:0};
    const cnt=all.filter(q=>q.topic===t).length;
    const pct=stat.total>0?Math.round(stat.correct/stat.total*100):0;
    const coverage=Math.round(stat.total/cnt*100);
    const barW=stat.total>0?Math.max(pct,3):0;
    const pctCol=stat.total===0?'var(--mt)':pct>=70?'var(--gn)':pct>=50?'var(--yl)':'var(--rd)';
    h+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+colors[idx]+'"></span>'+t+'</span><span style="font-size:13px;font-weight:800;font-family:var(--mn);color:'+pctCol+'">'+(stat.total>0?pct+'%':'\u2014')+'</span></div>';
    h+='<div style="height:8px;background:rgba(100,116,139,.12);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+barW+'%;background:'+colors[idx]+';border-radius:4px;transition:width .3s"></div></div>';
    h+='<div style="font-size:11px;color:var(--mt);margin-top:2px">'+stat.correct+'/'+stat.total+' correctas \u00B7 '+coverage+'% cobertura ('+stat.total+'/'+cnt+')</div></div>';
  });
  h+='</div>';

  // Weakest topics
  const ranked=topics.map(t=>{const s=ts[t]||{correct:0,total:0};return{topic:t,pct:s.total>0?s.correct/s.total:null,total:s.total}}).filter(x=>x.total>=3).sort((a,b)=>a.pct-b.pct);
  if(ranked.length>=2){
    h+='<div class="sll"><div class="slt">\u26A0\uFE0F Topics para reforzar</div>';
    ranked.slice(0,3).forEach(r=>{
      h+='<div class="sli"><span class="sli-t">'+r.topic+'</span><span class="sli-v" style="color:var(--rd)">'+Math.round(r.pct*100)+'%</span></div>';
    });
    h+='</div>';
  }
  if(ranked.length>=2){
    const best=ranked.slice(-3).reverse();
    h+='<div class="sll"><div class="slt">\u2705 Topics m\u00E1s fuertes</div>';
    best.forEach(r=>{
      h+='<div class="sli"><span class="sli-t">'+r.topic+'</span><span class="sli-v" style="color:var(--gn)">'+Math.round(r.pct*100)+'%</span></div>';
    });
    h+='</div>';
  }

  h+='<button class="bb" onclick="S.screen=\'topics\';R()">Practicar por topic</button>';
  h+='<button class="bb2" onclick="clearTopicStats()" style="margin-bottom:10px">\uD83D\uDDD1 Resetear estad\u00EDsticas</button>';
  h+='<button class="bb2" onclick="ext()">Volver al men\u00FA</button>';
  h+='</div></div>';
  return h;
}

function rQuiz(){
  const q=S.qs[S.ci],an=Object.keys(S.ans).length,ts=Object.values(S.qts);
  const avg=an>0?ts.reduce((a,b)=>a+b,0)/an:0;
  const fast=ts.filter(t=>t<=30).length,slow=ts.filter(t=>t>90).length;
  const prg=((S.ci+1)/S.qs.length*100).toFixed(1);
  const sol=q.sol,showE=S.showExp[S.ci];
  const correctLetter=sol?sol.a:null;

  let opts='';
  q.opts.forEach((o,i)=>{
    let c='ob';
    if(S.sel!==null)c+=' lk';
    if(showE&&S.sel!==null){
      const sl=o.trim()[0];
      if(sl===correctLetter)c+=' ok';
      else if(S.sel===i)c+=' no';
    }else if(S.sel===i)c+=' sl';
    opts+='<button class="'+c+'" onclick="pick('+i+')">'+esc(o)+'</button>';
  });

  let exp='';
  if(S.sel!==null){
    if(showE&&sol){
      const myLetter=q.opts[S.sel].trim()[0];
      const isRight=myLetter===correctLetter;
      const icon=isRight?'\u2705':'\u274C';
      exp='<div class="ex"><div class="ea">'+icon+' Respuesta correcta: '+esc(correctLetter)+')'+(isRight?' — \u00A1Correcto!':' — Tu respuesta: '+myLetter+')')+'</div><div class="et">'+esc(sol.e)+'</div></div>';
    }else{
      exp='<button class="eb" onclick="tglExp()">\uD83D\uDCD6 Ver respuesta y explicaci\u00F3n</button>';
    }
  }

  let statsH='';
  if(S.stats){
    const sc=score();
    statsH='<div class="sr"><span>Respondidas: <b style="color:var(--ac)">'+an+'/'+S.qs.length+'</b></span><span>Promedio: <b style="color:var(--pp)">'+(avg>0?fm(Math.round(avg)):'--')+'</b></span><span>Correctas: <b style="color:var(--gn)">'+sc.c+'</b></span><span>Score: <b style="color:var(--yl)">'+(sc.t>0?Math.round(sc.c/sc.t*100):0)+'%</b></span></div>';
  }

  const ds=Math.max(0,S.ci-20),de=Math.min(S.qs.length,S.ci+21);
  let dots='';
  for(let i=ds;i<de;i++){
    let bg=i===S.ci?'var(--ac)':(S.ans[i]!==undefined?'var(--gn)':'rgba(100,116,139,.25)');
    if(S.showExp[i]&&S.ans[i]!==undefined){
      const ql=S.qs[i].opts[S.ans[i]].trim()[0];
      bg=ql===S.qs[i].sol.a?'var(--gn)':'var(--rd)';
      if(i===S.ci)bg='var(--ac)';
    }
    dots+='<button class="dd" onclick="go('+i+')" style="background:'+bg+'" title="Q'+(i+1)+'"></button>';
  }

  return '<div class="tb"><div class="ti">'+
    '<button class="tbn" onclick="ext()">\u2715 Salir</button>'+
    '<div class="tg"><div class="tc"><div class="tl">Pregunta</div><div class="tv q">'+fm(S.qt)+'</div></div><div class="dv"></div><div class="tc"><div class="tl">Total</div><div class="tv t">'+fm(S.tt)+'</div></div></div>'+
    '<button class="tbn" onclick="S.stats=!S.stats;R()">'+(S.stats?'Ocultar':'Stats')+'</button>'+
    '</div><div class="pb"><div class="pf" style="width:'+prg+'%"></div></div>'+statsH+'</div>'+
    '<div class="ctr" style="padding-top:16px;padding-bottom:80px">'+
    '<div class="qh"><span class="qn">Pregunta '+(S.ci+1)+' de '+S.qs.length+'</span><span class="qs">'+q.src+'</span></div>'+
    '<div class="qc"><div class="qt">'+esc(q.text)+'</div></div>'+
    '<div class="os">'+opts+'</div>'+exp+
    '<div class="nr"><button class="nb np" onclick="prv()"'+(S.ci===0?' disabled':'')+'">\u2190 Anterior</button><button class="nb nn" onclick="nxt()"'+(S.sel===null?' disabled':'')+'>'+(S.ci===S.qs.length-1?'Finalizar \u2713':'Siguiente \u2192')+'</button></div>'+
    '<div class="dt">'+dots+'</div></div>';
}

function rResults(){
  const an=Object.keys(S.ans).length,ts=Object.values(S.qts);
  const avg=an>0?ts.reduce((a,b)=>a+b,0)/an:0;
  const fast=ts.filter(t=>t<=30).length,slow=ts.filter(t=>t>90).length;
  const mx=ts.length?Math.max(...ts):0,mn=ts.length?Math.min(...ts):0;
  const sc=score();
  const pct=sc.t>0?Math.round(sc.c/sc.t*100):0;
  const pcol=pct>=70?'var(--gn)':pct>=50?'var(--yl)':'var(--rd)';
  const sorted=Object.entries(S.qts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  let slowH='';
  if(sorted.length){
    slowH='<div class="sll"><div class="slt">Preguntas m\u00E1s lentas</div>';
    sorted.forEach(([i,t])=>{slowH+='<div class="sli"><span class="sli-t">Q'+(+i+1)+': '+esc(S.qs[+i].text.slice(0,60))+'...</span><span class="sli-v">'+fm(t)+'</span></div>'});
    slowH+='</div>';
  }

  return '<div class="rs"><div style="width:100%;max-width:600px">'+
    '<div class="rh"><div class="ml">Sesi\u00F3n completada</div><div class="rt">'+fm(S.tt)+'</div><p style="color:var(--mt);font-size:13px;margin-top:4px">Tiempo total \u00B7 '+an+' preguntas</p></div>'+
    '<div class="sc" style="margin-bottom:20px"><div class="sp" style="color:'+pcol+'">'+pct+'%</div><div class="sl2">'+sc.c+' de '+sc.t+' correctas</div></div>'+
    '<div class="g3">'+
    '<div class="sc"><div class="sv" style="color:var(--pp)">'+fm(Math.round(avg))+'</div><div class="sl2">Promedio</div></div>'+
    '<div class="sc"><div class="sv" style="color:var(--gn)">'+fm(mn)+'</div><div class="sl2">M\u00E1s r\u00E1pida</div></div>'+
    '<div class="sc"><div class="sv" style="color:var(--pk)">'+fm(mx)+'</div><div class="sl2">M\u00E1s lenta</div></div></div>'+
    '<div class="g2">'+
    '<div class="sc"><div class="sv" style="color:var(--gn)">'+fast+'</div><div class="sl2">R\u00E1pidas (\u226430s)</div></div>'+
    '<div class="sc"><div class="sv" style="color:var(--rd)">'+slow+'</div><div class="sl2">Lentas (>90s)</div></div></div>'+
    slowH+
    '<button class="bb" onclick="S.screen=\'review\';R()">Revisar respuestas</button>'+
    '<button class="bb2" onclick="ext()">Volver al men\u00FA</button>'+
    '</div></div>';
}

function rReview(){
  let h='<div class="tb"><div class="ti"><button class="tbn" onclick="S.screen=\'results\';R()">\u2190 Resultados</button><div style="font-size:14px;font-weight:700">Revisi\u00F3n de respuestas</div><button class="tbn" onclick="ext()">Men\u00FA</button></div></div>';
  h+='<div class="ctr" style="padding-top:16px;padding-bottom:40px">';

  const sc=score();
  h+='<div style="text-align:center;margin-bottom:20px;font-size:14px;color:var(--mt)">'+sc.c+'/'+sc.t+' correctas \u00B7 '+(sc.t>0?Math.round(sc.c/sc.t*100):0)+'%</div>';

  for(let i=0;i<S.qs.length;i++){
    const q=S.qs[i],a=S.ans[i],sol=q.sol;
    if(a===undefined)continue;
    const myL=q.opts[a].trim()[0],corL=sol.a,ok=myL===corL;
    const t=S.qts[i]||0;
    const tag2=ok?'<span class="tag-ok">\u2713 Correcta</span>':'<span class="tag-no">\u2717 Incorrecta</span>';

    h+='<div style="background:var(--sf);border:1px solid '+(ok?'rgba(52,211,153,.2)':'rgba(248,113,113,.15)')+';border-radius:14px;padding:16px;margin-bottom:10px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="qn">Q'+(i+1)+' \u00B7 '+q.src+'</span><span style="font-size:12px;color:var(--mt);font-family:var(--mn)">'+fm(t)+'</span></div>';
    h+='<div style="font-size:13px;line-height:1.6;margin-bottom:8px;color:#cbd5e1">'+esc(q.text.slice(0,200))+(q.text.length>200?'...':'')+'</div>';
    h+='<div style="font-size:13px;margin-bottom:6px">Tu respuesta: <b style="color:'+(ok?'var(--gn)':'var(--rd)')+'">'+myL+')</b> '+tag2+'</div>';
    if(!ok)h+='<div style="font-size:13px;margin-bottom:6px">Correcta: <b style="color:var(--gn)">'+corL+')</b></div>';
    h+='<details style="margin-top:6px"><summary style="font-size:12px;color:var(--pp);cursor:pointer;font-weight:600">Ver explicaci\u00F3n</summary><div style="font-size:13px;line-height:1.6;color:#94a3b8;margin-top:8px;padding:8px;background:rgba(15,23,42,.4);border-radius:8px">'+esc(sol.e)+'</div></details>';
    h+='</div>';
  }
  h+='<button class="bb" onclick="ext()" style="margin-top:12px">Volver al men\u00FA</button></div>';
  return h;
}

document.addEventListener('keydown',function(e){
  if(S.screen==='quiz'){
    const q=S.qs[S.ci];
    if(S.sel===null&&q){
      const ki={'a':0,'b':1,'c':2,'1':0,'2':1,'3':2};
      const idx=ki[e.key.toLowerCase()];
      if(idx!==undefined&&idx<q.opts.length){pick(idx);return}
    }
    if(e.key==='ArrowRight'&&S.sel!==null)nxt();
    else if(e.key==='ArrowLeft')prv();
    else if(e.key==='Enter'&&S.sel!==null&&!S.showExp[S.ci])tglExp();
  }else if(S.screen==='arcade'){
    const q=S.qs[S.ci];
    const ki={'a':0,'b':1,'c':2,'1':0,'2':1,'3':2};
    const idx=ki[e.key.toLowerCase()];
    if(idx!==undefined&&idx<q.opts.length)arcadePick(idx);
  }else if(S.screen==='survival'){
    const q=S.qs[S.ci];
    const ki={'a':0,'b':1,'c':2,'1':0,'2':1,'3':2};
    const idx=ki[e.key.toLowerCase()];
    if(idx!==undefined&&idx<q.opts.length)survPick(idx);
  }
});
R();
</script>
</body>
</html>
