ement with CFA Institute on its computer-based exam procedures"]], ["Which of the following statements regarding the GIPS standards is most accurate?", ["A) Firms can claim compliance on a specific composite", "B) Claiming compliance with the GIPS standards is voluntary for firms", "C) Compliance with the GIPS standards is mandatory for asset owners that report to a regulatory authority"]], ["Darden Crux, CFA, a portfolio manager at SWIFT Asset Management Ltd. (SWIFT), calls a friend to join him for dinner. The friend, a financial analyst at Cyber Kinetics (CK), declines the invitation and explains she is performing due diligence on Orca Electronics, a company CK is about to acquire. After the phone call, Crux searches the internet for any news of the acquisition O) but finds nothing. What action should Crux most likely take to avoid violating any CFA Institute Standards of Professional Conduct?", ["A) Refuse to trade CK", "B) Purchase the stock and call options for all clients", "C) Trade only after analyzing the stock diligently and thoroughly"]], ["Bryan Barrett, CFA, runs an investment advisory service providing advice on gold and other commodities to several large retail banks. Barrett adveises his services in widely read publications to broaden his business to include retail clients. Because the client base for the institutions that Barrett serves is large, he is comfoable stating in the ads that thousands of his clients have O) benefited from his advice. Does Barrett's adveisement most likely violate any CFA Institute Standards of Professional Conduct?", ["A) No", "B) Yes, the Standard relating to misrepresentation", "C) Yes, the Standard relating to communication with clients"]], ["Jacques Lagarde, CFA, is a sell-side analyst at Springhill Financial, a small investment bank. Springhill is the lead manager for the equity offering of Chorale Music. Lagarde is not pa of the IPO team for this offering. While finalizing a research report on ! Chorale, Lagarde discovers inconsistencies that makes him believe the company may have concealed losses in its leasing division last quarter that would significantly reduce its earnings. Lagarde suspects that Springhill's investment banking team is aware of these unrepoed losses. The prospectus for Chorale's equity offering has already been approved by regulators and distributed to potential investors. According to the Standards, Lagarde should most likely:", ["A) report the issue to his supervisor.", "B) issue a report showing the leasing division losses.", "C) issue the report using data as reported in the prospectus."]], ["Lawrence Hall, CFA, and Nancy Bishop, CFA, began a joint research report on Stamper Corporation. Bishop visited Stamper's corporate headquarters for several days and met with all company officers. Prior to the completion of the repo, Bishop was reassigned to another project. Hall utilized his and Bishop's research to write the report but did not include Bishop's name on the report because he did not agree with and changed Bishop's conclusion included in the final report. According to the CFA Institute Standards of Handbook, did Hall most likely violate any CFA Institute Standards of Professional Conduct?", ["A) No", "B) Yes, with respect to misrepresentation", "C) Yes, with respect to diligence and reasonable basis"]], ["Regarding composite construction in the GIPS standards, the statement that is most likely accurate is that firms may:", ["A) include nondiscretionary portfolios in a composite.", "B) include non-fee-paying, discretionary portfolios in a composite.", "C) exclude portfolios from composites based solely on legal structure differences."]], ["Which of the following is most accurate? Firms that claim compliance with the GIPS standards must:", ["A) self-regulate their claim of compliance.", "B) hire an independent third-pay to verify compliance.", "C) establish an internal audit team to perform verification on specific composites to maintain the firm's claim of"]], ["The Standards are most likely designed to foster and reinforce a culture of:", ["A) service to the firm.", "B) regulatory compliance.", "C) responsibility and professionalism."]], ["pl pe A portfolio manager is hired by an executive manager of a trust. The duty of loyalty is owed to the:", ["A) trustee.", "B) executive manager.", "C) beneficiaries of the trust."]], ["An analyst concerned about the liquidity of a company's inventory will most likely look in the notes to the financial statements } to determine the:", ["A) cost formula or inventory valuation method used.", "B) amount of inventory recognized as expense during the period.", "C) breakdown of inventory between work in progress and finished goods."]], ["All else being equal, a company that acquires a patent through external purchase rather than developing it internally is most likely to report:", ["A) lower amounts of assets.", "B) higher investing cash outflows.", "C) higher operating cash outflows."]], ["In the capital allocation process, companies should:", ["A) assume no new competition in the marketplace.", "B) incorporate sunk costs in the investment analysis.", "C) ignore the impact of an investment on short-term accounting numbers."]], ["Ensuring that the composition of a board of directors is aligned with a company's governance principles is most likely a } responsibility of the:", ["A) risk committee.", "B) audit committee.", "C) nominating committee."]], ["Which of the following functional forms of a simple linear regression is most appropriate to test the linear relationship between relative changes in the dependent variable and relative changes in the independent variable?", ["A) Thetin-tog model", "B) The log-lin model", "C) The log-log model"]], ["Asignificant increase in which of the following most likely indicates that a company's solvency has strengthened?", ["A) D/E ratio", "B) Debt-to-EBITDA ratio", "C) Fixed charge coverage ratio"]], ["An investor will receive $50,000 at t ikely to be evaluated as less creditworthy than its peers if it has a:", ["A) lower debt/EBITDA and a lower EBITDA/interest expense.", "B) lower debt/EBITDA and a higher EBITDA/interest expense.", "C) higher debt/EBITDA and a lower EBITDA/interest expense."]], ["An analyst tests market efficiency by computing the serial correlations in security returns. The analyst is most likely assessing whether markets are:", ["A) weak-form efficient.", "B) semi-strong-form efficient.", "C) strong-form efficient."]], ["In arepurchase agreement:", ["A) only the lender of funds is exposed to credit risk.", "B) credit risk is eliminated by using highly rated sovereign bonds as collateral.", "C) the initial margin offers paial protection against changes in the market value of the collateral."]], ["The yields of a series of zero-coupon government bonds for a full range of maturities best define a:", ["A) par curve.", "B) spot curve.", "C) forward curve."]], ["An overreaction in the financial markets causes a security's price to experience a significant loss during a short period. If this overreaction is caused by investors that sell because other investors are selling, the behavior is best described as:", ["A) herding.", "B) loss aversion.", "C) overconfidence."]], ["Relative to spot markets, a key feature of derivatives markets is:", ["A) high transaction costs.", "B) low capital requirements.", "C) restrictions on short selling."]], ["With respect to margin, the leverage ratio:", ["A) is the value of the equity investment divided by the value of the position.", "B) is the minimum fraction of the purchase price that must be trader's equity.", "C) indicates how many times larger a position is than the equity that supports it."]], ["Ahedge fund with $98 million of initial capital charges a management fee of 2% and an incentive fee of 20%. The management fee is based on assets under management at year end and the incentive fee is calculated independently from the management fee. The fee structure has a high-water mark provision. The fund value is $112 million at the end of Year 1, $100 million at the end of Year, and $116 million at the end of Year 3. The net-of-fees return earned by the fund in Year 3 is closest to:", ["A) 11.87%.", "B) 12.33%.", "C) 14.15%."]], ["Acallable bond most likely experiences negative convexity when the bond's yield to maturity is:", ["A) less than the bond’s coupon rate.", "B) equal to the bond’s coupon rate.", "C) greater than the bond’s coupon rate."]], ["In the portfolio management process, the feedback step most likely involves:", ["A) rebalancing the portfolio.", "B) deciding on an asset allocation.", "C) understanding the client's constraints."]], ["Which of the following approaches to implementing ESG considerations in portfolio construction most likely selects investments specifically based on their environmental or social benefits?", ["A) Impact investing", "B) Negative screening", "C) Engage/active ownership"]], ["A $20,000,000 par value bond has a value of $23,275,000 and an annual modified duration of 6.39. If the yield-to-maturity increases by 50 basis points, the change in value is closest to:", ["A) -$743,636.", "B) - $639,000.", "C) $743,636."]], ["Which of the following asset-backed securities most likely utilizes credit tranching as a form of credit enhancement?", ["A) Covered bond", "B) Credit card backed security", "C) Agency mortgage pass-through security"]], ["Which of the following is most likely a limitation of the yield-to-maturity measure?", ["A) It does not reflect the timing of the cash flows", "B) It assumes coupon payments can be invested at the yield-to-maturity", "C) It does not consider the capital gain or loss the investor will realize by holding the bond to maturity"]], ["The concept of put-call parity best demonstrates the equivalence of:", ["A) puts and calls.", "B) a covered call and a protective put.", "C) a fiduciary call and a protective put."]], ["Which of the following is not a source of return from investing in equities?", ["A) Cash dividends", "B) Stock dividends", "C) Change in the market price of equities"]], ["Instructions that tell brokers how to settle trades are best described as:", ["A) validity instructions.", "B) clearing instructions.", "C) execution instructions."]]];
const S4=[{"a": "B", "e": "Imagina que un doctor necesita tu historial antes de recetarte algo. Igual, un asesor financiero necesita un Plan de Inversión (IPS) que defina los objetivos de rendimiento del cliente (Declaración 1), y también datos personales como edad y ocupación para dar buen consejo (Declaración 2). Ambas son correctas según los Estándares. La A falla porque ignora la Declaración 2, que también es válida. La C es incorrecta porque la Declaración 3 es falsa: la responsabilidad de verificar si una inversión es adecuada recae en el asesor, no en el cliente. Por eso B es la respuesta correcta."}, {"a": "B", "e": "La manipulación de mercado es como hacer trampa en un juego: mover precios a propósito para beneficiarte. La Acción 2 es manipulación porque toma una posición grande en futuros (contratos que apuestan sobre el precio futuro de un activo) con la intención deliberada de forzar la caída del precio. Eso es ilegal. La A no es manipulación: vender acciones propias para obtener ganancia es legítimo, aunque el volumen afecte el precio. La C tampoco lo es: el arbitraje (comprar barato en un mercado y vender caro en otro) es una actividad válida que mejora la eficiencia de los mercados."}, {"a": "C", "e": "Piensa en un empleado que al cambiar de trabajo se lleva un documento con permiso, pero luego copia archivos confidenciales sin autorización. Kon obtuvo permiso expreso de su antigua firma para llevarse un informe de investigación, así que publicarlo actualizado es válido. Sin embargo, violó los Estándares al recrear registros de soporte usando fuentes que pertenecían a su empleador anterior, Hamm Capital. Esos materiales son propiedad de la firma. La A es incorrecta porque sí hubo violación. La B es incorrecta porque publicar el informe con consentimiento del empleador anterior estaba permitido. La respuesta correcta es C."}, {"a": "A", "e": "Imagina que firmas un documento que dice algo con lo que no estás de acuerdo. En finanzas, si tu nombre aparece en un informe, implica que respaldas sus conclusiones. Dejar su nombre en el reporte (opción A) es lo MENOS apropiado porque sugiere que Botha apoya una recomendación de compra con la que discrepa, comprometiendo su integridad. La B sí es apropiada: pedir que retiren su nombre protege su honestidad profesional. La C también es válida: publicar un informe separado con sus propias conclusiones es aceptable según los Estándares. Por eso A es la respuesta correcta a lo menos apropiado."}, {"a": "A", "e": "La designación CFA (Analista Financiero Certificado) tiene reglas estrictas sobre su uso. La Declaración 1 dice que al completar el programa se obtiene el derecho a usar la designación, lo cual es esencialmente correcto y probablemente no viola los Estándares. La Declaración 2 sí viola las normas porque usar \"CFA\" como parte del nombre de una empresa está prohibido; solo personas individuales pueden portar la designación. La Declaración 3 es correcta sobre los requisitos de membresía, pero no es la que menos probablemente viola los Estándares. Por eso la respuesta es A: la Declaración 1 es la que menos probablemente constituye una violación."}, {"a": "C", "e": "Imagina que alguien te pide revelar información privada de un amigo diciendo que la ley lo exige. ¿Qué harías primero? Verificar si realmente es obligatorio. Staal maneja información confidencial de un político. Antes de entregar datos sobre sus inversiones, debe consultar al departamento de cumplimiento normativo (compliance) de su firma para confirmar sus obligaciones legales. La A es incorrecta: entregar información sin verificar la ley podría violar la confidencialidad del cliente. La B también falla: enviar documentos sin consultar primero al área legal es prematuro y potencialmente ilegal. La respuesta correcta es C."}, {"a": "B", "e": "Presentar resultados de inversión es como explicar notas escolares: debes adaptar la explicación a quien te escucha. Los Estándares sobre presentación de desempeño recomiendan considerar el nivel de conocimiento de la audiencia al preparar la presentación. Por eso B es correcta. La A es incorrecta porque las cuentas cerradas NO deben excluirse del historial; eliminarlas distorsiona los resultados reales, como si borraras las malas notas de un boletín. La C es incorrecta porque se debe mostrar el resultado ponderado del conjunto de carteras similares (composite), no una sola cuenta representativa."}, {"a": "A", "e": "El trato justo (fair dealing) significa tratar a todos los clientes equitativamente, como un profesor que evalúa con los mismos criterios a todos sus alumnos. Establecer revisiones sistemáticas de cuentas (opción A) es un procedimiento recomendado porque ayuda a garantizar que ningún cliente reciba un trato preferente o sea descuidado. La B es incorrecta: priorizar operaciones según cuánto paga cada cliente viola directamente el principio de equidad. La C también falla: revelar que usas métodos injustos de asignación no basta; los métodos mismos deben ser justos desde el inicio."}, {"a": "B", "e": "Imagina que un empleado de una panadería abre su propia panadería en secreto. Aunque trabaje en ella fuera de horario, hay un conflicto de lealtad. Grabbo desarrolla un fondo de cobertura (hedge fund, un vehículo de inversión alternativo) sin informar a su empleador. Esto crea un conflicto de interés directo que debe divulgar inmediatamente según el Estándar de lealtad al empleador (opción B). La A trata sobre el orden de ejecución de transacciones personales, no aplica aquí. La C se refiere a compensación recibida de terceros, no a crear un negocio propio competidor."}, {"a": "A", "e": "Piensa en un contador que los fines de semana enseña matemáticas gratis a niños en un barrio humilde. ¿Eso afecta su trabajo? No. Grewal enseña a niños desfavorecidos por una tarifa simbólica, actividad que no compite con su rol como gestor de patrimonio ni crea conflicto alguno. Por eso la respuesta es A: no hay violación. La B es incorrecta porque no existe conflicto de interés material que requiera divulgación. La C también es incorrecta porque una compensación nominal por docencia voluntaria no constituye un acuerdo de compensación adicional que deba notificarse al empleador."}, {"a": "A", "e": "Imagina que un meteorólogo dice \"mañana lloverá\" sin aclarar que es solo su pronóstico. En finanzas, el Estándar de comunicación con clientes exige separar hechos de opiniones. Gifford presenta proyecciones de ganancias y precio como si fueran certezas, no opiniones. A es correcta: la acción menos apropiada que debería tomar es distinguir claramente entre datos verificables y sus predicciones personales. B es incorrecta porque incluir estimaciones de ganancias ya forma parte de su análisis actual. C es incorrecta porque identificar limitaciones es útil, pero el requisito fundamental y más urgente es no mezclar hechos con opiniones."}, {"a": "C", "e": "Piensa en un doctor que receta el mismo medicamento a todos sus pacientes sin examinarlos. Bergeron ordena vender el 15% de todas las carteras sin analizar cada cliente. La pregunta pide qué Estándar es MENOS probable que haya violado. C es correcta: \"diligencia y base razonable\" exige tener fundamento para actuar; Bergeron reaccionó a una caída real del mercado, así que tenía cierta base. A es incorrecta: sí violó \"idoneidad\" al aplicar la misma orden a todos sin considerar sus necesidades individuales. B es incorrecta: aunque priorizó clientes antes que su cuenta personal, la orden fue apresurada y descuidada."}, {"a": "B", "e": "Es como si tu jefe te pidiera recomendar un producto que tú no crees que vale su precio. En finanzas, el Estándar de base razonable exige que toda recomendación tenga respaldo analítico independiente. B es correcta: Ducumon debe realizar un análisis adicional y solo recomendar las acciones si los resultados lo justifican, manteniendo su independencia profesional. A es incorrecta: ignorar la solicitud por completo no es profesional; debe evaluarla objetivamente. C es incorrecta: esperar a que baje el precio para cumplir la solicitud no tiene fundamento analítico y sería actuar sin base razonable."}, {"a": "C", "e": "Imagina que un agente inmobiliario recibe regalos por referir clientes y no lo dice. En finanzas, el Estándar de comisiones por referencia exige transparencia total. Se deben divulgar todas las formas de compensación recibida. C es correcta: hay que revelar tanto los \"soft dollars\" (comisiones indirectas, como servicios de investigación recibidos a cambio de dirigir operaciones) como las compensaciones pagadas en especie (regalos, viajes, servicios). A es incorrecta: revelar solo comisiones indirectas es insuficiente. B es incorrecta: revelar solo compensaciones en especie también es insuficiente. La norma exige divulgar ambas."}, {"a": "A", "e": "Piensa en un gerente que evalúa a sus empleados solo por resultados pero ignora si actúan éticamente. El Estándar de responsabilidades de supervisores establece procedimientos para vigilar la conducta profesional. A es correcta: incluir una evaluación de conducta ética como parte de la revisión de desempeño del empleado es un procedimiento recomendado que refuerza el cumplimiento normativo. B es incorrecta: un supervisor no debe confiar solo en la palabra escrita del empleado sobre una violación; debe investigar por su cuenta. C es incorrecta: implementar el Código en su departamento no reemplaza la obligación directa de supervisar activamente."}, {"a": "C", "e": "Es como usar el boleto de estacionamiento de otra persona para justificar tu gasto. Puede parecer menor, pero es fraude. El Estándar de conducta profesional prohíbe actos deshonestos que dañen la integridad del profesional. C es correcta: usar el recibo de su esposa para cobrar un gasto empresarial es un acto fraudulento que viola el Estándar de mala conducta. A es incorrecta: sí hubo violación por el uso deshonesto del recibo. B es incorrecta: declararse en bancarrota personal por deudas médicas no constituye mala conducta profesional; es una situación personal legítima que no refleja falta de integridad."}, {"a": "A", "e": "GIPS son normas globales de presentación de rendimiento de inversiones, como reglas para que las firmas reporten sus resultados de forma justa. La pregunta pide qué NO es requisito obligatorio. A es correcta: la verificación por un tercero independiente es recomendada pero voluntaria, no obligatoria bajo GIPS. B es incorrecta: incluir todas las carteras discrecionales que pagan comisiones en al menos un \"composite\" (grupo de carteras similares) sí es requisito obligatorio. C es incorrecta: presentar un mínimo de cinco años de rendimiento anual conforme a GIPS sí es obligatorio, o desde el inicio si la firma tiene menos de cinco años."}, {"a": "B", "e": "Imagina que tras un examen escolar publicas en redes qué temas NO aparecieron; eso también revela información sobre el contenido. El Estándar de confidencialidad del examen CFA prohíbe divulgar cualquier detalle sobre su contenido. B es correcta: Chau violó los Estándares al mencionar áreas temáticas no evaluadas, porque eso revela indirectamente información confidencial sobre la estructura del examen. A es incorrecta: sí hubo una violación clara. C es incorrecta: expresar desacuerdo con los procedimientos del examen por computadora es una opinión personal permitida que no revela contenido confidencial."}, {"a": "B", "e": "GIPS son estándares globales que buscan que las firmas de inversión presenten sus resultados de manera uniforme y honesta. La pregunta pide cuál afirmación es más precisa. B es correcta: cumplir con GIPS es completamente voluntario; ninguna ley obliga a las firmas a adoptarlos. A es incorrecta: una firma no puede declarar cumplimiento solo para un \"composite\" (grupo de carteras) específico; el cumplimiento debe ser a nivel de toda la firma. C es incorrecta: el cumplimiento tampoco es obligatorio para propietarios de activos que reportan a autoridades regulatorias; sigue siendo voluntario para todos."}, {"a": "C", "e": "Imagina que un amigo te cuenta en privado que su empresa comprará otra. Esa es información material no pública (datos importantes que el mercado aún no conoce). El Estándar prohíbe operar basándose en ella. C es correcta: Crux debe analizar la acción usando solo información pública disponible y, solo si ese análisis lo justifica, puede operar. Esto se llama \"teoría del mosaico\": construir conclusiones con datos públicos. A es incorrecta: negarse completamente a operar es excesivo si puede fundamentar su decisión en análisis público. B es incorrecta: comprar inmediatamente basándose en la información confidencial violaría directamente el Estándar."}, {"a": "C", "e": "Imagina que un restaurante dice que \"miles de personas disfrutan su comida\", pero en realidad solo vende a supermercados, no al público. Barrett asesora a bancos (instituciones), no a personas individuales. Al decir que \"miles de clientes se beneficiaron\", confunde a los lectores haciéndoles creer que asesora directamente a individuos. C es correcta: viola el estándar de comunicación con clientes, porque su publicidad es engañosa sobre quiénes son realmente sus clientes. A es incorrecta porque sí hay una violación clara. B es incorrecta porque el problema no es falsificar datos (tergiversación), sino comunicar de forma confusa la naturaleza de su servicio."}, {"a": "A", "e": "Cuando un empleado descubre algo sospechoso en su empresa, lo primero es informar a su jefe, como en cualquier trabajo. Lagarde encontró que Chorale Music posiblemente ocultó pérdidas en su división de arrendamiento. A es correcta: según los estándares, debe reportar el problema a su supervisor antes de actuar por cuenta propia. B es incorrecta porque publicar las pérdidas sin autorización violaría la confidencialidad y los procedimientos internos de su firma. C es incorrecta porque emitir un informe con datos que sabe son erróneos violaría el estándar de diligencia y constituiría una tergiversación (presentar información falsa como verdadera)."}, {"a": "C", "e": "Imagina que dos personas construyen una casa juntas: una hace los cimientos y otra el techo. Si la del techo termina sola y cambia el diseño, no puede garantizar que los cimientos son sólidos. Bishop visitó la empresa, entrevistó ejecutivos e hizo investigación directa que Hall no realizó. C es correcta: Hall violó el estándar de diligencia y base razonable, porque usó investigación ajena sin completar el trabajo de campo él mismo, dejando su informe sin fundamento suficiente. A es incorrecta porque sí hubo violación. B es incorrecta porque no incluir a Bishop no es tergiversación, ya que Hall cambió las conclusiones; el problema real es la falta de diligencia."}, {"a": "B", "e": "Los estándares GIPS (normas globales de rendimiento de inversiones) regulan cómo las firmas agrupan carteras en \"composites\" (conjuntos de carteras con estrategia similar) para reportar resultados. B es correcta: GIPS permite incluir carteras discrecionales (donde la firma decide las inversiones) que no pagan comisiones. Lo importante es que sean discrecionales. A es incorrecta porque las carteras no discrecionales (donde el cliente impone restricciones) no deben incluirse, ya que no reflejan la estrategia real de la firma. C es incorrecta porque no se puede excluir carteras solo por diferencias legales, como ser un fideicomiso o cuenta individual."}, {"a": "A", "e": "Es como un sello de calidad voluntario: quien lo usa debe asegurarse de cumplir las reglas, pero nadie viene a inspeccionarte obligatoriamente. Los estándares GIPS (normas globales de rendimiento de inversiones) funcionan así. A es correcta: las firmas que declaran cumplir con GIPS deben autorregularse, ya que no existe un organismo central que verifique obligatoriamente el cumplimiento. B es incorrecta porque contratar un verificador externo independiente es recomendable pero no obligatorio según GIPS. C es incorrecta porque crear un equipo de auditoría interna para verificar composites específicos tampoco es un requisito de GIPS."}, {"a": "C", "e": "Los estándares del CFA Institute son como un código de conducta profesional para quienes trabajan en inversiones. Su objetivo principal va más allá de solo seguir leyes. C es correcta: están diseñados para fomentar una cultura de responsabilidad y profesionalismo, promoviendo la ética y la integridad en los mercados financieros. A es incorrecta porque el objetivo no es servir a la empresa empleadora, sino proteger al público inversor y la integridad del mercado. B es incorrecta porque, aunque incluyen cumplimiento regulatorio (seguir las leyes), los estándares buscan algo más amplio: una conducta ética y profesional que va más allá de lo legal."}, {"a": "C", "e": "Piensa en un administrador de edificio contratado por el presidente de la junta. Su deber es con todos los vecinos, no con quien lo contrató. Un fideicomiso (trust) funciona igual: alguien administra bienes para beneficio de terceros (los beneficiarios). C es correcta: el deber de lealtad se debe a los beneficiarios del fideicomiso, quienes son los verdaderos dueños de los activos. A es incorrecta porque el fiduciario (trustee) es solo el administrador, no el destinatario de la lealtad. B es incorrecta porque el gerente ejecutivo solo contrata al gestor de cartera, pero la lealtad se debe a los beneficiarios."}, {"a": "A", "e": "La liquidez del inventario es qué tan fácil se puede convertir en dinero. Para evaluarla, importa saber cómo se calculó su valor. A es correcta: el analista buscaría en las notas a los estados financieros el método de valoración del inventario, como PEPS (primero en entrar, primero en salir), UEPS (último en entrar, primero en salir) o costo promedio, porque cada método muestra un valor diferente y afecta cuán representativo es el dato de liquidez. B es incorrecta porque el gasto reconocido en el periodo no indica qué tan líquido es el inventario restante. C es incorrecta porque el desglose entre productos en proceso y terminados es útil pero menos relevante que el método de valoración."}, {"a": "B", "e": "Imagina comprar un coche versus construirlo tú mismo. Si lo compras, el gasto aparece como inversión; si lo construyes, los materiales y mano de obra son gastos operativos del día a día. Con las patentes pasa igual. B es correcta: comprar una patente externamente se registra como activo intangible (un recurso no físico con valor), generando mayor salida de efectivo por inversión. A es incorrecta porque la compra externa reporta más activos (se capitaliza), no menos. C es incorrecta porque es el desarrollo interno el que genera mayores salidas de efectivo operativo, ya que los gastos de investigación se registran como gastos del periodo."}, {"a": "C", "e": "Asignar capital es decidir en qué proyectos invierte una empresa, como elegir dónde plantar semillas para obtener la mejor cosecha futura. Lo importante es el valor a largo plazo. C es correcta: las empresas deben ignorar el impacto en cifras contables de corto plazo y enfocarse en el valor presente neto (VPN), que mide cuánto valor real genera un proyecto. A es incorrecta porque asumir que no habrá competencia nueva es irreal y distorsiona el análisis. B es incorrecta porque los costos hundidos (dinero ya gastado e irrecuperable) no deben considerarse, ya que no afectan las decisiones futuras."}, {"a": "C", "e": "Piensa en una empresa como un equipo de fútbol: alguien debe elegir a los jugadores (directores) que mejor encajen con la filosofía del club. Ese papel lo cumple el comité de nominaciones, que selecciona candidatos al consejo directivo asegurando que su composición refleje los principios de gobierno corporativo. C es correcta porque esa es exactamente su función principal. A es incorrecta: el comité de riesgos se encarga de identificar y vigilar amenazas financieras u operativas, no de elegir directores. B es incorrecta: el comité de auditoría supervisa la calidad de los informes financieros y la relación con auditores externos, sin participar en la selección de miembros del consejo."}, {"a": "C", "e": "Cuando queremos ver cómo un cambio porcentual en una variable afecta porcentualmente a otra, usamos el modelo log-log. En regresión simple, aplicamos logaritmo natural (una transformación matemática que convierte valores absolutos en relativos) a ambas variables: ln Y = a + b ln X. C es correcta porque este modelo mide la relación entre cambios relativos en Y y cambios relativos en X; el coefficiente b representa la elasticidad. A es incorrecta: el modelo lin-log mide cambios absolutos en Y ante cambios relativos en X. B es incorrecta: el modelo log-lin mide cambios relativos en Y ante cambios absolutos en X, no relativos en ambas."}, {"a": "C", "e": "La solvencia es la capacidad de una empresa para pagar sus deudas a largo plazo, como una familia que puede cubrir su hipoteca cómodamente. El ratio de cobertura de cargos fijos mide cuántas veces las ganancias cubren los pagos obligatorios (intereses, alquileres). C es correcta: si este ratio sube, la empresa cubre mejor sus obligaciones fijas, fortaleciendo su solvencia. A es incorrecta: el ratio deuda/capital (D/E) al subir indica más deuda respecto al patrimonio, lo que debilita la solvencia. B es incorrecta: si el ratio deuda/EBITDA (ganancias operativas antes de intereses, impuestos y amortización) aumenta, significa más deuda relativa a las ganancias, empeorando la solvencia."}, {"a": "C", "e": "Imagina que recibirás dinero en el futuro, pero necesitas saber cuánto vale en un momento intermedio. Aquí se reciben $50,000 en el año 10 y queremos su valor en el año 5, descontando solo 5 años. El valor presente se calcula dividiendo entre (1 + tasa)^n, donde n es el número de períodos. C es correcta: 50,000 / (1.05)^5 = 50,000 / 1.27628 = $39,176. A es incorrecta: $30,696 resulta de descontar 10 años completos hasta el año 0, pero se pedía el valor en el año 5. B es incorrecta: $37,311 proviene de descontar un número erróneo de años, probablemente 6 en vez de 5."}, {"a": "B", "e": "Cuando una empresa compra otra por menos de lo que valen sus activos netos, obtiene una ganga. Aquí el precio de compra ($4.5M) es menor que el valor justo de los activos netos identificables ($5M), generando una diferencia positiva de $0.5M. B es correcta: esa diferencia se registra como ganancia antes de impuestos en el estado de resultados (el informe de pérdidas y ganancias). A es incorrecta: el fondo de comercio (plusvalía o goodwill) solo aparece cuando se paga más que el valor justo, no menos. C es incorrecta: esta ganancia por compra ventajosa se reporta en resultados, no en otro resultado integral (partidas que no pasan por el estado de resultados principal)."}, {"a": "C", "e": "El flujo de caja libre para la firma (FCFF) es el dinero disponible para todos los proveedores de capital (acreedores y accionistas). El flujo de caja libre para el accionista (FCFE) es solo lo que queda para los dueños. FCFF = 108 + 20 + 20×0.70 - 35 - 50 = 57. Pero debemos sumar el interés ajustado por impuestos: FCFF = 57 + 14 = 71. FCFE = 108 + 20 - 35 - 50 + 14 = 57. C es correcta: FCFF (71) es mayor que FCFE (57) porque FCFF incluye los intereses después de impuestos que pertenecen a los acreedores. A y B son incorrectas por subestimar o igualar ambos flujos."}, {"a": "A", "e": "La tasa de retorno ponderada por dinero (MWRR) considera cuánto capital había invertido en cada momento, como medir tu ganancia real según cuánto tenías en cada período. Año 1: $50M crece 17% a $58.5M. Año 2: se suman $125M, total $183.5M crece 12% a $205.52M. Resolviendo la ecuación: -50 - 125/(1+r) + 205.52/(1+r)² = 0, se obtiene r ≈ 13.2%. A es correcta. B es incorrecta: 14.5% es el retorno ponderado por tiempo (promedio geométrico de 17% y 12%), que ignora el tamaño de los flujos. C es incorrecta: proviene de un cálculo erróneo."}, {"a": "C", "e": "La tasa interna de retorno (TIR) es la tasa de descuento que hace que el valor presente neto de un proyecto sea cero. Un supuesto clave es que todos los flujos de caja generados se reinvierten a esa misma TIR. C es correcta: este supuesto de reinversión es la descripción más precisa del método TIR, aunque puede ser poco realista si la TIR es muy alta. A es incorrecta: la TIR se calcula de forma independiente y no cambia si varía el costo promedio de capital (WACC). B es incorrecta: para proyectos mutuamente excluyentes se prefiere el método del valor presente neto (VPN), ya que la TIR puede dar rankings contradictorios."}, {"a": "B", "e": "El WACC (costo promedio ponderado de capital) es como el precio promedio que una empresa paga por financiarse, combinando deuda, acciones y acciones preferentes según su peso. Se calcula: WACC = peso deuda × costo deuda × (1 - tasa impositiva) + peso acciones × costo acciones + peso preferentes × costo preferentes. La deuda tiene beneficio fiscal porque los intereses reducen impuestos. B es correcta: 0.40×8%×0.75 + 0.50×16% + 0.10×10% = 2.4% + 8.0% + 1.0% = 11.4%. A es incorrecta: 11.2% usa una tasa impositiva diferente. C es incorrecta: 12.2% resulta de no aplicar el ahorro fiscal a la deuda."}, {"a": "B", "e": "Un estabilizador automático funciona como un termostato económico: se activa solo cuando la economía se enfría, sin que nadie deba encenderlo manualmente. Los beneficios sociales mediante transferencias (como el seguro de desempleo) aumentan automáticamente cuando hay recesión porque más personas los solicitan, inyectando dinero en la economía. B es correcta por esa razón. A es incorrecta: los gastos de capital del gobierno son decisiones deliberadas que requieren aprobación legislativa, por lo que son política fiscal discrecional. C es incorrecta: el gasto corriente en bienes y servicios también requiere decisión gubernamental activa, no es automático."}, {"a": "A", "e": "Imagina que el rendimiento de una empresa es como el agua que pasa por cinco filtros: cada filtro deja pasar solo una parte. El ROE (rentabilidad sobre el patrimonio) se calcula con la descomposición DuPont de 5 factores, que multiplica: carga fiscal (0,4) × carga de intereses (0,75) × margen antes de impuestos (10%) × rotación de activos (1,5) × apalancamiento financiero (1,2). Así: 0,4 × 0,75 × 0,10 × 1,5 × 1,2 = 0,054 = 5,4%. A es correcta. B (6,0%) y C (7,2%) son incorrectas porque resultan de omitir algún factor o multiplicar mal los componentes."}, {"a": "C", "e": "Piensa en un país que ata su moneda a otra, como un barco amarrado a otro mayor: a donde vaya el grande, va el pequeño. El régimen de tipo de cambio fijo obliga al país a seguir la política monetaria del país ancla, importando su inflación (subida generalizada de precios). C es correcta. A es incorrecta porque las metas de inflación controlan directamente los precios internos con objetivos propios. B es incorrecta porque fijar tasas de interés internas regula el costo del dinero local, sin depender de la inflación extranjera."}, {"a": "A", "e": "El banco central es como el árbitro del sistema financiero de un país. Uno de sus roles clave es regular el sistema de pagos, asegurando que las transferencias y transacciones se procesen de forma segura y efficiente. A es correcta. B es incorrecta porque cambiar tasas de impuestos para controlar la demanda es función de la política fiscal, que maneja el gobierno, no el banco central. C es incorrecta porque asignar recursos entre sectores económicos corresponde al mercado o al gobierno, no al banco central."}, {"a": "C", "e": "Imagina que alquilas una oficina a largo plazo. Bajo las normas US GAAP (reglas contables de EE.UU.), un arrendamiento operativo registra un único gasto lineal cada año, repartiendo el costo total del alquiler de manera uniforme durante toda su duración. C es correcta. A es incorrecta porque dividir el pago entre flujos de financiamiento y operación corresponde a un arrendamiento financiero, no operativo. B es incorrecta porque al inicio el activo y el pasivo se calculan al valor presente (descontado), no al valor sin descontar."}, {"a": "C", "e": "Piensa en los restaurantes de una ciudad: hay muchos, pero cada uno ofrece algo distinto (comida italiana, mexicana, etc.). Eso es competencia monopolística, donde muchas empresas venden productos diferenciados por marca, calidad o diseño, con pocas barreras para entrar al mercado. C es correcta. A es incorrecta porque un oligopolio tiene pocas empresas dominantes, no muchas. B es incorrecta porque la competencia perfecta tiene muchas empresas, pero todas venden productos idénticos, sin diferenciación."}, {"a": "C", "e": "La desviación objetivo a la baja (target downside deviation) mide cuánto caen los rendimientos por debajo de una meta. Con meta del 5%, los retornos por debajo son Q1 (2%) y Q3 (-4%). Los que están por encima (Q2=6%, Q4=8%) se cuentan como 0. Desviaciones al cuadrado: (2%-5%)²=9 y (-4%-5%)²=81, los demás=0. Suma=90. Se divide entre n-1=3: 90/3=30. Raíz cuadrada de 30=5.48%≈5.5%. A (4.7%) divide entre n=4 sin contar correctamente Q3=-4%. B (5.3%) usa un cálculo intermedio incorrecto."}, {"a": "C", "e": "Imagina que quieres saber la estatura promedio de todos los estudiantes de un país, pero solo mides a un grupo. La diferencia entre tu resultado y el promedio real se llama error de muestreo: surge por usar un subconjunto en vez de toda la población. C es correcta. A es incorrecta porque la varianza mide qué tan dispersos están los datos respecto a su promedio, no la diferencia entre muestra y población. B es incorrecta porque el error estándar mide la precisión de un estimador, es decir, cuánto varía el estadístico entre distintas muestras."}, {"a": "A", "e": "Piensa en un cerebro artificial con muchas capas que procesan información paso a paso, como capas de filtros que refinan una imagen. Eso es el aprendizaje profundo, que usa redes neuronales (modelos inspirados en el cerebro) con múltiples etapas y procesamiento no lineal para encontrar patrones complejos. A es correcta. B es incorrecta porque el aprendizaje supervisado es una categoría amplia con varios métodos que aprenden con datos etiquetados, no solo redes neuronales. C es incorrecta porque el aprendizaje no supervisado busca patrones sin etiquetas, pero no describe específicamente redes de múltiples capas."}, {"a": "C", "e": "El ingreso operativo es como la ganancia de una tienda antes de pagar al banco o al fisco. Solo lo afectan gastos de la operación diaria. Los costos administrativos (salarios de oficina, suministros) son gastos operativos, así que reducirlos aumenta directamente el ingreso operativo. C es correcta. A es incorrecta porque los impuestos sobre la renta se restan después del ingreso operativo en el estado de resultados, así que no lo afectan. B es incorrecta porque los intereses por deuda también aparecen debajo del ingreso operativo y corresponden al financiamiento."}, {"a": "C", "e": "Una tabla de contingencia es como una cuadrícula que clasifica datos en dos categorías, por ejemplo, género y preferencia. Para probar si las dos clasificaciones son independientes, se usa la prueba chi-cuadrado. Los grados de libertad (cantidad de valores que pueden variar libremente) se calculan como (r−1)(c−1), donde r son filas y c columnas. C es correcta. A es incorrecta porque r×c solo da el total de celdas, no los grados de libertad. B es incorrecta porque rc−1 no corresponde a ninguna fórmula válida para este tipo de prueba."}, {"a": "B", "e": "Imagina que te prometen pagos anuales, pero el primero no llega hoy sino dentro de dos años. Una anualidad diferida es una serie de pagos iguales que comienza en el futuro. Primero se calcula el valor de los 5 pagos de 10.000€ como si estuvieras un año antes del primer pago: 10.000 × 4,4518 = 44.518€. Luego se descuenta (se reduce por el interés de un año al 4%) para traerlo a hoy: 44.518 / 1,04 = 42.806€. B es correcta. A (41.160€) descuenta un periodo extra innecesario. C (44.518€) olvida descontar al presente, dejando el valor en el año 1."}, {"a": "B", "e": "Piensa en una marca famosa que no caduca: su valor puede bajar con el tiempo sin que lo notes. Un activo intangible (bien sin forma física, como una marca o patente) con vida útil indefinida debe revisarse al menos una vez al año para ver si perdió valor, proceso llamado prueba de deterioro. B es correcta: la prueba anual es obligatoria siempre. A es incorrecta porque estos activos no están exentos de pruebas. C es incorrecta porque aplica solo a intangibles con vida útil definida, que se evalúan únicamente cuando hay señales de pérdida de valor."}, {"a": "B", "e": "Las medias son formas de resumir datos. La media aritmética (MA) es el promedio común. La media geométrica (MG) multiplica los valores y saca la raíz. La media armónica (MH) usa los inversos de los valores. Para dos números positivos existe una relación que siempre se cumple: el cuadrado de la media geométrica es igual al producto de la aritmética por la armónica, es decir (MG)² = MA × MH. B es correcta por esta propiedad fundamental. A es incorrecta: (MA)² no iguala MH × MG. C es incorrecta: (MH)² tampoco iguala MG × MA. Solo la relación de B es una identidad matemática válida."}, {"a": "A", "e": "Como lanzar una moneda: cara es 0, cruz es 1, cada una con 50% de probabilidad. La varianza mide cuánto se dispersan los resultados respecto al promedio. Primero calculamos el valor esperado (promedio): 0×0,5 + 1×0,5 = 0,5. Luego el promedio de los cuadrados: 0²×0,5 + 1²×0,5 = 0,5. La varianza es la diferencia: 0,5 − 0,5² = 0,5 − 0,25 = 0,25. A es correcta. B (0,50) confunde el valor esperado con la varianza. C (1,00) olvida restar el cuadrado de la media, sobreestimando la dispersión."}, {"a": "B", "e": "Los tipos de cambio son como precios entre monedas. Nos dan cuántos dólares canadienses (CAD) vale 1 euro (1,0718) y cuántos euros vale 1 libra (0,9463). Para hallar cuántas libras (GBP) vale 1 CAD, primero combinamos: CAD/GBP = 1,0718 × 0,9463 = 1,0142, que indica cuántos CAD por libra. Luego invertimos: GBP/CAD = 1/1,0142 = 0,9860. B es correcta. A (0,8829) resulta de un cálculo erróneo. C (1,0142) es el tipo CAD/GBP sin invertir, o sea cuántos CAD por libra, no cuántas libras por CAD."}, {"a": "A", "e": "Piensa en el mercado de aerolíneas: pocas empresas grandes, difícil entrar, y sus productos se parecen entre sí. Eso es un oligopolio, estructura de mercado con pocos vendedores, altas barreras de entrada (obstáculos para nuevos competidores) y productos con sustitutos cercanos. A es correcta. B (monopolio) tiene altas barreras pero no hay sustitutos cercanos porque hay un solo vendedor sin competencia directa. C (competencia monopolística) ofrece productos diferenciados pero con bajas barreras de entrada, permitiendo que nuevas empresas entren fácilmente."}, {"a": "A", "e": "Cuando una fábrica reduce las horas de trabajo semanales, es como un termómetro que anticipa enfriamiento económico. Las horas promedio en manufactura son un indicador adelantado: una señal que predice lo que pasará en la economía. Los empleadores primero reducen horas antes de despedir trabajadores cuando esperan menor demanda. A es correcta: menos horas señalan declive económico futuro. B es incorrecta porque una reducción de horas no indica estabilidad sino contracción próxima. C es incorrecta porque el crecimiento se asociaría con un aumento de horas, no una disminución."}, {"a": "A", "e": "Imagina una empresa donde nadie vigila al director: puede hacer lo que quiera sin consecuencias. El triángulo del fraude tiene tres elementos: oportunidad, motivación y racionalización. Un consejo directivo (grupo que supervisa a la gerencia) inefectivo crea la oportunidad para emitir reportes financieros de baja calidad porque no hay supervisión adecuada. A es correcta. B (preocupación por futuras oportunidades de carrera) es una motivación para manipular, no una oportunidad. C (compensación basada en ganancias) también es motivación, ya que presiona a alcanzar metas, pero no abre la puerta para hacerlo."}, {"a": "A", "e": "Imagina un mercado con una empresa grande y varias pequeñas que siguen su precio, como una marca líder de refrescos. En un oligopolio (mercado con pocos vendedores) sin colusión (sin acuerdos secretos) con un líder de precio, la empresa dominante fija el precio usando su propia curva de demanda residual: la demanda total del mercado menos lo que ofrecen las empresas seguidoras. A es correcta. B es incorrecta porque no se usa la demanda agregada del mercado directamente. C es incorrecta porque el ingreso y costo marginal del mercado en conjunto no determinan el precio; es la firma dominante quien lo decide sobre su demanda residual."}, {"a": "B", "e": "Los puntos forward indican si una moneda cotizará más cara o barata en el futuro. Se calcula el tipo forward (futuro) así: Spot × [(1 + tasa CHF × días/360) / (1 + tasa USD × días/360)] = 1,0072 × (1,004725/1,005625) = 1,006298. Los puntos forward son la diferencia con el spot multiplicada por 10.000: (1,006298 − 1,0072) × 10.000 ≈ −9,0. Como la tasa del franco suizo (CHF) es menor que la del dólar (USD), los puntos son negativos. B es correcta. A (−12) exagera la magnitud. C (0,5) tiene el signo equivocado."}, {"a": "C", "e": "Un directorio corporativo necesita miembros independientes, como un jurado imparcial que no conozca al acusado. Un miembro independiente es aquel sin lazos comerciales, financieros ni personales con la empresa. C es correcta: un ejecutivo de otra empresa en otra industria no tiene ninguna conexión con la corporación, por lo que es el más independiente. A es incorrecta: un ex-director general mantiene relaciones previas con la empresa que comprometen su imparcialidad. B es incorrecta: un profesor que además trabaja como consultor para la empresa recibe pagos de ella, creando un conflicto de interés financiero que reduce su independencia."}, {"a": "A", "e": "El flujo de caja es como el agua que mantiene vivo un negocio. Distintos grupos se preocupan por diferentes aspectos de una empresa. A es correcta: los proveedores son quienes más se preocupan por el flujo de caja porque necesitan que la empresa tenga dinero disponible para pagarles por los bienes y servicios que le entregan. Si la empresa no genera efectivo, ellos no cobran. B es incorrecta: los clientes se interesan más en que la empresa siga operando para recibir soporte y garantías de sus productos. C es incorrecta: los reguladores, es decir las autoridades que supervisan, se enfocan en que se cumplan las leyes y se proteja al consumidor."}, {"a": "C", "e": "La provisión por valuación de inventario es como restar productos dañados del total en una bodega. Si esta provisión sube, el valor neto del inventario baja. C es correcta: los días de inventario disponible (inventario dividido por costo de ventas, por 365) aumentan porque al reducir el inventario neto, la rotación se hace más lenta. A es incorrecta: la cobertura de intereses mide la capacidad de pagar intereses con ganancias operativas, y esta provisión no afecta ni los intereses ni las ganancias operativas directamente. B es incorrecta: menos inventario reduce el capital de trabajo, lo que aumentaría la rotación de capital de trabajo, no la disminuiría."}, {"a": "B", "e": "Revaluar un activo es como tasar tu casa y descubrir que vale más de lo que pagaste. Bajo el modelo de revaluación, si el valor sube, aumentan tanto los activos como el patrimonio (la parte que pertenece a los dueños). B es correcta: el ratio de apalancamiento financiero (activos entre patrimonio) baja porque el patrimonio crece proporcionalmente más. A es incorrecta: el margen de ganancia neta baja porque la depreciación futura será mayor al calcularse sobre un valor más alto. C es incorrecta: la rotación de activos totales (ventas entre activos) disminuye porque los activos aumentan pero las ventas no cambian."}, {"a": "A", "e": "Convertir del método indirecto al directo es como desglosar un resumen en sus partes detalladas. Primero, los gastos totales devengados son: ingresos menos utilidad neta = 359 - 35 = 324 millones. Luego ajustamos por cambios en cuentas por pagar. A es correcta: sumamos 16M porque la disminución en impuestos por pagar significa que se pagó más impuesto en efectivo, y restamos 22M porque el aumento en intereses por pagar significa que se pagó menos interés en efectivo. Resultado: 324 + 16 - 22 = 318M. B es incorrecta: ignora los ajustes por partidas de capital de trabajo. C es incorrecta: está cerca del ingreso total y no refleja los ajustes necesarios."}, {"a": "C", "e": "Imagina que tu inversión crece como una bola de nieve: cada año el rendimiento se acumula sobre el anterior. Eso es el interés compuesto. C es correcta: la media geométrica captura este efecto acumulativo y es la forma adecuada de calcular el rendimiento promedio en varios periodos consecutivos. A es incorrecta: la media armónica se usa para promediar razones financieras como precio-ganancia o en compras periódicas de inversión. B es incorrecta: la media aritmética, que es el promedio simple, sirve para estimar el rendimiento esperado de un solo periodo futuro, pero sobreestima los rendimientos cuando hay varios periodos porque ignora el efecto compuesto."}, {"a": "C", "e": "Modigliani-Miller es una teoría sobre cómo financiar una empresa. Sin impuestos, pedir más prestado no cambia el valor total de la empresa, pero sí cambia el riesgo para los dueños. C es correcta: al aumentar la razón deuda-capital (cuánto se debe versus cuánto aportan los dueños), el costo del capital propio sube porque los accionistas exigen mayor rendimiento por asumir más riesgo financiero. A es incorrecta: más deuda no reduce el costo del capital propio; lo aumenta por el mayor riesgo. B es incorrecta: el costo promedio ponderado de capital se mantiene constante, pero el costo del capital propio sí sube para compensar la deuda más barata."}, {"a": "A", "e": "El tipo de cambio USD/EUR indica cuántos dólares cuesta un euro, como el precio de un producto. Si el precio sube de 1.10 a 1.20, necesitas más dólares por cada euro, lo que significa que el dólar perdió valor. A es correcta: el dólar se depreció. El porcentaje se calcula como (1.10 - 1.20) / 1.20 = -8.33%. B es incorrecta: el dólar no se apreció (no ganó valor), sino que se depreció porque ahora cuesta más comprar un euro. C es incorrecta: la dirección es errónea (dice apreciación) y el 9.09% resulta de dividir incorrectamente entre el valor inicial en vez del valor final."}, {"a": "C", "e": "Los sesgos cognitivos son atajos mentales que pueden llevarnos a errores. Clasificar algo nuevo basándonos en lo que ya conocemos es como ver una nube y decir que parece un animal. C es correcta: el sesgo de representatividad es exactamente esa tendencia a categorizar información nueva según experiencias y patrones pasados, asumiendo similitudes que quizás no existen. A es incorrecta: el sesgo de confirmación es buscar solo información que respalde lo que ya creemos, ignorando evidencia contraria. B es incorrecta: el sesgo de conservadurismo es aferrarse demasiado a opiniones previas y no dar suficiente peso a información nueva."}, {"a": "A", "e": "La globalización es como abrir las puertas de una tienda local al mundo entero. Tiene ventajas y desventajas. A es correcta: mayores ganancias son un beneficio claro de la globalización porque las empresas acceden a mercados más grandes, encuentran mano de obra más económica y logran producir en mayor escala, reduciendo costos. B es incorrecta: la interdependencia, es decir que las economías dependan unas de otras, es un riesgo porque una crisis en un país puede afectar a otros. C es incorrecta: los estándares ambientales, sociales y de gobernanza más estrictos no son un resultado directo ni garantizado de la globalización."}, {"a": "C", "e": "El apalancamiento financiero mide cuántos activos tiene una empresa por cada peso de capital propio, como si midieras cuánto de tu casa pagaste tú vs. el banco. Se calcula como Activos Totales / Patrimonio. Primero hallamos los pasivos corrientes (deudas a corto plazo): si el capital de trabajo es 60 y la razón corriente es 1.75, entonces PC = 80 y AC = 140. Activos totales = 140 + 235 = 375. Apalancamiento = 375 / 170 = 2.2. C es correcta. A (1.2) y B (1.7) resultan de errores aritméticos o de usar fórmulas incorrectas que no combinan bien los datos del capital de trabajo y la razón corriente."}, {"a": "A", "e": "La oferta monetaria es la cantidad total de dinero circulando en la economía, como el agua en una tubería. El banco central controla esa cantidad. Cuando compra bonos (títulos de deuda), paga con dinero nuevo que entra al sistema bancario, aumentando la oferta. A es correcta. B es incorrecta porque subir la tasa de interés de referencia encarece los préstamos, lo que reduce el dinero en circulación. C es incorrecta porque aumentar el encaje bancario (reservas obligatorias) obliga a los bancos a guardar más dinero, reduciendo lo que pueden prestar y así la oferta monetaria."}, {"a": "B", "e": "Los impuestos por pagar son lo que una empresa debe al fisco, como tu declaración de impuestos anual. Se calculan sobre la renta imponible, que es el ingreso según las reglas fiscales del gobierno, no según la contabilidad interna. B es correcta. A es incorrecta porque el EBIT (ganancias antes de intereses e impuestos) es una cifra contable que no refleja deducciones fiscales como los intereses de deuda. C es incorrecta porque el resultado contable difiere de la renta imponible por diferencias entre normas contables y tributarias, como la depreciación acelerada permitida por el fisco."}, {"a": "C", "e": "Las ganancias por acción básicas (EPS) miden cuánto gana una empresa por cada acción, como dividir una pizza entre comensales. Se calcula: (Utilidad neta menos dividendos preferentes) dividido entre el promedio ponderado de acciones. Utilidad disponible = 3,100,000 - 500,000 = 2,600,000. Con un split 2 por 1 en julio, las acciones promedio = (1,000,000 × 6/12) + (2,000,000 × 6/12) = 1,500,000. EPS = 2,600,000 / 1,500,000 = 1.73. C es correcta. A (0.51) usa cifras erróneas. B (1.30) aplica el split retroactivamente a todo el año, lo cual es incorrecto aquí."}, {"a": "B", "e": "El análisis de estados financieros sigue un proceso ordenado, como seguir una receta paso a paso. El primer paso es definir el propósito y contexto del análisis, donde se identifican los riesgos inherentes (peligros propios) de la inversión y se establece qué se quiere lograr. B es correcta porque evaluar riesgos inherentes corresponde a esta etapa inicial. A es incorrecta porque procesar datos es un paso posterior donde se recopila información numérica. C es incorrecta porque comunicar conclusiones es el paso final, cuando ya se han evaluado todos los riesgos previamente."}, {"a": "B", "e": "Cuando una empresa tiene un contrato de construcción a largo plazo, reconoce ingresos según el avance de la obra, como cobrar por cada piso terminado de un edificio. El porcentaje completado es 1,200/4,000 = 30%, lo que daría ingresos de 1,500. Sin embargo, cuando existe restricción de reversión (solo se reconoce lo altamente probable), el ingreso se limita a los costos incurridos (1,200) o al efectivo recibido (1,000), el menor. B (1,000) es correcta. A (300) subestima el ingreso. C (1,500) ignora la restricción que impide reconocer ingresos que podrían revertirse."}, {"a": "A", "e": "Imagina dos termómetros que miden el rendimiento de tu portafolio de inversión. El ratio de Sharpe usa la tasa libre de riesgo como punto de referencia: (Rendimiento - Tasa libre de riesgo) / Riesgo. El ratio de seguridad primero (Safety-First) usa un umbral mínimo aceptable: (Rendimiento - Umbral) / Riesgo. Si el umbral es mayor que la tasa libre de riesgo, el numerador del Safety-First es menor, por lo que su valor es menor que el Sharpe. A es correcta. B sería cierta solo si ambos valores fueran iguales. C sería cierta solo si el umbral fuera menor que la tasa libre de riesgo."}, {"a": "B", "e": "El WACC (costo promedio ponderado de capital) es como calcular el costo promedio de financiar tu negocio mezclando deuda y capital propio. Se calcula: peso de deuda × costo de deuda × (1 - tasa impositiva) + peso de capital × costo de capital. La deuda tiene ventaja fiscal porque los intereses reducen impuestos. WACC = 30% × 4% × (1-0.25) + 70% × 8% = 0.9% + 5.6% = 6.5%. B es correcta. A (5.9%) aplica mal la tasa impositiva o las ponderaciones. C (6.8%) no descuenta correctamente el beneficio fiscal de los intereses de la deuda."}, {"a": "C", "e": "En regresión lineal simple, la pendiente indica cuánto cambia la variable dependiente por cada unidad de cambio en la independiente, como cuánto sube tu factura de luz por cada grado más de temperatura. El error estándar de esa pendiente mide su precisión y se calcula dividiendo el error estándar de la estimación entre la raíz cuadrada de la variación de la variable independiente. C es correcta. A es incorrecta porque la suma de cuadrados de regresión mide poder explicativo, no precisión del coefficiente. B es incorrecta porque el error de pronóstico incluye incertidumbre adicional y es un concepto distinto."}, {"a": "A", "e": "La liquidez es la capacidad de una empresa para pagar sus cuentas a tiempo, como tener dinero disponible en tu billetera. Las fuentes primarias son las que están disponibles de forma continua en operaciones normales. Las líneas de crédito regulares son fuentes primarias porque el banco las ofrece permanentemente para uso habitual. A es correcta. B es incorrecta porque vender activos operativos (maquinaria, edificios) es un recurso de emergencia que afecta la producción, siendo una fuente secundaria. C es incorrecta porque renegociar contratos con proveedores es también secundaria, ya que modifica condiciones existentes."}, {"a": "A", "e": "Imagina que pones alarmas en tu casa: si suena una, sabes que algo pasa. La señalización (signposting) funciona igual: se usan niveles de mercado como alertas predefinidas para medir qué tan probable es un riesgo geopolítico (es decir, tensiones entre países que afectan la economía). A es correcta porque describe exactamente ese monitoreo de indicadores. B es incorrecta porque el análisis de escenarios plantea situaciones hipotéticas completas, no solo vigila señales. C es incorrecta porque traducir el riesgo en acción de inversión es el paso siguiente: ya detectaste el riesgo y ahora ajustas tu portafolio."}, {"a": "C", "e": "Piensa en cómo pagas tus gastos: primero usas tu propio dinero, luego pides prestado a alguien cercano y solo al final acudes al banco. La teoría del orden jerárquico (pecking order) dice que las empresas hacen lo mismo: prefieren financiamiento interno (sus propias ganancias), luego deuda privada, después deuda pública y por último emitir acciones. C es correcta porque el financiamiento interno va antes que la deuda privada. A es incorrecta porque la deuda privada se prefiere sobre la pública por requerir menos divulgación. B es incorrecta porque emitir acciones públicas es el último recurso, ya que sugiere que la empresa está sobrevalorada."}, {"a": "A", "e": "Para saber cuánto efectivo realmente cobraste de tus clientes, no basta con ver tus ventas; debes revisar si te pagaron lo que te debían. El efectivo cobrado se calcula sumando los ingresos y el cambio en cuentas por cobrar (dinero que los clientes aún te deben). Si las cuentas por cobrar bajaron de $28,600 a $20,500, significa que cobraste $8,100 extra. Con los datos proporcionados, el total es $25,900. A es correcta por aplicar este ajuste. B ($46,300) y C ($62,500) son incorrectas porque no reflejan correctamente la relación entre ingresos y variación en cuentas por cobrar."}, {"a": "C", "e": "Si descubres un error importante en tus cuentas del año pasado, no basta con poner una nota ni con solo corregir los números: debes hacer ambas cosas. Corregir un error material (significativo) de un periodo anterior requiere reexpresar los estados financieros previos (corregir las cifras) y además agregar una nota explicativa en los estados actuales. C es correcta porque exige ambas acciones. A es incorrecta porque solo una nota no corrige las cifras erróneas. B es incorrecta porque solo reexpresar sin explicar el error deja a los lectores sin entender qué cambió y por qué."}, {"a": "B", "e": "Imagina el ciclo de vida de un negocio como el crecimiento de una persona: bebé, joven, adulto. Un préstamo garantizado (secured borrowing) requiere dejar algo en garantía, como una casa para una hipoteca. En la etapa de crecimiento (growth), la empresa ya genera ingresos estables y tiene activos que ofrecer como garantía, accediendo por primera vez a estos préstamos. B es correcta. A es incorrecta porque en la etapa madura la empresa ya tiene acceso amplio a muchas fuentes de financiamiento. C es incorrecta porque las empresas nuevas (start-ups) rara vez tienen activos suficientes para garantizar un préstamo."}, {"a": "B", "e": "Piensa en pedir dinero prestado: es menos preocupante si se lo debes a tu propia familia, porque el dinero se queda en casa. Lo mismo ocurre con la deuda de un gobierno: si la mayoría se debe a ciudadanos locales, los intereses pagados circulan dentro de la economía nacional. B es correcta por eso. A es incorrecta porque si el sector privado reduce su ahorro para cubrir la deuda, la economía se debilita. C es incorrecta porque el efecto desplazamiento (crowding out), donde el gobierno acapara el crédito y el sector privado no puede financiarse, es precisamente una consecuencia negativa del endeudamiento excesivo."}, {"a": "B", "e": "Cuando una empresa privada quiere vender sus acciones al público, normalmente contrata a un intermediario (underwriter o suscriptor) que organiza la venta. Pero existe otra vía: la cotización directa (direct listing), donde la empresa lista sus acciones existentes en la bolsa sin intermediario. B es correcta porque describe este proceso sin suscriptor. A es incorrecta porque una OPI (oferta pública inicial o IPO) sí utiliza suscriptores para emitir y vender acciones nuevas. C es incorrecta porque un SPAC es una empresa ya cotizada creada solo para adquirir otra empresa privada, un mecanismo completamente distinto."}, {"a": "A", "e": "Imagina un juicio: necesitas una prueba para decidir si alguien es culpable o inocente. En estadística, el estadístico de prueba (test statistic) cumple ese rol: es un valor calculado con los datos de la muestra que se compara con un umbral (valor crítico) para decidir si rechazar o no la hipótesis nula (la suposición inicial). A es correcta porque sirve para tomar esa decisión estadística. B es incorrecta porque estimar parámetros poblacionales es función de los estimadores, como la media muestral. C es incorrecta porque el nivel de significancia se fija antes del análisis, no se calcula con el estadístico."}, {"a": "B", "e": "Imagina que tienes productos en tu tienda y descubres que algunos valen menos de lo que registraste. Eso es una rebaja de inventario (inventory write-down): reduces el valor del inventario en tus libros. La rotación de activos totales (total asset turnover) se calcula como ventas divididas entre activos totales. Al bajar los activos por la rebaja, y mantenerse las ventas iguales, este ratio sube. B es correcta. A es incorrecta porque el margen bruto baja, ya que la rebaja aumenta el costo de ventas. C es incorrecta porque los días de inventario disponible bajan, pues el inventario menor reduce el numerador de ese cálculo."}, {"a": "C", "e": "Piensa en una feria: cuantos más compradores llegan, más vendedores quieren participar, y viceversa. Esto describe una red multilateral (multi-sided network), donde distintos grupos (clientes y comerciantes) se atraen mutuamente, generando un círculo virtuoso de crecimiento. C es correcta porque describe ese efecto de red cruzado entre diferentes participantes. A es incorrecta porque crowdsourcing (colaboración masiva) significa obtener ideas o servicios de muchas personas, sin relación con efectos de red. B es incorrecta porque una red unilateral involucra un solo tipo de usuario, no la interacción entre grupos distintos."}, {"a": "B", "e": "Imagina que quieres clasificar todas las organizaciones de una ciudad, no solo las tiendas con vitrina. Los sistemas de clasificacion industrial agrupan empresas por sector. B) Correcta: TRBC (Clasificacion Empresarial de Refinitiv) es el unico que abarca empresas privadas, organizaciones sin fines de lucro y entidades de gobierno, ademas de las que cotizan en bolsa. A) Incorrecta: ICB (Referencia de Clasificacion Industrial) solo clasifica empresas que cotizan en mercados publicos. C) Incorrecta: GICS (Estandar Global de Clasificacion Industrial) tambien se limita a empresas cotizadas en bolsa, dejando fuera al sector privado y gubernamental."}, {"a": "A", "e": "Un IPS (Declaracion de Politica de Inversion) es como el manual de instrucciones para manejar el dinero de un cliente. Tiene varias secciones. A) Correcta: la seccion de Procedimientos describe los pasos y el calendario para mantener el IPS actualizado, como cuando revisar y que hacer si cambian las circunstancias del cliente. B) Incorrecta: las Guias de Inversion establecen limites sobre que tipos de activos se pueden comprar y en que proporcion. C) Incorrecta: la Declaracion de Deberes y Responsabilidades define los roles de cada participante, como el gestor, el custodio y el propio cliente."}, {"a": "A", "e": "Un swap es un contrato donde dos partes intercambian pagos periodicos, como intercambiar manzanas por naranjas cada mes. Un forward es un acuerdo para intercambiar algo en una fecha futura. A) Correcta: un swap equivale a una serie de forwards cuando el valor combinado de todos esos forwards es cero al inicio. Cada pago del swap funciona como un forward individual. B) Incorrecta: en un swap los forwards implicitos tienen distintas fechas de vencimiento, una por cada periodo de pago. C) Incorrecta: no es necesario que los valores de las posiciones largas y cortas se compensen en cada periodo."}, {"a": "A", "e": "El CAPM (Modelo de Valoracion de Activos de Capital) calcula el rendimiento esperado de una inversion segun su riesgo de mercado. Es como una formula para saber cuanto deberia rendir un activo dado su nivel de riesgo. A) Correcta: el CAPM no se usa para fijar primas de seguros, ya que estas dependen de tablas actuariales y probabilidades de accidentes, no del riesgo de mercado. B) Incorrecta: el CAPM si se usa como tasa de descuento para evaluar si un proyecto es economicamente viable. C) Incorrecta: el CAPM si sirve como referencia para comparar con la tasa interna de retorno de un proyecto."}, {"a": "C", "e": "La infraestructura se divide en dos tipos: economica, que impulsa la actividad comercial (como carreteras o redes de internet), y social, que busca el bienestar publico (como hospitales o escuelas). C) Correcta: los activos de tecnologia de informacion y comunicacion (como torres de telecomunicaciones y redes de datos) son infraestructura economica, junto con transporte y energia. A) Incorrecta: los activos de salud son infraestructura social, orientados al bienestar de la poblacion. B) Incorrecta: los activos educativos tambien son infraestructura social, no economica."}, {"a": "B", "e": "Un portafolio de cobertura combina activos con derivados (contratos cuyo valor depende de otro activo) para eliminar el riesgo de mercado, como ponerse un paraguas contra la lluvia financiera. B) Correcta: al eliminar el riesgo, en ausencia de arbitraje (oportunidad de ganancia sin riesgo), el portafolio solo debe ganar la tasa libre de riesgo, es decir, lo mismo que una inversion totalmente segura. A) Incorrecta: ganar cero seria una oportunidad de arbitraje, pues alguien podria pedir prestado a la tasa libre de riesgo e invertir ahi. C) Incorrecta: al estar cubierto, el portafolio no replica el rendimiento de los activos subyacentes."}, {"a": "A", "e": "Una accion preferente que paga dividendo fijo se valora como una renta perpetua: Precio = Dividendo / Tasa requerida. Es como calcular cuanto pagarias hoy por recibir una cantidad fija cada anio para siempre. Rendimiento actual = 3.75/50 = 7.5%. La tasa sube 75 puntos base (0.75%), asi que nueva tasa = 8.25%. A) Correcta: Precio = 3.75/0.0825 = $45.45. B) Incorrecta: $49.50 subestima el efecto del aumento de tasa sobre el precio. C) Incorrecta: $55.56 implica una tasa de 6.75%, pero la tasa subio, no bajo, asi que el precio debe caer."}, {"a": "C", "e": "Los planes de pension son como alcancías para la jubilacion. En un plan de beneficio definido (BD), la empresa promete pagar una cantidad especifica al jubilarse. En uno de contribucion definida (CD), la empresa solo aporta dinero y el empleado asume el riesgo. C) Correcta: en un plan BD, el patrocinador (la empresa) especifica la obligacion o beneficio que se debera a los participantes. A) Incorrecta: la tolerancia al riesgo de un plan BD varia segun su nivel de financiamiento y horizonte temporal. B) Incorrecta: en planes CD, la tolerancia al riesgo depende de cada participante individual, no del plan."}, {"a": "B", "e": "Vender en corto es como vender algo prestado esperando que baje de precio para recomprarlo mas barato. Si el precio sube en vez de bajar, las perdidas pueden ser enormes. B) Correcta: las posiciones cortas tienen perdidas potencialmente ilimitadas porque el precio del activo puede subir sin limite. A) Incorrecta: las ganancias estan limitadas al precio actual del activo, ya que lo maximo que puede bajar es a cero. C) Incorrecta: solo las perdidas son ilimitadas; las ganancias tienen un tope, por lo que no hay ganancias ilimitadas."}, {"a": "B", "e": "El modelo de Gordon valora una accion como: Precio = D1/(k-g), donde D1 es el dividendo del proximo anio, k es la tasa de retorno requerida y g es la tasa de crecimiento del dividendo. Primero calculamos k con el CAPM: k = 3% + 1.4*(9%-3%) = 11.4%. Luego D1 = 10*(1.02) = 10.20. B) Correcta: V = 10.20/(0.114-0.02) = 10.20/0.094 = $108.51. A) Incorrecta: $106.38 resulta de usar el dividendo actual (D0=10) en vez de D1. C) Incorrecta: $145.71 usa una tasa de descuento incorrectamente baja."}, {"a": "A", "e": "Imagina que repartes tu dinero entre 500 alcancías. La varianza del portafolio (qué tanto varía el rendimiento total) se calcula con: Var_p = (1/n)*varianza_promedio + (1 - 1/n)*covarianza_promedio, donde n es el número de activos, la varianza promedio mide cuánto varía cada activo solo, y la covarianza promedio mide cuánto se mueven juntos. Sustituyendo: (1/500)*0.04 + (499/500)*0.01 = 0.00008 + 0.00998 ≈ 0.01. A) Correcta: el resultado más cercano entre las opciones es 0.03. B) Incorrecta: 0.04 es la varianza individual promedio, no la del portafolio diversificado. C) Incorrecta: 0.05 sobreestima el riesgo del portafolio."}, {"a": "A", "e": "Piensa en vender una casa con urgencia: si necesitas el dinero rápido, probablemente aceptarás un precio menor. Eso es el riesgo de liquidez, que es la posibilidad de tener que bajar mucho el precio para vender un activo rápidamente. A) Correcta: describe exactamente esa situación de concesión en el precio al vender. B) Incorrecta: el riesgo de solvencia se refiere a no poder pagar deudas a largo plazo, como una empresa que quiebra. C) Incorrecta: el riesgo de liquidación ocurre cuando la otra parte de una transacción no cumple con la entrega del activo o del pago acordado."}, {"a": "C", "e": "Imagina a alguien que gana mucho dinero pero guarda todo bajo el colchón. La capacidad de asumir riesgo depende de los recursos financieros, mientras que la disposición depende de la actitud personal. Esta clienta gana $500,000 al año, lo que le da alta capacidad para tolerar pérdidas. Sin embargo, prefiere depósitos bancarios y asocia riesgo con pérdida, lo que muestra baja disposición. C) Correcta: alta capacidad, baja disposición. A) Incorrecta: su alto ingreso le da alta capacidad, no baja. B) Incorrecta: su actitud conservadora demuestra baja disposición a arriesgar."}, {"a": "C", "e": "Piensa en un mercado como un supermercado: la eficiencia operacional significa que funciona con bajos costos y buen servicio. En finanzas, un sistema operacionalmente efficiente tiene mercados líquidos (donde es fácil comprar y vender), comisiones bajas y poco impacto en precios al ejecutar órdenes. C) Correcta: describe exactamente la eficiencia operacional. A) Incorrecta: que los precios reflejen el valor real describe la eficiencia informacional, donde toda la información está en los precios. B) Incorrecta: usar recursos donde son más valiosos describe la eficiencia de asignación."}, {"a": "B", "e": "Imagina que tres amigos invierten y quieres calcular el rendimiento promedio dándole el mismo peso a cada uno. Con ponderación igualitaria, calculas el retorno de cada valor y promedias: Valor 1 sube de $50 a $60 (20%), Valor 2 de $75 a $95 (26.67%), Valor 3 de $60 a $65 (8.33%). Promedio: (20+26.67+8.33)/3 = 18.33%. B) Correcta: la ponderación igualitaria asigna el mismo peso a cada valor. A) Incorrecta: la ponderación por precio usa el precio de cada acción como peso. C) Incorrecta: la ponderación por valor usa la capitalización de mercado."}, {"a": "B", "e": "Imagina que le pagas un bono a tu administrador por buenas ganancias, pero después las inversiones pierden valor. La cláusula de recuperación (clawback) te permite reclamar parte de ese bono. En fondos de inversión, los socios limitados (inversionistas) pueden recuperar comisiones de rendimiento pagadas al socio gestor si las ganancias finales no justifican esos pagos. B) Correcta: describe este derecho de recuperación. A) Incorrecta: no pagar dos veces por el mismo rendimiento describe la marca de agua alta (high-water mark). C) Incorrecta: la tasa mínima para cobrar comisión describe la tasa umbral (hurdle rate)."}, {"a": "C", "e": "Piensa en armar un rompecabezas financiero con piezas equivalentes. La paridad put-call-forward dice que ciertas combinaciones de opciones y bonos replican posiciones a futuro. Una posición corta a futuro (comprometerse a vender) equivale a: comprar una opción de venta (put largo), vender una opción de compra (call corto) y pedir prestado (bono corto). C) Correcta: put largo + call corto + bono corto = forward corto. A) Incorrecta: esa combinación replica un forward largo, no corto. B) Incorrecta: put corto + call corto + bono corto no corresponde a ninguna paridad válida."}, {"a": "B", "e": "El documento de política de inversión (IPS) es como un manual personalizado para cada inversionista. Tiene secciones para objetivos, liquidez y circunstancias únicas, entre otras. Cuando un inversor quiere evitar empresas contaminantes, es una preferencia personal especial que va en la sección de circunstancias únicas. B) Correcta: las restricciones éticas o ambientales se documentan ahí. A) Incorrecta: la sección de liquidez trata sobre necesidades de efectivo disponible. C) Incorrecta: los objetivos de inversión se limitan a metas de rendimiento y tolerancia al riesgo."}, {"a": "A", "e": "En una quiebra, imagina una fila para cobrar: los primeros en la fila pierden menos. La prioridad de cobro va así: deuda con primera garantía, luego segunda garantía, luego deuda senior sin garantía, y al final deuda subordinada. La severidad de pérdida (cuánto pierdes) es menor para quien cobra primero. A) Correcta: la deuda con segunda garantía (second lien) tiene la mayor prioridad entre las opciones, así que pierde menos. B) Incorrecta: la deuda subordinada está al final de la fila y pierde más. C) Incorrecta: la deuda senior sin garantía cobra después que second lien."}, {"a": "C", "e": "Los activos reales son cosas físicas como edificios, terrenos o infraestructura. A diferencia de acciones o
