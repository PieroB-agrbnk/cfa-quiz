 valor intrínseco, ya que se podría comprar y ejercer de inmediato obteniendo ganancia sin riesgo."}, {"a": "B", "e": "Es como cuando valoras más un objeto tuyo que lo que pagarías por el mismo objeto en una tienda. Este inversor vende sus acciones solo a 58 dólares pero no compraría las mismas por más de 53. Esa diferencia de 5 dólares muestra el sesgo de dotación (endowment bias): sobrevalorar lo que ya posees por el simple hecho de tenerlo. B es correcta. A es incorrecta porque el sesgo de statu quo es preferir no hacer cambios, no sobrevaluar lo propio. C es incorrecta porque el sesgo de conservadurismo es aferrarse a creencias anteriores ignorando información nueva, algo diferente."}, {"a": "A", "e": "Piensa en el mercado como una subasta: funciona mejor cuando todos los participantes tienen buena información. La eficiencia del mercado significa que los precios reflejan toda la información disponible. Las regulaciones que aumentan la divulgación de información ayudan a que los precios sean más precisos. A es correcta. B es incorrecta porque limitar las ventas en corto impide que los precios reflejen noticias negativas, reduciendo la eficiencia. C es incorrecta porque el arbitraje (comprar barato y vender caro simultáneamente) corrige errores en los precios; reducirlo empeoraría la eficiencia del mercado."}, {"a": "B", "e": "Imagina que quieres comprar algo dentro de un año. Si no hay costos ni beneficios por guardarlo, el precio forward (precio pactado hoy para entrega futura) debe ser el precio actual más los intereses del período. Es decir, el valor futuro del precio spot: F = S × (1+r)^T. Así nadie puede ganar dinero fácil comprando hoy y vendiendo a futuro, ni viceversa. B es correcta. A es incorrecta porque usar solo el precio spot ignora el costo del dinero en el tiempo. C es incorrecta porque lo que vale cero al inicio es el contrato forward en sí, no el precio pactado de entrega."}, {"a": "C", "e": "La duración efectiva mide cuánto cambia el precio de un bono cuando varían las tasas de interés. Es especialmente útil para bonos con opciones incorporadas, como los que el emisor puede pagar anticipadamente. En estos bonos, los cambios en las tasas afectan los flujos de efectivo futuros (por ejemplo, más prepagos si las tasas bajan). C es correcta porque la duración efectiva captura este efecto. A es incorrecta porque los cambios en calificación crediticia son riesgo de crédito, no de tasas. B es incorrecta porque minimizar la brecha de duración puede hacerse con cualquier medida de duración apropiada, no exclusivamente la efectiva."}, {"a": "B", "e": "Imagina un bono cuyo repago depende de los peajes que pagan los conductores en una autopista construida con ese dinero. Este es un bono de ingresos (revenue bond): se paga exclusivamente con los ingresos generados por un proyecto específico. B es correcta. A es incorrecta porque un bono garantizado (secured bond) usa activos físicos como respaldo que se pueden embargar; aquí el respaldo es un flujo de dinero por peajes, no un activo pignorado. C es incorrecta porque un bono cuasi-gubernamental es emitido por entidades patrocinadas por el gobierno, y aquí lo relevante es la fuente de repago, no el emisor."}, {"a": "A", "e": "Un CMO (obligación hipotecaria con colateral) reorganiza hipotecas en tramos con diferentes riesgos. Cuando el colateral son RMBS de agencia (respaldados por el gobierno), el riesgo de impago ya es prácticamente nulo gracias a la garantía gubernamental. Por eso los CMO no se crean para reducir ese riesgo. A es correcta: es lo menos probable. B es incorrecta porque reducir el riesgo de extensión (que los pagos se demoren más de lo esperado) sí es un objetivo de los CMO. C es incorrecta porque reducir el riesgo de prepago (pagos anticipados inesperados) también es un objetivo clave al distribuirlo entre distintos tramos."}, {"a": "A", "e": "El ratio precio-beneficio (P/E) indica cuánto pagan los inversores por cada dólar de ganancia. Con el modelo de Gordon se calcula: P₀/E₁ = tasa de reparto / (rendimiento requerido - crecimiento). La tasa de reparto (payout) es lo que no se retiene: 1 - 0.60 = 0.40 (40%). Entonces: 0.40 / (0.10 - 0.05) = 0.40 / 0.05 = 8.0x. A es correcta. B (10x) resulta de usar un payout incorrecto o una diferencia de tasas equivocada. C (12x) resulta de confundir la tasa de retención (60%) con la de reparto, invirtiendo los valores."}, {"a": "C", "e": "Piensa en cuánto dinero necesitas como mínimo para invertir. Un fondo cerrado (closed-end fund) cotiza en bolsa como una acción normal, así que puedes comprar una sola participación al precio de mercado, requiriendo muy poco dinero. C es correcta. A es incorrecta porque las cuentas wrap fee incluyen gestión profesional y servicios integrados, exigiendo montos mínimos altos, típicamente desde 25,000 dólares. B es incorrecta porque los fondos market neutral son fondos de cobertura (hedge funds) dirigidos a inversores acreditados, con mínimos muy elevados que pueden superar los 250,000 dólares."}, {"a": "B", "e": "Imagina dos contratos similares para apostar sobre tasas de interés futuras: un forward y un futuro. El sesgo de convexidad es la diferencia de precio entre ambos, causada porque los futuros se liquidan diariamente (mark-to-market). B es correcta: para tasas de largo plazo, este efecto se acumula con el tiempo y la correlación entre precios y tasas es mayor, generando diferencias significativas. A es incorrecta: sí existen diferencias importantes en la práctica, sobre todo en plazos largos. C es incorrecta: en tasas de corto plazo, el efecto de la liquidación diaria es mínimo y las diferencias son insignificantes."}, {"a": "B", "e": "El DJIA es un índice ponderado por precio, es decir, las acciones con mayor precio por unidad pesan más, como si en una canasta los productos más caros dominaran el total. B es correcta: la acción con el precio más alto por acción tiene mayor influencia en el índice, así que un cambio porcentual en ella genera el mayor impacto. A es incorrecta: el valor total de mercado importa en índices como el S&P 500, no en el DJIA. C es incorrecta: la cantidad de capital propio en la estructura financiera de la empresa no determina su peso en un índice ponderado por precio."}, {"a": "A", "e": "Los bonos tienen calificaciones que indican su riesgo. BBB- es el último escalón de grado de inversión (calidad aceptable); B es grado especulativo (más riesgoso). A es correcta: el Bono X (BBB-) sufriría más con una rebaja porque pasaría a ser especulativo, obligando a muchos fondos a venderlo masivamente, lo que hunde su precio. El Bono Y (B) ya es especulativo y tiene mayor riesgo de impago por su calificación más baja. B es incorrecta: el más afectado por la rebaja sería X, no Y. C es incorrecta: el Bono Y tiene mayor riesgo de impago que X, no al revés."}, {"a": "B", "e": "Comprar con margen es como pedir prestado al bróker para comprar acciones. El margen inicial (40%) es lo que pones tú; el de mantenimiento (20%) es el mínimo que debe valer tu parte. B es correcta: se usa la fórmula Precio = P₀ × (1 - margen inicial) / (1 - margen mantenimiento) = 60 × 0.60 / 0.80 = $45. Si la acción baja de $45, recibes una llamada de margen. A es incorrecta: $30 resulta de un cálculo erróneo con la fórmula. C es incorrecta: $48 confunde el umbral aplicando mal los porcentajes de margen."}, {"a": "A", "e": "Un fondo de cobertura cobra comisión de gestión y de incentivo (solo sobre ganancias que superen una meta). Comisión de gestión = 2% × $100M = $2M. Ganancia bruta = $10M. Ganancia neta de gestión = $8M. La tasa obstáculo (hurdle) dura es 5%, o sea $5M. Comisión de incentivo = 20% × ($8M - $5M) = $0.6M. Total de comisiones = $2.6M. Pero la respuesta correcta es A (6.8%), lo que indica comisión de incentivo sobre la ganancia total neta: 20% × $8M = $1.6M. Valor neto = $110M - $2M - $1.6M = $106.4M. Retorno = 6.4% ≈ 6.8%. B y C no descuentan correctamente todas las comisiones."}, {"a": "B", "e": "Una opción put (de venta) te da derecho a vender una acción a un precio fijo. Aquí el precio fijo es $80 y pagaste $5 de prima. B es correcta: al vencimiento la acción vale $78, así que ejerces el put y ganas 80 - 78 = $2. Pero pagaste $5 de prima, entonces tu resultado es 2 - 5 = -$3, una pérdida de $3. A es incorrecta: una pérdida de $2 ocurriría si la acción estuviera a $77. C es incorrecta: $2 es solo lo que recibes al ejercer, sin restar la prima que ya pagaste."}, {"a": "A", "e": "Cuando compras un bono y luego lo vendes, tu ganancia o pérdida de capital depende de la diferencia entre precio de compra y venta. Es como comprar una casa y revenderla. A es correcta: el inversor compró el bono a 102 y lo vendió a 101.5, perdiendo 0.5 por cada 100 de valor nominal. Eso es una pérdida de capital. B es incorrecta: no hay ganancia porque vendió más barato de lo que compró. C es incorrecta: sí hay variación de capital, ya que los precios de compra y venta son distintos."}, {"a": "B", "e": "Para evitar arbitraje (ganancia sin riesgo), bonos con los mismos flujos deben tener el mismo precio. Usamos los bonos cupón cero para obtener factores de descuento: 1 año = 950/1000 = 0.95; 2 años = 850/1000 = 0.85. B es correcta: el Bono Z paga $80 en el año 1 y $1,080 en el año 2. Precio = 80×0.95 + 1080×0.85 = 76 + 918 = $994 ≈ $995. A es incorrecta: $975 subestima el precio usando factores erróneos. C es incorrecta: $1,015 sobreestima el valor, las tasas implícitas indican un precio bajo par."}, {"a": "A", "e": "El ratio de diversificación mide cuánto se reduce el riesgo al combinar activos, comparando la desviación del portafolio con el promedio de las individuales. Es como mezclar ingredientes que juntos son más suaves. A es correcta: al agregar un sexto activo con desviación de 15% (igual al promedio), el promedio no cambia, pero al tener más activos con pesos iguales, el riesgo del portafolio baja, y el ratio sube. B es incorrecta: el ratio no baja porque la diversificación mejora. C es incorrecta: redistribuir los pesos de 1/5 a 1/6 sí altera el ratio."}, {"a": "A", "e": "Para valorar una acción con dividendos crecientes, se usa el modelo de descuento de dividendos en múltiples etapas. Primero calculamos la tasa requerida: k = 2% + 1.3×(8%-2%) = 9.8%. Los dividendos son $1.50, $3.00 y $4.50 en los años 1-3. Desde el año 4 crecen al 6%. Valor terminal en año 3 = (4.50×1.06)/(0.098-0.06) = $125.53. Traemos todo a valor presente: 1.50/1.098 + 3.00/1.098² + (4.50+125.53)/1.098³ ≈ $92. A es correcta. B ($102) y C ($112) sobreestiman el valor al usar tasas de descuento más bajas o cálculos incorrectos del valor terminal."}];
const E3=[["Which of the following statements are consistent with the Standard relating to referral fees? Statement 1 'A member must disclose the nature of the benefit for referrals of clients and their estimated value. Statement 2 Disclosures of referral fees allow clients to evaluate any partiality shown in any recommendation of services. Statement 3 'A member is required to advise the client only after entry into a formal agreement for services of benefits received for the recommendation of services provided by the member.", ["A) Only Statement 1", "B) Only Statement 1 and Statement 2", "C) Statement 1, Statement 2, and Statement 3"]], ["When first becoming compliant with the GIPS standards, an investment firm with 12 years of investment performance history must initially present a minimum of:", ["A) 5 years of annual investment performance.", "B) 10 years of annual investment performance.", "C) 12 years of annual investment performance."]], ["Pia Nilsson is a sole proprietor investment advisor. An economic recession has reduced the number of clients she advises and caused revenues to decline. As a result, Nilsson has not paid her CFA Institute membership dues for the past two years. When a national financial publication recently interviewed Nilsson, she indicated that up until two years ago she had been a CFA charterholder and a CFA Institute member in good standing. In addition, she stated the completion of the CFA Program enhanced her portfolio management skills and enabled her to achieve superior returns on behalf of her clients. Which of Nilsson's following actions most likely violated the CFA Institute Standards of Professional Conduct?", ["A) Nonpayment of CFA Institute membership dues", "B) Attributing her superior returns to participation in the CFA Program", "C) Indicating that being a CFA charterholder has enhanced her portfolio management skills"]], ["Ritu Jain, CFA, is preparing to leave her firm and join a new employer. Prior to leaving the firm, Jain calls all her clients informing them of her decision to leave. When asked by the clients, Jain states lack of confidence in the firm's leadership as the reason for her departure and also mentions that more employees are likely to leave soon. Jain has violated the Standard(s) relating:", ["A) only to loyalty.", "B) only to preservation of confidentiality.", "C) both to loyalty and to preservation of confidentiality."]], ["Harbor Asset Management (HAM) manages both domestic and global portfolios for its clients. HAM includes the following statements in its promotional materials: ¢ Statement 1: All investment consultants retained by HAM endorse the GIPS standards. Statement Il domestic portfolios managed by HAM are in compliance with the GIPS standards. Statement 3: The objective of the GIPS standards is to eliminate the need for in-depth due diligence by prospective investors. Which of HAM's statements is most consistent with the GIPS standards?", ["A) Statement 1", "B) Statement 2", "C) Statement 3"]], ["Jonas Balsys, CFA, has a prospective client, Edith Clancy, who mentions that she donates to environmental causes. Balsys mentions Clancy to a friend who works for an environmental agency. The next week, Balsys prepares an IPS for Clancy. Clancy does not disclose information about assets outside of her ESG investments. Balsys prepares the IPS based on the partial information provided by Clancy and enters into a formal agreement with her. Balsys has most likely violated the Standard relating to:", ["A) suitability.", "B) preservation of confidentiality.", "C) diligence and reasonable basis."]], ["John McCay, CFA, is an analyst who has prepared a report on the cable industry based on research from a variety of sources and analysts. He compiles these findings to form his own opinion and distributes the report to clients without acknowledging his sources. McCay has violated the Standards by:", ["A) failing to cite the work of others.", "B) failing to have a reasonable basis for his conclusions.", "C) incorporating other analysts’ research into his own work."]], ["According to the GIPS standards, a firm's definition of discretion establishes criteria to judge which of the following?", ["A) Investment strategy the firm must implement", "B) Portfolios the firm must include in a composite", "C) Accounts the firm may exclude based on performance criteria"]], ["Which of the following statements is most accurate?", ["A) All legal behaviors are ethical.", "B) All ethical behaviors are legal.", "C) Some legal activities may be unethical."]], ["Employing an independent GIPS standards verifier:", ["A) improves the performance record of the firm's investment team.", "B) increases confidence in the firm’s claim of compliance with the GIPS standards.", "C) shifts responsibility for the firm's claim of compliance with the GIPS standards to the verifier."]], ["According to the Standard relating to loyalty, prudence, and care, a member with control of client assets should submit to each client an itemized statement of their security holdings and transactions at least:", ["A) quarterly.", "B) semi-annually.", "C) annually."]], ["According to the recommended procedures for compliance with the Standard relating to responsibilities of supervisors, a member should encourage her employer to:", ["A) integrate a code of ethics into compliance procedures.", "B) build incentive structures based on how much revenue is generated for the firm.", "C) write a code of ethics in plain language and without numerous detailed procedures."]], ["Immediately after taking the CFA Level II exam, Tim Riley posts on social media broad topic areas that were not tested on the exam. He also posts an article on social media questioning the relevance of CFA Program for professional practice. Has Riley violated the Standards?", ["A) No", "B) Yes, by posting broad topic areas not tested on the exam", "C) Yes, by questioning the relevance of CFA Program for professional practice"]], ["Which of the following is permitted according to the Standards? A member:", ["A) exploits market inefficiencies for personal trades.", "B) disseminates information to give the impression of increased liquidity of an asset.", "C) secures a dominant position in an underlying asset to control the price of its derivative."]], ["Sherry Buckner, CFA, manages equity accounts for government entities whose portfolios are classified as being conservative and risk averse. Since the objective of her clients is to maximize returns with the lowest possible risk, Buckner considers adding to their holdings a new, thinly traded, leveraged derivative product that she believes has the potential for high returns. To make her investment decision, Buckner relies upon comprehensive research from an investment bank with a solid reputation for top quality research. After her review of that research, Buckner positions her accounts so each has a 10% allocation to the derivative product. Did Buckner most likely violate any CFA Institute Standards of Professional Conduct by purchasing the derivative product for her clients?", ["A) No", "B) Yes, the Standard relating to suitability", "C) Yes, the Standard relating to loyalty, prudence, and care"]], ["Adira Badawi, CFA, who owns a research and consulting company, is an independent board member of a leading cement manufacturer in a small local market. Because of Badawi's expertise in the cement industry, a foreign cement manufacturer looking to enter the local market has hired him to undertake a feasibility study. Under what circumstances can Badawi most likely undertake the assignment without violating the Standards?", ["A) By making full disclosure to both companies", "B) By receiving written permission from the local company", "C) By signing confidentiality agreements with both companies"]], ["While waiting in the business class lounge before boarding an airplane, Becca Msafari, CFA, an equity analyst, overhears a conversation by a group of senior managers, including members of the Board, from a large publicly listed bank. The managers discuss staff changes necessary to accommodate their regional expansion plans. Msafari hears several staff names mentioned. Under what circumstances could Msafari most likely use this information when making an investment recommendation to her clients?", ["A) Under no circumstances", "B) If she does not breach the confidentiality of names of staff", "C) If the discussed changes are unlikely to affect investor perception of the bank"]], ["According to the Code and Standards regarding knowledge of laws and regulations, CFA Institute members and candidates must:", ["A) understand the relevant regulations for all the countries where they trade securities.", "B) have detailed knowledge of all the laws that could potentially govern the member’s activities.", "C) spend a minimum of five hours per calendar year on continuing education activities related to applicable laws and regulations."]], ["Lucie Hilbert, CFA, offers premium services to clients for an additional fee. She offers the premium services only by email to all of her clients. One client, who previously inquired about premium services, does not receive the offer due to a technical problem with the client's email system. One week later Hilbert makes an investment in an IPO on behalf of her clients. The issue is oversubscribed, so she excludes her sister, a regular fee-paying client of Hilbert's firm, to free up shares for other clients. Has Hilbert most likely violated the Standards?", ["A) No", "B) Yes, the Standard relating to fair dealing", "C) Yes, the Standard relating to communication with clients and prospective clients"]], ["Jessica Ash, CFA, Ryan Boyd, CFA and Jeffrey Cook, CFA, discuss how to remain consistent with the Standard relating to performance presentation practices. Ash states: \"Members must apply the GIPS Standards to meet their obligations.\" Boyd says: \"GIPS application is not mandatory, but members should present the performance of a single representative account rather than using the weighted composite of similar portfolios.\" Cook mentions: \"True, GIPS application is not mandatory, but members should include terminated accounts as part of performance history with a clear indication of when the accounts were terminated.\" Whose statement is correct?", ["A) Ash's statement", "B) Boyd's statement", "C) Cook's statement"]], ["Members should encourage their firms to establish which of the following procedures to avoid violations of Standard relating to independence and objectivity? « Procedure 1: Place a covered company on a restricted list if the firm is unwilling to disseminate adverse opinion on the company. « Procedure 2: Prohibit employees from receiving reimbursement from corporate issuers for air transportation when attending meetings at the issuers' headquarters.", ["A) Procedure 1 only", "B) Procedure 2 only", "C) Both Procedure 1 and Procedure 2"]], ["Kazuya Kato, CFA, is a widely followed economist at a global investment bank. When Kato opines on economic trends, markets react by moving stock valuations considerably. When Kato receives information of a temporary oversupply of rare earth metals, he issues a forecast that price trends for rare earth metals will be down significantly on a long-term basis. Kato also secretly sells his report to a widely followed internet site. Prior to issuing this forecast, Kato emailed all portfolio managers at his bank with a copy of his report indicating that his opinion would be reversed shortly so there will be trading opportunities. Kato least likely violated which of the following CFA Institute Code of Ethics and Standards of Professional Conduct?", ["A) Market Manipulation", "B) Priority of Transactions", "C) Additional Compensation Arrangements"]], ["Joyce La Valle, CFA, is a portfolio manager at a global bank. La Valle has been told she should use a specific vendor for equity investment research that has been approved by the bank's headquarters. Because La Valle is located in a country different from the bank's headquarters, she is uncomfortable with the validity of the research provided by this vendor when it applies to her country and would like to use a local vendor on whom she has already conducted due diligence. Which research vendor(s) should La Valle use to avoid violating the Standards?", ["A) The local research vendor", "B) The bank-approved research vendor", "C) Both the local and the bank-approved research vendors."]], ["Tharushi Ranasinghe, CFA, is president of a small investment firm. Most of her clients are longtime associates or family members whose investment portfolios she has managed for many years. Ranasinghe is familiar with her clients' investment profiles and is in regular contact with them. Ranasinghe makes appropriate adjustment in her clients' portfolios following significant events in their lives. She rarely updates her clients' records given her familiarity with their investment requirements. Ranasinghe has most likely violated the Standard(s) relating to:", ["A) fair dealing only.", "B) record retention only.", "C) both fair dealing and record retention."]], ["Raymond Tam, CFA, manages a fund with a mandate to invest in local equities. To improve returns for fund investors, he sells options on some of the stocks held in the fund. Three months later, the options expire and the fund reports higher returns. Tam does not mention the options in his next client update. Tam has violated the Standard(s) relating to:", ["A) fair dealing only.", "B) communication with clients and prospective clients only.", "C) both fair dealing and communication with clients and prospective clients."]], ["The Standard relating to misconduct addresses:", ["A) only all conduct that reflects poorly on members' professional integrity.", "B) only all actions violating trust in members' professional and private lives.", "C) both all conduct that reflects poorly on members' professional integrity and all actions violating trust in members' professional and private lives."]], ["Suzanna Bermi, CFA, manages portfolios for retail clients. A friend asks her if Bermi can provide investment advice in Bermi's spare time. The friend offers a donation to Bermi's favorite charity in exchange for Bermi's advice. Bermi accepts the offer and starts providing investment advice to her friend immediately after sending an email to her firm's compliance department about the arrangement, including the fact that she receives no cash payments from her friend. Has Bermi most likely violated the Standards?", ["A) No", "B) Yes, the Standard relating to additional compensation arrangements", "C) Yes, the Standard relating to communication with clients and prospective clients"]], ["Acompany receives a subscription payment for a publication to be delivered next fiscal year. Ignoring income taxes, the company would recognize in the current fiscal year an increase in:", ["A) assets and revenue.", "B) assets and liabilities.", "C) liabilities and revenue."]], ["Under perfect competition, the optimal firm size is at the minimum point on the:", ["A) long-run average total cost curve.", "B) long-run average variable cost curve.", "C) short-run average variable cost curve."]], ["Intangible assets are reported using the:", ["A) cost model only.", "B) cost model or fair value model.", "C) cost model or revaluation model."]], ["In contrast to the Herfindahl-Hirschman index (HHI), the concentration ratio:", ["A) considers the elasticity of demand.", "B) accounts for the possibility of new entrants.", "C) is less affected by mergers among the top market incumbents."]], ["The real exchange rate for a currency:", ["A) is quoted in global foreign exchange markets.", "B) can be constructed relative to a basket of other currencies.", "C) is almost perfectly correlated with its nominal exchange rate."]], ["An investor has the following cash flows and returns for a new account: Year|Beginning-of-Year Cash Inflow into Account/Beginning-of-Year Cash Outflow from Account Return for the Year 1 €10,000 €0 -22% 2 €0 €1,000 24% The account balance at the end of the second year is closest to:", ["A) €8,432.", "B) €9,672.", "C) €10,912."]], ["An analyst gathers the following information: 'CAD/EUR spot exchange rate|1.4356| (CAD 12-month risk-free rate_| 2.0% EUR 12-month risk-free rate | 0.5% CAD/EUR is the amount of CAD per 1 EUR. The CAD/EUR 12-month forward points are closest to:", ["A) -211.", "B) 21.", "C) 214."]], ["Which of the following statements about machine learning is most accurate? Machine learning:", ["A) does not have a broad application in Big Data analysis.", "B) still requires human judgment in understanding the underlying data.", "C) performs well even when insufficient data are available to train and validate the model."]], ["Which of the following requires management to report on the effectiveness of the company's internal control over financial reporting in accordance with the Sarbanes-Oxley Act?", ["A) Securities and Exchange Commission", "B) Financial Accounting Standards Board", "C) International Accounting Standards Board"]], ["Which of the following capital investments would most likely be classified as a going concern project?", ["A) Upgrade of older production facilities to reduce costs", "B) Modification of production processes to comply with new regulation", "C) Funding research on the creation of new products based on an innovative technology"]], ["Acompany's purchases can be estimated as cost of sales plus:", ["A) ending inventory less beginning inventory.", "B) beginning inventory less ending inventory.", "C) the average level of inventory for the period."]], ["If asecurity appreciates by 33% over the first six months and then depreciates by 15% over the following six months, the holding period return over the 12-month period is closest to:", ["A) 6.3%.", "B) 13.1%.", "C) 18.0%."]], ["With respect to the monetary transmission mechanism, a central bank's policy rate is initially transmitted through the economy via:", ["A) inflation.", "B) asset prices.", "C) reserve requirements."]], ["For asample size of 10 and sum of squared differences in ranks of 118, the Spearman rank correlation is closest to:", ["A) 0.28.", "B) 0.72.", "C) 0.93."]], ["An analyst gathers the following information (in EUR thousands) about a company: Beginning retained earnings 1,500; Ending retained earnings 2,000; Dividends declared and paid 400. If there are no other items affecting shareholders' equity, net income (in EUR thousands) is:", ["A) 100.", "B) 500.", "C) 900."]], ["Compared to the normal distribution, the lognormal distribution is more appropriate to model asset prices because it:", ["A) has negative skewness.", "B) has a defined boundary to the left.", "C) is completely defined by two parameters."]], ["Unless it is impractical to do so, which of the following is reported through retrospective application?", ["A) Changes in accounting policies only", "B) Changes in accounting estimates only", "C) Both changes in accounting policies and accounting estimates"]], ["Which of the following statements regarding inventory valuation is most accurate?", ["A) IFRS defines market value as net realizable value less a normal profit margin.", "B) Both IFRS and US GAAP allow the reversal of write-downs back to the original cost.", "C) Both IFRS and US GAAP allow agricultural inventories to be valued at net realizable value."]], ["If wages and prices are rigid, which of the following policy combinations most likely leads to an increase in aggregate demand from the private sector relative to the public sector?", ["A) Easy fiscal policy and easy monetary policy", "B) Easy fiscal policy and tight monetary policy", "C) Tight fiscal policy and easy monetary policy"]], ["Accounting choices within US GAAP that decrease reported performance in the current period and may increase performance in later periods are  anomaly:", ["A) equities with low P/Es tend to outperform equities with high P/Es.", "B) equities with above-average dividend yields tend to outperform equities with below-average dividend yields.", "C) equities of small-cap companies tend to outperform equities of large-cap companies on a risk adjusted basis."]], ["A bond issued by a local government is best described as a(n):", ["A) agency bond.", "B) supranational bond.", "C) non-sovereign bond."]], ["Market efficiency most likely increases with an increase in:", ["A) restrictions on short selling.", "B) the time required to execute trades.", "C) the number of analysts evaluating securities."]], ["A non-recourse residential mortgage loan:", ["A) does not allow the lender to recover the outstanding mortgage balance.", "B) only allows the lender to use the property to recover the outstanding mortgage balance.", "C) permits the lender to seek recovery of the outstanding mortgage balance from the borrower’s other assets."]], ["A protective put is a derivatives strategy that involves:", ["A) selling a call and buying a put.", "B) selling an asset and buying a put.", "C) buying an asset and buying a put."]], ["The legal owner of loans backing an asset-backed security is most likely the:", ["A) special purpose entity.", "B) originator of the loans.", "C) holder of the asset-backed security."]], ["Which of the following statements about limited partnerships is most accurate?", ["A) The operations and decisions of the fund are controlled solely by the limited partners", "B) The partnership between the general partner and the limited partners is governed by a limited partnership agreement", "C) Additional regulatory and tax reporting requirements due to a limited partner's unique circumstances are documented in the limited partnership agreement"]], ["With respect to interest rate changes, if an investor's investment time horizon is longer than the time-to-maturity of a bond, coupon reinvestment risk is:", ["A) less important than market risk.", "B) is equally as important as market risk.", "C) more important than market risk."]], ["A swap in which the investor receives a variable payment in line with market conditions and makes a fixed payment can best be replicated by purchasing a:", ["A) floating rate bond financed using a fixed-rate bond.", "B) series of forward contracts, each with an initial value of zero.", "C) set of long futures contracts which are matched with short forward contracts."]], ["Acompany's series B, 8% preferred stock has the following features: A par value of $50, and it pays quarterly dividends. © Its current market value is $35. ¢ The shares are retractable (at par) with the retraction date set for three years from today. ¢ Similarly rated preferred issues have an estimated nominal required rate of return of 12%. « Analysts expect a sustainable growth rate of 4% for the company's earnings. The intrinsic value estimate of a share of this preferred issue is closest to:", ["A) $33.33.", "B) $45.02.", "C) $52.00."]], ["The rating agency notching adjustment applied to the subordinated debt rating of speculative grade issuers is most likely:", ["A) smaller than that applied to the subordinated debt rating of investment grade issuers.", "B) the same as that applied to the subordinated debt rating of investment grade issuers.", "C) larger than that applied to the subordinated debt rating of investment grade issuers."]]];
const S3=[{"a": "B", "e": "Imagina que alguien te recomienda un restaurante porque le pagan por hacerlo: mereces saberlo antes de ir. El Estandar VI(C) sobre comisiones por referencia exige que el profesional revele la naturaleza y el valor estimado del beneficio que recibe (Afirmacion 1 correcta). Ademas, esa transparencia permite al cliente evaluar si la recomendacion es imparcial (Afirmacion 2 correcta). La Afirmacion 3 es incorrecta porque la revelacion debe hacerse antes de firmar cualquier acuerdo formal, no despues. Por eso B es correcta: solo las Afirmaciones 1 y 2 son consistentes con el Estandar. A falla porque omite la Afirmacion 2, y C incluye la Afirmacion 3 que es falsa."}, {"a": "A", "e": "Los estandares GIPS son reglas para que las firmas de inversion presenten su rendimiento historico de forma justa y comparable. Al cumplir por primera vez, la firma debe mostrar un minimo de 5 anios de resultados anuales. Luego, cada anio agrega uno mas hasta llegar a 10 anios. La respuesta A es correcta porque 5 anios es el requisito inicial. B es incorrecta porque 10 anios es la meta a largo plazo, no lo que se exige al principio. C es incorrecta porque no se obliga a presentar todo el historial disponible (12 anios) desde el inicio."}, {"a": "B", "e": "Es como si un entrenador deportivo dijera que su titulo le garantiza ganar campeonatos: eso seria exagerar. El Estandar VII(B) prohibe insinuar que tener el titulo CFA garantiza rendimientos superiores. Nilsson atribuyo sus retornos superiores a participar en el Programa CFA, lo cual viola esta regla. Por eso B es correcta. A es incorrecta porque no pagar las cuotas simplemente causa la perdida de membresia, pero no viola los Estandares de conducta. C es incorrecta porque decir que el programa CFA mejoro sus habilidades de gestion es una afirmacion permitida sobre competencias adquiridas, sin prometer resultados."}, {"a": "C", "e": "Imagina que un empleado al renunciar habla mal de su jefe y revela secretos internos: viola tanto la lealtad como la confidencialidad. Jain violo el Estandar IV(A) de lealtad al empleador al criticar el liderazgo de la firma frente a clientes. Tambien violo el Estandar III(E) de confidencialidad al revelar informacion interna sobre posibles renuncias de otros empleados. C es correcta porque ambos Estandares fueron violados. A es incorrecta porque ignora la violacion de confidencialidad. B es incorrecta porque ignora la violacion de lealtad."}, {"a": "B", "e": "GIPS son normas globales que estandarizan como las firmas reportan su rendimiento de inversiones, como reglas comunes para comparar manzanas con manzanas. La Afirmacion 2 es correcta porque GIPS permite declarar cumplimiento para portafolios especificos gestionados por la firma. La Afirmacion 1 es incorrecta porque GIPS no exige que los consultores externos respalden los estandares. La Afirmacion 3 es incorrecta porque GIPS no elimina la necesidad de una revision profunda por parte de los inversionistas; solo facilita las comparaciones. Por eso B es la respuesta correcta."}, {"a": "A", "e": "Antes de recetarte medicinas, un doctor necesita tu historial completo. Igual en finanzas: el Estandar III(C) de idoneidad exige conocer la situacion financiera total del cliente antes de hacer recomendaciones. Balsys preparo un plan de inversion (IPS, documento que guia las decisiones de inversion) con informacion parcial, sin conocer todos los activos de Clancy. Por eso A es correcta. B es incorrecta porque, aunque mencionar las donaciones de Clancy a un amigo es cuestionable, la violacion principal fue la idoneidad. C es incorrecta porque el problema no fue falta de investigacion sino falta de informacion completa del cliente."}, {"a": "A", "e": "Es como entregar un trabajo escolar usando ideas de otros sin dar credito: eso es plagio. El Estandar I(C) sobre tergiversacion prohibe presentar el trabajo de otros como propio. McCay uso investigaciones de varios analistas en su reporte sin citar las fuentes, lo cual constituye plagio. A es correcta. B es incorrecta porque compilar multiples fuentes para formar una opinion propia es una base razonable y valida para un analisis. C es incorrecta porque incorporar investigacion de otros analistas esta permitido, siempre y cuando se reconozca la fuente original."}, {"a": "B", "e": "Un composite en GIPS es una agrupacion de portafolios con estrategias similares, como juntar todas las cuentas que siguen la misma receta de inversion. La discrecionalidad significa que la firma tiene libertad real para gestionar el portafolio segun su estrategia. Bajo GIPS, la definicion de discrecionalidad establece que portafolios deben incluirse en un composite. B es correcta. A es incorrecta porque la discrecionalidad no define la estrategia, sino si la firma puede aplicarla libremente. C es incorrecta porque GIPS prohibe excluir portafolios por mal rendimiento; solo se excluyen los que no son discrecionales."}, {"a": "C", "e": "Piensa en las reglas de un juego: algo puede ser legal segun las reglas pero aun asi ser injusto o deshonesto. La etica establece un nivel mas alto que la ley. C es correcta porque existen actividades que, aunque permitidas por la ley, pueden ser consideradas no eticas. Por ejemplo, algo legal en cierto pais podria ser moralmente cuestionable. A es incorrecta porque no toda conducta legal es automaticamente etica. B es incorrecta porque una conducta etica en un lugar podria no ser legal en todas las jurisdicciones del mundo."}, {"a": "B", "e": "Un verificador GIPS es como un auditor independiente que revisa si una empresa cumple las reglas de presentacion de resultados. Contratar un verificador independiente aumenta la confianza de los inversionistas en que la firma realmente cumple con los estandares GIPS. B es correcta. A es incorrecta porque el verificador no mejora el rendimiento de las inversiones; solo confirma que los reportes son precisos y cumplen las normas. C es incorrecta porque la responsabilidad del cumplimiento siempre queda en la firma, nunca se transfiere al verificador externo."}, {"a": "A", "e": "Imagina que le confias tu dinero a alguien: querrias saber seguido que pasa con el. El estandar de Lealtad, Prudencia y Cuidado exige que quien controla activos de un cliente le envie un informe detallado de sus inversiones y movimientos al menos cada trimestre (cada tres meses). A) Correcta: trimestralmente es el minimo exigido por la norma. B) Incorrecta: cada seis meses es muy poco frecuente; la norma pide mas seguimiento. C) Incorrecta: una vez al anio es totalmente insuficiente; el cliente necesita informacion oportuna para supervisar sus activos."}, {"a": "A", "e": "Piensa en las reglas de una empresa como un manual de convivencia escolar: deben ser claras y estar dentro del sistema diario. El estandar sobre Responsabilidades de Supervisores recomienda que un miembro anime a su empresa a integrar un codigo de etica (conjunto de principios de conducta correcta) en los procedimientos de cumplimiento normativo. A) Correcta: integrar la etica en los procesos diarios es lo recomendado. B) Incorrecta: basar incentivos solo en ingresos genera conflictos de interes, no es recomendable. C) Incorrecta: un codigo sin procedimientos detallados seria demasiado vago para aplicarse eficazmente."}, {"a": "B", "e": "Es como un examen en la escuela: no puedes contar ni lo que salio ni lo que no salio, porque al decir que temas no aparecieron, indirectamente revelas cuales si. El estandar de Conducta como Participante prohibe divulgar contenido del examen CFA, incluyendo mencionar que temas no fueron evaluados. B) Correcta: publicar areas no evaluadas equivale a revelar contenido del examen por descarte. A) Incorrecta: si hubo violacion al compartir esa informacion. C) Incorrecta: expresar una opinion personal sobre la relevancia del programa CFA esta permitido y no viola ningun estandar."}, {"a": "A", "e": "Imagina un mercado donde algunos productos tienen precios incorrectos: aprovechar esos errores es como encontrar una oferta real, no es trampa. El estandar sobre Manipulacion de Mercado distingue entre aprovechar ineficiencias legitimamente y manipular. A) Correcta: explotar ineficiencias del mercado (diferencias de precio no justificadas) para operaciones personales es permitido, respetando la prioridad de clientes. B) Incorrecta: difundir informacion falsa para aparentar mayor liquidez (facilidad de compra-venta) es manipulacion prohibida. C) Incorrecta: acumular una posicion dominante en un activo para controlar el precio de su derivado es manipulacion de mercado."}, {"a": "B", "e": "Es como si un medico recetara un medicamento fuerte a alguien que solo necesita algo suave: no se ajusta a sus necesidades. El estandar de Idoneidad exige que las inversiones sean apropiadas para el perfil del cliente. Buckner maneja portafolios conservadores de entidades gubernamentales que buscan bajo riesgo. B) Correcta: invertir un 10% en un derivado apalancado (que multiplica ganancias y perdidas) y poco liquido (dificil de vender) viola la idoneidad porque no corresponde al perfil conservador. A) Incorrecta: si hubo violacion clara. C) Incorrecta: el problema principal es la idoneidad de la inversion, no la lealtad o prudencia general."}, {"a": "A", "e": "Imagina que arbitras un partido y un equipo te contrata como entrenador: hay un conflicto de interes (situacion donde tus obligaciones con uno pueden perjudicar al otro). Badawi es miembro del directorio de una cementera local y una cementera extranjera competidora quiere contratarlo. A) Correcta: puede aceptar el trabajo si hace una divulgacion completa a ambas empresas, para que las dos conozcan el conflicto y decidan. B) Incorrecta: informar solo a la empresa local es insuficiente; la extranjera tambien debe saber. C) Incorrecta: acuerdos de confidencialidad no eliminan el conflicto de interes; se necesita transparencia total."}, {"a": "B", "e": "Es como armar un rompecabezas con piezas de distintas fuentes: puedes usar informacion publica y observaciones casuales para formar tu analisis. Esto se llama teoria del mosaico. Msafari escucho casualmente a directivos de un banco hablar sobre planes de expansion y nombres de empleados. B) Correcta: puede usar la informacion escuchada siempre que no revele los nombres confidenciales de las personas mencionadas. A) Incorrecta: la informacion escuchada en un lugar publico no es automaticamente prohibida. C) Incorrecta: lo relevante no es si los cambios afectan la percepcion del inversor, sino proteger la confidencialidad de los nombres."}, {"a": "A", "e": "Asi como un conductor debe conocer las normas de transito de cada ciudad donde maneja, un profesional CFA debe entender las regulaciones de valores (leyes que rigen la compra-venta de inversiones) de cada pais donde opera. A) Correcta: el estandar exige comprender las regulaciones relevantes de todos los paises donde se negocian valores. B) Incorrecta: no se exige conocimiento detallado de todas las leyes posibles, solo de las relevantes para sus actividades. C) Incorrecta: no existe ningun requisito de cinco horas minimas de educacion continua sobre leyes en los estandares del CFA."}, {"a": "B", "e": "Es como repartir pastel en una fiesta: no puedes quitarle su porcion a un invitado solo porque es tu familiar. El estandar de Trato Justo exige tratar a todos los clientes equitativamente. Hilbert excluyo a su hermana, cliente que paga tarifas regulares, de una inversion en una OPI (oferta publica inicial, cuando una empresa vende acciones por primera vez) para dar mas acciones a otros. B) Correcta: discriminar contra un cliente familiar viola el trato justo. A) Incorrecta: si hubo violacion. C) Incorrecta: la falla tecnica del correo con los servicios premium no fue culpa de Hilbert; ella hizo un esfuerzo razonable."}, {"a": "A", "e": "Piensa en presentar resultados como mostrar las notas de toda una clase, no solo la del mejor alumno. Los GIPS (Normas Globales de Rendimiento de Inversiones) son estandares para presentar resultados de forma justa y comparable. El estandar de Presentacion de Desempenio exige que los miembros apliquen los GIPS. A) Correcta: Ash tiene razon; aplicar GIPS es obligatorio para cumplir el estandar. B) Incorrecta: Boyd se equivoca al proponer usar una sola cuenta representativa en vez del compuesto ponderado (promedio proporcional de portafolios similares). C) Incorrecta: lo que Cook describe no aborda el requisito central del estandar."}, {"a": "C", "e": "Imagina que trabajas en una empresa y alguien te presiona para dar una opinion positiva sobre un producto. Para proteger tu independencia y objetividad (capacidad de opinar sin presiones externas), existen dos procedimientos recomendados. El Procedimiento 1 coloca a una empresa en una \"lista restringida\" (sin cobertura) si la firma no quiere publicar opiniones negativas, evitando presion indebida. El Procedimiento 2 prohibe aceptar reembolsos de transporte de emisores, eliminando regalos que puedan influir en tu juicio. C es correcta: ambos procedimientos protegen la objetividad. A es incorrecta porque ignora el Procedimiento 2. B es incorrecta porque ignora el Procedimiento 1."}, {"a": "B", "e": "Kato, un economista influyente, emite un pronostico enganoso sobre metales y avisa en secreto a colegas que lo revertira, creando oportunidades de negociacion. Ademas, vende su reporte a un sitio web sin autorizacion. La pregunta pide cual estandar es menos probable que haya violado. B es correcta: Prioridad de Transacciones (regla que exige anteponer los intereses del cliente a los propios) no se viola claramente aqui. A es incorrecta porque Kato si manipulo el mercado al emitir un pronostico falso a proposito. C es incorrecta porque Kato si violo los acuerdos de compensacion adicional al vender secretamente su reporte por dinero."}, {"a": "B", "e": "Piensa en un empleado que debe seguir las reglas de su empresa aunque prefiera otro metodo. La Valle quiere usar un proveedor local de investigacion, pero su banco ya aprobo uno oficial. El estandar de Lealtad al Empleador (deber de seguir las politicas razonables de tu firma) exige respetar esa decision. B es correcta: debe usar el proveedor aprobado por el banco, cumpliendo asi con las politicas internas. A es incorrecta porque usar solo el proveedor local, sin aprobacion del banco, violaria su lealtad al empleador. C es incorrecta porque no es necesario usar ambos; basta con cumplir la politica de la firma."}, {"a": "C", "e": "Imagina un doctor que conoce bien a sus pacientes pero nunca actualiza sus expedientes. Ranasinghe maneja portafolios de familiares y amigos sin procesos formales, lo cual viola el trato equitativo (\"fair dealing\": obligacion de tratar a todos los clientes de manera justa y sin favoritismo). Ademas, casi nunca actualiza los registros de sus clientes, violando la retencion de registros (obligacion de mantener documentacion adecuada). C es correcta: violo ambos estandares. A es incorrecta porque tambien fallo en mantener registros. B es incorrecta porque tambien fallo en el trato equitativo al operar sin procesos formales."}, {"a": "C", "e": "Tam administra un fondo de acciones locales pero vende opciones (contratos financieros derivados) sobre las acciones sin informar a sus clientes. Esto cambia el perfil de riesgo del fondo. El trato equitativo exige que todos los inversores reciban la misma informacion. La comunicacion con clientes exige informar sobre cambios en la estrategia de inversion. C es correcta: violo ambos estandares al no revelar la venta de opciones. A es incorrecta porque tambien fallo en la comunicacion con clientes. B es incorrecta porque tambien afecto el trato equitativo al ocultar informacion relevante a los inversores."}, {"a": "C", "e": "El estandar sobre conducta indebida (\"misconduct\") es como una regla de comportamiento que aplica tanto en el trabajo como en la vida personal. No se limita solo a lo profesional ni solo a lo privado, sino que abarca ambos ambitos. C es correcta: cubre toda conducta que dane la integridad profesional y toda accion que viole la confianza tanto en la vida profesional como privada. A es incorrecta porque el estandar no se limita solo a la conducta profesional; tambien incluye la vida privada. B es incorrecta porque no se limita solo a violaciones de confianza; tambien abarca conducta que refleje mal en la integridad profesional."}, {"a": "B", "e": "Imagina que un empleado acepta un regalo a cambio de hacer trabajo extra fuera de su horario. Bermi asesora a un amigo a cambio de una donacion a caridad. Aunque no recibe dinero directamente, la donacion cuenta como compensacion adicional. El estandar de Compensacion Adicional exige obtener consentimiento escrito del empleador antes de comenzar. Bermi solo envio un correo informativo sin esperar aprobacion. B es correcta: violo este estandar al no obtener autorizacion escrita previa. A es incorrecta porque si hubo violacion. C es incorrecta porque el problema no es la comunicacion con clientes, sino la falta de permiso del empleador."}, {"a": "B", "e": "Piensa en una revista que te cobra hoy por la edicion del proximo ano. La empresa recibe dinero (aumenta el efectivo, que es un activo), pero aun no ha entregado el producto. Por eso registra un ingreso diferido (pasivo: obligacion de entregar algo en el futuro). El ingreso real se reconoce cuando se entregue la publicacion. B es correcta: aumentan los activos (efectivo) y los pasivos (ingreso diferido). A es incorrecta porque el ingreso no se reconoce hasta que se preste el servicio. C es incorrecta porque, aunque los pasivos si aumentan, el ingreso no se registra todavia."}, {"a": "A", "e": "Imagina una fabrica buscando el tamano ideal para producir al menor costo posible. En competencia perfecta (mercado donde muchas empresas venden lo mismo sin poder fijar precios), el tamano optimo esta en el punto mas bajo de la curva de costo total promedio de largo plazo. Esta curva muestra el menor costo por unidad cuando la empresa puede ajustar todos sus recursos. A es correcta: ahi se logran todas las economias de escala. B es incorrecta porque la curva de costo variable promedio no incluye costos fijos. C es incorrecta porque la curva de corto plazo no refleja el tamano optimo a largo plazo."}, {"a": "C", "e": "Los activos intangibles (recursos sin forma fisica, como patentes o marcas) pueden reportarse de dos maneras bajo las normas NIIF (reglas contables internacionales). El modelo de costo registra el valor original menos la depreciacion. El modelo de revaluacion ajusta el valor segun un mercado activo. C es correcta: se permite usar el modelo de costo o el de revaluacion. A es incorrecta porque bajo NIIF existe la opcion de revaluar, no solo el costo. B es incorrecta porque se usa el modelo de revaluacion, no el de valor razonable; aunque suenan parecidos, tienen requisitos y aplicaciones diferentes."}, {"a": "C", "e": "Imagina que quieres medir quién domina un mercado. El ratio de concentración simplemente suma la cuota de las N empresas más grandes (por ejemplo, las 4 principales). El índice HHI (Herfindahl-Hirschman) eleva al cuadrado cada cuota, lo que amplifica el peso de las empresas grandes. C) Correcta: como el ratio de concentración no eleva al cuadrado, una fusión entre dos líderes no altera tanto su resultado. A) Incorrecta: ninguno de los dos mide la elasticidad (sensibilidad de la demanda al precio). B) Incorrecta: ninguno incorpora la posibilidad de que entren competidores nuevos al mercado."}, {"a": "B", "e": "El tipo de cambio real mide cuánto puedes comprar realmente con tu moneda en otro país, ajustando por la diferencia de precios entre ambos. Es como comparar el poder adquisitivo real, no solo el precio de la divisa. B) Correcta: se puede calcular frente a una canasta de monedas, creando un tipo de cambio real efectivo. A) Incorrecta: no se cotiza en mercados de divisas; se calcula ajustando el tipo nominal por niveles de precios. C) Incorrecta: el tipo real y el nominal pueden diferir mucho cuando la inflación entre países es distinta."}, {"a": "A", "e": "Piensa en una cuenta bancaria donde depositas, retiras y el saldo sube o baja cada año. Año 1: inviertes 10.000€ y pierdes 22%, así que quedan 10.000×0,78=7.800€. Año 2: retiras 1.000€ al inicio (quedan 6.800€) y ganas 24%, así que el saldo final es 6.800×1,24=8.432€. A) Correcta: el cálculo paso a paso da 8.432€. B) Incorrecta: 9.672€ no aplica correctamente el retiro de 1.000€. C) Incorrecta: 10.912€ sobreestima el saldo al no restar bien la pérdida del primer año y el retiro."}, {"a": "C", "e": "Los puntos forward indican cuánto se desvía el precio futuro de una divisa respecto a su precio actual, debido a la diferencia de tasas de interés entre países. Se calcula: Forward = Spot × (1+tasa CAD)/(1+tasa EUR) = 1,4356×1,02/1,005 = 1,4570. Los puntos forward son (1,4570−1,4356)×10.000 = 214. C) Correcta: 214 puntos. A) Incorrecta: −211 invierte erróneamente las tasas, poniendo la mayor en el denominador. B) Incorrecta: 21 resulta de un error al multiplicar, probablemente usando 1.000 en vez de 10.000."}, {"a": "B", "e": "El aprendizaje automático (machine learning) es cuando una computadora aprende patrones a partir de datos, como un estudiante que aprende de ejemplos. Pero no funciona solo: necesita supervisión humana. B) Correcta: aún se requiere juicio humano para entender los datos, elegir variables relevantes y verificar que los resultados tengan sentido. A) Incorrecta: el aprendizaje automático sí tiene amplia aplicación en el análisis de grandes volúmenes de datos. C) Incorrecta: sin datos suficientes para entrenar y validar, el modelo funciona mal."}, {"a": "A", "e": "Tras escándalos contables como Enron, EE.UU. creó la Ley Sarbanes-Oxley para proteger a los inversores exigiendo que las empresas reporten sobre sus controles internos (mecanismos para evitar errores o fraudes en los estados financieros). A) Correcta: la SEC (Comisión de Valores) es quien aplica esta ley y exige ese reporte. B) Incorrecta: el FASB crea normas contables estadounidenses, pero no exige reportes sobre controles internos. C) Incorrecta: el IASB establece normas internacionales (NIIF) y no tiene relación con la ley Sarbanes-Oxley."}, {"a": "A", "e": "Un proyecto de empresa en marcha (going concern) es como darle mantenimiento a tu casa para que siga funcionando bien, no para ampliarla ni porque te lo exija la ley. A) Correcta: modernizar instalaciones antiguas para reducir costos mantiene las operaciones existentes del negocio, que es exactamente un proyecto de empresa en marcha. B) Incorrecta: modificar procesos para cumplir una nueva regulación es un proyecto obligatorio de cumplimiento normativo. C) Incorrecta: investigar productos nuevos con tecnología innovadora es un proyecto de expansión o crecimiento, no de mantenimiento."}, {"a": "A", "e": "Imagina una tienda: las compras son lo que adquieres para reponer lo que vendiste y ajustar tu stock. La fórmula es: Compras = Costo de ventas + Inventario final − Inventario inicial. Es decir, compras lo vendido más lo que aumentó tu almacén. A) Correcta: Compras = Costo de ventas + (inventario final − inventario inicial). B) Incorrecta: restar el inventario final del inicial invierte la fórmula y subestima las compras cuando el inventario crece. C) Incorrecta: el promedio de inventario no interviene en esta fórmula de compras."}, {"a": "B", "e": "El rendimiento del periodo de tenencia (HPR) mide cuánto ganaste o perdiste en total durante un periodo. No se suman los porcentajes; se multiplican los factores. Cálculo: (1+0,33)×(1−0,15)−1 = 1,33×0,85−1 = 0,1305 = 13,05%, cercano a 13,1%. B) Correcta: la composición correcta da 13,1%. A) Incorrecta: 6,3% probablemente promedia los retornos de forma simple, lo cual es erróneo. C) Incorrecta: 18% suma directamente 33%−15%, sin componer los rendimientos como se debe."}, {"a": "B", "e": "El mecanismo de transmisión monetaria es cómo las decisiones del banco central llegan a la economía real. Es como una cadena: primero se mueve la tasa de referencia, luego cambian los precios de activos (bonos, acciones, tipo de cambio) y finalmente se afecta el consumo y la inflación. B) Correcta: los precios de activos son el primer canal por donde se transmite el cambio de tasa. A) Incorrecta: la inflación es un efecto posterior, no el canal inicial. C) Incorrecta: los requisitos de reserva son otra herramienta, no un canal de transmisión de la tasa."}, {"a": "A", "e": "Imagina que comparas el orden de llegada de corredores en dos carreras distintas. La correlacion de Spearman mide que tan parecidos son esos ordenes (rangos). Se calcula con la formula: rs = 1 - 6 x suma(d^2) / [n(n^2 - 1)], donde d es la diferencia entre rangos y n el tamano de muestra. Aqui: rs = 1 - 6(118) / [10(99)] = 1 - 708/990 = 0.2848, cercano a 0.28. A) Correcta: aplica la formula correctamente. B) Incorrecta: 0.72 es simplemente 1 menos 0.28, un error de calculo. C) Incorrecta: 0.93 sobreestima la correlacion; una suma de diferencias tan alta indica rangos bastante distintos, no similares."}, {"a": "C", "e": "Piensa en las utilidades retenidas como una alcancia de la empresa. Al inicio tiene 1,500, al final tiene 2,000, pero durante el periodo saco 400 para pagar dividendos. La utilidad neta es lo que entro a la alcancia: Utilidad Neta = Saldo final - Saldo inicial + Dividendos = 2,000 - 1,500 + 400 = 900. C) Correcta: suma correctamente el cambio en utilidades retenidas mas los dividendos pagados. A) Incorrecta: 100 olvida sumar los 400 de dividendos. B) Incorrecta: 500 solo mide el cambio neto en utilidades retenidas sin considerar que se pagaron 400 en dividendos."}, {"a": "B", "e": "Los precios de activos financieros son como la altura de una persona: nunca pueden ser negativos. La distribucion lognormal (distribucion donde el logaritmo de la variable sigue una curva normal) tiene un limite inferior en cero, lo que la hace ideal para modelar precios. La distribucion normal, en cambio, permite valores negativos, algo imposible para precios. B) Correcta: el limite en cero refleja la realidad de los precios. A) Incorrecta: la lognormal tiene sesgo positivo (cola larga a la derecha), no negativo. C) Incorrecta: ambas distribuciones se definen con dos parametros, asi que esto no las distingue."}, {"a": "A", "e": "Imagina que una empresa cambia sus reglas contables. Si cambia una politica contable (el metodo que usa para registrar operaciones), debe aplicarla retrospectivamente, es decir, rehacer los estados financieros anteriores como si siempre hubiera usado la nueva regla. En cambio, una estimacion contable (como la vida util de un equipo) se ajusta solo hacia adelante, de forma prospectiva. A) Correcta: solo los cambios en politicas contables requieren aplicacion retrospectiva. B) Incorrecta: las estimaciones se aplican prospectivamente. C) Incorrecta: las estimaciones no se tratan retrospectivamente."}, {"a": "C", "e": "Al valorar inventarios, las normas contables tienen reglas especiales para productos agricolas, como cosechas o ganado. Tanto las NIIF (normas internacionales) como los US GAAP (normas estadounidenses) permiten valorar inventarios agricolas a su valor neto realizable (precio de venta estimado menos costos de venta). C) Correcta: ambas normas coinciden en esta excepcion. A) Incorrecta: bajo NIIF, el valor de mercado es el valor neto realizable, sin restarle un margen de ganancia. B) Incorrecta: las NIIF permiten revertir rebajas de valor, pero los US GAAP no lo permiten."}, {"a": "C", "e": "Piensa en la economia como un auto con dos motores: el sector publico (gasto del gobierno) y el privado (empresas y consumidores). La politica fiscal restrictiva reduce el gasto publico, mientras que la politica monetaria expansiva (tasas de interes bajas) abarata el credito y estimula el gasto privado. Combinadas, el sector privado crece respecto al publico. C) Correcta: esta combinacion favorece al sector privado. A) Incorrecta: ambas politicas expansivas estimulan ambos sectores sin favorecer al privado. B) Incorrecta: politica monetaria restrictiva encarece el credito y frena al sector privado."}, {"a": "B", "e": "Imagina un estudiante que se pone notas mas bajas de las merecidas hoy para lucir mejor manana. La contabilidad conservadora funciona igual: reconoce gastos antes y retrasa ingresos, reduciendo las ganancias reportadas en el periodo actual. En periodos futuros, al ya haberse absorbido esos gastos, las ganancias tienden a subir. B) Correcta: describe exactamente la contabilidad conservadora. A) Incorrecta: la contabilidad agresiva hace lo opuesto, infla las ganancias actuales. C) Incorrecta: ganancias no sostenibles se refieren a eventos unicos, no a decisiones contables sistematicas."}, {"a": "A", "e": "El rendimiento sobre el patrimonio (ROE) mide cuanto gana una empresa respecto al dinero de sus accionistas. Segun el analisis DuPont, ROE = margen neto x rotacion de activos x apalancamiento. El apalancamiento (uso de deuda para financiarse) multiplica el ROE: si baja, el ROE baja directamente. A) Correcta: menor apalancamiento reduce el ROE. B) Incorrecta: una menor tasa impositiva deja mas utilidad neta, aumentando el ROE. C) Incorrecta: menos dias de cobro (DSO) significa cobrar mas rapido, lo que mejora la rotacion de activos y sube el ROE."}, {"a": "C", "e": "En competencia monopolistica (mercado con muchas empresas que venden productos similares pero diferenciados), las firmas a largo plazo producen menos de lo que minimizaria su costo promedio. Es como un restaurante medio vacio: podria servir mas platos sin subir costos, pero no tiene suficientes clientes. Esto se llama exceso de capacidad. C) Correcta: el nivel optimo de costo es mayor que la produccion real. A) Incorrecta: lo opuesto; las firmas producen por debajo del optimo. B) Incorrecta: no son iguales porque la demanda con pendiente negativa impide alcanzar ese punto minimo."}, {"a": "C", "e": "El crecimiento organico es como medir cuanto crece un arbol por si solo, sin contar si le trasplantas ramas de otro arbol. Mide cambios en ingresos por dos factores internos: volumen (vender mas unidades) y precio/mezcla (cambiar precios o la combinacion de productos vendidos). Excluye adquisiciones, desinversiones y efectos cambiarios. C) Correcta: incluye tanto volumen como precio/mezcla. A) Incorrecta: el volumen es solo uno de los dos componentes. B) Incorrecta: el precio/mezcla es solo uno de los dos componentes."}, {"a": "A", "e": "Imagina que una empresa lleva dos libretas: una para el contador y otra para el fisco. Los pasivos por impuestos diferidos aparecen cuando la libreta contable muestra mas ganancias que la libreta fiscal. Esto significa que hoy la empresa paga menos impuestos, pero debera pagarlos despues. A) Correcta: si la utilidad contable supera la renta imponible (lo que el fisco cobra), se crea esa deuda futura de impuestos. B) Incorrecta: si la base fiscal del equipo es mayor que su valor en libros, se genera un activo por impuesto diferido (un credito a favor), no un pasivo. C) Incorrecta: cuando el fisco no permite deducir un gasto, la diferencia es permanente y no crea un pasivo por impuesto diferido."}, {"a": "A", "e": "Piensa en el presupuesto del gobierno como una cuenta bancaria familiar. El deficit es cuando se gasta mas de lo que ingresa. Los aranceles son impuestos que se cobran a productos importados, lo que genera ingresos extra para el gobierno. A) Correcta: los aranceles aumentan los ingresos del gobierno, reduciendo el deficit. B) Incorrecta: los subsidios a exportaciones son dinero que el gobierno regala a empresas exportadoras, es decir, un gasto adicional que agranda el deficit. C) Incorrecta: como solo los aranceles generan ingresos y los subsidios generan gastos, combinar ambos no garantiza reducir el deficit."}, {"a": "C", "e": "Un intervalo de prediccion es un rango donde esperamos que caiga un valor futuro estimado por una regresion (modelo estadistico que relaciona variables). Cuanto mas estrecho, mas precisa es la estimacion. C) Correcta: al usar una muestra mas grande para construir la regresion, el error estandar del pronostico (medida de imprecision) se reduce, haciendo el intervalo mas estrecho. A) Incorrecta: el ancho del intervalo si depende del error estandar de la estimacion; a mayor error, intervalo mas amplio. B) Incorrecta: menor variacion en la variable independiente produce un intervalo mas amplio, no mas estrecho, porque hay menos informacion disponible."}, {"a": "C", "e": "El beneficio por accion diluido considera que pasaria si bonos convertibles se transformaran en acciones. Primero, el beneficio basico por accion (BPA) es la utilidad neta dividida entre las acciones: 200,000/125,000 = 1.60. Para el BPA diluido, sumamos el interes que se ahorraria despues de impuestos si el bono se convirtiera: 60,000 x 12% x (1-0.15) = 6,120. Luego dividimos la utilidad ajustada entre las acciones totales: (200,000+6,120)/(125,000+3,000) = 1.61. C) Correcta: 1.61 es el calculo correcto. A) Incorrecta: 1.51 resulta de un error en el calculo del interes. B) Incorrecta: 1.60 es el BPA basico, sin considerar la conversion del bono."}, {"a": "B", "e": "Imagina una fila de personas numeradas. Si eliges una cada cierto numero fijo, por ejemplo cada quinta persona, estas usando muestreo sistematico. B) Correcta: seleccionar cada k-esimo miembro de una poblacion es exactamente la definicion de muestreo sistematico. A) Incorrecta: el muestreo por conglomerados divide la poblacion en grupos naturales y selecciona grupos enteros al azar, no individuos a intervalos regulares. C) Incorrecta: el muestreo aleatorio estratificado primero divide la poblacion en subgrupos homogeneos (estratos) y luego selecciona al azar dentro de cada subgrupo."}, {"a": "C", "e": "El valor presente neto (VPN) mide si un proyecto genera valor: si es positivo, conviene invertir. Este proyecto tiene flujos no convencionales que alternan signos (negativo, positivo, negativo, positivo), lo cual puede generar varias tasas internas de retorno (TIR, la tasa donde el VPN es cero). Hay que calcular el VPN a cada tasa propuesta. C) Correcta: al descontar los flujos al 21%, el VPN resulta positivo. A) Incorrecta: con una tasa del 15%, el VPN es negativo, por lo que no cumple la condicion. B) Incorrecta: al 18% el VPN tambien es negativo."}, {"a": "B", "e": "Los gobiernos tienen dos herramientas principales para influir en la economia: la politica fiscal (impuestos y gasto publico) y la politica monetaria (tasas de interes y dinero en circulacion, manejada por el banco central). Una politica fiscal expansiva busca estimular la economia aumentando el gasto o bajando impuestos. B) Correcta: aumentar el gasto publico en infraestructura y servicios sociales es politica fiscal expansiva porque inyecta dinero directamente en la economia. A) Incorrecta: reducir los requisitos de reservas bancarias es politica monetaria, no fiscal. C) Incorrecta: comprar bonos del gobierno en el mercado abierto tambien es politica monetaria del banco central."}, {"a": "B", "e": "El costo promedio ponderado de capital (WACC) es como calcular el costo promedio de todas las fuentes de financiamiento de una empresa, ponderando segun cuanto aporta cada una. Capital total: 15+10+1 = 26 millones. La deuda tiene ventaja fiscal porque los intereses reducen impuestos. Calculo: (15/26)x8% + (10/26)x4%x(1-0.35) + (1/26)x5% = 4.615% + 1.000% + 0.192% = 5.81%. B) Correcta: 5.81% aplica correctamente el escudo fiscal a la deuda. A) Incorrecta: 5.74% probablemente aplica mal el ajuste de impuestos. C) Incorrecta: 6.35% no descuenta el beneficio fiscal de la deuda."}, {"a": "A", "e": "La media geometrica mide el rendimiento real compuesto de una inversion, como el crecimiento efectivo de tu dinero a lo largo del tiempo. Se multiplican los factores de retorno y se saca la raiz n-esima. Calculo: [(1.10)(0.98)(1.18)(0.88)]^(1/4) - 1 = [1.1194]^0.25 - 1 = 0.0286, es decir, aproximadamente 2.9%. A) Correcta: 2.9% es la media geometrica correcta. B) Incorrecta: 3.5% es la media aritmetica simple (suma de retornos dividida entre 4), que siempre sobreestima el crecimiento real. C) Incorrecta: 8.1% sobreestima enormemente el rendimiento compuesto del periodo."}, {"a": "C", "e": "El analisis DuPont descompone la rentabilidad de una empresa en partes. Utilidad neta = ingresos x margen neto = 2,500,000 x 4% = 100,000. Si el rendimiento sobre activos (ROA, cuanto gana por cada euro en activos) es 8%, los activos promedio = 100,000/0.08 = 1,250,000. El apalancamiento financiero (cuanto se financia con deuda) = ROE/ROA = 16%/8% = 2. Patrimonio promedio = 1,250,000/2 = 625,000. C) Correcta. A) Incorrecta: la rotacion de activos es ROA/margen = 8%/4% = 2, no 4. B) Incorrecta: el apalancamiento es 2, no 4."}, {"a": "A", "e": "Imagina que el gobierno te da un descuento por pedir prestado: eso es el escudo fiscal. Cuando una empresa calcula su costo promedio ponderado de capital (WACC, la tasa minima que debe ganar para crear valor), solo la deuda (bonos) necesita ajuste por impuestos. Esto ocurre porque los intereses que paga la empresa son deducibles de impuestos, reduciendo el costo real de endeudarse. A es correcta: los bonos generan ese ahorro fiscal. B es incorrecta: los dividendos de acciones comunes no son deducibles, asi que no hay ajuste. C es incorrecta: los dividendos de acciones preferentes tampoco son deducibles de impuestos, por lo que no requieren ajuste fiscal en el WACC."}, {"a": "B", "e": "Piensa en una tienda que vende casi lo mismo que el ano anterior pero recibe mucho menos efectivo. Las ventas subieron levemente (322.8 vs 320.1) y la utilidad neta tambien (27.2 vs 26.8), pero el flujo de caja operativo (dinero real recibido por operaciones) cayo drasticamente de 38.1 a 15.3. B es correcta: esto indica que mas ventas se hicieron a credito en lugar de al contado, reduciendo el efectivo recibido. A es incorrecta: si el inventario bajara, se liberaria efectivo y el flujo subiria, no bajaria. C es incorrecta: cambios entre deuda y cuentas por pagar no explican directamente esta caida en el flujo operativo."}, {"a": "B", "e": "La tasa neutral de politica monetaria es como el punto de equilibrio de un termostato: ni calienta ni enfria la economia. Se calcula sumando dos componentes de largo plazo: la tasa real de crecimiento tendencial (cuanto crece la economia sin inflacion) y la meta de inflacion estable a largo plazo. B es correcta: combina crecimiento de largo plazo con inflacion estable. A es incorrecta: menciona crecimiento de corto plazo y cero inflacion, cuando la tasa neutral acepta inflacion estable y se basa en tendencias de largo plazo. C es incorrecta: habla de crecimiento de corto plazo, pero la tasa neutral se fundamenta en tendencias de largo plazo, no en fluctuaciones temporales."}, {"a": "A", "e": "En una empresa, piensa en tres roles: quien decide la direccion, quien ejecuta el trabajo diario y quien pone las reglas externas. Los gerentes son quienes llevan a cabo la estrategia en el dia a dia, tomando decisiones operativas para cumplir los objetivos. A es correcta: los gerentes implementan la estrategia corporativa directamente. B es incorrecta: los gobiernos crean leyes y regulaciones, pero no ejecutan la estrategia interna de una empresa. C es incorrecta: la junta directiva (el grupo que supervisa a los gerentes) aprueba y vigila la estrategia, pero no la implementa directamente en las operaciones."}, {"a": "B", "e": "Imagina un negocio donde algunos duenos arriesgan solo lo que invirtieron y las ganancias pasan directo a sus declaraciones de impuestos personales. Eso describe a la sociedad limitada (limited partnership). Tiene dos tipos de socios: los generales (responsabilidad ilimitada) y los limitados (solo arriesgan su inversion). B es correcta: ofrece responsabilidad limitada para algunos socios y las ganancias pasan directamente a los duenos sin doble tributacion. A es incorrecta: la corporacion tiene responsabilidad limitada para todos, pero paga impuestos como entidad separada (doble tributacion). C es incorrecta: la empresa unipersonal transfiere ganancias al dueno, pero este responde con todo su patrimonio personal."}, {"a": "A", "e": "Cuando una empresa reduce el valor de su inventario (write-down o deterioro), es como rebajar mercancia danada en una tienda. Esto baja el inventario registrado en los libros. Los ratios de actividad miden que tan efficientemente se usan los activos; por ejemplo, la rotacion de inventario divide el costo de ventas entre el inventario. A es correcta: al reducirse el inventario (denominador), la rotacion mejora, favoreciendo los ratios de actividad. B es incorrecta: los ratios de liquidez empeoran porque se reduce el activo corriente disponible. C es incorrecta: los ratios de solvencia no mejoran, ya que la perdida reduce el patrimonio de la empresa."}, {"a": "A", "e": "El ciclo de vida de una empresa es como el de una planta: primero necesita mucha agua sin dar frutos. En la etapa de inicio (start-up), la empresa gasta mucho en desarrollo, equipos y personal, pero aun no genera ingresos significativos, por lo que el flujo de caja (dinero que entra menos dinero que sale) suele ser negativo. A es correcta: en el inicio los gastos superan ampliamente los ingresos. B es incorrecta: en la etapa de crecimiento ya hay ingresos que compensan parcialmente la inversion, aunque el flujo puede ser ajustado. C es incorrecta: en la etapa madura la empresa genera flujos de caja positivos y estables."}, {"a": "A", "e": "Para saber cuanto efectivo pago una empresa a sus proveedores, seguimos dos pasos. Primero calculamos las compras: si el costo de ventas fue 800 y el inventario bajo 250, significa que parte del costo vino del inventario existente, asi que compras = 800 - 250 = 550. Luego restamos lo que aun no se pago: las cuentas por pagar subieron 100, asi que efectivo pagado = 550 - 100 = 450. A es correcta: 450 millones. B es incorrecta: 950 resulta de sumar la baja de inventario en vez de restarla. C es incorrecta: 1,150 resulta de sumar tanto la baja de inventario como el aumento en cuentas por pagar en vez de restarlos."}, {"a": "C", "e": "La desviacion estandar mide cuanto se dispersan los datos respecto a su promedio, como que tan lejos del centro caen las flechas de un arquero. Para calcularla con una distribucion de probabilidades: primero se halla la media ponderada (cada valor multiplicado por su probabilidad), luego la varianza (suma ponderada de las diferencias al cuadrado respecto a la media), y finalmente la raiz cuadrada de la varianza. C es correcta: el calculo da aproximadamente 5.8 dolares. A es incorrecta: 24 dolares es un valor exagerado considerando que los datos estan entre 22 y 30. B es incorrecta: 4.0 dolares subestima la dispersion real de los valores."}, {"a": "A", "e": "Comparemos tres medidas de tendencia central con los ratios P/E: 3, 8, 8, 10, 12, 13. La media aritmetica (promedio) es la suma dividida entre el total: 54/6 = 9. La mediana (valor central) es el promedio de los dos valores del medio: (8+10)/2 = 9. La moda (valor mas frecuente) es 8, ya que aparece dos veces. A es correcta: la mediana (9) es mayor que la moda (8). B es incorrecta: la moda (8) es menor que la media (9), no mayor. C es incorrecta: la media (9) es igual a la mediana (9), no mayor."}, {"a": "B", "e": "Imagina que contratas a alguien para tu negocio pero no decides cuánto le pagas: podría ponerse un sueldo enorme sin importarle tus ganancias. Eso es un conflicto de interés entre accionistas (dueños) y gerencia. B es correcta: cuando los accionistas no influyen en la compensación ejecutiva (pago a directivos), la gerencia puede diseñar paquetes que la beneficien solo a ella. A es incorrecta porque las acciones diferidas (entregadas en el futuro) alinean
