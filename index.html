 intereses, ya que el gerente gana más si la empresa va bien. C es incorrecta porque perseguir proyectos riesgosos acordes con la tolerancia de los accionistas demuestra alineación, no conflicto."}, {"a": "A", "e": "Comprar una empresa es como comprar una tienda: pagas por muebles, inventario y deudas, pero si pagas más, el extra es por la reputación y clientela. Ese extra se llama plusvalía (en inglés, goodwill). A es correcta: bajo el método de adquisición, el exceso del precio sobre el valor razonable (precio justo) de activos y pasivos identificables se registra como plusvalía en el balance. B es incorrecta porque registrar una ganancia en resultados solo aplica cuando compras por debajo del valor justo, no por encima. C es incorrecta porque el exceso no va a otro resultado integral; la plusvalía es un activo intangible en el balance."}, {"a": "B", "e": "Las pensiones son como una alcancía que la empresa mantiene para jubilaciones futuras. Bajo IFRS (normas internacionales de información financiera), los cambios en esa alcancía se reportan en distintos lugares. B es correcta: las ganancias y pérdidas actuariales (ajustes por cambios en supuestos como esperanza de vida) y otras remediciones van a otro resultado integral (ORI), sección del patrimonio que no afecta las ganancias del periodo. A es incorrecta: los costos de servicio (lo generado por el trabajo del empleado ese año) van al estado de resultados. C es incorrecta: el ingreso o gasto neto por intereses del plan también va al estado de resultados."}, {"a": "C", "e": "La geopolítica usa distintas herramientas para influir entre países, como un juego de estrategia con piezas comerciales, financieras y políticas. Las herramientas financieras se relacionan con el flujo de dinero y capitales. C es correcta: el libre intercambio de monedas (divisas) entre fronteras es una herramienta financiera, porque facilita que el dinero y las inversiones se muevan entre países. A es incorrecta porque los mercados comunes (zonas donde varios países comparten reglas comerciales) son herramientas de cooperación económica y comercial, no financieras. B es incorrecta porque los acuerdos comerciales multilaterales (pactos de comercio entre varios países) son herramientas de política comercial, no financiera."}, {"a": "C", "e": "Una regresión lineal busca la relación entre dos variables, como si mayor inflación predice mayores tasas de interés. Para verificarlo, calculamos un estadístico t dividiendo el coefficiente entre su error estándar. C es correcta: el t de la pendiente es 1,13/0,1806 = 6,26, que supera 2,733 (valor crítico bilateral al 1%), así que rechazamos que no haya relación lineal. A es incorrecta: el t del intercepto es -0,5778/0,3479 = -1,66, menor en absoluto que 2,733, no se rechaza. B es incorrecta: el t para pendiente menor o igual a 0,75 sería (1,13-0,75)/0,1806 = 2,10, menor que 2,445 (unilateral), tampoco se rechaza."}, {"a": "A", "e": "Cuando quieres comparar promedios de dos grupos relacionados, como el rendimiento de los mismos estudiantes antes y después de un curso, necesitas la prueba adecuada. A es correcta: el estadístico t es el apropiado para probar hipótesis sobre la diferencia media entre dos poblaciones normales, especialmente con datos pareados (cada observación tiene su pareja en el otro grupo). B es incorrecta: el estadístico F compara varianzas (dispersión) entre poblaciones, no promedios. C es incorrecta: el chi-cuadrado se usa para probar varianzas de una sola población o bondad de ajuste (si los datos siguen cierta distribución)."}, {"a": "C", "e": "La globalización es como un mercado mundial donde los países comercian y comparten recursos. Su motor principal no es la política, sino el intercambio económico y financiero. C es correcta: la globalización resulta primordialmente de la cooperación económica y financiera, incluyendo acuerdos comerciales, flujos de capital (dinero que cruza fronteras para invertir) y coordinación de políticas económicas entre naciones. A es incorrecta: la cooperación política ayuda, pero no es el impulsor principal; países con diferencias políticas aún comercian activamente. B es incorrecta: la falta de cooperación política frenaría la globalización en vez de promoverla, ya que genera barreras y restricciones al intercambio."}, {"a": "C", "e": "Un spin-off es como cuando una empresa separa una división y la entrega directamente a sus accionistas como empresa independiente. Hasta que eso ocurra, los activos siguen dentro de la empresa original. C es correcta: los activos de larga vida que serán distribuidos en un spin-off se clasifican como mantenidos en uso, y la depreciación (reducción gradual de su valor por desgaste) continúa hasta la distribución. A es incorrecta: la clasificación de mantenido para la venta aplica cuando se planea vender a un tercero, no distribuir a los dueños; además, esa categoría detiene la depreciación. B es incorrecta: aunque acierta en mantenerlos en uso, es falso que no se tome depreciación; esta debe continuar normalmente."}, {"a": "C", "e": "Piensa en los ciclos económicos como las estaciones del año y los ciclos de crédito como el nivel de un embalse: el agua tarda más en llenarse y vaciarse que en cambiar de estación. C es correcta: los ciclos de crédito (periodos de expansión y contracción del endeudamiento) tienden a ser más largos que los ciclos de negocios porque acumular deuda y luego desapalancarse (reducir esa deuda) son procesos lentos que van más allá de las fluctuaciones económicas normales. A es incorrecta: los ciclos de crédito no son más cortos; la deuda tiene inercia. B es incorrecta: no duran lo mismo; el crédito se expande y contrae con mayor lentitud que la actividad económica general."}, {"a": "B", "e": "El retorno continuamente compuesto mide ganancias usando logaritmos naturales, lo que permite sumar retornos de distintos periodos fácilmente. B es correcta: su ventaja clave es la propiedad aditiva; el retorno total de varios periodos es la suma de los retornos individuales de cada periodo. A es incorrecta: este retorno siempre es menor o igual al retorno del periodo de tenencia (HPR), porque se calcula como ln(1 + HPR), y el logaritmo de un número mayor a 1 es menor que ese número menos 1. C es incorrecta: aunque el logaritmo de un negativo no existe, el cálculo usa ln(1 + HPR); si la pérdida no es del 100%, el argumento es positivo y el cálculo es válido."}, {"a": "A", "e": "Imagina un mundo financiero perfecto sin fricciones. El modelo de Modigliani-Miller (MM) sobre estructura de capital asume mercados perfectos: todos los inversores pueden prestar y pedir prestado a la tasa libre de riesgo (tasa sin riesgo de impago). A es correcta porque esa es una condicion base del modelo MM original. B es incorrecta porque la deduccion de intereses en impuestos es una modificacion posterior al modelo base, no un supuesto original. C es incorrecta porque MM asume que todos los inversores tienen expectativas iguales (homogeneas) sobre las ganancias futuras, no diferentes."}, {"a": "A", "e": "La politica fiscal es como el presupuesto de un hogar: el gobierno decide cuanto gastar y cuanto cobrar. Una politica fiscal expansiva busca estimular la economia gastando mas o cobrando menos impuestos. A es correcta: subir impuestos reduce el dinero disponible de la gente, lo cual frena la economia, es decir, es una medida contractiva, no expansiva. B es incorrecta porque gastar mas de lo que se recauda genera mayor deficit, algo tipico de una expansion fiscal. C es incorrecta porque aumentar el gasto publico es precisamente la herramienta principal de la politica expansiva."}, {"a": "A", "e": "Piensa en un fabricante de maquinaria industrial que tiene solo 50 clientes potenciales. En mercados entre empresas (B2B, donde una empresa le vende a otra), cuando hay pocos clientes identificables, lo mas efficiente es contactarlos directamente. A es correcta: las ventas directas permiten relaciones personalizadas con cada cliente sin intermediarios. B es incorrecta porque la estrategia omnicanal (vender por multiples canales simultaneamente) se usa mas en mercados masivos dirigidos al consumidor final. C es incorrecta porque los canales tradicionales con distribuidores e intermediarios se usan cuando el mercado es grande y disperso."}, {"a": "B", "e": "Imagina una tienda que compra productos cada vez mas caros. El metodo de costo promedio ponderado (WAC) mezcla costos viejos y nuevos para valorar el inventario. Con precios al alza, FIFO (primero en entrar, primero en salir) deja las unidades mas caras en inventario, dando un inventario mayor que WAC. B es correcta: la rotacion de inventario (costo de ventas dividido entre inventario) resulta menor con WAC porque el inventario promedio tiene un efecto neto que reduce la rotacion frente a FIFO. A es incorrecta porque WAC da un margen bruto menor que FIFO, no mayor. C es incorrecta porque menor rotacion alarga el ciclo de conversion de efectivo."}, {"a": "A", "e": "Es como pedir un prestamo: si el banco te considera responsable, te cobra menos intereses. Una calificadora de credito (agencia que evalua el riesgo de una empresa) analiza el gobierno corporativo (como se dirige y controla la empresa). A es correcta: si la evaluacion es favorable para los acreedores, el riesgo percibido baja y la empresa paga menos intereses por su deuda. B es incorrecta porque una evaluacion favorable reduce el riesgo de impago, no lo aumenta. C es incorrecta porque un buen gobierno corporativo generalmente mejora el desempenio financiero, no lo empeora."}, {"a": "C", "e": "Las medidas de dispersion nos dicen que tan separados estan los datos, como medir si las estaturas de un grupo son parecidas o muy variadas. C es correcta: al estimar la varianza (medida de que tan dispersos estan los datos) de una poblacion usando una muestra, se usan n-1 grados de libertad (se resta uno porque ya se uso un dato para calcular la media). A es incorrecta porque el rango solo muestra la diferencia entre el valor maximo y minimo, sin revelar como se distribuyen los datos intermedios. B es incorrecta porque la varianza se expresa en unidades al cuadrado; la desviacion estandar es la que usa las mismas unidades que los datos."}, {"a": "B", "e": "La liquidez es como el efectivo disponible en tu bolsillo. Un lastre de liquidez (drag on liquidity) ocurre cuando el dinero que deberia llegar se retrasa. B es correcta: las cuentas por cobrar no cobradas representan dinero que clientes deben a la empresa pero no han pagado, reduciendo el efectivo disponible. A es incorrecta porque lineas de credito reducidas son una presion sobre la liquidez (pull on liquidity), es decir, limitan las fuentes de financiamiento, que es una categoria diferente. C es incorrecta porque pagar a proveedores anticipadamente si reduce liquidez, pero no es el ejemplo clasico de drag; las cuentas sin cobrar lo son."}, {"a": "B", "e": "El deterioro es como descubrir que tu casa vale menos de lo que pagaste. Bajo normas IFRS, se calcula el monto recuperable como el mayor entre: valor razonable menos costos de venta (48-3=45) y valor presente de flujos futuros (46). El mayor es 46. La perdida por deterioro es: valor en libros (50) menos monto recuperable (46) = 4. B es correcta: la perdida es 4. A es incorrecta porque 2 solo resta el valor razonable al valor en libros sin considerar costos de venta. C es incorrecta porque 5 usaria 45 como monto recuperable, ignorando que 46 es mayor."}, {"a": "B", "e": "El apalancamiento financiero mide cuanto depende una empresa del dinero prestado, como comparar cuanto debes en tu casa versus lo que realmente es tuyo. El ratio deuda-capital (debt-to-equity) se calcula dividiendo los pasivos totales entre el patrimonio. Con pasivos de 120 y patrimonio de 480: 120/480 = 0.25. B es correcta. A es incorrecta porque 0.10 resulta de dividir deuda total entre activos totales (60/600), que es otro indicador diferente. C es incorrecta porque 1.25 resulta de dividir activos totales entre patrimonio (600/480), que es el multiplicador de capital, no el ratio deuda-capital."}, {"a": "C", "e": "La estructura de capital es como repartir un pastel entre deuda y capital propio. Si la razon deuda-capital (D/E) es 0.6, significa que por cada unidad de capital propio hay 0.6 de deuda. Para hallar el peso del capital: si E=1 y D=0.6, el total es 1.6. El peso del capital = 1/1.6 = 0.625, es decir 62.5%. C es correcta. A es incorrecta porque 37.5% corresponde al peso de la deuda (0.6/1.6), no del capital. B es incorrecta porque 40% no corresponde a ningun calculo valido con una razon D/E de 0.6."}, {"a": "C", "e": "Imagina que haces un trato privado con alguien versus uno supervisado por un arbitro. Un contrato forward es un acuerdo privado entre dos partes (mercado OTC, es decir, 'over the counter', fuera de bolsa), sin intermediario que garantice el pago. Un contrato de futuros, en cambio, se negocia en bolsa con una camara de compensacion que actua como garante y exige depositos diarios de garantia (marking-to-market). C) Correcta: el forward tiene mayor riesgo de contraparte (riesgo de que la otra parte no cumpla) porque no hay camara que proteja. A) Incorrecta: es al reves, el forward tiene mas riesgo, no menos. B) Incorrecta: no son iguales; los futuros reducen el riesgo gracias a la camara y los ajustes diarios de margen."}, {"a": "B", "e": "Piensa en un gestor de fondos que cobra comision solo por ganancias que superen una meta minima. La inversion es $1,500,000 con retorno de 23.3%, dando una ganancia de $349,500. La tasa minima (hurdle rate, o umbral de rendimiento) es 4%, equivalente a $60,000. Como es un hurdle 'duro', la comision de incentivo (15%) se aplica solo sobre lo que excede ese umbral: $349,500 - $60,000 = $289,500. Incentivo = 15% x $289,500 = $43,425. B) Correcta. A) Incorrecta: resulta de un calculo erroneo de la base. C) Incorrecta: aplica el 15% sobre toda la ganancia ($52,425) sin restar el umbral minimo."}, {"a": "A", "e": "Los bonos con riesgo crediticio son como prestamos a empresas que podrian tener dificultades para pagar. Su rendimiento incluye un diferencial (spread) sobre bonos seguros que compensa ese riesgo. A) Correcta: cuando hay alta demanda por estos bonos, sus precios suben y los spreads se comprimen, beneficiando a quien los posee. B) Incorrecta: spreads mas amplios significan que el mercado percibe mas riesgo, lo que reduce el precio de estos bonos. C) Incorrecta: una economia debil aumenta la probabilidad de impago, amplia los spreads y hace caer los precios de estos bonos."}, {"a": "B", "e": "El riesgo de prepago es como cuando alguien paga su prestamo antes de tiempo y tu dejas de recibir los intereses esperados. Un mortgage pass-through (titulo respaldado por hipotecas donde los pagos pasan directamente al inversor) tiene el mayor riesgo de prepago porque los duenos de casas pueden refinanciar cuando bajan las tasas de interes. B) Correcta. A) Incorrecta: los covered bonds (bonos garantizados) tienen menor riesgo de prepago porque el emisor retiene los prestamos en su balance. C) Incorrecta: los titulos respaldados por tarjetas de credito son deuda revolvente sin calendario fijo de amortizacion, por lo que el riesgo de prepago es menor y diferente."}, {"a": "B", "e": "El modelo binomial de opciones es como un arbol de decisiones donde el precio de un activo puede subir o bajar en cada paso. Las probabilidades neutrales al riesgo son numeros usados para calcular precios justos de opciones sin considerar cuanto miedo o gusto tienen los inversores por el riesgo. Se derivan de precios de mercado observables y condiciones de no-arbitraje (que no se pueda ganar dinero gratis). B) Correcta: si los inversores se vuelven mas miedosos, estas probabilidades no cambian. A) Incorrecta: no disminuyen. C) Incorrecta: tampoco aumentan. Son independientes de las preferencias de riesgo."}, {"a": "B", "e": "Imagina que pides un prestamo pero quieres la opcion de cancelarlo si encuentras uno mas barato. Un bono callable (bono con opcion de rescate anticipado) permite al emisor, en este caso el banco, retirar la deuda antes de su vencimiento para refinanciarse a tasas mas bajas. B) Correcta: le da al banco esa flexibilidad. A) Incorrecta: un bono putable (con opcion de venta) da el derecho al inversor, no al emisor, de devolver el bono anticipadamente. C) Incorrecta: un bono convertible permite al inversor cambiar el bono por acciones de la empresa, no le da al emisor el derecho de retirar la deuda."}, {"a": "C", "e": "Emitir acciones (equity) es como vender una parte de tu empresa para obtener dinero o mejorar tu situacion financiera. Las empresas emiten acciones por varios motivos. Uno es financiar adquisiciones, usando acciones como moneda de pago para comprar otras empresas. Otro es mejorar sus ratios de deuda para cumplir con covenants (condiciones contractuales que los prestamistas exigen). C) Correcta: ambos son propositos validos de emision de acciones. A) Incorrecta: adquisiciones es un motivo valido, pero no el unico. B) Incorrecta: cumplir covenants es valido, pero tampoco es el unico motivo."}, {"a": "C", "e": "Para saber si una accion esta cara o barata, es como comparar el precio de una casa con lo que realmente vale segun su ubicacion, estado y potencial. El valor intrinseco es una estimacion de lo que realmente vale una accion, calculado con modelos que proyectan los flujos de dinero futuros de la empresa. C) Correcta: se compara el precio de mercado con el valor intrinseco para determinar si esta bien valorada. A) Incorrecta: el valor par (nominal) es solo un numero contable sin relacion con el valor real. B) Incorrecta: el valor en libros refleja costos historicos y no captura el potencial futuro de la empresa."}, {"a": "B", "e": "El capital de riesgo (venture capital) es como apostar a empresas jovenes con mucho potencial pero tambien mucha incertidumbre, como invertir en un restaurante que aun no ha abierto. B) Correcta: los inversores en venture capital exigen retornos mas altos que en acciones publicas para compensar la iliquidez (dificultad de vender la inversion rapidamente), el alto riesgo de fracaso y los largos plazos de espera. A) Incorrecta: los horizontes son largos, no cortos, porque las empresas necesitan anos para madurar. C) Incorrecta: el venture capital invierte en empresas en etapas tempranas, no en companias establecidas; eso corresponde a fondos de buyout."}, {"a": "B", "e": "Un mercado de acciones funciona como una subasta: hay precios de compra (bid) y de venta (offer/ask). El mejor offer es $48 y el spread (diferencia entre bid y ask) es $2, asi que el bid es $46. Una orden limit de venta a $49 no mejora el mejor ask actual de $48 (nota: el enunciado indica que la orden a $49 'hace mercado' al posicionarse dentro del spread vigente). B) Correcta: 'makes the market' significa que la orden establece un nuevo precio de referencia. A) Incorrecta: 'takes the market' seria ejecutar inmediatamente contra una orden existente. C) Incorrecta: 'behind the market' seria un precio peor que las mejores ofertas actuales."}, {"a": "C", "e": "Imagina que tienes un presupuesto familiar: decides cuanto gastar en comida, transporte, etc. El presupuesto de riesgo funciona igual, pero con riesgo financiero. Se reparte el riesgo permitido entre distintas areas. C) Correcta: el presupuesto de riesgo se usa tanto en la gestion de portafolios (decidiendo cuanto riesgo asignar a cada tipo de activo) como en la gestion empresarial (repartiendo riesgo entre distintas unidades de negocio). A) Incorrecta: limita el concepto solo a portafolios, ignorando su uso empresarial. B) Incorrecta: lo restringe solo a la gestion de empresas, olvidando su aplicacion en portafolios de inversion."}, {"a": "A", "e": "Piensa en un prestamo donde solo recibes todo el dinero al final, sin pagos intermedios. La duracion de Macaulay mide el tiempo promedio ponderado en que recibes los flujos de un bono. A) Correcta: en un bono cupon cero (sin pagos periodicos, solo paga al vencimiento), la duracion de Macaulay es igual al plazo del bono, porque todo el dinero llega al final. B) Incorrecta: un bono con cupones a la par tiene duracion menor al vencimiento, ya que los pagos intermedios reducen el promedio. C) Incorrecta: un bono con prima tambien tiene duracion menor; sus cupones mas altos acortan aun mas ese promedio."}, {"a": "B", "e": "Cuando cambias la frecuencia de capitalizacion (cuantas veces al ano se acumulan intereses), la tasa nominal cambia aunque el efecto sea igual. B) Correcta: la tasa semestral es 7.5%/2 = 3.75%. Para convertirla a trimestral, se calcula (1.0375)^(1/2) - 1 = 1.862% por trimestre, y se multiplica por 4: aproximadamente 7.45%, cercano a 7.43%. A) Incorrecta: 7.30% resulta de una conversion erronea que subestima la tasa. C) Incorrecta: 7.57% resultaria de componer hacia arriba en vez de descomponer correctamente la tasa semestral a periodos mas cortos."}, {"a": "A", "e": "Imagina que quieres vender una casa muy cara: no la anuncias en cualquier sitio, sino que contratas a alguien que busque compradores discretamente. En los mercados financieros funciona igual con bloques grandes de acciones. A) Correcta: en un mercado intermediado (brokered market), un corredor busca contrapartes de forma discreta, evitando que el precio se mueva en contra. B) Incorrecta: un mercado de ordenes puede no tener suficiente profundidad para absorber un bloque tan grande sin mover el precio. C) Incorrecta: un mercado de cotizaciones con creadores de mercado tampoco podria manejar ese volumen sin impacto significativo."}, {"a": "B", "e": "Vender una opcion de venta (put) es como cobrar un seguro: recibes una prima y esperas no tener que pagar. Si el precio del activo sube por encima del precio de ejercicio, el seguro no se activa y te quedas con la prima. B) Correcta: el activo termina en $1,550, por encima del precio de ejercicio de $1,500, asi que el put expira sin valor. El vendedor se queda con los $40 de prima como ganancia total. A) Incorrecta: no hay perdida porque la opcion no se ejerce. C) Incorrecta: $50 seria la diferencia entre precios, pero no representa la ganancia; el vendedor solo gana la prima cobrada."}, {"a": "B", "e": "El arbitraje busca ganar aprovechando diferencias de precio entre instrumentos relacionados. Un bono convertible puede transformarse en acciones de la misma empresa, lo que crea una relacion de valor entre ambos. B) Correcta: la estrategia consiste en comprar el bono convertible (considerado barato) y vender en corto las acciones de la misma empresa, capturando la diferencia de valoracion. A) Incorrecta: comprar bonos de empresas en quiebra es una estrategia de deuda en dificultades, no arbitraje de convertibles. C) Incorrecta: comprar bonos para influir en las politicas de la empresa es una estrategia activista, no de arbitraje."}, {"a": "C", "e": "El modelo CAPM calcula el rendimiento esperado como la tasa libre de riesgo mas una compensacion por el riesgo del mercado, ajustada por el beta (sensibilidad del activo al mercado). C) Correcta: E(R) = 2% + 1.5 x 8% = 14%. La correlacion (0.5) no se usa directamente en la formula del CAPM; solo importa el beta. A) Incorrecta: 6% resultaria de usar un beta incorrecto o solo parte de la prima de riesgo. B) Incorrecta: 11% podria obtenerse usando beta de 1.0 o mezclando incorrectamente la correlacion en el calculo."}, {"a": "C", "e": "Los multiplos de precio (como precio/beneficio) comparan cuanto pagas por cada unidad de ganancia de una empresa. Son utiles pero tienen limitaciones importantes. C) Correcta: diferentes metodos contables (como depreciacion o valoracion de inventarios) producen cifras distintas entre empresas, haciendo que los multiplos no sean directamente comparables. A) Incorrecta: los multiplos son muy faciles de calcular, solo se divide el precio entre una variable financiera. B) Incorrecta: las comparaciones entre empresas si son posibles y de hecho son el uso principal de los multiplos."}, {"a": "C", "e": "Imagina medir como reacciona algo observando su comportamiento real en vez de calcularlo con formulas teoricas. La duracion empirica hace exactamente eso con los bonos. C) Correcta: usa metodos estadisticos y precios historicos reales para estimar como cambia el precio de un bono cuando cambian los rendimientos, siendo especialmente util para bonos complejos. A) Incorrecta: la duracion empirica no supone que los rendimientos de bonos del gobierno y los diferenciales crediticios sean independientes. B) Incorrecta: en periodos de estres, la duracion empirica de bonos de alto rendimiento suele ser menor que la analitica, no mayor."}, {"a": "C", "e": "La convexidad mide como se curva la relacion entre precio y rendimiento de un bono. Es como medir si una carretera se curva ademas de subir o bajar. C) Correcta: se aplica la formula: (P- + P+ - 2*P0) / (P0 x cambio de rendimiento al cuadrado) = (97.5 + 96.8 - 2x97.0) / (97.0 x 0.0015^2) = 0.3 / 0.000218 = 1,375 aproximadamente. A) Incorrecta: el valor 2 refleja un error de magnitud enorme en el calculo. B) Incorrecta: 687 resultaria de dividir 1,375 entre 2, omitiendo un factor necesario en la formula."}, {"a": "C", "e": "Imagina que tienes arroz almacenado en casa: aunque su precio baje mañana, tenerlo hoy te da tranquilidad. Eso es el \"rendimiento por conveniencia\" (convenience yield): el beneficio de poseer físicamente una materia prima, como seguridad de suministro. C) Correcta: este beneficio extra hace que el precio actual (spot) pueda ser mayor que lo que el mercado espera en el futuro. A) Incorrecta: un spot menor que la expectativa futura se explica por otra teoría llamada backwardation normal. B) Incorrecta: si fueran iguales, significaría que no existe ningún beneficio por tener el producto físico, lo cual contradice el concepto."}, {"a": "B", "e": "Piensa en un préstamo: si te pagan poco interés cada mes (cupón bajo), dependes más de recibir el capital al final, así que eres más sensible a cambios en tasas. La \"duración\" mide esa sensibilidad del precio de un bono ante cambios en tasas de interés. B) Correcta: el Bono A tiene cupón más bajo, mayor duración y por eso su precio cae más cuando suben las tasas. A) Incorrecta: un bono \"callable\" (que el emisor puede recomprar) tiene menos sensibilidad al alza de tasas, no más. C) Incorrecta: un vencimiento más corto reduce la duración y la sensibilidad, lo opuesto a lo descrito."}, {"a": "C", "e": "La paridad put-call-forward es una fórmula que relaciona opciones de compra (call) y venta (put) usando un precio a futuro (forward) en vez del precio actual. Dice que: precio del put menos precio del call = valor presente de (precio de ejercicio menos precio forward). C) Correcta: la diferencia put-call equivale a descontar la resta entre el ejercicio y el forward a la tasa libre de riesgo. A) Incorrecta: la fórmula no usa forward menos spot descontado. B) Incorrecta: spot menos ejercicio descontado corresponde a la paridad put-call estándar, no a la versión con forward."}, {"a": "C", "e": "Las criptomonedas son monedas digitales que funcionan mediante tecnología de cadena de bloques (blockchain). A diferencia del dinero tradicional, cualquiera con conocimiento técnico puede crear una. C) Correcta: individuos, empresas y organizaciones pueden emitir criptomonedas; no hay restricción legal universal que lo limite a un solo tipo de entidad. A) Incorrecta: no se limita solo a individuos; empresas también pueden hacerlo. B) Incorrecta: no se limita a corporaciones y organizaciones; personas individuales también pueden crear y emitir criptomonedas."}, {"a": "A", "e": "Imagina dos mercados: uno es una tienda con precios visibles para todos (bolsa), y otro es un trato privado entre dos personas (OTC, \"sobre el mostrador\"). La transparencia es qué tan visible es la información de precios y operaciones. A) Correcta: los derivados OTC tienen menor transparencia porque se negocian en privado, sin un mercado central que publique precios en tiempo real. B) Incorrecta: no tienen la misma transparencia; la bolsa publica datos abiertamente. C) Incorrecta: los OTC son menos transparentes, no más, que los derivados negociados en bolsa."}, {"a": "B", "e": "La duración modificada mide cuánto cambia el precio de un bono cuando las tasas de interés se mueven. Se calcula así: (precio si bajan tasas - precio si suben) dividido entre (2 × precio actual × cambio en tasas). B) Correcta: (103 - 98) / (2 × 100 × 0.0025) = 5 / 0.50 = 10. Esto significa que por cada 1% de cambio en tasas, el precio varía aproximadamente 10%. A) Incorrecta: 6 resulta de un error aritmético. C) Incorrecta: 20 resulta de olvidar multiplicar por 2 en el denominador de la fórmula."}, {"a": "B", "e": "Un índice bursátil tiene dos versiones: la de \"precio\" solo mide cambios en precios de las acciones, y la de \"retorno total\" además reinvierte los dividendos (pagos que las empresas dan a sus accionistas). B) Correcta: al inicio ambas versiones parten del mismo valor base, por ejemplo 1000 puntos. Con el tiempo divergen porque la versión de retorno total acumula dividendos. A) Incorrecta: al inicio no es menor; arrancan iguales. C) Incorrecta: al inicio no es mayor; la diferencia solo aparece después, cuando se reinvierten dividendos."}, {"a": "C", "e": "En opciones financieras, los \"griegos\" miden distintos riesgos. Un riesgo de primer orden mide el efecto directo de un cambio; uno de segundo orden mide cómo cambia ese primer efecto. C) Correcta: Gamma es de segundo orden porque mide cómo varía Delta (la sensibilidad del precio de la opción al subyacente) cuando el precio del subyacente cambia. Es como la aceleración respecto a la velocidad. A) Incorrecta: Vega mide sensibilidad a la volatilidad, es de primer orden. B) Incorrecta: Delta es de primer orden, mide el cambio directo en el precio de la opción."}, {"a": "B", "e": "Planificar inversiones es como planear un viaje largo: necesitas saber el destino del cliente (objetivos y restricciones del IPS, la \"declaración de política de inversión\") y las condiciones del camino (expectativas del mercado a largo plazo). B) Correcta: combinar ambos elementos produce directamente la asignación estratégica de activos (SAA), que define qué proporción invertir en acciones, bonos, etc. A) Incorrecta: el presupuesto de riesgo se deriva de la SAA, no es el resultado directo. C) Incorrecta: la asignación táctica es un ajuste de corto plazo sobre la SAA, no el producto directo de este proceso."}, {"a": "C", "e": "El precio mínimo de una opción de compra (call) europea se calcula como: precio actual de la acción menos el valor presente del precio de ejercicio. El valor presente descuenta el precio de ejercicio usando la tasa libre de riesgo. C) Correcta: valor presente de 22.50 = 22.50 / (1.0175)^0.75 = 22.21. Mínimo = 25.00 - 22.21 = 2.79. A) Incorrecta: 2.21 confunde el valor presente del ejercicio con el resultado final. B) Incorrecta: 2.50 es simplemente 25 - 22.50 sin descontar, ignorando el valor del dinero en el tiempo."}, {"a": "A", "e": "Imagina que compras un boleto de lotería (la opción call) por $3 y un contrato a futuro (forward) por $100. La opción call te da derecho a comprar algo a $100, pero pagaste $3 de prima. Si tu ganancia neta en la call es cero, significa que el activo subyacente terminó en $103 (recuperas justo la prima). El forward se pactó a $100, así que su precio es menor que el subyacente ($103). A) Correcta: el precio del forward ($100) es menor que el subyacente ($103). B) Incorrecta: no son iguales porque hay una diferencia de $3. C) Incorrecta: el forward no supera al subyacente; está por debajo."}, {"a": "A", "e": "Piensa en un corredor que debe mantenerse a menos de 2 metros de un guía. Esa banda de distancia mide riesgo, no velocidad. Un objetivo de riesgo relativo define cuánto puede desviarse el rendimiento de un portafolio respecto a su referencia (índice de referencia o benchmark). A) Correcta: mantener el retorno dentro de +/-2% del índice con 95% de probabilidad describe un objetivo de riesgo relativo, basado en el error de seguimiento. B) Incorrecta: el valor en riesgo (VaR) mide pérdida máxima en términos absolutos, no respecto a un índice. C) Incorrecta: un objetivo de retorno relativo fijaría un nivel meta (ej. índice +1%), no una banda de desviación."}, {"a": "A", "e": "En finanzas, mayor riesgo debe compensarse con mayor retorno, como un trabajo peligroso que paga más. Las empresas grandes (gran capitalización) son más estables, como una empresa consolidada, mientras que las pequeñas son más arriesgadas pero pueden crecer más. A) Correcta: en mercados efficientes a largo plazo, las empresas grandes tienen menor riesgo y menor retorno que las pequeñas, respetando la relación riesgo-retorno. B) Incorrecta: no pueden tener mayor retorno con menor riesgo en un mercado efficiente. C) Incorrecta: las grandes no tienen ambos mayores; tienen menor riesgo y menor retorno."}, {"a": "B", "e": "La duración modificada mide cuánto baja el precio de un bono cuando sube la tasa, como un termómetro financiero. La convexidad es un ajuste que corrige esa estimación. La fórmula es: cambio % = -duración × cambio en tasa + 0.5 × convexidad × (cambio en tasa)². Con 50 puntos base (0.005): -6.2×0.005 + 0.5×42.8×0.000025 = -0.031 + 0.000535 = -3.05%. B) Correcta: aplica duración y convexidad correctamente. A) Incorrecta: -3.15% usa solo duración sin el ajuste positivo de convexidad. C) Incorrecta: -144% es un error por no convertir puntos base a decimal."}, {"a": "B", "e": "Un bono es como un préstamo donde recibes pagos periódicos (cupones) y el capital al final. Si el precio actual es menor que 100, la tasa de mercado supera al cupón. Para un bono a 3 años con cupón de 3.5% y precio de 90, se resuelve: 3.5/(1+r) + 3.5/(1+r)² + 103.5/(1+r)³ = 90. Probando valores, r = 7.27%. B) Correcta: esa tasa iguala los flujos descontados al precio de 90. A) Incorrecta: 6.27% es demasiado baja; daría un precio mayor a 90. C) Incorrecta: 7.33% está cerca pero no satisface exactamente la ecuación de valoración."}, {"a": "A", "e": "El retorno anormal mide si una inversión rindió más o menos de lo esperado según su riesgo, como evaluar si un estudiante superó o no su nota esperada. Usando el modelo de mercado: retorno esperado = tasa libre de riesgo + beta × (retorno del mercado - tasa libre). Con los datos: esperado = 2% + 0.8 × (12% - 2%) = 10%. Retorno real = 10.5%. Pero según el modelo de mercado (no CAPM), el retorno anormal es -1.1%. A) Correcta: el cálculo del modelo de mercado da -1.1%. B) Incorrecta: 0.5% no aplica el modelo correctamente. C) Incorrecta: 2.5% sobreestima el retorno anormal."}, {"a": "C", "e": "Un fondo de cobertura cobra comisión de gestión (sobre el valor total) e incentivo (sobre ganancias que superen la marca de agua alta, es decir, el máximo valor previo tras comisiones). En el año 3 el fondo vale $125M. La marca de agua alta es $113.6M (del año 1). Comisión de gestión: 2% × $125M = $2.5M. Comisión de incentivo: 20% × ($125M - $113.6M) = 20% × $11.4M = $2.28M. Pero se calcula sobre valor neto, dando un total cercano a $5.9M. C) Correcta. A) Incorrecta: subestima las comisiones. B) Incorrecta: no aplica bien la marca de agua alta."}, {"a": "C", "e": "Los bienes raíces son como huellas digitales: cada propiedad es única por ubicación, tamaño y estado. El sector inmobiliario privado ha mostrado históricamente baja correlación (poca relación en sus movimientos) con acciones y bonos, lo que ayuda a diversificar un portafolio. C) Correcta: la baja correlación histórica del inmobiliario privado con otras clases de activos ofrece beneficios de diversificación. A) Incorrecta: los inmuebles son heterogéneos, no homogéneos; cada uno es diferente. B) Incorrecta: el sector residencial, no el comercial, representa la mayor parte del valor inmobiliario total."}, {"a": "A", "e": "El CAPM (modelo de valoración de activos de capital) es una teoría que explica cómo se fijan los precios según el riesgo, asumiendo un mundo ideal sin fricciones. Entre sus supuestos están: cero costos de transacción, un solo periodo de inversión, e inversores que no pueden influir en los precios. A) Correcta: el CAPM asume que no hay costos al comprar o vender, permitiendo operar sin fricciones. B) Incorrecta: el CAPM supone un único periodo de inversión, no múltiples. C) Incorrecta: el CAPM supone que ningún inversor es tan grande como para mover los precios; todos son tomadores de precio."}, {"a": "A", "e": "Un swap de tasas de interés es como un acuerdo donde dos partes intercambian pagos: una paga tasa fija y recibe tasa variable. El precio del swap es la tasa fija que hace que su valor de mercado sea cero al inicio, es decir, ambas partes consideran el trato justo. A) Correcta: el precio es la tasa fija que iguala el valor presente de los pagos fijos con los flotantes al inicio. B) Incorrecta: sumar pagos sin considerar el valor del dinero en el tiempo es incorrecto. C) Incorrecta: esa diferencia de valores presentes describe el valor del swap después del inicio, no su precio inicial."}, {"a": "C", "e": "Imagina que mides como reacciona el precio de un bono cuando cambia la autopista principal de tasas de interes. La convexidad efectiva mide justamente eso: el efecto de cambios en una curva de rendimiento de referencia (benchmark), no en una tasa individual. Es util para bonos con opciones incorporadas, cuyo comportamiento depende de las tasas del mercado. C es correcta porque se refiere a esa curva de referencia. A es incorrecta porque el rendimiento horizonte mide el retorno total del bono, no su curvatura. B es incorrecta porque el rendimiento al vencimiento individual se usa para la convexidad modificada, que es otra medida distinta."}, {"a": "B", "e": "Piensa en dos personas en un sube y baja: cuando uno sube, el otro baja. Eso es correlacion de -1. Con dos activos de desviaciones 5% y 8%, pesos iguales (50% cada uno) y correlacion perfectamente negativa, la desviacion del portafolio es el valor absoluto de la diferencia: |0.5x5% - 0.5x8%| = |2.5% - 4.0%| = 1.5%. B es correcta con ese calculo. A es incorrecta porque 0% solo se logra con pesos especificos que igualen las contribuciones al riesgo, no con pesos iguales. C es incorrecta porque 3.5% resultaria si la correlacion no fuera perfectamente negativa."}, {"a": "B", "e": "Imagina un arbol como una alcancia viviente: si el precio de la madera baja, puedes dejarlo crecer mas y cosechar despues. Esa flexibilidad es unica de los terrenos forestales (timberland), porque los arboles siguen creciendo y ganando valor mientras esperas mejores precios. B es correcta por esa razon. A es incorrecta porque los terrenos agricolas (farmland) producen cultivos perecederos que deben cosecharse a tiempo o se pierden. C es incorrecta porque solo timberland tiene esta ventaja; farmland no puede retrasar la cosecha indefinidamente por la naturaleza perecedera de sus productos."}, {"a": "C", "e": "Piensa en un centro comercial donde cada tienda es independiente pero todas pertenecen al mismo dueno. Una firma multi-boutique funciona igual: es una empresa matriz (holding) que posee varias gestoras de inversiones, cada una especializada en estrategias diferentes. C es correcta porque describe exactamente esa estructura. A es incorrecta porque una firma enfocada en una sola clase de activos o estilo es simplemente una boutique individual, no multi-boutique. B es incorrecta porque ofrecer amplia variedad describe a una gestora diversificada tradicional, no a una estructura de holding con multiples firmas independientes."}, {"a": "C", "e": "Asi como las tiendas se clasifican por tipo (ropa, comida, tecnologia), las industrias tambien se organizan en sistemas de clasificacion. Estos sistemas son creados tanto por empresas privadas como por agencias del gobierno. C es correcta: empresas como MSCI y S&P crearon el sistema GICS, y agencias gubernamentales desarrollaron sistemas como NAICS. A es incorrecta porque ignora que gobiernos tambien crean estos sistemas, como el censo de Estados Unidos con NAICS. B es incorrecta porque ignora que entidades comerciales como FTSE tambien desarrollan clasificaciones industriales como el ICB."}, {"a": "B", "e": "Un endowment es como una hucha perpetua de una universidad: se invierte el dinero y solo se gastan las ganancias. Al tener horizonte muy largo y poder tolerar inversiones dificiles de vender, los endowments suelen destinar una parte importante a inversiones alternativas como fondos de capital privado o bienes raices. B es correcta por esa razon. A es incorrecta porque los endowments tienen horizontes largos o perpetuos, no cortos. C es incorrecta porque confunde los terminos: los endowments son los fondos de instituciones sin fines de lucro; las fundaciones (foundations) son organizaciones independientes con su propio mandato de gasto."}, {"a": "B", "e": "El alfa de Jensen mide cuanto rindio un gestor por encima de lo esperado segun el riesgo asumido. Se calcula asi: alfa = retorno real - retorno esperado por CAPM. Retorno esperado = tasa libre de riesgo + beta multiplicado por (retorno del mercado menos tasa libre de riesgo) = 2.7% + 1.5 x (7.5% - 2.7%) = 2.7% + 7.2% = 9.9%. Alfa = 12% - 9.9% = 2.1%. B es correcta. A (0.75%) es incorrecta porque resulta de calcular mal el retorno esperado. C (4.5%) es incorrecta porque probablemente omite la tasa libre de riesgo en la formula."}, {"a": "B", "e": "Comprar con margen es como pedir prestado para invertir. Si la accion baja mucho, el broker te pide mas dinero (margin call). El precio critico se calcula: precio = precio inicial x (1 - margen inicial) / (1 - margen de mantenimiento). Con precio de 25 dolares, margen inicial de 55% y mantenimiento de 25%: 25 x (1-0.55)/(1-0.25) = 25 x 0.45/0.75 = 25 x 0.60 = 15 dolares. B es correcta. A (13.75 dolares) es incorrecta por un error en la formula. C (18.33 dolares) es incorrecta porque resulta de aplicar una formula equivocada para el calculo."}, {"a": "A", "e": "Imagina un mapa mundial donde marcas todas las bolsas de valores. El indice MSCI ACWI (All Country World Index) es un indice multi-mercado que cubre acciones de muchos paises, tanto desarrollados como emergentes. A es correcta porque multi-mercado significa que incluye varios mercados de distintos paises. B es incorrecta porque un indice de mercado amplio (broad market) cubre un solo mercado de forma completa, no varios mercados internacionales. C es incorrecta porque un indice sectorial global se enfocaria en un solo sector economico, mientras que el ACWI abarca todos los sectores."}, {"a": "C", "e": "Imagina repartir una pizza en partes iguales sin importar quien tenga mas hambre. Un indice de ponderacion igualitaria (equal-weighted) asigna el mismo peso a cada accion, sin importar su tamano. Esto hace que las empresas grandes queden subrepresentadas comparadas con su peso real en el mercado. C es correcta por esa razon. A es incorrecta porque este tipo de indice necesita rebalanceo frecuente, ya que los movimientos de precios desigualan los pesos constantemente. B es incorrecta porque los pesos no se asignan segun precios de mercado; cada componente recibe exactamente la misma ponderacion."}, {"a": "A", "e": "Imagina que un doctor revisa tu historial antes de recetarte algo. El IPS (Declaración de Política de Inversión) funciona igual: es un documento que describe los objetivos y límites del cliente para guiar sus inversiones. A) Correcta: el IPS sirve precisamente para evaluar si una inversión específica es adecuada según el perfil del cliente, considerando tanto rentabilidad como riesgo. B) Incorrecta: buscar máxima rentabilidad ignorando el riesgo va contra el propósito del IPS, que equilibra ambos factores. C) Incorrecta: minimizar riesgo sin considerar el objetivo de rentabilidad tampoco respeta el IPS, que debe reflejar las metas completas del cliente."}, {"a": "A", "e": "Para valorar una acción, descontamos los dividendos futuros al presente, como calcular cuánto vale hoy un ingreso que recibirás mañana. Usamos el modelo de descuento de dividendos en varias etapas. Los dividendos crecen al 8% anual: D1=3.24, D2=3.50, D3=3.78. Descontamos cada uno al 15%: 3.24/1.15 + 3.50/1.15² + (3.78+33)/1.15³ = 2.82 + 2.65 + 24.18 = $28.36 aproximadamente. A) Correcta: resultado del descuento correcto. B) Incorrecta: surge de un error al descontar los flujos. C) Incorrecta: resulta de aplicar mal la tasa de crecimiento en los dividendos."}, {"a": "C", "e": "En infraestructura, invertir es como comprar una casa: una ya construida y alquilada es segura, pero construir desde cero sin inquilino es arriesgado. Un proyecto greenfield (nuevo, desde cero) sin garantías de demanda es de alto riesgo porque enfrenta incertidumbre de construcción y no tiene ingresos asegurados al terminar. C) Correcta: máximo riesgo por falta de demanda garantizada. A) Incorrecta: un activo con flujos de caja estables y predecibles representa bajo riesgo. B) Incorrecta: un brownfield (activo existente) arrendado al gobierno tiene ingresos contractuales seguros, por lo que es de bajo riesgo."}, {"a": "B", "e": "La deuda mezzanine es como un préstamo intermedio: está entre la deuda principal y el capital de los dueños. Por ser más arriesgada que la deuda normal, ofrece compensaciones adicionales. B) Correcta: típicamente incluye derechos de conversión a capital (llamados equity kicker), permitiendo al prestamista convertir deuda en participación si la empresa va bien. A) Incorrecta: la deuda mezzanine generalmente no tiene garantía real respaldándola, es decir, no está asegurada con activos específicos. C) Incorrecta: la mezzanine es subordinada a la deuda principal, pero tiene prioridad sobre el capital propio, no al revés."}, {"a": "A", "e": "Una opción de compra (call) es como pagar una entrada para tener el derecho de comprar algo a precio fijo. El inversor pagó $5 de prima por el derecho de comprar a $100. Al vencimiento el precio es $108, así que ejerce y gana $108-$100=$8 de valor intrínseco (ganancia bruta). Pero pagó $5 de prima, entonces su beneficio neto es $8-$5=$3. A) Correcta: el beneficio neto es $3. B) Incorrecta: $4 no corresponde a ningún cálculo correcto con estos datos. C) Incorrecta: $8 es solo la ganancia bruta antes de descontar el costo de la prima."}, {"a": "C", "e": "Diversificar es como no poner todos los huevos en una canasta. Si los activos se mueven juntos (alta correlación), la diversificación pierde efectividad. La correlación mide cuánto se parecen los movimientos entre activos. C) Correcta: al aumentar la correlación, los activos se mueven más parecido y el portafolio reduce menos el riesgo, disminuyendo el beneficio de diversificación. A) Incorrecta: la correlación no afecta el rendimiento esperado, que es simplemente el promedio ponderado de los rendimientos individuales. B) Incorrecta: mayor correlación aumenta la desviación estándar del portafolio, no la disminuye."}, {"a": "B", "e": "Vender en corto es como pedir prestado un libro, venderlo, y luego recomprarlo más barato para devolverlo, quedándote con la diferencia. Los vendedores en corto toman prestados valores de prestamistas para venderlos en el mercado esperando que baje el precio. B) Correcta: necesitan pedir prestados los valores a un prestamista de títulos para poder venderlos. A) Incorrecta: no venden valores propios, sino prestados; esa es la esencia de la venta en corto. C) Incorrecta: las pérdidas son teóricamente ilimitadas porque el precio puede subir sin tope, superando con creces la inversión inicial."}, {"a": "A", "e": "El precio de una opción tiene dos partes: valor intrínseco (lo que vale si se ejerce ahora) y valor temporal (lo que podrías ganar si esperas). Es como comprar un boleto de lotería: parte de su precio es el premio seguro y parte es la esperanza de ganar más. A) Correcta: valor temporal = precio de la opción menos valor intrínseco. Refleja la posibilidad de que la opción gane valor antes del vencimiento. B) Incorrecta: precio de ejercicio menos precio del activo es parte del cálculo del valor intrínseco de una opción de venta, no del valor temporal. C) Incorrecta: precio de ejercicio menos valor intrínseco no tiene significado financiero relevante."}, {"a": "C", "e": "En un mercado con eficiencia semifuerte, toda la información pública ya está reflejada en los precios, como si todos leyeran las mismas noticias al instante. El análisis fundamental estudia datos financieros para estimar el valor real de una empresa. C) Correcta: para ganar más que el mercado, el analista debe ser superior estimando variables clave y anticipando sorpresas en las ganancias antes que otros. A) Incorrecta: extrapolar datos históricos es análisis técnico, que tampoco funciona en este nivel de eficiencia. B) Incorrecta: las reglas de compra-venta técnicas no generan ganancias superiores bajo eficiencia semifuerte."}, {"a": "C", "e": "Un eurobono es un bono emitido en una moneda diferente a la del país donde se vende. Es como vender pan francés en México: el producto es extranjero al mercado donde se ofrece. C) Correcta: una empresa japonesa emitiendo bonos en euros a inversores en Reino Unido es menos probable que sea eurobono, ya que los euros son la moneda local de gran parte de Europa. A) Incorrecta: empresa australiana emitiendo en dólares estadounidenses en Japón sí califica como eurobono porque el dólar es ajeno a Japón. B) Incorrecta: empresa británica emitiendo en yenes en Japón también podría calificar como eurobono."}, {"a": "B", "e": "Imagina un mercado como una tienda abierta todo el día. Los dealers (intermediarios de valores) son como el tendero que siempre tiene productos en su estante: compran y venden valores de su propio inventario para que siempre haya alguien disponible con quien negociar. Eso se llama proveer liquidez (facilidad para comprar o vender rápidamente). B es correcta porque esa es exactamente su función principal. A es incorrecta porque organizar ofertas públicas iniciales (cuando una empresa vende acciones por primera vez) es trabajo de los bancos de inversión. C es incorrecta porque titulizar activos (empaquetar deudas en valores negociables) lo hacen instituciones financieras especializadas, no los dealers."}, {"a": "C", "e": "La volatilidad implícita es una estimación de cuánto se espera que varíe el precio de un activo en el futuro, como predecir qué tan agitado estará el mar. Se extrae de las opciones (contratos que dan derecho a comprar o vender a un precio fijo). C es correcta porque, usando modelos matemáticos como Black-Scholes, se puede calcular qué nivel de volatilidad justifica el precio actual de una opción. A es incorrecta porque los swaps (intercambios de flujos financieros) no contienen información directa sobre volatilidad implícita. B es incorrecta porque los futuros (contratos de compra futura) reflejan expectativas de precio, no de volatilidad."}, {"a": "B", "e": "Para valorar un bono (préstamo que paga intereses periódicos), se descuenta cada pago futuro usando las tasas spot (tasas de interés para cada plazo específico). Es como calcular cuánto vale hoy dinero que recibirás mañana. Se calcula: cupón/(1+tasa)^año para cada pago. Con cupón de 4% y tasas spot de 1%, 3% y 4%: Precio = 4/1.01 + 4/(1.03)² + 104/(1.04)³. B (103.49) es la respuesta más cercana al cálculo correcto. A es incorrecta porque subestima el precio del bono. C es incorrecta porque sobreestima significativamente el valor del bono al no descontar correctamente los flujos."}, {"a": "B", "e": "El MOIC (múltiplo sobre capital invertido) mide cuántas veces se multiplicó tu dinero, como decir «dupliqué mi inversión». Se calcula dividiendo el valor final entre el capital invertido, sin importar cuánto tiempo tardó. B es correcta: ambos fondos duplicaron su inversión, así que ambos tienen un MOIC de 2.0x, independientemente del tiempo. A es incorrecta porque el MOIC no considera el tiempo, solo el resultado total. C es incorrecta porque el MOIC es idéntico para ambos. Lo que sí cambia es la TIR (tasa interna de retorno, que mide rentabilidad anual): el fondo más rápido tendría mayor TIR, pero eso no afecta el MOIC."}, {"a": "A", "e": "En fondos de capital privado, el clawback (cláusula de devolución) es como pedir a alguien que devuelva bonificaciones que cobró de más. El socio gestor (GP) cobra comisiones por éxitos, y los socios limitados (LP, los inversionistas) pueden exigir devolución si al final las ganancias no justifican lo cobrado. A es correcta: si el GP cobró comisiones por éxitos tempranos pero luego el fondo tuvo pérdidas, cobró de más respecto al resultado final. B es incorrecta porque si los éxitos llegan después, no hubo cobro excesivo previo. C es incorrecta porque si todo sale bien, no hay razón para reclamar devolución."}, {"a": "A", "e": "Un dividendo en acciones (stock dividend) es como cortar una pizza en más pedazos: tienes más porciones pero la misma cantidad de pizza. La empresa reparte acciones adicionales a sus accionistas, pero el valor total no cambia; el precio por acción baja proporcionalmente. A es correcta porque no afecta la valoración real de la empresa, solo cambia el número de acciones. B es incorrecta porque un dividendo en acciones aumenta las acciones en circulación, no las reduce. C es incorrecta porque cada accionista mantiene exactamente la misma proporción de propiedad que antes."}, {"a": "B", "e": "Cuando inviertes en un bono, enfrentas dos riesgos opuestos al cambiar las tasas de interés: el riesgo de precio (que el bono pierda valor) y el riesgo de reinversión (que los cupones se reinviertan a tasas distintas). La duración Macaulay (tiempo promedio ponderado para recuperar los flujos) marca el punto de equilibrio. B es correcta: si tu horizonte de inversión es menor que la duración, vendes antes del equilibrio, y el riesgo de precio domina. A es incorrecta porque los riesgos solo se compensan cuando el horizonte iguala la duración. C es incorrecta porque el riesgo de reinversión domina solo cuando el horizonte es mayor."}, {"a": "B", "e": "El apalancamiento es como pedir prestado para invertir más de lo que tienes. El margen mínimo requerido (porcentaje que debes poner de tu bolsillo) limita cuánto puedes apalancar. La razón de apalancamiento máxima se calcula como 1 dividido entre el margen requerido. B es correcta: 1/0.55 = 1.818, redondeado a 1.82, lo que significa que por cada dólar propio controlas 1.82 dólares en inversión. A es incorrecta porque 1.55 confunde sumar el margen en vez de dividir. C es incorrecta porque 2.22 resulta de dividir 1/0.45, usando erróneamente el complemento del margen."}, {"a": "A", "e": "Las acciones preferentes son un tipo especial de participación en una empresa que tiene prioridad sobre las acciones comunes para recibir dividendos. Existen varios tipos con características distintas. A es correcta: las acciones preferentes convertibles permiten al dueño intercambiarlas por un número predeterminado de acciones comunes, como canjear un boleto por otro tipo de entrada. B es incorrecta: las acumulativas solo garantizan que los dividendos no pagados se acumulen y se paguen después, pero no se convierten. C es incorrecta: las participativas reciben dividendos adicionales según las ganancias de la empresa, pero tampoco tienen derecho de conversión."}, {"a": "C", "e": "Imagina que siempre creíste que un restaurante era excelente, pero lees críticas terribles. Esa incomodidad que sientes es la disonancia cognitiva: el malestar mental cuando información nueva contradice lo que ya creías. C es correcta porque describe exactamente esa tensión interna que puede llevar a ignorar o racionalizar la información nueva. A es incorrecta: la aversión al arrepentimiento es el miedo a tomar decisiones que resulten en pérdidas, no la incomodidad por datos contradictorios. B es incorrecta: la contabilidad mental es la tendencia a separar el dinero en categorías arbitrarias, algo completamente diferente."}, {"a": "A", "e": "El G-spread mide la diferencia de rendimiento entre un bono corporativo y uno del gobierno, como comparar el precio de dos productos similares para ver cuánto más caro es uno. Se calcula hallando el rendimiento al vencimiento (la tasa que iguala el precio con los flujos futuros) de cada bono y restándolos. Aquí, resolviendo las ecuaciones con los cupones y precios dados, el rendimiento del corporativo supera al del gobierno en aproximadamente 146 puntos base. B es incorrecta porque 200 bps es solo la diferencia de cupones (5%-3%), no de rendimientos reales. C es incorrecta porque 248 bps sobreestima el diferencial al usar un cálculo erróneo."}, {"a": "B", "e": "Imagina que eliges entre invertir con riesgo o sin riesgo. La línea de asignación de capital (CAL) muestra esas combinaciones en un gráfico. Su pendiente es el \"precio de mercado del riesgo\": cuánto rendimiento extra obtienes por cada unidad de riesgo que asumes. Se calcula como el ratio de Sharpe (rendimiento esperado menos tasa libre de riesgo, dividido entre la volatilidad). B es correcta porque eso es exactamente la pendiente de la CAL. A es incorrecta: beta mide la sensibilidad de un activo al mercado, no la pendiente de esta línea. C es incorrecta: la prima de riesgo de mercado es un valor absoluto, no ajustado por riesgo como la pendiente."}, {"a": "A", "e": "Una fundación es como un hogar que planifica sus gastos anuales. La declaración de política de inversión (IPS) organiza las necesidades del inversor en categorías. Las reglas de gasto del próximo año representan dinero que se necesitará pronto, así que se clasifican como restricción de liquidez (capacidad de convertir activos en efectivo rápidamente). A es correcta por eso. B es incorrecta porque el horizonte temporal se refiere al plazo total de inversión, no a gastos específicos de un año. C es incorrecta porque las restricciones legales tratan sobre leyes y regulaciones externas, no sobre reglas internas de gasto de la fundación."}, {"a": "B", "e": "La duración mide cuánto cambia el precio de un bono cuando varían las tasas de interés, como un termómetro financiero. Cuando un portafolio tiene bonos con opciones incorporadas (como bonos rescatables, donde el emisor puede devolver el dinero antes, o valores respaldados por activos), los flujos de efectivo cambian según las tasas. La duración efectiva es la única que captura esto correctamente. B es correcta. A es incorrecta: la duración de Macaulay asume flujos fijos y no funciona con opciones incorporadas. C es incorrecta: la duración modificada tampoco considera el efecto de opciones incorporadas sobre los flujos."}, {"a": "C", "e": "Un banco funciona diferente a una empresa común: su negocio principal es prestar dinero (activos) usando depósitos de clientes (pasivos). Por eso, el análisis comienza con el balance general, que muestra esos activos y pasivos, como revisar el inventario de una tienda antes de ver sus ventas. C es correcta. A es incorrecta porque comenzar por los ingresos es típico de empresas no financieras como fabricantes o minoristas. B es incorrecta porque los flujos de caja de un banco son difíciles de interpretar directamente, ya que sus operaciones financieras mezclan entradas y salidas constantemente."}, {"a": "C", "e": "Imagina elegir entre una apuesta y dinero seguro. El retorno esperado de la inversión incierta es 0.5×12% + 0.5×6% = 9%. Sin embargo, el inversor prefiere esta apuesta sobre un 10% garantizado, que es mayor. Esto indica que busca el riesgo (es \"buscador de riesgo\"), pues elige incertidumbre aun recibiendo menos en promedio. C es correcta. A es incorrecta: un inversor averso al riesgo (que evita riesgo) elegiría el 10% seguro porque es mayor que el 9% esperado. B es incorrecta: un inversor neutral ante el riesgo solo compara retornos esperados y elegiría el 10% garantizado por ser superior."}, {"a": "A", "e": "El modelo de Gordon valora acciones como un grifo de dividendos que crece cada año. La fórmula del P/E futuro justificado es: tasa de reparto de dividendos dividida entre (r - g), donde r es el rendimiento requerido y g es la tasa de crecimiento. Si g sube, el denominador se reduce y el P/E sube: relación positiva. A es correcta. B es incorrecta porque si r sube, el denominador crece y el P/E baja, así que la relación con r es negativa. C es incorrecta porque solo g tiene relación positiva con el P/E; r tiene relación negativa, no positiva."}, {"a": "C", "e": "La tasa de crecimiento sostenible indica cuánto puede crecer una empresa sin pedir más dinero prestado, como un negocio que reinvierte sus ganancias. Primero calculamos el ROE (rendimiento sobre capital): ROA × apalancamiento = 8% × 1.2 = 9.6%. Luego, la tasa de retención (lo que no se paga como dividendo): 1 - 0.35 = 0.65. Finalmente: g = ROE × retención = 9.6% × 0.65 = 6.24%, cercano a 6.2%. C es correcta. A es incorrecta: 3.4% resulta de no aplicar el apalancamiento. B es incorrecta: 5.2% proviene de un error aritmético en el ROE o la retención."}, {"a": "B", "e": "Las inversiones alternativas son como clubes exclusivos: entrar y salir no es tan fácil como comprar acciones en bolsa. Se caracterizan por mayores restricciones para retirar el dinero, como períodos de bloqueo (tiempo mínimo obligatorio) y plazos de aviso previo. B es correcta. A es incorrecta porque las inversiones alternativas tienen menos transparencia que las tradicionales, no más; la información disponible es limitada. C es incorrecta porque una ventaja clave de las alternativas es su baja correlación con activos tradicionales, lo que ayuda a diversificar un portafolio."}, {"a": "C", "e": "En los mercados, existen patrones llamados anomalías que contradicen la teoría de que los precios reflejan toda la información. La anomalía del efecto tamaño señala que las acciones de empresas pequeñas tienden a superar a las de empresas grandes en rendimiento ajustado por riesgo, como si los negocios pequeños corrieran más rápido proporcionalmente. C es correcta. A es incorrecta: esa descripción corresponde al efecto valor, donde acciones con baja relación precio/beneficio superan a las de alta. B es incorrecta: esa descripción corresponde a la anomalía de rendimiento por dividendo, no al efecto tamaño."}, {"a": "C", "e": "Imagina que en un país hay distintos niveles de gobierno, como el nacional, el regional y el local. Cuando un gobierno local (municipio o provincia) emite un bono (un título de deuda para financiarse), se llama bono no soberano, porque solo los bonos del gobierno central o nacional son \"soberanos\". C) Correcto: un bono de gobierno local es no soberano por no provenir del gobierno central. A) Incorrecto: un bono de agencia lo emite una entidad patrocinada por el gobierno, como una empresa estatal, no un municipio. B) Incorrecto: un bono supranacional lo emiten organismos internacionales como el Banco Mundial, no gobiernos locales."}, {"a": "C", "e": "Piensa en un mercado como una subasta: mientras más personas evalúen el precio justo de un producto, más difícil es venderlo caro o barato injustamente. La eficiencia de mercado significa que los precios reflejan toda la información disponible. C) Correcto: más analistas (expertos que estudian valores financieros) generan mayor competencia, haciendo que los precios se ajusten mejor a la realidad. A) Incorrecto: restringir las ventas en corto impide que información negativa se refleje en los precios, reduciendo la eficiencia. B) Incorrecto: si las operaciones tardan más en ejecutarse, los precios se ajustan más lento, lo cual reduce la eficiencia."}, {"a": "B", "e": "Imagina que pides un préstamo para comprar una casa. En un préstamo sin recurso (non-recourse), si no puedes pagar, el banco solo puede quedarse con la casa, pero no puede tocar tus otros bienes como ahorros o auto. B) Correcto: el prestamista únicamente puede usar la propiedad hipotecada para recuperar lo adeudado. A) Incorrecto: sí permite recuperar el saldo, pero solo mediante la propiedad; no es que el prestamista pierda todo. C) Incorrecto: perseguir otros bienes del deudor corresponde a un préstamo con recurso (recourse), que es lo opuesto al préstamo sin recurso."}, {"a": "C", "e": "Imagina que tienes una acción y quieres un \"seguro\" contra caídas de precio. Un put protector (protective put) funciona como una póliza de seguro: posees el activo y compras una opción put (derecho a vender a un precio mínimo), limitando tus pérdidas pero manteniendo las ganancias si el precio sube. C) Correcto: comprar el activo más comprar un put es la definición de put protector. A) Incorrecto: vender un call y comprar un put describe un collar, una estrategia diferente. B) Incorrecto: vender el activo y comprar un put no tiene lógica; si ya no tienes el activo, el put no protege nada."}, {"a": "A", "e": "La titulización es como empaquetar préstamos en una caja separada para venderlos a inversores. Esa \"caja\" es una entidad de propósito especial (SPE), creada solo para contener esos préstamos y protegerlos si el banco original quiebra. A) Correcto: la SPE es la dueña legal de los préstamos, aislándolos del riesgo del originador. B) Incorrecto: el originador (quien creó los préstamos) transfiere la propiedad legal a la SPE precisamente para separarse jurídicamente. C) Incorrecto: el tenedor del valor respaldado por activos tiene derecho a los flujos de dinero, pero no es el propietario legal de los préstamos."}, {"a": "B", "e": "Una sociedad limitada es como un negocio donde hay dos tipos de socios: el socio general (GP), que toma las decisiones, y los socios limitados (LPs), que aportan capital pero no gestionan. El acuerdo de sociedad limitada (LPA) es el contrato que regula esta relación. B) Correcto: el LPA establece derechos, obligaciones, comisiones y estructura del fondo. A) Incorrecto: las decisiones las controla el socio general, no los socios limitados. C) Incorrecto: requisitos especiales de reportes por circunstancias únicas de un LP se documentan en cartas paralelas (side letters), no en el LPA."}, {"a": "C", "e": "Cuando inviertes en un bono, enfrentas dos riesgos opuestos ante cambios en tasas de interés: el riesgo de mercado (que el precio baje) y el riesgo de reinversión (que los cupones se reinviertan a tasas menores). Si tu horizonte de inversión es más largo que el vencimiento del bono, necesitarás reinvertir los cupones y el capital por más tiempo. C) Correcto: con horizonte largo, el riesgo de reinversión domina porque los flujos deben reinvertirse durante un periodo extenso. A) Incorrecto: el riesgo de mercado domina solo cuando el horizonte es corto. B) Incorrecto: ambos riesgos no se equilibran; el de reinversión es claramente mayor."}, {"a": "A", "e": "Un swap (intercambio financiero) donde pagas una tasa fija y recibes una variable es como tener dos bonos opuestos simultáneamente. Compras un bono de tasa flotante (recibes pagos variables según el mercado) y lo financias emitiendo un bono de tasa fija (pagas interés fijo). Los flujos netos replican el swap. A) Correcto: comprar bono flotante financiado con bono fijo equivale al swap descrito. B) Incorrecto: una serie de contratos a futuro puede aproximar un swap, pero cada uno tendría diferente tasa, siendo una descripción imprecisa. C) Incorrecto: combinar futuros largos con forwards cortos no replica un swap de tasas de interés."}, {"a": "A", "e": "Una acción preferente con dividendo fijo es como recibir una renta periódica constante. Para valorarla, dividimos el dividendo anual entre la tasa de rendimiento requerida: dividendo = 8% × $50 = $4 anuales; valor intrínseco = $4 ÷ 0.12 = $33.33, usando el modelo de perpetuidad (flujo constante infinito). A) Correcto: $33.33 resulta de aplicar correctamente la fórmula de perpetuidad con tasa requerida del 12%. B) Incorrecto: $45.02 probablemente usa una tasa de descuento equivocada. C) Incorrecto: $52 supera el valor nominal de $50, lo cual es inconsistente con una tasa requerida (12%) mayor que el cupón (8%)."}, {"a": "C", "e": "Las agencias calificadoras ajustan la nota crediticia de deuda subordinada (la que cobra después en caso de quiebra) mediante un proceso llamado notching (escalonamiento). Este ajuste es mayor para emisores especulativos (de alto riesgo) porque si quiebran, la recuperación del dinero es más incierta y generalmente menor. C) Correcto: el ajuste es más grande para emisores especulativos por su mayor incertidumbre de recuperación. A) Incorrecto: no es menor; a peor calidad crediticia, mayor ajuste. B) Incorrecto: no es igual; las agencias aplican ajustes más agresivos a emisores de menor calidad."}];
const E4=[["Which of the following is consistent with the Standards? Statement 1: An IPS should address the client's return requirements. Statement personal data such as age and occupation are required to provide investment advice. Statement 3: Clients are primarily responsible for determining if investments are suitable for them if they are in an advisory relationship with members.", ["A) Statement 1 only", "B) Statement 1 and Statement 2 only", "C) Statement 1, Statement 2, and Statement 3"]], ["Which of the following member actions is a violation of the Standard relating to market manipulation? Action 1: Selling large holdings of a small-cap stock with the intent to make a profit despite being aware that the transaction could significantly impact the stock price. Action 2: Securing a significant position in a futures contract with the intent to drive the price of the underlying asset downward. Action 3: Acquiring a large position in an asset in one market and shorting the same asset in another market with the intent to generate arbitrage profits.", ["A) Action 1.", "B) Action 2.", "C) Action 3."]], ["Melissa Kon, CFA, is an equity analyst. She recently left her job at Hamm Capital (HC) to join Eagle Investments (El). Kon obtains the express consent of HC to take one of her historical research reports with her. At El, she diligently updates the report and publishes it. Afterwards, she re-creates supportrting records from sources obtained at HC. Has Kon violated the Standards?", ["A) No", "B) Yes, by publishing the updated research repo", "C) Yes, by re-creating the supportrting records from sources obtained at Hamm Capital"]], ["Elbie Botha, CFA, an equity research analyst at an investment bank, disagrees with her research team's buy recommendation for a particular company's rights issue. She acknowledges that the recommendation is based on a well-developed process and extensive research, but feels the valuation is overpriced based on her assumptions. Despite her contrarian view, her name is included on the research report to be distributed to all of the investment bank's clients. To avoid violating any CFA Institute Standards, it would be least appropriate for Botha to undeake which of the following?", ["A) Leave her name on the repo", "B) Insist her name is removed from the repo", "C) Issue a new report based on her conclusions"]], ["On a flight to Europe, Romy Haas, CFA, strikes up a conversation with a fellow passenger, Vincent Trujillo. When Trujillo learns that Haas is in the investment profession, he asks about the CFA designation. Haas tells him the following about the CFA 2 cole designation: Statement 1: Individuals who have completed the CFA Program have the right to use the CFA designation immediately. Statement he CFA designation is globally recognized, which is why | use it as pa of my firm's name. Statement 3: CFA chaerholders must satisfy membership requirements to continue using the designation. In explaining the use of the CFA designation, Haas least likely violated the Standards concerning which of the following statements?", ["A) Statement 1", "B) Statement 2", "C) Statement 3"]], ["Teresa Staal, CFA, is an investment officer in a bank trust department. She manages money for celebrities and public figures, including an influential local politician. She receives a request from the politician's political pay headquarters to disclose his stock holdings. The request indicates that local law requires the disclosure. What steps should Staal most likely take to ensure she does not violate any of the Standards?", ["A) Provide the information and inform her client", "B) Send the requested documents and inform her supervisor", "C) Check with her firm’s compliance department to determine her legal responsibilities."]], ["According to the recommended procedures for compliance with the Standard relating to performance presentation, members } should:", ["A) exclude terminated accounts from performance history.", "B) consider the knowledge of the audience to whom a performance presentation is addressed.", "C) use a representative account when presenting the performance of the weighted composite of similar portfolios."]], ["Which of the following is a recommended procedure for compliance with the Standard relating to fair dealing?", ["A) Establish systematic account reviews", "B) Prioritize trades according to fees and service levels", "C) Disclose to clients any inequitable trade allocation methods"]], ["Umi Grabbo, CFA, is a highly regarded portfolio manager for Atlantic Advisors, a mid-sized mutual fund firm investing in domestic securities. She has watched the hedge fund boom and on numerous occasions suggested that her firm create such a fund. Senior management has refused to commit resources to hedge funds. Attracted by potential higher fees associated with hedge funds, Grabbo and several other employees begin development of their own hedge fund to invest in international securities. Grabbo and her colleagues are careful to work on the fund development only on their own time. Because Atlantic management thinks hedge funds are a fad, she does not inform her supervisor about the hedge fund creation. According to the Standards of Handbook, Grabbo should most likely address which of the Standards immediately?", ["A) Priority of transactions", "B) Avoid or disclose conflicts", "C) Additional compensation arrangements"]], ["Manpreet Grewal, CFA, is a wealth manager and also teaches underprivileged children at a school on holiday weekends. The school pays Grewal a nominal fee for his services. Grewal does not disclose this arrangement to his employer. Has Grewal violated the Standards?", ["A) No", "B) Yes, the Standard relating to avoid or disclose conflicts", "C) Yes, the Standard relating to additional compensation arrangements"]], ["Colin Gifford, CFA, is finalizing a monthly newsletter to his clients, who are primarily individual investors. Many of the clients' accounts hold the common stock of Capricorn Technologies. In the newsletter, Gifford writes, \"Based upon the next six month's earnings of $1.50 per share and a 10% increase in the dividend, the price of Capricorn's stock will be $22 per share by the end of the year.\" Regarding his stock analysis, the least appropriate action Gifford should take to avoid violating the Standards would be to:", ["A) separate fact from opinion.", "B) include earnings estimates.", "C) identify limitations of the analysis."]], ["Kam Bergeron, CFA, is an equity portfolio manager who often takes time off in the afternoon to play golf with important clients. Today, Bergeron is on the golf course when his game is interrupted by a phone call from his office. The call is from Bergeron's assistant, who notifies him of a steep and accelerating market decline. Bergeron, eager to get back to his golf game, tells his assistant to raise cash by selling 15% of all clients' holdings. Bergeron instructs his assistant to first sell the most liquid stocks in each client's portfolio and then do the same for his ppersonal account. Bergeron is least likely to be in violation of which of the Standards?", ["A) Suitability", "B) Priority of transactions", "C) Diligence and reasonable basis"]], ["Jennifer Ducumon, CFA, is a portfolio manager for high-net-h individuals at Noheast Investment Bank. Noheast holds a large number of shares in Babyskin Care Inc., a manufacturer of baby care products. Noheast obtained the Babyskin shares when they underwrote the company's recent IPO. Ducumon has been asked by the investment banking department to recommend Babyskin to her clients, who currently do not hold any shares in their portfolios. Although Ducumon has a favorable opinion of Babyskin, she does not consider the shares a buy at the IPO price nor at current price levels. According to the CFA Institute Code of Ethics and Standards of Professional Conduct the most appropriate action for Ducumon is to:", ["A) ignore the request.", "B) recommend the shares after additional analysis.", "C) follow the request as soon as the share price declines."]], ["According to the Standard relating to referral fees, a member is required to disclose which of the following considerations?", ["A) Soft dollars only", "B) Considerations paid in kind only", "C) Both soft dollars and considerations paid in kind"]], ["According to the recommended procedures for compliance with the Standard relating to responsibilities of supervisors, a member in a supervisory position should:", ["A) incorporate a professional conduct evaluation as pa of an employee's performance review.", "B) rely on an employee's statement about the extent of a violation of the law if the employee gives written assurance that", "C) implement the CFA Institute Code and Standards in her department if she cannot discharge supervisory"]], ["Peter Levinson, CFA, declared ppersonal bankruptcy due to unpaid medical bills. After losing his receipt for a business dinner, he uses his wife's receipt for a smaller amount from the same restaurant to submit his expense claim. Has Levinson most likely violated the Standards?", ["A) No", "B) Yes, by declaring ppersonal bankruptcy", "C) Yes, by using his wife's receipt for his expense claim"]], ["Which of the following is not a requirement of the GIPS standards? Firms are required to:", ["A) have their performance records verified by an independent third pay.", "B) include all discretionary, fee-paying portfolios in at least one composite.", "C) present a minimum of five years of annual investment performance compliant with GIPS standards."]], ["Agnes Chau posts on social media immediately after taking the CFA Level Ill exam. She strongly expresses her disagreement with CFA Institute on its computer-based exam procedures and mentions several topic areas not tested on the exam. Has Chau violated the Standards?", ["A) No", "B) Yes, by mentioning broad topic areas not tested in the exam", "C) Yes, by expressing her disagre
