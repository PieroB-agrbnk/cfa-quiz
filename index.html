", "B) Yes, with respect to independence and objectivity", "C) Yes, with respect to additional compensation arrangements"]], ["Karl Wexler, CFA, with Santa Fe Capital, has applied for a promotion to supervise all portfolio managers. During interviews, he discovers the firm's compliance policies are seriously flawed. If offered the position, Wexler should most likely:", ["A) accept the position so that he will be better positioned to influence changes to the firm's compliance policies", "B) accept the position and disclose to clients his conflict of interest", "C) decline in writing to accept the position until the firm adopts and enforces adequate compliance procedures"]], ["Nicholas Boudreaux, CFA, manager of a high yield bond fund, gives a conference presentation with a brief summary of his fund's returns over 5 years alongside an appropriate benchmark. He notes more detailed info is available to all clients upon request and encourages prospective clients to become clients. Has Boudreaux most likely violated the Standards?", ["A) No", "B) Yes, with respect to performance presentation only", "C) Yes, with respect to both performance presentation and misrepresentation"]], ["A portfolio manager increases the maximum that a fund can invest in mid-cap companies from $500 million to $600 million due to inflation. The manager's investment process remains the same and she plans to inform the customer during the scheduled IPS revision at the beginning of next year. Has the manager most likely violated the Standards?", ["A) No", "B) Yes, with respect to fair dealing", "C) Yes, with respect to communication with clients and prospective clients"]], ["Phylicia Chan, CFA, lives and works in a country where laws governing financial professionals have historically been less stringent than the CFA Code and Standards. Her company considered adopting a code based on the Code and Standards, but decided not to after the country's parliament passed new laws (due to come into effect next year) that create even stricter requirements. Chan has been asked to make trades she believes are intended to distort security prices. Chan should most likely adhere to:", ["A) the Code and Standards", "B) her country's current laws", "C) her country's recently-passed laws"]]];
const S5=[{"a": "A", "e": "Divulgar conflictos de interes protege al cliente y cumple con el Codigo de Etica. La opcion B es front-running (operar antes que el cliente), que esta prohibido. La opcion C viola la confidencialidad del cliente."}, {"a": "C", "e": "La norma prohibe operar con informacion material no publica. Lo correcto es no operar y fomentar que la empresa divulgue la informacion. La opcion A es uso ilegal de informacion privilegiada. La opcion B es incorrecta porque operar despues de informar a cumplimiento sigue siendo una violacion."}, {"a": "A", "e": "GIPS exige presentar al menos 5 anos de historial de rendimiento conforme a GIPS, o desde el inicio si la firma tiene menos de 5 anos. La opcion B es incorrecta porque no se puede seleccionar solo los mejores composites. La opcion C es incorrecta porque las cuentas terminadas deben incluirse siempre."}, {"a": "C", "e": "Asignar IPOs a clientes institucionales primero por generar mas comisiones viola el deber de lealtad y cuidado hacia todos los clientes. No es justo dar preferencia basada en las comisiones. Las opciones A y B no se relacionan directamente con la asignacion injusta de inversiones."}, {"a": "B", "e": "Permitir que clientes premium operen antes que otros con las mismas recomendaciones viola el trato justo. La opcion A es correcta porque enviar a todos al mismo tiempo es justo. La opcion C es aceptable si se divulga claramente."}, {"a": "C", "e": "Los soft dollars estan permitidos solo si la investigacion pagada beneficia directamente a los clientes cuyas comisiones se usan. No estan totalmente prohibidos (opcion A incorrecta), pero tampoco se permiten sin restriccion (opcion B incorrecta)."}, {"a": "B", "e": "Invertir en un negocio de un familiar sin divulgarlo es un claro conflicto de interes y viola el deber fiduciario. La opcion A es una inversion prudente y diversificada. La opcion C es gestion rutinaria correcta del portafolio."}, {"a": "C", "e": "La norma requiere tener una base razonable y adecuada para cualquier recomendacion. No se debe simplemente seguir al consenso (opcion A) ni limitar recomendaciones solo a lo que subio en el pasado (opcion B), ya que el rendimiento pasado no garantiza resultados futuros."}, {"a": "B", "e": "Un almuerzo modesto de negocios es aceptable y no compromete la objetividad. Aceptar vacaciones de lujo sin divulgarlas (opcion A) compromete la independencia. Cambiar una calificacion por presion (opcion C) viola directamente la objetividad."}, {"a": "A", "e": "No se puede usar 'Chartered Financial Analyst' como titulo o sustantivo; solo se permite 'CFA' como adjetivo despues del nombre. La opcion B es el uso correcto. La opcion C es una declaracion aceptable sobre la experiencia."}, {"a": "C", "e": "La analista debe reportar la actividad ilegal a traves de los procedimientos de cumplimiento de la firma. Ignorarlo (opcion A) es incorrecto. Informar a los medios (opcion B) no es el canal apropiado y podria violar la confidencialidad."}, {"a": "B", "e": "La idoneidad requiere considerar la situacion financiera, experiencia de inversion y objetivos del cliente. Las preferencias de redes sociales (opcion A) y opiniones personales sobre gerentes (opcion C) no son factores relevantes para la idoneidad de inversiones."}, {"a": "A", "e": "La declaracion viola la norma VII(B) al implicar que la designacion CFA garantiza rendimientos, y tambien viola la norma I(C) porque es una tergiversacion decir que aprobar examenes garantiza resultados superiores. La opcion B no aplica porque no se trata de lealtad al empleador. La opcion C es incompleta."}, {"a": "C", "e": "Segun el Codigo de Etica, el deber principal es hacia los clientes, luego la integridad de los mercados de capitales, y despues el empleador. Las opciones A y B invierten incorrectamente este orden de prioridades."}, {"a": "A", "e": "La informacion detallada de clientes (saldos, estrategias) es propiedad del empleador anterior y no se puede llevar sin permiso. La opcion B ignora los derechos de propiedad del empleador. La opcion C seria parcialmente correcta para contactar clientes, pero la lista detallada sigue siendo propiedad de la firma anterior."}, {"a": "B", "e": "El valor futuro es FV = 10,000 x (1.06)^3 = 10,000 x 1.191016 = $11,910.16. La opcion A usa interes simple (10,000 + 1,800). La opcion C usa un factor de crecimiento incorrecto."}, {"a": "A", "e": "El VPN se calcula como: VP de los flujos = 15,000 x [(1 - 1.10^-4)/0.10] = 15,000 x 3.16987 = 47,548. VPN = 47,548 - 50,000 = -$2,452. La opcion B sobreestima los flujos. La opcion C no descuenta correctamente."}, {"a": "C", "e": "La TIR es la tasa de descuento que hace el VPN igual a cero, por definicion. La opcion A es incorrecta porque con flujos no convencionales pueden dar decisiones diferentes al VPN. La opcion B es al reves: se acepta si la TIR supera la tasa requerida."}, {"a": "A", "e": "La media es (4+8+6+10+12)/5 = 8. La varianza muestral es [(16+0+4+4+16)/4] = 10. La desviacion estandar es raiz de 10 = 3.16. La opcion B usa n en vez de n-1. La opcion C es la varianza, no la desviacion estandar."}, {"a": "B", "e": "Un coeficiente de correlacion de -0.75 indica una relacion lineal negativa fuerte: cuando un activo sube, el otro tiende a bajar. La opcion A describe correlacion positiva. La opcion C describe correlacion cercana a cero."}, {"a": "C", "e": "El valor presente de $5,800 en 2 anos al 8% es: 5,800 / (1.08)^2 = 5,800 / 1.1664 = $4,972. Como $5,000 hoy vale mas que $4,972, conviene tomar el dinero hoy. La opcion A calcula mal el VP. La opcion B tiene el VP correcto pero la conclusion incorrecta."}, {"a": "A", "e": "En una distribucion normal, aproximadamente 68% de las observaciones caen dentro de una desviacion estandar de la media. El 95% corresponde a dos desviaciones estandar (opcion B) y 99% a tres (opcion C)."}, {"a": "C", "e": "Precio = 50/1.06 + 50/1.06^2 + 1050/1.06^3 = 47.17 + 44.50 + 881.60 = $973.27. Cuando el rendimiento supera al cupon, el bono cotiza bajo par. La opcion A seria si rendimiento = cupon. La opcion B seria si rendimiento fuera menor al cupon."}, {"a": "B", "e": "Para eventos independientes, P(A y B) = P(A) x P(B) = 0.4 x 0.3 = 0.12. La opcion A suma las probabilidades, que seria P(A o B) sin ajuste. La opcion C no multiplica correctamente."}, {"a": "C", "e": "Chebyshev dice que al menos 1 - 1/k^2 de las observaciones estan dentro de k desviaciones estandar. Para k=3: 1 - 1/9 = 8/9 = 88.9%, aproximadamente 89%. La opcion A es para k=2. La opcion B sobreestima el resultado."}, {"a": "A", "e": "R-cuadrado de 0.81 significa que 81% de la variacion en la variable dependiente es explicada por la variable independiente. La correlacion seria la raiz cuadrada de R^2 = 0.9, no 0.81 (opcion B). La opcion C confunde R^2 con el coeficiente de la pendiente."}, {"a": "C", "e": "Un error Tipo I ocurre cuando se rechaza una hipotesis nula que es verdadera (falso positivo). La opcion A describe un error Tipo II. La opcion B describe no rechazar, que no es ningun tipo de error."}, {"a": "A", "e": "Intervalo = 100 +/- 1.96 x (18/raiz de 36) = 100 +/- 1.96 x 3 = 100 +/- 5.88 = [94.12, 105.88]. La opcion B usa un error estandar incorrecto. La opcion C no esta centrada correctamente."}, {"a": "B", "e": "VP = 2,000 x [(1 - 1.07^-5)/0.07] = 2,000 x 4.1002 = $8,200.40. El factor de anualidad a 5 anos al 7% es 4.1002. La opcion A usa un factor incorrecto. La opcion C no descuenta los flujos."}, {"a": "B", "e": "La media geometrica = [(1.10)(0.95)(1.20)]^(1/3) - 1 = [1.254]^(1/3) - 1 = 1.0789 - 1 = 7.89%. La opcion A es la media aritmetica (25/3 = 8.33%). La opcion C no calcula correctamente la raiz cubica."}, {"a": "A", "e": "En una distribucion uniforme entre 20 y 80, la probabilidad es (65-35)/(80-20) = 30/60 = 0.50. La opcion B y C calculan incorrectamente el rango relativo."}, {"a": "C", "e": "Si el p-valor (0.03) es menor que el nivel de significancia (0.05), se rechaza la hipotesis nula. La opcion A es incorrecta porque el p-valor es menor al umbral. La opcion B no es un paso necesario cuando ya se tiene suficiente evidencia."}, {"a": "B", "e": "El Teorema del Limite Central establece que con muestras de al menos 30 observaciones, la distribucion de la media muestral sera aproximadamente normal. La opcion A (10) es insuficiente. La opcion C (100) no es necesaria, 30 es suficiente."}, {"a": "C", "e": "La elasticidad precio de la demanda = % cambio en cantidad / % cambio en precio = -15% / 10% = -1.50. La opcion A invierte la formula. La opcion B seria elasticidad unitaria, que no corresponde a estos datos."}, {"a": "B", "e": "En competencia perfecta a largo plazo, la libre entrada y salida de firmas elimina las ganancias economicas, dejandolas en cero. La opcion A describe un monopolio. La opcion C es incorrecta porque las firmas cubren costos en equilibrio."}, {"a": "A", "e": "Un aumento en la oferta monetaria reduce las tasas de interes, lo que abarata el credito y estimula la inversion. La opcion B describe lo opuesto. La opcion C ignora el efecto de liquidez sobre las tasas."}, {"a": "A", "e": "El enfoque del gasto calcula el PIB como Consumo + Inversion + Gasto del gobierno + Exportaciones netas (X-M). La opcion B suma exportaciones e importaciones en vez de restarlas. La opcion C resta las exportaciones netas incorrectamente."}, {"a": "B", "e": "La inflacion de demanda ocurre cuando la demanda agregada crece mas rapido que la oferta agregada. La opcion A describe inflacion de costos (oferta). La opcion C reduciria la demanda y no causaria inflacion."}, {"a": "C", "e": "La balanza de pagos debe equilibrarse: un deficit en cuenta corriente debe compensarse con un superavit en cuenta de capital (entrada de capitales extranjeros). La opcion A no es correcta. La opcion B no tiene relacion directa obligatoria."}, {"a": "B", "e": "Mayor demanda de exportaciones aumenta la demanda de la moneda del pais, lo que la aprecia. La opcion A seria si cayera la demanda de exportaciones. La opcion C ignora los efectos del comercio sobre el tipo de cambio."}, {"a": "C", "e": "El monopolista maximiza ganancias donde el ingreso marginal iguala al costo marginal (IM = CM). La opcion A es la condicion de competencia perfecta. La opcion B minimiza costos pero no maximiza ganancias necesariamente."}, {"a": "A", "e": "A corto plazo, algunos precios de insumos (como salarios) son rigidos y no se ajustan de inmediato, por lo que las empresas producen mas cuando sube el nivel de precios. La opcion B describe el largo plazo. La opcion C no tiene logica economica."}, {"a": "B", "e": "La politica fiscal usa impuestos y gasto publico para influir en la economia. La opcion A describe politica monetaria. La opcion C describe politica cambiaria, no fiscal."}, {"a": "A", "e": "El pico del ciclo economico es el punto maximo de actividad economica antes de que comience una contraccion. La opcion B describe el valle (punto mas bajo). La opcion C describe una contraccion, no el pico."}, {"a": "C", "e": "Un arancel encarece los productos importados, lo que sube el precio domestico y reduce las importaciones. La opcion A describe lo opuesto. La opcion B ignora los efectos basicos de los aranceles."}, {"a": "B", "e": "La ventaja comparativa dice que los paises deben especializarse en producir bienes con el menor costo de oportunidad. La opcion A promueve autarquia, que es ineficiente. La opcion C confunde ventaja comparativa con ventaja absoluta."}, {"a": "C", "e": "La tasa de interes real aproximada = tasa nominal - inflacion = 8% - 3% = 5%. La opcion A suma en vez de restar. La opcion B confunde la tasa real con la inflacion."}, {"a": "A", "e": "En un oligopolio, pocas empresas dominan el mercado y cada una considera las acciones de sus rivales al tomar decisiones. La opcion B describe competencia perfecta. La opcion C describe mas un monopolio con producto unico."}, {"a": "C", "e": "Cuando el banco central vende bonos, retira dinero de la circulacion, reduciendo la oferta monetaria y subiendo las tasas de interes. La opcion A describe la compra de bonos, no la venta. La opcion B ignora el mecanismo de mercado abierto."}, {"a": "B", "e": "La ley de rendimientos marginales decrecientes dice que al agregar mas de un insumo variable a un insumo fijo, el producto marginal eventualmente disminuye. La opcion A confunde producto marginal con producto total. La opcion C describe rendimientos crecientes a escala, que es diferente."}, {"a": "A", "e": "La balanza de pagos incluye la cuenta corriente, la cuenta de capital y la cuenta financiera. La opcion B es incompleta. La opcion C excluye servicios, que son parte de la cuenta corriente."}, {"a": "C", "e": "La estanflacion combina estancamiento economico (bajo crecimiento) con alta inflacion. La opcion A describe una economia saludable. La opcion B describe deflacion con desempleo, que no es estanflacion."}, {"a": "A", "e": "Si la elasticidad cruzada es positiva, un aumento en el precio de un bien aumenta la demanda del otro, indicando que son sustitutos. La opcion B (complementos) tendria elasticidad cruzada negativa. La opcion C (bienes inferiores) se refiere a la elasticidad ingreso, no cruzada."}, {"a": "B", "e": "Una politica fiscal expansiva en recesion implica reducir impuestos y aumentar el gasto publico para estimular la economia. La opcion A es politica contractiva. La opcion C seria politica fiscal neutral."}, {"a": "B", "e": "El estado de resultados (income statement) muestra ingresos y gastos durante un periodo. El balance general muestra la posicion financiera en un momento dado, no durante un periodo. El estado de flujos de efectivo muestra movimientos de caja, no ingresos y gastos directamente."}, {"a": "C", "e": "Bajo IFRS, no se requiere presentar 'operating income' como linea separada en el estado de resultados, aunque muchas empresas lo hacen voluntariamente. Los costos financieros y la utilidad bruta si son requeridos por IFRS."}, {"a": "A", "e": "Capital contribuido = Activos totales - Pasivos totales - Utilidades retenidas = 500,000 - 300,000 - 120,000 = 80,000. Los 200,000 representan el patrimonio total, no solo el capital contribuido. Los 120,000 son las utilidades retenidas, no el capital contribuido."}, {"a": "C", "e": "LIFO (ultimo en entrar, primero en salir) asigna el costo de los articulos mas recientes al costo de ventas. FIFO asigna los costos mas antiguos al costo de ventas. El promedio ponderado usa un costo promedio de todos los articulos."}, {"a": "A", "e": "Con precios en alza, FIFO asigna costos antiguos (mas bajos) al costo de ventas, resultando en mayor utilidad neta. LIFO asigna costos recientes (mas altos) al costo de ventas, reduciendo la utilidad. El promedio ponderado queda entre ambos metodos."}, {"a": "B", "e": "Depreciacion en linea recta = (Costo - Valor residual) / Vida util = (100,000 - 0) / 5 = 20,000 por ano. 25,000 seria si la vida util fuera 4 anos. 50,000 seria si la vida util fuera solo 2 anos."}, {"a": "A", "e": "El efectivo recibido de clientes es parte de las actividades operativas, ya que se relaciona con las operaciones principales del negocio. Las actividades de inversion incluyen compra/venta de activos de largo plazo. Las actividades de financiamiento incluyen deuda y capital."}, {"a": "C", "e": "La depreciacion se suma de vuelta porque es un gasto que no implica salida de efectivo pero redujo la utilidad neta. No es una entrada de efectivo de inversion. No es un ajuste por capital de trabajo, sino un ajuste por gasto no monetario."}, {"a": "C", "e": "Un ratio corriente de 1.5 significa que los activos corrientes son 1.5 veces los pasivos corrientes. Esto indica capital de trabajo positivo, no negativo. Los activos corrientes superan a los pasivos corrientes, no al reves."}, {"a": "B", "e": "La rotacion de activos (ventas / activos totales) mide la eficiencia en el uso de activos para generar ventas. El ROE mide rentabilidad sobre el patrimonio. La razon deuda-patrimonio mide apalancamiento, no eficiencia."}, {"a": "C", "e": "Bajo IFRS 15, los ingresos se reconocen cuando se satisface una obligacion de desempeno (se transfiere el control del bien o servicio). No se requiere recibir efectivo para reconocer ingresos. La firma del contrato no es suficiente por si sola."}, {"a": "A", "e": "Un pasivo por impuestos diferidos surge cuando el gasto de impuestos contable excede los impuestos por pagar, por diferencias temporales. Si los impuestos por pagar exceden el gasto, se crea un activo diferido. Las diferencias permanentes no crean impuestos diferidos."}, {"a": "B", "e": "Un arrendamiento operativo resulta en mayor ingreso operativo en los primeros anos porque el gasto de arrendamiento es menor que la suma de depreciacion e intereses en un arrendamiento financiero. No genera mayores activos ni menores gastos totales a lo largo del plazo."}, {"a": "C", "e": "Pedir prestado mas deuda aumenta los pasivos sin cambiar el patrimonio, elevando la razon deuda-patrimonio. Emitir acciones aumenta el patrimonio, reduciendo la razon. Pagar deuda reduce los pasivos, tambien reduciendo la razon."}, {"a": "B", "e": "La descomposicion DuPont del ROE incluye margen de utilidad neta, rotacion de activos y apalancamiento financiero. El ratio corriente mide liquidez y no es parte de la formula DuPont. La rotacion de activos y el apalancamiento si son componentes."}, {"a": "A", "e": "Capitalizar un gasto lo registra como activo en lugar de gasto inmediato, lo que aumenta la utilidad neta en el periodo actual. No la disminuye ni la deja igual. El gasto se reconocera gradualmente via depreciacion o amortizacion en periodos futuros."}, {"a": "B", "e": "Una cuenta contra-activo compensa y reduce el saldo de un activo relacionado (por ejemplo, depreciacion acumulada reduce el valor de los activos fijos). No aumenta el valor de un activo. No es un pasivo presentado como activo."}, {"a": "A", "e": "Flujo de operaciones = 200,000 + 30,000 (depreciacion) - 15,000 (aumento cuentas por cobrar) + 10,000 (aumento cuentas por pagar) = 225,000. Se suma la depreciacion y los aumentos en pasivos corrientes, y se resta el aumento en activos corrientes. 255,000 y 215,000 resultan de errores en los signos de los ajustes."}, {"a": "A", "e": "NPV = -100,000 + 40,000 x [(1 - 1.10^-4) / 0.10] = -100,000 + 40,000 x 3.1699 = 26,795 aproximadamente. Los 60,000 serian el total sin descontar menos la inversion. El NPV no es 15,000 ya que el factor de anualidad a 4 anos al 10% es 3.17."}, {"a": "B", "e": "La TIR es la tasa de descuento que hace el VPN igual a cero. No maximiza flujos de efectivo futuros, esos ya estan determinados por el proyecto. No necesariamente es igual al WACC; si la TIR supera al WACC, el proyecto agrega valor."}, {"a": "C", "e": "Si el periodo de recuperacion (3.5 anos) es menor que el maximo aceptable (4 anos), el proyecto se acepta bajo la regla de payback. No se rechaza porque cumple con el criterio. Aunque el VPN es mas robusto, la regla de payback por si sola lo aceptaria."}, {"a": "B", "e": "El WACC incluye el costo de deuda despues de impuestos, el costo de capital propio y el costo de acciones preferentes. La tasa de crecimiento de utilidades retenidas no es un componente directo. El margen de utilidad bruta es una medida de rentabilidad, no de costo de capital."}, {"a": "A", "e": "WACC = 0.40 x 8% x (1-0.25) + 0.60 x 12% = 0.40 x 6% + 0.60 x 12% = 2.4% + 7.2% = 9.60%. El 8% no considera las proporciones ni el escudo fiscal. El 7.2% es solo la porcion del costo de capital propio."}, {"a": "C", "e": "Segun Modigliani-Miller sin impuestos, el valor de la empresa es independiente de su estructura de capital. No existe un ratio optimo de deuda bajo este supuesto. La politica de dividendos tampoco afecta el valor bajo estos supuestos ideales."}, {"a": "A", "e": "El grado de apalancamiento operativo (DOL) mide cuanto cambia la utilidad operativa ante cambios en ventas. La sensibilidad de la utilidad neta al gasto por intereses no es DOL. La sensibilidad de las UPA al EBIT es el grado de apalancamiento financiero (DFL)."}, {"a": "A", "e": "DOL = Contribucion marginal total / Utilidad operativa = (50 x 10,000) / (50 x 10,000 - 200,000) = 500,000 / 300,000 = 1.667. No es 2.00 porque los costos fijos no son la mitad de la contribucion. No es 1.50 ya que eso no coincide con el calculo correcto."}, {"a": "C", "e": "El DFL es mayor cuando la empresa tiene mucha deuda, porque los intereses fijos amplifican los cambios en el EBIT sobre las utilidades por accion. Sin deuda, el DFL es 1 (minimo). En el punto de equilibrio del EBIT, el DFL seria indefinido, no maximo en sentido practico."}, {"a": "B", "e": "La politica de dividendos estables ofrece el flujo de ingresos mas predecible para los inversionistas. La politica residual depende de las oportunidades de inversion y varia mucho. La politica de ratio constante varia con las utilidades de cada periodo."}, {"a": "C", "e": "La recompra de acciones reduce el numero de acciones en circulacion, lo que aumenta las utilidades por accion (UPA). No las disminuye porque hay menos acciones. No aumenta las acciones en circulacion, las reduce."}, {"a": "B", "e": "La gestion eficiente del capital de trabajo busca minimizar el ciclo de conversion de efectivo para liberar recursos. Maximizar el ciclo significaria tener dinero atado mas tiempo, lo cual es ineficiente. Maximizar inventarios genera costos de almacenamiento innecesarios."}, {"a": "A", "e": "El ciclo de conversion de efectivo = Dias de inventario + Dias de cuentas por cobrar - Dias de cuentas por pagar. Las otras formulas tienen los signos invertidos o los componentes en el orden equivocado. Se resta las cuentas por pagar porque representan financiamiento de proveedores."}, {"a": "C", "e": "El gobierno corporativo busca alinear los intereses de los gerentes con los de los accionistas para proteger a estos ultimos. No busca maximizar ganancias a corto plazo para la gerencia. Minimizar impuestos no es un objetivo principal del gobierno corporativo."}, {"a": "A", "e": "El problema de agencia surge cuando los gerentes actuan en su propio interes en vez del de los accionistas. Los desacuerdos entre accionistas y bonistas son conflictos entre stakeholders, no el problema clasico de agencia. Que el costo de capital exceda el retorno es un problema de rentabilidad, no de agencia."}, {"a": "C", "e": "La teoria de stakeholders dice que la empresa debe considerar a todas las partes afectadas: empleados, clientes, comunidad, etc. No solo a los accionistas ni solo a accionistas y bonistas. Es una vision mas amplia que la teoria clasica centrada solo en accionistas."}, {"a": "B", "e": "Cuando hay conflicto entre VPN y TIR en proyectos mutuamente excluyentes, se usa el VPN porque mide directamente la creacion de valor. La TIR no ajusta bien por tamano ni por patron de flujos. El periodo de recuperacion no es un metodo apropiado para resolver este conflicto."}, {"a": "B", "e": "Alto apalancamiento operativo y financiero combinados crean un alto grado de apalancamiento total, lo que resulta en alta variabilidad en las utilidades por accion. No genera baja variabilidad en la utilidad neta; al contrario, la amplifica. El apalancamiento total seria alto, no bajo."}, {"a": "B", "e": "Una orden limitada permite comprar o vender a un precio especifico o mejor. La opcion A describe una orden de mercado, que se ejecuta al mejor precio disponible. La opcion C no es un tipo de orden estandar."}, {"a": "A", "e": "Usando el modelo de Gordon: Precio = Dividendo / (r - g), entonces 50 = 2.50 / (0.10 - g), lo que da g = 5%. La opcion B (7%) haria el precio mucho mas alto, y la opcion C (3%) daria un precio de $35.71, no $50."}, {"a": "C", "e": "En un mercado eficiente en forma semi-fuerte, toda la informacion publica ya esta en los precios. Analizar estados financieros (informacion publica) no generaria retornos anormales. La opcion A (informacion privilegiada) podria funcionar porque no es publica. La opcion B (patrones historicos) tampoco funcionaria, pero eso es eficiencia debil, no semi-fuerte."}, {"a": "B", "e": "Precio = P/E x EPS = 15 x $4 = $60. La opcion A ($45) seria un P/E de 11.25, y la opcion C ($75) seria un P/E de 18.75. Es una multiplicacion directa."}, {"a": "C", "e": "Un indice ponderado por capitalizacion de mercado da mas peso a las empresas mas grandes. Un indice ponderado por precio (A) da mas peso a acciones con precio alto. Un indice igual-ponderado (B) da el mismo peso a todas las empresas."}, {"a": "A", "e": "Las acciones preferentes pagan dividendos fijos, similar a los cupones de un bono corporativo. No garantizan ganancias de capital como dice la opcion B, y no se parecen a letras del tesoro (C) porque estas son de corto plazo y no pagan cupones."}, {"a": "C", "e": "Si el valor intrinseco ($80) es menor que el precio de mercado ($95), la accion esta sobrevaluada. El inversor deberia vender o no comprar. La opcion A es incorrecta porque la accion esta sobrevaluada, no subvaluada. La opcion B es incorrecta porque el mercado no siempre es correcto."}, {"a": "A", "e": "Un P/B menor a 1.0 significa que el mercado valora la empresa por debajo de su valor en libros. La opcion B no tiene relacion con el P/B. La opcion C describe crecimiento de ganancias, que no se deduce directamente del P/B."}, {"a": "C", "e": "Un mercado eficiente se caracteriza por precios que se ajustan rapidamente a nueva informacion. Costos de transaccion altos (A) y baja liquidez (B) son caracteristicas negativas que dificultan el buen funcionamiento del mercado."}, {"a": "B", "e": "Las altas barreras de entrada protegen a las empresas existentes porque dificultan la entrada de nuevos competidores. Los nuevos competidores (A) se perjudican, y los consumidores (C) pueden sufrir precios mas altos por la menor competencia."}, {"a": "A", "e": "El dividendo del proximo ano es 3.00 x 1.06 = $3.18. Valor = 3.18 / (0.11 - 0.06) = $63.60. La opcion B ($60) usa el dividendo actual sin ajustar por crecimiento. La opcion C ($54.55) usa una formula incorrecta."}, {"a": "C", "e": "Una nota de tasa flotante es un instrumento de deuda (renta fija), no un titulo de capital. Las acciones preferentes convertibles (A) y los recibos de deposito (B) si son tipos de titulos de capital."}, {"a": "B", "e": "Si el mercado es eficiente en forma debil, los precios ya reflejan datos historicos, asi que el analisis tecnico (A) no funciona. Pero el analisis fundamental (B) podria encontrar acciones subvaluadas usando informacion publica. Una estrategia solo pasiva (C) seria para eficiencia semi-fuerte o fuerte."}, {"a": "A", "e": "La tasa de crecimiento g = ROE x tasa de retencion = 15% x 60% = 9%. P/E adelantado justificado = ratio de pago / (r - g) = 0.40 / (0.12 - 0.09) = 0.40 / 0.03 = 13.33. La opcion B (9.52) y la opcion C (6.67) usan tasas de crecimiento o descuento incorrectas."}, {"a": "C", "e": "Las ordenes de mercado garantizan que se ejecutaran, pero al mejor precio disponible en ese momento, que puede variar. La opcion A describe una orden limitada. La opcion B es incorrecta porque ninguna orden garantiza ambas cosas."}, {"a": "A", "e": "Los recibos de deposito (ADRs/GDRs) permiten invertir en empresas extranjeras a traves de bolsas locales. No eliminan todo el riesgo cambiario (B), y no tienen relacion con bonos gubernamentales (C)."}, {"a": "B", "e": "Una ventaja competitiva sostenible, alto ROE y fuerte flujo de caja libre son senales positivas para inversion. La opcion A es contradictoria con estos indicadores. La opcion C es incorrecta porque el precio siempre importa; ningun activo es bueno a cualquier precio."}, {"a": "C", "e": "La prima de riesgo de capital es el retorno extra que los inversores exigen por invertir en acciones en lugar de activos sin riesgo. La opcion A describe el spread de bonos sobre el efectivo. La opcion B describe el retorno total esperado, no solo la prima sobre la tasa libre de riesgo."}, {"a": "B", "e": "Rendimiento corriente = cupon anual / precio = $60 / $950 = 6.32%. La opcion A (6%) es la tasa del cupon, no el rendimiento corriente. La opcion C (5.70%) es incorrecta matematicamente."}, {"a": "B", "e": "Un bono cupon cero a 20 anos tiene la mayor duracion porque no paga cupones intermedios y tiene largo plazo. Mayor duracion significa mayor riesgo de tasa de interes. Las opciones A y C tienen cupones que reducen su duracion efectiva."}, {"a": "A", "e": "Cuando las tasas suben, un bono callable baja menos que uno no-callable porque la opcion call pierde valor, lo cual beneficia al tenedor del bono. La opcion B es lo contrario. La opcion C es incorrecta porque los precios de bonos bajan cuando las tasas suben."}, {"a": "A", "e": "Precio = 1000 / (1.08)^5 = 1000 / 1.4693 = $680.58. La opcion B ($620.92) usaria una tasa mas alta. La opcion C ($735.03) usaria una tasa mas baja. Es un calculo de valor presente simple."}, {"a": "B", "e": "La duracion mide la sensibilidad del precio de un bono a cambios en tasas de interes. La opcion A describe riesgo crediticio, que es un concepto diferente. La opcion C describe el plazo al vencimiento, que no es lo mismo que duracion."}, {"a": "C", "e": "Un MBS es un titulo respaldado por un conjunto de prestamos hipotecarios agrupados. La opcion A describe un bono corporativo con garantia especifica. La opcion B describe un bono gubernamental, no un MBS."}, {"a": "B", "e": "Duracion modificada = Duracion Macaulay / (1 + YTM) = 7 / 1.05 = 6.67 anos. La opcion A (7.35) multiplica en vez de dividir. La opcion C (7.00) es la duracion Macaulay sin modificar."}, {"a": "A", "e": "Cambio porcentual = -duracion x cambio en tasa + 0.5 x convexidad x (cambio)^2 = -6 x 0.01 + 0.5 x 50 x 0.0001 = -0.06 + 0.0025 = -5.75%. La opcion B (-6%) ignora el efecto de convexidad. La opcion C (-6.25%) es matematicamente incorrecta."}, {"a": "C", "e": "Cuando un bono es degradado de BBB a BB, pasa de grado de inversion a grado especulativo. Esto aumenta el spread crediticio y reduce el precio. Las opciones A y B describen lo contrario de lo que realmente ocurre."}, {"a": "B", "e": "El rendimiento al vencimiento (YTM) asume que los cupones se reinvierten a esa misma tasa. El rendimiento corriente (A) solo mide cupon dividido por precio sin considerar reinversion. El spread nominal (C) es una medida de diferencia de rendimiento, no de reinversion."}, {"a": "C", "e": "Un bono convertible da al tenedor el derecho de canjearlo por un numero especifico de acciones comunes del emisor. La opcion A describe un bono con opcion de venta (putable). La opcion B describe una caracteristica de notas de tasa flotante, no de bonos convertibles."}, {"a": "A", "e": "Una curva de rendimiento con pendiente positiva indica que los inversores exigen mayor rendimiento por bonos de mayor plazo, compensando el mayor riesgo de duracion. La opcion B no explica por que la curva tiene pendiente. La opcion C no es necesariamente cierta con una curva ascendente."}, {"a": "C", "e": "El YTM asume que todos los cupones se reinvierten a la misma tasa YTM. La opcion A (rendimiento corriente) no es la tasa de reinversion asumida. La opcion B (tasa libre de riesgo) tampoco es correcta segun la definicion de YTM."}, {"a": "A", "e": "Un bono putable protege al inversor si las tasas suben porque puede vender el bono de vuelta al emisor a un precio predeterminado. Un bono callable (B) perjudica al inversor porque el emisor lo recompra cuando le conviene. Un bono fijo a 20 anos (C) perderia mucho valor si las tasas suben debido a su alta duracion."}, {"a": "B", "e": "El spread crediticio es la diferencia entre el rendimiento de un bono corporativo y un bono gubernamental comparable. La opcion A describe la diferencia entre cupon y YTM, que no es un spread crediticio. La opcion C describe el spread bid-ask, que es un concepto de liquidez."}, {"a": "A", "e": "Con cupon de $50, tasa del 4% y 3 anos: Precio = 50/1.04 + 50/1.04^2 + 1050/1.04^3 = 48.08 + 46.23 + 933.51 = $1,027.75 aprox. La opcion B seria si el YTM fuera mayor al cupon. La opcion C seria si YTM igualara al cupon exactamente."}, {"a": "B", "e": "La titulizacion permite al banco transferir riesgo crediticio y liberar capital para nuevos prestamos. La opcion A es lo contrario: el riesgo se reduce, no aumenta. La opcion C es falsa porque la titulizacion no garantiza que los prestatarios paguen."}, {"a": "C", "e": "La convexidad negativa ocurre con bonos callable cuando las tasas bajan, porque el precio del bono tiene un techo cerca del precio de recompra. Los bonos cupon cero (A) tienen convexidad positiva alta. Las notas flotantes (B) tienen poca duracion y convexidad positiva."}, {"a": "C", "e": "Un contrato forward es un acuerdo privado y personalizado entre dos partes para comprar o vender un activo a un precio y fecha futuros específicos. La opción A describe un contrato de futuros (estandarizado y en bolsa). La opción B describe una opción, que da el derecho pero no la obligación."}, {"a": "A", "e": "El payoff de un contrato forward largo es: (precio spot - precio forward) × cantidad = ($58 - $50) × 1,000 = $8,000 de ganancia. No es una pérdida porque el precio spot ($58) es mayor que el precio pactado ($50). Los $50,000 de la opción B confunden el valor total del contrato con la ganancia."}, {"a": "A", "e": "La diferencia más importante es que los futuros se negocian en bolsas organizadas y se liquidan diariamente (mark to market), mientras que los forwards son acuerdos privados. La opción B es falsa porque los futuros cubren muchos activos. La opción C invierte las características: son los futuros los que tienen liquidación diaria."}, {"a": "C", "e": "El agricultor quiere fijar un precio de venta, así que debe tomar una posición corta en futuros de maíz (vender futuros). Una posición larga (opción A) fijaría un precio de compra. Comprar una opción call (opción B) le daría el derecho a comprar, no a vender."}, {"a": "B", "e": "La opción call expira sin valor porque el precio del activo ($37) es menor que el precio de ejercicio ($40). El comprador pierde solo la prima pagada de $3. La opción A ($6) es incorrecta porque la pérdida máxima del comprador de una opción es siempre la prima pagada. No hay ganancia (opción C)."}, {"a": "A", "e": "La paridad put-call establece que C + PV(X) = P + S, donde C es el precio del call, PV(X) es el valor presente del precio de ejercicio, P es el precio del put, y S es el precio del activo. La opción B no descuenta el precio de ejercicio. La opción C tiene los signos incorrectos."}, {"a": "B", "e": "El valor del put al vencimiento es max(0, $70 - $60) = $10. Restando la prima pagada de $5, la ganancia es $10 - $5 = $5. La opción A ($10) olvida restar la prima. La opción C ($15) suma incorrectamente la prima en vez de restarla."}, {"a": "C", "e": "Comprar una opción call tiene ganancia potencial ilimitada (el precio puede subir sin límite) y pérdida limitada a la prima pagada. Vender un call desnudo (opción A) tiene pérdida ilimitada. Vender un put (opción B) tiene ganancia limitada a la prima recibida."}, {"a": "B", "e": "Si las tasas suben, la tasa flotante que recibe la Parte A aumenta mientras que su pago fijo permanece igual. Por lo tanto, la Parte A recibe pagos netos de la Parte B. La opción A es lo contrario. La opción C es incorrecta porque los swaps no se rebalancean automáticamente."}, {"a": "C", "e": "La probabilidad neutral al riesgo se usa para calcular el valor esperado del payoff de la opción, que luego se descuenta a la tasa libre de riesgo. No representa probabilidades reales (opción A) ni mide la volatilidad histórica (opción B)."}, {"a": "A", "e": "Un protective put consiste en comprar una acción y comprar un put sobre esa acción para protegerse contra caídas. La opción B describe un covered call (comprar acción y vender call). La opción C describe una estrategia diferente que combina una venta en corto con un call."}, {"a": "B", "e": "El vendedor de un call desnudo enfrenta pérdidas teóricamente ilimitadas porque el precio de la acción puede subir sin límite. La opción A describe la pérdida máxima del comprador de una opción. La opción C calcula incorrectamente la pérdida."}, {"a": "C", "e": "Un covered call es ideal cuando se espera que el precio se mantenga estable o suba ligeramente, ya que el ingreso por la prima complementa los rendimientos. Si el precio sube mucho (opción A), la ganancia se limita por el call vendido. Si baja mucho (opción B), la prima no compensa las pérdidas."}, {"a": "B", "e": "La parte que paga el retorno del S&P 500 y recibe una tasa fija está efectivamente corta en el S&P 500 y prestando dinero a tasa fija. La opción A invierte la posición (sería si recibe el retorno del S&P). La opción C tiene la tasa incorrecta."}, {"a": "A", "e": "Si el put está barato según la paridad put-call, se debe comprar el put (barato), vender el call, comprar la acción y pedir prestado el valor presente del precio de ejercicio. Esto recrea la paridad y genera ganancia por arbitraje. Las otras opciones tienen combinaciones incorrectas de posiciones."}, {"a": "B", "e": "Mayor volatilidad del activo subyacente aumenta el valor tanto de calls como de puts. Una menor tasa libre de riesgo (opción A) reduce el valor del call. Menos tiempo al vencimiento (opción C) generalmente reduce el valor de las opciones por la pérdida de valor temporal."}, {"a": "A", "e": "Cuando el saldo cae por debajo del margen de mantenimiento ($3,500), el inversor recibe un margin call y debe depositar fondos para restaurar el margen inicial completo: $5,000 - $3,200 = $1,800. La opción B solo restauraría el margen de mantenimiento, lo cual es incorrecto. La opción C ignora que se violó el margen de mantenimiento."}, {"a": "C", "e": "Los contratos forward de divisas son usados comúnmente por corporaciones para cubrir el riesgo cambiario en flujos de efectivo futuros. Los especuladores intradía (opción A) prefieren instrumentos más líquidos. Los bancos centrales (opción B) usan otros mecanismos para influir en tipos de cambio."}, {"a": "C", "e": "Un REIT es una empresa que posee, opera o financia bienes raíces que generan ingresos y debe distribuir la mayoría de su ingreso gravable a los accionistas. La opción A es demasiado restrictiva y describe una sociedad privada. La opción B describe un programa gubernamental de hipotecas, no un REIT."}, {"a": "A", "e": "La estructura '2 y 20' significa una comisión de gestión del 2% sobre los activos administrados y una comisión de incentivo del 20% sobre las ganancias. La opción B invierte los porcentajes. La opción C describe comisiones de entrada y salida, que no corresponden a esta estructura."}, {"a": "B", "e": "Un LBO implica adquirir una empresa usando una cantidad significativa de deuda para financiar la compra. La opción A describe comprar acciones con margen a través de un corredor, que es diferente. La opción C describe una reestructuración de capital, no un LBO."}, {"a": "C", "e": "La etapa semilla (seed stage) proporciona capital para desarrollar una idea de negocio o prototipo antes de que la empresa genere ingresos. La opción A describe capital de expansión para empresas establecidas. La opción B describe financiamiento de etapa tardía para una oferta pública inicial."}, {"a": "C", "e": "Los coleccionables como arte y vino se caracterizan por valoración subjetiva, baja liquidez y altos costos de transacción. La opción A es lo opuesto: estos mercados son ilíquidos y opacos. La opción B es falsa porque el almacenamiento y seguro pueden ser costosos."}, {"a": "A", "e": "Una estrategia long/short equity toma posiciones largas en acciones infravaloradas y cortas en acciones sobrevaloradas dentro del mismo sector. La estrategia global macro (opción B) apuesta por tendencias macroeconómicas. Los managed futures (opción C) operan con contratos de futuros siguiendo tendencias."}, {"a": "B", "e": "Las inversiones en infraestructura típicamente ofrecen flujos de efectivo relativamente estables, a menudo vinculados a la inflación, con horizontes de inversión largos. La opción A es incorrecta porque la infraestructura tiene baja liquidez. La opción C es incorrecta porque la infraestructura tiende a tener baja volatilidad y baja correlación con acciones."}, {"a": "A", "e": "La tasa de capitalización se calcula como el ingreso operativo neto (NOI) dividido entre el valor de mercado de la propiedad. La opción B invierte la fórmula. La opción C usa el ingreso bruto de alquiler y el precio de compra, que no son los componentes correctos."}, {"a": "B", "e": "La comisión anual de gestión es 2% × $500 millones = $10 millones. La opción A ($5 millones) usa un porcentaje del 1%. La opción C ($100 millones) usa un porcentaje del 20%, que corresponde a la comisión de incentivo, no a la de gestión."}, {"a": "A", "e": "El high-water mark asegura que el gestor solo cobre comisiones de incentivo sobre ganancias nuevas que superen el valor máximo anterior del fondo (NAV). La opción B describe un límite de comisiones que no existe en esta provisión. La opción C describe un retorno mínimo garantizado, que es diferente (eso sería un hurdle rate)."}, {"a": "B", "e": "Las inversiones alternativas generalmente tienen menor liquidez, mayores comisiones y menos transparencia que las inversiones tradicionales. La opción A describe lo opuesto de la realidad. La opción C es incorrecta porque las alternativas buscan mayores retornos, no menores, y no suelen tener precios diarios."}, {"a": "C", "e": "El efecto J-curve describe cómo los retornos de private equity tienden a ser negativos al principio (por comisiones y costos iniciales) y luego positivos cuando las empresas del portafolio maduran. La opción A es incorrecta sobre las comisiones. La opción B describe recesiones, no el efecto J-curve."}, {"a": "B", "e": "Las materias primas frecuentemente tienen baja o negativa correlación con clases de activos tradicionales como acciones y bonos, lo que mejora la diversificación. La opción A es incorrecta porque la correlación no es perfecta. La opción C exagera: no siempre se mueven en dirección opuesta."}, {"a": "A", "e": "Un limited partner (socio limitado) aporta capital pero no participa en la gestión del fondo. El general partner (opción B) es quien gestiona las inversiones. Un managing director (opción C) es un título corporativo, no un rol específico en la estructura de private equity."}, {"a": "C", "e": "Un equity REIT genera ingresos principalmente del cobro de alquileres de propiedades que posee y opera. Un mortgage REIT (opción A) invierte en hipotecas y gana intereses. Un hybrid REIT (opción B) combina ambas estrategias."}, {"a": "B", "e": "El período de lock-up es un tiempo durante el cual los inversores no pueden retirar su capital del fondo. La opción A describe una restricción sobre el gestor, no sobre los inversores. La opción C describe el período de liquidación de operaciones."}, {"a": "A", "e": "La debida diligencia debe incluir una evaluación completa de la estrategia, calificaciones del gestor, estructura de comisiones, gestión de riesgos y términos legales. La opción B es demasiado limitada. La opción C no aplica porque las alternativas generalmente no son públicas."}, {"a": "C", "e": "Los REITs públicos ofrecen mayor liquidez (se compran y venden como acciones) y menores requisitos de inversión mínima que la propiedad directa. La opción A es incorrecta porque en un REIT no se controla la gestión de propiedades. La opción B es falsa porque los REITs no eliminan todos los impuestos."}, {"a": "C", "e": "Según el CAPM, el retorno esperado depende solo del riesgo sistemático medido por beta. La desviación estándar (opción A) mide riesgo total, no solo sistemático. El Sharpe ratio (opción B) es una medida de rendimiento ajustado al riesgo, no de riesgo no sistemático."}, {"a": "A", "e": "Usando el CAPM: E(R) = Rf + β(Rm - Rf) = 3% + 1.5(9% - 3%) = 3% + 9% = 12%. La opción B (16.5%) multiplica beta por el retorno del mercado completo sin restar Rf. La opción C (13.5%) calcula incorrectamente la prima de riesgo."}, {"a": "B", "e": "La diversificación reduce el riesgo no sistemático (específico de la empresa) al combinar activos que no están perfectamente correlacionados. El riesgo sistemático (opción A) no se puede eliminar con diversificación. El riesgo total del mercado (opción C) es sinónimo de riesgo sistemático."}, {"a": "C", "e": "La frontera eficiente de Markowitz muestra los portafolios que ofrecen el mayor retorno esperado para cada nivel de riesgo. La opción A describe lo contrario. La opción B describe un portafolio igualmente ponderado, que no necesariamente está en la frontera eficiente."}, {"a": "B", "e": "El Sharpe ratio se calcula como (retorno del portafolio - tasa libre de riesgo) / desviación estándar del portafolio. La opción A describe el Treynor ratio (usa beta en lugar de desviación estándar). La opción C describe el Information ratio."}, {"a": "A", "e": "El sesgo de recencia ocurre cuando un inversor da demasiado peso a eventos recientes al tomar decisiones. El sesgo de confirmación (opción B) busca información que confirme creencias existentes. El sesgo de anclaje (opción C) se fija excesivamente en un valor de referencia inicial."}, {"a": "C", "e": "El riesgo sistemático es inherente a todo el mercado y no puede eliminarse con diversificación. Incluye factores como inflación, tasas de interés y recesiones. La opción A describe el riesgo no sistemático. La opción B también describe el riesgo no sistemático (específico de empresa o industria)."}, {"a": "B", "e": "Alpha de Jensen = Retorno del portafolio - [Rf + β(Rm - Rf)] = 12% - [4% + 1.0(10% - 4%)] = 12% - [4% + 6%] = 12% - 10% = 2.0%. La opción A (6.0%) simplemente resta la tasa libre de riesgo del retorno sin considerar el CAPM. La opción C (0%) sería correcta solo si el retorno esperado igualara al retorno real."}, {"a": "A", "e": "Un IPS debe incluir objetivos de retorno, tolerancia al riesgo, horizonte temporal, necesidades de liquidez y restricciones del inversor. La opción B es incompleta porque solo menciona los objetivos de retorno. La opción C es incorrecta porque un IPS establece la política, no una lista específica de valores."}, {"a": "C", "e": "El Treynor ratio usa beta (riesgo sistemático) en el denominador, mientras que el Sharpe ratio usa la desviación estándar (riesgo total). La opción A describe el Sharpe ratio. La opción B describe el Information ratio que usa tracking error."}, {"a": "B", "e": "La asignación estratégica de activos establece una mezcla objetivo a largo plazo basada en los objetivos y restricciones del inversor. La opción A describe trading táctico a corto plazo. La opción C describe perseguir rendimientos pasados, lo cual no es una estrategia de asignación formal."}, {"a": "A", "e": "Cuando dos activos tienen correlación de -1.0, es posible construir un portafolio con riesgo cero (desviación estándar de cero) combinándolos en las proporciones correctas. La opción B es incorrecta porque la correlación afecta el riesgo, no duplica los retornos. La opción C confunde riesgo total con riesgo sistemático."}, {"a": "B", "e": "Un valor que se ubica por encima de la Línea del Mercado de Valores (SML) ofrece un retorno mayor al justificado por su riesgo sistemático, lo que significa que está infravalorado. Un valor sobrevalorado (opción A) estaría por debajo de la SML. Si estuviera correctamente valorado (opción C) estaría exactamente sobre la SML."}, {"a": "C", "e": "La aversión a las pérdidas hace que los inversores sientan más dolor por las pérdidas que placer por ganancias equivalentes, llevándolos a mantener posiciones perdedoras. El exceso de confianza (opción A) lleva a sobreestimar las propias habilidades. La representatividad (opción B) clasifica inversiones basándose en estereotipos."}, {"a": "A", "e": "Un beta de 0.8 significa que el portafolio se mueve un 80% de lo que se mueve el mercado en la misma dirección. No se mueve en dirección opuesta (opción B), eso sería un beta negativo. No es más riesgoso que el mercado (opción C) porque un beta menor a 1 indica menor riesgo sistemático."}, {"a": "C", "e": "El portafolio de mínima varianza es el que tiene el menor riesgo posible (menor desviación estándar) entre todos los portafolios posibles de activos riesgosos. No tiene el mayor retorno (opción A). No contiene solo activos libres de riesgo (opción B), sino una combinación óptima de activos riesgosos."}, {"a": "A", "e": "Agregar un activo libre de riesgo transforma la frontera eficiente en la Línea del Mercado de Capitales (CML), una línea recta desde la tasa libre de riesgo tangente a la frontera eficiente. La opción B es incorrecta porque no elimina todo el riesgo. La opción C es incorrecta porque la CML está por encima de la frontera original."}, {"a": "B", "e": "Un inversor con horizonte corto, baja tolerancia al riesgo y alta necesidad de liquidez debe invertir en bonos gubernamentales a corto plazo e instrumentos del mercado monetario. Las acciones de crecimiento y capital de riesgo (opción A) son muy riesgosos e ilíquidos. Los mercados emergentes y materias primas (opción C) son muy volátiles."}];
const S6=[{"a": "C", "e": "Agregar una opcion put integrada reduce la sensibilidad del precio del bono a cambios en la curva de rendimiento, porque el tenedor puede vender el bono al emisor si las tasas suben. Alargar el vencimiento (A) aumenta la sensibilidad, y reducir el cupon (B) tambien la aumenta."}, {"a": "B", "e": "Los especuladores proporcionan liquidez al mercado de derivados y reducen el costo de modificar exposiciones al riesgo. No son inherentemente desestabilizadores (A), y no se puede afirmar que los coberturistas sean mas beneficiosos que los especuladores (C), ya que ambos cumplen funciones importantes."}, {"a": "A", "e": "Los indices multi-mercado estan disenados para representar multiples clases de activos, como acciones, bonos y bienes raices. No se refieren a estilos de inversion (B) ni a grupos de desarrollo economico (C)."}, {"a": "C", "e": "Con LIFO y precios en alza, el costo de ventas es mayor porque se asignan los costos mas recientes, lo que reduce el inventario en el balance. Un inventario menor en el denominador produce un mayor ratio de rotacion de inventario. El margen operativo (B) seria menor, y el ratio corriente (A) tambien seria menor."}, {"a": "B", "e": "La recapitalizacion permite a Black Ridge obtener fondos emitiendo deuda sin perder control de la empresa. La liquidacion (A) implicaria vender Toldo, y una oferta publica inicial (C) diluiria el control al emitir acciones al publico."}, {"a": "B", "e": "Si el logaritmo natural de una variable aleatoria sigue una distribucion normal, entonces la variable original sigue una distribucion lognormal por definicion. No es normal (A), y si hay suficiente evidencia para concluir (C es incorrecto)."}, {"a": "C", "e": "Un fondo cerrado (closed-end) emite un numero fijo de acciones que los inversores compran y venden en el mercado abierto. Un fondo abierto (B) permite comprar y vender directamente con el fondo. No-load (A) se refiere a fondos sin comision de venta."}, {"a": "A", "e": "El diferencial bid-ask de un bono es una medida del riesgo de liquidez. Un diferencial amplio indica que el bono es dificil de negociar sin afectar su precio. No mide el riesgo de tasa de interes (B) ni el riesgo de reinversion (C)."}, {"a": "A", "e": "La fijacion de precios dinamica ajusta precios segun la oferta y demanda en tiempo real, sin depender de efectos de red. El modelo freemium (B) y la penetracion (C) buscan atraer una gran base de usuarios donde los efectos de red son una consideracion explicita."}, {"a": "C", "e": "Las acciones preferentes tienen mayor prioridad sobre los activos de la empresa que las acciones comunes en caso de liquidacion. No protegen contra caidas de precio (A), y generalmente ofrecen dividendos mas altos, no mas bajos, que las comunes (B)."}, {"a": "B", "e": "Las deseconomias de escala se representan por la parte ascendente de la curva de costo total promedio de largo plazo, donde aumentar la produccion incrementa el costo unitario. La curva de costo marginal de corto plazo (A) y la de costo total promedio de corto plazo (C) no representan especificamente deseconomias de escala."}, {"a": "A", "e": "Si los clientes pagan mas rapido, las cuentas por cobrar promedio disminuyen, lo que aumenta la rotacion de cuentas por cobrar. Permitir mas credito (B) aumentaria las cuentas por cobrar y reduciria la rotacion. Mantener inventario menos tiempo (C) afecta la rotacion de inventario, no la de cuentas por cobrar."}, {"a": "C", "e": "El precio futuro se calcula como: (Spot + Seguro) x (1 + Rf) + Almacenamiento = (850 + 8) x 1.04 + 10 = 858 x 1.04 + 10 = 892.32 + 10 = 902.32. El seguro se paga por adelantado y se capitaliza, mientras que el almacenamiento se paga al final del ano y simplemente se suma."}, {"a": "C", "e": "La estrategia oportunista en bienes raices busca los mayores rendimientos asumiendo el mayor riesgo, invirtiendo en propiedades que requieren desarrollo o reestructuracion significativa. Core (A) ofrece los rendimientos mas bajos con menor riesgo, y value-add (B) se situa en un punto intermedio."}, {"a": "B", "e": "Los bonos Euroyen son bonos denominados en yenes emitidos fuera de Japon y suscritos por un sindicato internacional. No estan denominados en euros (A); el prefijo 'Euro' indica que se emiten fuera del mercado domestico de la moneda. No se emiten simultaneamente en ambos mercados (C)."}, {"a": "C", "e": "Bajo los supuestos de Modigliani y Miller, el beta del activo (asset beta) no cambia con la estructura de capital, ya que refleja el riesgo operativo del negocio. Anadir deuda aumenta el beta del equity, pero el beta del activo permanece constante."}, {"a": "C", "e": "En un indice igualmente ponderado, cada accion recibe el mismo peso. Con un valor inicial de $1,000, cada accion recibe $333.33. Para KLM a $20 por accion: $333.33 / $20 = 16.67, redondeado a 17 acciones."}, {"a": "B", "e": "Ajustar las ponderaciones del portafolio a corto plazo basandose en expectativas de mercado es asignacion tactica de activos. La seleccion de valores (A) se refiere a elegir titulos individuales. La asignacion estrategica (C) establece pesos objetivo a largo plazo."}, {"a": "B", "e": "Bajo US GAAP, los pagos de intereses (cupones) se clasifican como actividades operativas. Emitir bonos (A) es una actividad de financiamiento, y comprar vehiculos (C) es una actividad de inversion."}, {"a": "B", "e": "La media geometrica es preferible para calcular rendimientos anualizados compuestos a lo largo del tiempo, como en el Escenario 2. La media armonica es mas apropiada para el Escenario 1 (promedio de costos). Ninguna de las dos es ideal para el Escenario 3 con valores atipicos."}, {"a": "C", "e": "Las restricciones de capital protegen a las empresas domesticas de la competencia extranjera, lo que reduce los incentivos para mejorar la eficiencia. Pueden lograr rendimientos mas bajos en bonos del gobierno (A) al mantener capital domestico y aumentar ingresos gubernamentales (B) mediante impuestos."}, {"a": "A", "e": "Para bonos con opciones integradas (como una opcion call), la duracion efectiva es la medida mas apropiada porque tiene en cuenta los cambios en los flujos de efectivo cuando las tasas de interes cambian. La duracion modificada (B) y la de Macaulay (C) asumen flujos de efectivo fijos y no son adecuadas para bonos con opciones."}, {"a": "A", "e": "En el modelo binomial, la probabilidad neutral al riesgo de un movimiento alcista es: p = (1 + Rf - d) / (u - d). Un aumento en la tasa libre de riesgo incrementa el numerador, lo que aumenta la probabilidad de un movimiento al alza."}, {"a": "B", "e": "Los modelos FCFE asumen que la empresa opera en un punto donde el ingreso marginal iguala al costo marginal, es decir, en el nivel optimo de produccion que maximiza beneficios. No asumen que el ingreso marginal sea el mayor (A) ni que la diferencia sea la mayor (C)."}, {"a": "A", "e": "El high water mark protege a los inversores de pagar comisiones de incentivo dos veces por el mismo rendimiento, ya que las comisiones solo se cobran cuando el fondo supera su valor maximo anterior. La opcion B describe un hurdle rate, y la opcion C describe un soft hurdle rate."}, {"a": "B", "e": "La utilidad determina la ubicacion de la curva de indiferencia (curvas mas altas representan mayor utilidad), mientras que la aversion al riesgo determina la forma (mayor aversion produce curvas mas empinadas). No es correcto que ambos afecten la forma (A) ni que los roles esten invertidos (C)."}, {"a": "C", "e": "Una patente comprada es un activo intangible con vida util finita y se amortiza durante su periodo de vigencia. El goodwill (A) es un intangible con vida indefinida que no se amortiza sino que se somete a pruebas de deterioro. La maquinaria (B) es un activo tangible que se deprecia, no se amortiza."}, {"a": "C", "e": "Los tipos de cambio forward son malos predictores de los tipos spot futuros principalmente porque el margen de error es demasiado grande, no porque sobreestimen (A) o subestimen (B) sistematicamente. Los errores no muestran un sesgo consistente en una direccion."}, {"a": "B", "e": "Las acciones comunes representan capital permanente y no son una fuente de fondos a corto plazo. Los depositos minoristas (A) y los certificados de deposito (C) son fuentes tipicas de financiamiento a corto plazo para los bancos."}, {"a": "B", "e": "Si el analista cree que las variables estan positivamente correlacionadas, la hipotesis alternativa debe ser direccional: rho > 0. La opcion A (rho != 0) es una prueba de dos colas que no especifica la direccion. La opcion C (rho <= 0) seria una hipotesis nula, no alternativa."}, {"a": "C", "e": "Los activos reales atraen a inversores que buscan activos con precios incorrectos respecto a su valor. Estos activos suelen ser dificiles de negociar y gestionar, lo que crea oportunidades de encontrar precios erroneos. Las opciones A y B son incorrectas porque los activos reales son tipicamente iliquidos y dificiles de administrar."}, {"a": "B", "e": "Esto es desviacion comercial porque Alphaton cambio sus importaciones de un productor de menor costo (Gammaland) a un productor de mayor costo (Betaville) debido a la eliminacion del arancel dentro de la union aduanera. No es creacion comercial porque no se genera nuevo comercio, sino que se redirige comercio existente de un proveedor mas eficiente a uno menos eficiente."}, {"a": "A", "e": "Una estructura de un solo nivel (one-tier) incluye tanto miembros ejecutivos como no ejecutivos en el mismo consejo de administracion. Un consejo supervisor (opcion B) es parte de una estructura de dos niveles donde los no ejecutivos supervisan por separado. La estructura de clase dual (opcion C) se refiere a diferentes clases de acciones con distintos derechos de voto."}, {"a": "B", "e": "Con un IRR del 16%, el GP primero recibe el hurdle rate del 7% para el LP, luego el catch-up de 1.75% va al GP, y el resto se divide 80/20. El retorno del LP es aproximadamente 12.8%. Las opciones A y C no calculan correctamente la distribucion entre el hurdle, catch-up y la comision de rendimiento."}, {"a": "C", "e": "Las agencias calificadoras tienen acceso a informacion material no publica proporcionada por los emisores como parte del proceso de calificacion. La opcion A es incorrecta porque las agencias generalmente no anticipan bien el riesgo de eventos imprevistos. La opcion B es incorrecta porque las agencias cambian las calificaciones con regularidad."}, {"a": "A", "e": "El inventario se reconoce como gasto cuando los bienes se venden, siguiendo el principio de correspondencia entre ingresos y gastos. La opcion B es incorrecta porque el inventario se registra como activo al adquirirlo, no como gasto. La opcion C es incorrecta porque el momento del reconocimiento del gasto no cambia segun el metodo de valuacion."}, {"a": "B", "e": "Los inversores neutrales al riesgo son indiferentes al riesgo y no requieren una prima de riesgo adicional sobre la tasa libre de riesgo. La opcion A es incorrecta porque los inversores buscadores de riesgo aceptarian incluso primas negativas. La opcion C es incorrecta porque los inversores aversos al riesgo esperan ganar mas que la tasa libre de riesgo, no simplemente esa tasa."}, {"a": "B", "e": "El valor intrinseco de un titulo no puede conocerse con certeza porque depende de estimaciones sobre flujos de caja futuros y tasas de descuento apropiadas. La opcion A es incorrecta porque el valor intrinseco fluctua con nueva informacion. La opcion C describe una situacion posible pero no es la respuesta mas precisa."}, {"a": "C", "e": "El tipo forward se calcula como Spot x (1 + r_CHF) / (1 + r_AUD). Si ambas tasas suben 0.1%, el diferencial de tasas se mantiene pero el efecto matematico hace que el forward suba ligeramente porque la tasa base (CHF) mas baja se beneficia proporcionalmente mas del aumento. El forward seria mayor que 0.7274."}, {"a": "B", "e": "La correlacion se calcula como covarianza dividida por el producto de las desviaciones estandar: -0.10 / (sqrt(0.25) x sqrt(0.20)) = -0.10 / (0.5 x 0.4472) = -0.10 / 0.2236 = -0.447, que es aproximadamente -0.45. Las opciones A y C no realizan correctamente el calculo."}, {"a": "B", "e": "Un MBS tiene un conjunto estatico de prestamos subyacentes que no cambia despues de la emision, mientras que un covered bond tiene un pool dinamico que el emisor puede modificar. La opcion A es incorrecta porque los covered bonds tienen menor riesgo de prepago, no mayor. La opcion C invierte la relacion: los covered bonds dan recurso tanto al emisor como al pool."}, {"a": "C", "e": "Si el flujo de caja operativo es persistentemente menor que la utilidad neta, sugiere que las ganancias reportadas no se estan convirtiendo en efectivo, lo cual indica contabilidad agresiva de devengados. La opcion A podria indicar otros problemas pero no necesariamente contabilidad agresiva. La opcion B se relaciona con solvencia, no con politicas de devengados."}, {"a": "C", "e": "Ambos indicadores son indicadores rezagados. La relacion inventario-ventas y la duracion promedio del desempleo reaccionan despues de que los cambios economicos ya han ocurrido. Los indicadores rezagados confirman tendencias economicas en lugar de predecirlas."}, {"a": "B", "e": "Una estrategia de mercado neutral toma posiciones largas y cortas en acciones con el objetivo de tener un beta cercano a cero, eliminando el riesgo de mercado sistematico. La opcion A (macro) se enfoca en tendencias macroeconomicas globales. La opcion C (valor fundamental) busca acciones infravaloradas sin necesariamente neutralizar el beta."}, {"a": "A", "e": "La capitalizacion de mercado se calcula multiplicando el numero de acciones por el precio de mercado: 45 millones x $13.60 = $612 millones. El valor en libros, la deuda y el efectivo no se incluyen en el calculo de la capitalizacion de mercado. Las opciones B y C incluyen incorrectamente deuda u otros componentes."}, {"a": "C", "e": "Un modelo de factores macroeconomicos utiliza variables macroeconomicas como tasas de interes para explicar los rendimientos de los valores. Un modelo estadistico (opcion A) usa tecnicas estadisticas sin asignar significado economico a los factores. Un modelo fundamental (opcion B) usa atributos especificos de la empresa como el ratio P/E."}, {"a": "B", "e": "El WACC se calcula usando los pesos objetivo: WACC = 0.60 x 12.5% + 0.40 x 8.5% x (1 - 0.30) = 7.5% + 2.38% = 9.88%, aproximadamente 9.90%. Se usan los pesos objetivo porque representan la estructura de capital deseada. Las opciones A y C usan pesos incorrectos."}, {"a": "A", "e": "La duracion monetaria se calcula como duracion modificada x precio. Duracion modificada = Macaulay / (1 + yield) = 8.35 / 1.054 = 7.924. Money duration = 7.924 x $98.50 = $780.5, aproximadamente $780. Se usa la duracion de Macaulay ajustada, no la duracion efectiva, para este calculo."}, {"a": "B", "e": "Un precio de ejercicio mas alto aumenta el valor de una opcion put americana porque le da al tenedor el derecho de vender a un precio mas alto. La opcion A es incorrecta porque un precio de ejercicio mas alto reduce el valor de un call. La opcion C es incorrecta porque menos tiempo hasta el vencimiento generalmente reduce el valor de una opcion americana."}, {"a": "B", "e": "Contango significa que los precios de los futuros son mayores que el precio spot actual. La opcion A describe la curva de rendimiento pero no define contango directamente. La opcion C describe la situacion opuesta (backwardation), donde el convenience yield supera los costos de almacenamiento."}, {"a": "C", "e": "Una opinion de auditoria calificada es necesaria cuando hay un cambio importante en las politicas contables, ya que los estados financieros del trimestre siguiente pueden no ser comparables con periodos anteriores. La opcion A no requiere necesariamente una opinion calificada. La opcion B describe una auditoria normal sin limitaciones."}, {"a": "C", "e": "Usando el modelo de Gordon: V = D1 / (r - g) = 3.80 x (1.035) / (0.09 - 0.035) = 3.933 / 0.055 = $71.51. Es importante usar el dividendo esperado (D1), no el dividendo mas reciente. La opcion A usa una tasa de descuento incorrecta y la opcion B no ajusta el dividendo por el crecimiento."}, {"a": "C", "e": "El analisis de texto se aplica a datos escritos o textuales, no a conjuntos de datos basados en voz. Los datos de voz requieren procesamiento de lenguaje natural hablado, que es diferente del analisis de texto. Las opciones A y B son usos validos del analisis de texto."}, {"a": "C", "e": "Es imposible eliminar completamente la asimetria de informacion entre principales y agentes porque los agentes siempre tendran mas informacion sobre sus propias acciones y decisiones diarias. La primera parte del enunciado del CEO es incorrecta. La opcion B es incorrecta porque cierto nivel de asimetria puede ser aceptable si el costo de eliminarla es mayor que el beneficio."}, {"a": "A", "e": "Un bono callable ofrece un rendimiento mas alto para compensar al tenedor por el riesgo de que el emisor pueda recomprar el bono antes del vencimiento. La opcion B es incorrecta porque los flujos de un bono callable son menos predecibles. La opcion C es incorrecta porque un bono callable tiene mayor riesgo de reinversion si es llamado."}, {"a": "A", "e": "La varianza del portafolio = (0.32)^2(0.14)^2 + (0.68)^2(0.11)^2 + 2(0.32)(0.68)(0.14)(0.11)(0.71) = 0.002007 + 0.005596 + 0.004786 = 0.01239. La desviacion estandar = sqrt(0.01239) = 11.13%, aproximadamente 11.12%. Las opciones B y C calculan incorrectamente los pesos o la correlacion."}, {"a": "B", "e": "Los estabilizadores automaticos ajustan la politica fiscal sin accion legislativa. Durante la expansion economica, los ingresos fiscales aumentan y los gastos en programas sociales disminuyen automaticamente, lo que endurece la politica fiscal. La opcion A no explica el mecanismo automatico. La opcion C se refiere a politica monetaria, no fiscal."}, {"a": "A", "e": "La razon deuda-capital es Deuda/(Deuda+Equity) = 0.35, mientras que deuda-activos es Deuda/Activos. Como los activos incluyen deuda, equity y otros pasivos, los activos totales son mayores que el capital (deuda + equity), por lo que deuda/activos sera menor que 0.35. Las opciones B y C sobreestiman la relacion."}, {"a": "A", "e": "El estadistico de prueba chi-cuadrado se calcula como (n-1) x s^2 / sigma_0^2 = 35 x (2.1)^2 / (2.0)^2 = 35 x 4.41 / 4.0 = 35 x 1.1025 = 38.59, aproximadamente 38.6. La opcion B calcula incorrectamente el estadistico. La opcion C confunde el estadistico con el punto de rechazo."}, {"a": "A", "e": "Las acciones registradas globales (Global Registered Shares) pueden negociarse en los mercados domesticos y extranjeros, incluyendo el mercado domestico del emisor frances. Los recibos de deposito globales (GDRs) generalmente se negocian fuera del mercado domestico del emisor. Por lo tanto, solo las acciones registradas globales se negociarian en el mercado domestico."}, {"a": "B", "e": "Ambos instrumentos son negociados en bolsa, lo que minimiza el riesgo de contraparte para ambos. Sin embargo, las opciones sobre tasas de interes pueden tener menor liquidez que los futuros de tasas de interes, por lo que el analisis se centraria en las diferencias de liquidez. La opcion C es incorrecta porque ambos tienen riesgo de contraparte minimo al ser instrumentos de bolsa."}, {"a": "A", "e": "Defeasance es el termino que describe cuando un prestatario de CMBS compra una cartera de valores gubernamentales para cubrir las obligaciones restantes del prestamo y asi poder realizar prepagos. La opcion B prohibe totalmente los prepagos. La opcion C impone penalizaciones monetarias directas por prepagos."}, {"a": "C", "e": "AUM al final del ano = $114M. Comision de gestion = 2% x $114M = $2.28M. AUM neto = $111.72M. Retorno neto de gestion = 11.72%. Como supera el hurdle del 9%, la comision de incentivo = 15% x ($111.72M - $109M) = 15% x $2.72M = $0.408M. Retorno neto del inversor = ($114M - $2.28M - $0.408M - $100M) / $100M = 11.31%."}, {"a": "A", "e": "Tanto una empresa individual como una sociedad general tienen responsabilidad ilimitada para sus propietarios. Al convertirse en sociedad general, Archer seguiria teniendo responsabilidad ilimitada. La opcion B es incorrecta porque las sociedades generales tambien tributan a nivel personal. La opcion C es incorrecta porque las sociedades generales no pueden acceder a mercados publicos de capital."}, {"a": "B", "e": "La teoria de mercados de capitales asume que todos los inversores tienen las mismas expectativas economicas (expectativas homogeneas) y que existe un unico portafolio optimo de activos riesgosos (el portafolio de mercado). La opcion A contradice el supuesto de expectativas homogeneas. La opcion C contradice la existencia de un unico portafolio optimo."}, {"a": "B", "e": "Los mercados dirigidos por cotizaciones (quote-driven) dependen principalmente de los dealers para proporcionar liquidez, ya que estos publican precios de compra y venta. Los mercados dirigidos por ordenes (opcion A) usan un libro de ordenes de los participantes. Los mercados de negociacion continua (opcion C) pueden usar ambos mecanismos."}, {"a": "B", "e": "Precio nuevo = $700 x 1.05 = $735. Con elasticidad de 0.5, el cambio en cantidad = -0.5 x 5% = -2.5%. Cantidad nueva = 2M x (1 - 0.025) = 1.95M toneladas. Ventas = 1.95M x $735 = $1,433.25M, aproximadamente $1,433 millones. Las opciones A y C no aplican correctamente la elasticidad precio de la demanda."}, {"a": "A", "e": "Cuando la curva de rendimiento sube, los precios de los bonos bajan porque existe una relacion inversa entre rendimientos y precios. Esto aplica a todos los bonos, incluyendo este bono con cupon del 8.5%. Las opciones B y C son incorrectas porque ignoran la relacion inversa fundamental entre tasas de interes y precios de bonos."}, {"a": "C", "e": "Los accionistas tienen un derecho residual sobre los activos de la empresa despues de pagar la deuda. Su pago es el maximo entre cero y el valor neto de los activos (activos menos deuda), similar a una opcion call. A es incorrecta porque describe un valor siempre negativo o cero, y B es incorrecta porque no refleja la naturaleza residual del derecho de los accionistas."}, {"a": "A", "e": "En 20X2, ABC tiene ratios de liquidez mejores que la industria (current ratio 2.2 vs 2.1, quick ratio 0.50 vs 0.45, dias de cobro e inventario menores). Sin embargo, comparando con 20X1, ABC empeoro: su current ratio bajo de 2.4 a 2.2 y su quick ratio bajo de 0.60 a 0.50. B es incorrecta porque ABC es mejor que la industria, no peor. C es incorrecta porque ABC empeoro respecto al ano anterior."}, {"a": "A", "e": "El ingreso disponible es el ingreso nacional menos los impuestos mas las transferencias gubernamentales (como subsidios y pensiones). B es incorrecta porque las transferencias se suman, no se restan. C es incorrecta porque no se calcula multiplicando por una tasa neta de impuestos."}, {"a": "C", "e": "Una oferta publica inicial (IPO) generalmente proporciona la valoracion mas alta y permite al vendedor retener participacion para beneficiarse de futuras subidas. A (venta comercial) ofrece buena valoracion pero no retiene potencial alcista. B (venta secundaria) tipicamente se realiza a descuento y tampoco retiene potencial alcista."}, {"a": "A", "e": "Los patrones de momentum se basan en precios historicos, lo cual desafia la forma debil de la hipotesis de mercado eficiente. Si la forma debil se viola, automaticamente las formas semi-fuerte y fuerte tambien se violan. B es incorrecta porque la violacion no se limita solo a la forma debil. C es incorrecta porque la forma debil tambien se ve afectada."}, {"a": "A", "e": "Berkley paga impuestos sobre el efectivo recibido ahora pero reconoce el ingreso contable despues, creando una base fiscal menor que la base contable del pasivo. Esto genera un activo por impuesto diferido porque la empresa ya pago impuestos que deducira en el futuro. B es incorrecta porque un pasivo por impuesto diferido ocurre cuando los impuestos se pagan despues, no antes."}, {"a": "B", "e": "El cambio porcentual se calcula como: -10.3 x 0.018 + 0.5 x 88.5 x 0.018^2 = -0.1854 + 0.01434 = -0.1711, es decir -17.1%. A es incorrecta porque no aplica correctamente la formula. C es incorrecta porque solo considera la duracion sin el ajuste por convexidad."}, {"a": "A", "e": "El Estandar IV(B) requiere obtener consentimiento del empleador antes de aceptar compensacion directa o indirecta de otros empleadores que puedan crear un conflicto de intereses. B y C son incorrectas porque amplian el alcance mas alla de lo que establece este estandar especifico, que se enfoca en compensacion de otros empleadores, no de clientes."}, {"a": "A", "e": "James uso informacion confidencial obtenida a traves de su esposo para solicitar negocios, lo cual constituye conducta deshonesta y poco profesional (misconduct). B es incorrecta porque James no revelo informacion de un cliente suyo. C es incorrecta porque la informacion sobre cambiar gestores de fondos no es informacion material no publica sobre un valor."}, {"a": "A", "e": "La donacion caritativa no constituye informacion material no publica sobre Royal Petroleum. Fleisher llego a su propia conclusion mediante un analisis basado en informacion no material. Su razonamiento fue una deduccion personal, no el uso de informacion privilegiada. B y C son incorrectas porque no hubo violacion de los estandares."}, {"a": "A", "e": "Los estandares no requieren votar en todas las proxies, sino actuar en el mejor interes del cliente. Votar de acuerdo con las recomendaciones de la gerencia no es una violacion si se considera en el mejor interes del cliente. B es incorrecta porque no es obligatorio votar todas las proxies. C es incorrecta porque seguir las recomendaciones de la gerencia puede ser apropiado."}, {"a": "C", "e": "Cuando la empresa no permite divulgar detalles de compensacion basada en incentivos a corto plazo, el miembro debe presentar una solicitud escrita para que se permita esta divulgacion. A es incorrecta porque no es necesario disociarse inmediatamente. B es incorrecta porque el miembro no debe violar las politicas de la empresa unilateralmente."}, {"a": "B", "e": "Hart compro un volumen enorme de acciones con la intencion de mover el precio y motivar una adquisicion, lo cual es manipulacion de mercado. Sin embargo, no hay violacion de prioridad de transacciones porque no se menciona que haya comprado para cuentas personales antes que para clientes. A es incorrecta porque la intencion de distorsionar precios es claramente manipulacion. C es incorrecta porque no hay evidencia de violacion de prioridad de transacciones."}, {"a": "A", "e": "No existe un orden obligatorio para listar las designaciones academicas y profesionales. Haverford puede elegir el orden que prefiera para sus credenciales. B y C son incorrectas porque ninguna regla del CFA Institute exige un orden especifico entre la designacion CFA y los titulos academicos."}, {"a": "B", "e": "Cuando un supervisor descubre evidencia de violacion de politicas, debe aumentar la supervision de las actividades del empleado mientras se investiga. A es incorrecta porque suspender inmediatamente puede ser excesivo sin una investigacion completa. C es incorrecta porque solo dar capacitacion adicional no aborda adecuadamente la violacion descubierta."}, {"a": "A", "e": "Johnson actuo dentro del mandato de su fondo, que invierte en acciones poco negociadas de empresas de tecnologia de consumo. Usar ordenes pequenas para minimizar el precio promedio es una practica normal de ejecucion, no manipulacion. Comprar deuda de BTC tambien es aceptable. B y C son incorrectas porque no hubo violacion de idoneidad ni manipulacion del mercado."}, {"a": "A", "e": "La donacion de $50,000 fue una fraccion minima del presupuesto caritativo de $2 millones de Diallo y fue d
