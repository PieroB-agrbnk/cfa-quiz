<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CFA L1 Practice Timer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:rgba(22,30,48,.85);--bd:rgba(100,116,139,.15);--tx:#e2e8f0;--mt:#64748b;--ac:#60a5fa;--pp:#a78bfa;--gn:#34d399;--pk:#f472b6;--rd:#f87171;--yl:#fbbf24;--ff:'Outfit',system-ui,sans-serif;--mn:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--ff);background:var(--bg);color:var(--tx);min-height:100vh}
.ctr{max-width:720px;margin:0 auto;padding:16px}
.menu{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.ml{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--mt);font-weight:600}
.mt{font-size:clamp(28px,5vw,44px);font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0 4px}
.ms{color:var(--mt);font-size:14px;margin-bottom:36px}
.mg{display:grid;gap:10px;width:100%;max-width:440px}
.mb{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 22px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--tx);transition:all .2s;text-align:left;font-family:var(--ff)}
.mb:hover{background:rgba(51,65,85,.7);border-color:rgba(96,165,250,.35);transform:translateY(-1px)}
.mb .l{font-weight:700;font-size:15px}.mb .d{color:var(--mt);font-size:12px;margin-top:2px}.mb .a{font-size:20px;color:var(--ac)}
.tb{position:sticky;top:0;z-index:10;background:rgba(8,12,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:10px 16px}
.ti{display:flex;justify-content:space-between;align-items:center;max-width:720px;margin:0 auto}
.tbn{background:none;border:none;color:var(--mt);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--ff)}
.tg{display:flex;gap:16px;align-items:center}.tc{text-align:center}
.tl{font-size:10px;color:var(--mt);letter-spacing:1.5px;text-transform:uppercase}
.tv{font-size:20px;font-weight:800;font-family:var(--mn);font-variant-numeric:tabular-nums}
.tv.q{color:var(--ac)}.tv.t{color:var(--pp)}
.dv{width:1px;height:28px;background:rgba(100,116,139,.25)}
.pb{max-width:720px;margin:8px auto 0;height:3px;background:rgba(100,116,139,.12);border-radius:2px}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,#3b82f6,#a78bfa);transition:width .3s}
.sr{max-width:720px;margin:8px auto 0;display:flex;gap:14px;justify-content:center;font-size:12px;color:var(--mt);flex-wrap:wrap}
.sr b{font-weight:700}
.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.qn{font-size:13px;font-weight:700;color:var(--mt)}
.qs{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(96,165,250,.1);color:var(--ac);font-weight:600}
.qc{background:var(--sf);border-radius:16px;padding:22px;border:1px solid var(--bd);margin-bottom:14px}
.qt{font-size:15px;line-height:1.7;white-space:pre-wrap;font-variant-numeric:tabular-nums}
.os{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ob{background:rgba(22,30,48,.6);border:1.5px solid var(--bd);border-radius:12px;padding:15px 18px;cursor:pointer;text-align:left;color:#cbd5e1;font-size:14px;line-height:1.6;transition:all .15s;font-family:var(--ff);white-space:pre-wrap}
.ob:hover:not(.lk){border-color:rgba(96,165,250,.35);background:rgba(51,65,85,.45)}
.ob.sl{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.45);color:#93c5fd}
.ob.ok{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.4);color:#6ee7b7}
.ob.no{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3);color:#fca5a5}
.ob.lk{cursor:default}
.eb{width:100%;padding:14px;background:rgba(167,139,250,.12);border:1.5px solid rgba(167,139,250,.3);border-radius:12px;color:var(--pp);font-weight:700;font-size:14px;cursor:pointer;font-family:var(--ff);margin-bottom:12px;transition:all .2s}
.eb:hover{background:rgba(167,139,250,.2)}
.ex{background:rgba(22,30,48,.7);border:1px solid rgba(167,139,250,.2);border-radius:14px;padding:20px;margin-bottom:14px}
.ea{font-size:15px;font-weight:800;color:var(--gn);margin-bottom:10px}
.et{font-size:14px;line-height:1.7;color:#cbd5e1}
.nr{display:flex;gap:10px;margin-top:auto}
.nb{flex:1;padding:14px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;font-family:var(--ff);border:none}
.np{background:var(--sf);border:1px solid var(--bd)!important;color:var(--mt)}.np:disabled{color:#1e293b;cursor:default}
.nn{flex:2;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:700}.nn:disabled{background:var(--sf);color:#334155;cursor:default}
.dt{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:12px 0}
.dd{width:8px;height:8px;border-radius:50%;border:none;cursor:pointer;padding:0;transition:all .15s}
.rs{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px}
.rh{text-align:center;margin:32px 0 28px}
.rt{font-size:36px;font-weight:800;color:var(--ac);font-family:var(--mn)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sc{background:var(--sf);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--bd)}
.sv{font-size:24px;font-weight:800;font-family:var(--mn)}.sl2{font-size:11px;color:var(--mt);margin-top:4px}
.sp{font-size:48px;font-weight:800;font-family:var(--mn)}
.sll{background:var(--sf);border-radius:12px;padding:16px;margin-bottom:24px;border:1px solid var(--bd);width:100%}
.slt{font-size:13px;font-weight:700;color:var(--mt);margin-bottom:10px}
.sli{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(100,116,139,.08);font-size:12px;gap:8px}
.sli-t{color:#cbd5e1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sli-v{color:var(--pk);font-weight:700;font-family:var(--mn);white-space:nowrap}
.bb{width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--ff);margin-bottom:10px}
.bb2{width:100%;padding:14px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;color:var(--mt);font-weight:600;font-size:14px;cursor:pointer;font-family:var(--ff)}
.bb2:hover{border-color:rgba(96,165,250,.3)}
.tag-ok{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(52,211,153,.15);color:var(--gn);margin-left:6px}
.tag-no{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(248,113,113,.15);color:var(--rd);margin-left:6px}
.tag-sk{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(100,116,139,.15);color:var(--mt);margin-left:6px}

/* Games */
.lives{display:flex;gap:6px;align-items:center}.heart{font-size:22px;transition:all .3s}.heart.lost{opacity:.2;transform:scale(.7)}
.arcade-timer{font-size:64px;font-weight:800;font-family:var(--mn);text-align:center;color:var(--yl)}
.arcade-timer.danger{color:var(--rd);animation:pulse .5s infinite}
.streak-num{font-size:40px;font-weight:800;font-family:var(--mn);color:var(--gn)}
.game-score{font-size:28px;font-weight:800;font-family:var(--mn)}
.flash-ok{animation:flashGreen .4s}
.flash-no{animation:flashRed .4s}
.opt-fast{padding:14px 18px;font-size:15px;cursor:pointer;border-radius:12px;border:1.5px solid var(--bd);background:rgba(22,30,48,.6);color:#cbd5e1;font-family:var(--ff);transition:all .1s;text-align:left;line-height:1.5}
.opt-fast:hover{border-color:rgba(96,165,250,.4);background:rgba(51,65,85,.5)}
.opt-fast:active{transform:scale(.98)}
.err-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:11px;background:var(--rd);color:#fff;font-size:11px;font-weight:800;margin-left:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes flashGreen{0%{background:rgba(52,211,153,.3)}100%{background:transparent}}
@keyframes flashRed{0%{background:rgba(248,113,113,.3)}100%{background:transparent}}
@media(max-width:500px){.sv{font-size:18px}.tv{font-size:17px}.g3{gap:6px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const E1=[["Which of the following statements about ethical behavior is most accurate?", ["A) Legal standards typically set a higher standard of behavior than ethical standards.", "B) Personal traits are the most important determinant of the ethical quality of one's behavior.", "C) Unethical behavior in the investment industry increases the cost of capital for businesses."]], ["While at dinner a member overhears a well-known and influential analyst from a different firm tell his companion that he will be raising his recommendation on Tree Products from hold to buy when he appears on a morning talk show the next day. Before the broadcast, the member buys 1,000 shares of Tree Products for her own account. The member has violated the Standard relating to:", ["A) fair dealing.", "B) diligence and reasonable basis.", "C) material nonpublic information."]], ["Allen Winkler, CFA, recently had lunch with Kim Thompson, a former professor of his, who told him of a new valuation model she had developed. Winkler recreated Thompson's model with some revisions and back-tested it using data provided by Standard & Poor's (S&P) with impressive results. Winkler's firm launches a mutual fund based on the revised model, and Winkler provides a discussion of the principles underlying the model and the test results. Is Winkler required to credit Thompson for having developed the model and S&P as the source of the data?", ["A) Both of these sources must be cited.", "B) Neither of these sources must be cited.", "C) Only one of these sources must be cited."]], ["Donald Smith, CFA, has been assigned by his employer to write a report for clients on Braden Corporation. Smith has 1,000 shares of Braden that he bought three years ago and has been discussing a consulting contract with Braden to write guidelines for their investor relations department. If Smith writes the report on Braden Corporation, he must disclose within the report:", ["A) both his ownership of Braden shares and his prospective consulting work.", "B) and to his employer his prospective consulting work but not his ownership of Braden shares.", "C) his ownership of Braden shares but need only disclose his prospective consulting work to his employer."]], ["Diane Harris, a CFA Institute member, is a portfolio manager for Worldwide Investments. One of her clients has offered her the use of his condominium in Hawaii if the returns on his U.S. equities account beat their benchmark on a risk-adjusted basis. Harris informed her manager of all terms of this agreement in writing and received verbal consent to the arrangement before accepting the offer. Did Harris violate the Standards?", ["A) Yes, because written consent from her employer is required.", "B) No, because bonuses from clients for doing her job well do not create a conflict of interest.", "C) No, because Harris notified and received verbal consent from her employer to enter the arrangement."]], ["Betty Cantor, CFA, has been finishing a report on high-tech firm HLC Corporation and intends to give it a \"market perform\" rating. Before releasing the report, she speaks with Donald Watson, her former manager and mentor, who is now with another investment firm and is well known for his great calls on high-tech companies. Watson is bullish on HLC and tells Cantor that \"HLC is going to increase for sure over the next year, and we have it as a buy.\" Cantor changes her rating on HLC to \"outperform\" based on Watson's comments. Cantor has:", ["A) not violated the Standards because she knows the high quality of Watson's analysis.", "B) violated the Standards because she based her rating on material nonpublic information.", "C) violated the Standards because she does not have a reasonable basis for her recommendation."]], ["Tom Hayes, CFA, changed firms recently, becoming the senior analyst at Balcom Management. He had earned a great reputation at his old firm with his analysis of Selldex, which doubled in value after his recommendation. Because he still likes Selldex, Hayes recreates from public sources the records and analysis he did at his previous employer and issues a report on Selldex with a \"buy\" rating. Hayes has:", ["A) not violated the Standards.", "B) violated the Standards because the analysis he did for his previous employer belongs to his previous employer.", "C) violated the Standards because his analysis is based on previous research and not independent of his prior analysis."]], ["The CFA Institute Code of Ethics most likely requires members and candidates to:", ["A) not engage in activity which compromises the integrity of CFA Institute.", "B) stay informed on applicable laws and regulations that pertain to their respective areas of business.", "C) act with competence, integrity, and in ethical manner when dealing with the public, clients, employers, employees, and other market participants."]], ["Craig Boone, CFA, a fixed-income trader, observes that one of the salesmen on the desk has been allocating his trades at the end of the day, giving better execution to large clients, a practice Boone suspects is illegal. The salesman tells Boone this is a common practice and that the firm's senior management is aware of it. If Boone makes a personal record of the activity, takes it home for his personal files, and subsequently reveals it to regulatory authorities, he would:", ["A) not be in violation of any Standards.", "B) be in violation of the Standards for disclosing confidential information.", "C) be in violation of the Standards for breaching his duty of loyalty to his employer."]], ["Sanctions that may be imposed on members by CFA Institute include:", ["A) public censure, suspension of membership, and fines.", "B) suspension of membership, revocation of CFA charter, and fines.", "C) public censure, suspension of membership, and revocation of CFA charter."]], ["Mary Walters, CFA, is a bank trust officer who has entered into a referral agreement with Bob Sear, a tax attorney. Sear has told Walters that he will do her tax work in return for referrals. According to the CFA Institute Code and Standards, Walters must disclose:", ["A) only the fact that she compensated for referrals, to any clients or prospects she refers to Sear.", "B) only the fact that she is compensated for referrals, to her employer and any clients or prospects she refers to Sear.", "C) the fact that she is compensated for the referrals and the nature of the compensation she is to receive, to her employer and any clients or prospects she refers to Sear."]], ["Ronaldo Jenkins, CFA, chief investment officer for Windwatch Advisors, has been helping his local municipality find an investment bank for a bond issue. Jenkins was told in confidence that one investment bank, which is a subsidiary of a commercial bank held in Windwatch client portfolios, is experiencing financial difficulties and will be shut down soon. According to the CFA Institute Standards of Professional Conduct, Jenkins is least likely permitted to:", ["A) share the information received about the investment bank with his compliance officer.", "B) share the information received about the investment bank with Windwatch's head of equity investments.", "C) approach the investment bank about making public disclosure of the financial difficulties and pending closure."]], ["Morton Crane, CFA, is a portfolio manager. Crane has just been informed by his compliance officer that a new law will require additional disclosures of personal client information to regulators for two of Crane's former clients and one of his current clients. Crane decides to comply with the new law and provide the required client information. Has Crane violated CFA Institute Standards of Professional Conduct?", ["A) No.", "B) Yes, because he disclosed confidential information about a former client.", "C) Yes, because he disclosed confidential information about a current client."]], ["While visiting Cassori Company, Mark Ramsey, CFA, overhears management make comments that are not public information but are not really meaningful by themselves. Combining this information with his own analysis and other outside sources, Ramsey decides to change his recommendation on Cassori from \"Buy\" to \"Sell.\" According to the CFA Institute Standards of Professional Conduct, Ramsey:", ["A) must not issue his report until Cassori's management makes their comments public.", "B) may issue his \"Sell\" report because the facts are nonmaterial, but should maintain a file of the facts and documents leading to this conclusion.", "C) must report these events to his immediate supervisor and legal counsel, since they have become material in combination with his analysis."]], ["When a member or candidate knows that a client and coworker are violating regulatory rules and local law, the member or candidate is:", ["A) not required to report any of the violations to authorities.", "B) required to report violations by the coworker but not the client.", "C) required to report the violations of the law and of the regulatory rules to the appropriate authority."]], ["Adam Schute, CFA, is on a conference call with the CFO of an investment banking client with his phone speaker on and his door open. As a result, salesmen and traders overhear the CFO describing problems with production target dates that have not been publicly disclosed. The salesmen relay this information to clients and the traders reduce their positions in the stock. With respect to the Standard on material nonpublic information, Schute has:", ["A) not violated the Standard because he has not acted on the information, but the traders and salesmen have violated the Standard.", "B) violated the Standard because he should have taken steps to prevent the dissemination of the information.", "C) violated the Standard by not making the information public when he realized others had overheard the call."]], ["Peter Wellington has changed his status in marketing materials to \"Level III CFA candidate.\" Wellington passed the Level II CFA exam and just received his results. He intends to register for the next Level III CFA examination that is offered. Wellington has:", ["A) not violated the Standards of Professional Conduct.", "B) violated the Standard on conduct as participants in CFA Institute programs.", "C) violated the Standard on reference to the CFA Institute, the CFA Designation, and the CFA Program."]], ["When he assumed the job of compliance officer two years ago, Ed Michaels, CFA, issued written compliance procedures and made all covered employees aware of the procedures. A report by an external auditor found that on several occasions over the past two years, two different employees traded in recommended securities ahead of trades made in managed client accounts. Michaels fires both employees and recirculates the written compliance procedures that explain clearly which activities are prohibited. Michaels has violated the Standard concerning:", ["A) Responsibilities of Supervisors by firing the employees instead of restricting their activities.", "B) Responsibilities of Supervisors by failing to implement reasonable procedures to detect violations.", "C) Misconduct because, as the compliance officer, he is associated with, and ultimately responsible for, the unethical activity."]], ["Ralph Malone, CFA, has many clients, including a trust account that benefits three of his immediate family members. His firm changes its recommendation on a stock from \"hold\" to \"buy\" on a security that is suitable for many clients, including the trust. Which of the following would be considered a violation of the Standard concerning priority of transactions?", ["A) Malone waits until after the firm purchases the security to buy it for the family trust account.", "B) Malone trades on the family account shortly after his firm's clients have been informed of the buy recommendation.", "C) The firm gives clients time to act on the new recommendation and then buys 100,000 shares for its own account prior to publicly disclosing the new recommendation."]], ["Patricia Nelson, CFA, is informed by one of her clients that if she can get the performance of the client firm's pension portfolio above that of the Standard & Poor's average by year-end, the client will give her a free trip to Singapore to visit the firm's offices. If Nelson agrees to this arrangement, which of the following actions complies with CFA Institute Standards of Professional Conduct? Nelson:", ["A) must inform her employer of this agreement but does not need consent.", "B) must inform her employer of this agreement and may accept it with verbal consent.", "C) may inform her employer by email of this agreement and must receive written consent."]], ["John Anderson, CFA, follows Radley Manufacturing for his employer, Atlas Brokers. Radley has announced a takeover bid for Palmer Industries, a company that Atlas does not follow. To get out a research note about the potential effects of the acquisition on Radley, Anderson purchases a report on Palmer from a research firm Atlas regularly uses. Anderson incorporates projections and analysis from the purchased report into his research note on what a post-acquisition Radley would look like but does not cite the source. Anderson has violated the Standard on:", ["A) misrepresentation.", "B) independence and objectivity.", "C) diligence and reasonable basis."]], ["Susan Smart, CFA, is about to change her \"buy\" recommendation on RollinsCo to \"sell.\" RollinsCo had been growing rapidly over the past year, but Smart believes the growth potential is now gone. Smart sells the shares held in her discretionary client accounts and in her own personal account before issuing her report. According to the Standards that concern fair dealing and priority of transactions, Smart violated:", ["A) both of these Standards.", "B) neither of these Standards.", "C) only one of these Standards."]], ["Matt Jacobs, CFA, recommended to a client that he buy shares in Timeco, which has subsequently underperformed the market. Timeco stock is thinly traded, and its price has decreased sharply over the past few weeks because two insiders have sold large blocks of shares. Jacobs believes this price decrease reflects an illiquid market. Because he still believes Timeco is a good long-term investment, he buys shares for his personal account in order to raise the price and help him convince his client to hold on to his investment in Timeco. Has Jacobs violated the Standards?", ["A) No, because the trade is for the benefit of his client.", "B) Yes, because he intended to manipulate the market price of Timeco.", "C) No, because he is providing liquidity to offset the effects of the recent large insider sales."]], ["To be compliant with GIPS, a firm's composites must comprise all:", ["A) fee-paying accounts.", "B) discretionary accounts.", "C) discretionary accounts that are fee-paying."]], ["Tony Roberts, CFA, is part of a team that manages equities accounts. He believes that a teammate, who is not a CFA Institute member or candidate, takes actions that, while not illegal under local law, violate CFA Institute Standards of Professional Conduct. According to the CFA Institute Standards of Professional Conduct, Roberts:", ["A) is required to dissociate from the team's activities if they continue.", "B) is not required to act because the Code and Standards do not apply to non-members.", "C) must report the suspected violations of the Code and Standards first to his supervisor and then to CFA Institute."]], ["Judy Blush is a CFA candidate and is recommending the purchase of a mutual fund that invests solely in long-term U.S. Treasury bonds (T-bonds) to one of her clients. She states: \"Because the U.S. government guarantees payment of both principal and interest on its bonds, risk of loss from investing in this fund is virtually zero.\" Blush's actions violated:", ["A) the Standard on misrepresentation.", "B) the Standard on communication with clients.", "C) none of the Standards of Professional Conduct."]], ["The Code of Ethics least likely states that members and candidates are required to:", ["A) use their own judgement.", "B) obey all laws and the Standards of Practice.", "C) attempt to improve the competence of other investment professionals."]], ["According to the Standard concerning suitability, it is most likely that members and candidates in advisory relationships with clients should:", ["A) document unsuccessful attempts to update client information.", "B) purchase only securities with low to medium risk for a client with moderate risk tolerance.", "C) decline to manage assets for clients who withhold important information about their financial circumstances and needs."]], ["Which of the following statements is a proper reference to the CFA designation?", ["A) I expect to obtain the CFA designation after I pass the next Level III exam.", "B) As a CFA charterholder, I am required to comply with high ethical standards.", "C) As a CFA Level II, I hope to obtain the highest set of credentials in the investment industry."]], ["Byron Bell, CFA, tells his assistant that Mary Mitchel, a client of his, confided to him that she is suffering from the early stages of Alzheimer's disease and that she is planning to leave almost all of her sizable estate to Prather House, a support facility for Alzheimer's patients. Bell directs his assistant to keep this information confidential. With respect to the Standard on preservation of confidentiality, Bell has:", ["A) not violated the Standard.", "B) violated the Standard by sharing information about his client's health but not about planned bequest to Prather House.", "C) violated the Standard both by sharing the information about his client's health and about her planned bequest to Prather House."]], ["The slope coefficient of a lin-log model describes a linear relationship between:", ["A) relative changes in the dependent variable and relative changes in the independent variable.", "B) relative changes in the dependent variable and absolute changes in the independent variable.", "C) absolute changes in the dependent variable and relative changes in the independent variable."]], ["In accrual accounting, the matching principle states that:", ["A) an entity should recognize revenues only when received and expenses only when they are paid.", "B) transactions and events producing cash flows are allocated only to time periods in which the cash flows occur.", "C) expenses incurred to generate revenue are recognized in the same time period as the revenue."]], ["Listed equity securities held as assets that do not convey significant influence in the investee company must be reported at fair value through profit and loss under:", ["A) IFRS only.", "B) U.S. GAAP only.", "C) both IFRS and U.S. GAAP."]], ["Over the last 12 months, M&N Company has been using its accounts payable as an internal source of funds. This month, M&N's largest supplier changed its invoice terms from 2/20 net 90 to 2/10 net 60. Going forward, this change is most likely to:", ["A) increase M&N's days of payables.", "B) decrease M&N's days of payables.", "C) have no effect on M&N's days of payables."]], ["Given the observations 45, 20, 30, and 25, the mean absolute deviation is closest to:", ["A) 0.0.", "B) 7.5.", "C) 13.3."]], ["The independent auditors of Shadydells, Inc., have determined that the company recorded operating leases that should have been capitalized. This is considered to be a material instance of noncompliance with applicable GAAP, but the financial statements are otherwise fairly presented. Which opinion are the auditors most likely to issue?", ["A) Adverse opinion.", "B) Qualified opinion.", "C) Unqualified opinion."]], ["An analyst gathers the following information: Net income $100, Decrease in accounts receivable 30, Depreciation 25, Increase in inventory 17, Increase in accounts payable 10, Decrease in wages payable 5, Increa sted public company, a private company typically has greater:", ["A) free float.", "B) barriers to ownership transfer.", "C) reporting and compliance costs."]], ["A pricing model is developed with the assumption that returns are both independently and identically distributed. Based on that assumption:", ["A) the mean exhibits stationarity.", "B) past returns can be used to predict future returns.", "C) the variance is constant over time, but the standard deviation is not necessarily constant over time."]], ["An analyst gathered data: 1,000,000 shares outstanding at beginning of year. 10,000 6% convertible bonds (conversion ratio 20:1 issued at par June 30. 100,000 warrants outstanding all year with exercise price $25. Average stock price $20, ending price $30. If convertible bonds are dilutive, the number of shares for diluted EPS is:", ["A) 1,000,000.", "B) 1,100,000.", "C) 1,266,667."]], ["Two of the typical steps in the capital allocation process are:", ["A) analyzing project proposals and raising additional capital.", "B) raising additional capital and creating the firm-wide capital budget.", "C) analyzing project proposals and creating the firm-wide capital budget."]], ["A company that has recognized goodwill as a balance sheet asset most likely has:", ["A) acquired another company.", "B) produced successful research and development.", "C) positive environmental, social, and governance factors."]], ["Assume that one year ago, the exchange rate between JPY and EUR was 100 JPY/EUR, and JPY/USD was 80 JPY/USD. Current rates are 104.2 JPY/EUR and 76.6 JPY/USD. Which statement is most accurate?", ["A) The USD has depreciated relative to the EUR.", "B) The JPY has depreciated 4.2% relative to the EUR.", "C) The current U.S. dollar to euro exchange rate is approximately 1.25 USD/EUR."]], ["An analyst gathered: CFO $800, Purchase of plant/equipment 40, Sale of land 30, Interest expense 80, D&A 100. Tax rate 35%, U.S. GAAP. The company's FCFF is closest to:", ["A) $840. ess cycles.", "B) coincide with business cycles.", "C) have longer durations than business cycles."]], ["For a dataset of nine unequal values, the harmonic mean is 13.25 and the arithmetic mean is 13.86. The geometric mean is closest to:", ["A) 12.97.", "B) 13.55.", "C) 14.16."]], ["An analyst is concerned about his own tendency to exhibit overconfidence bias. An appropriate action toward overcoming this bias would be to:", ["A) narrow confidence intervals.", "B) work independently from colleagues.", "C) employ scenario analysis in forecasting."]], ["Jordan Loney issues a \"sell\" recommendation on Sullivan Company because she believes its financial reporting quality is low. Loney writes, \"Rapid turnover of key employees in its information systems and accounting units have made Sullivan's internal monitoring controls ineffective.\" Which condition that may lead to low-quality financial reporting has Loney detected?", ["A) Opportunity.", "B) Motivation.", "C) Rationalization."]], ["Which of the following relationships among a company's stakeholders is most accurately described as a principal-agent relationship? The relationship between a company's managers and its:", ["A) creditors.", "B) regulators.", "C) shareholders."]], ["At the beginning of the year, a firm securitizes half of its accounts receivable and uses the proceeds to pay down principal on a long-term bank loan. These transactions will:", ["A) increase the firm's current ratio.", "B) decrease the firm's debt-to-equity ratio.", "C) decrease the firm's interest coverage ratio."]], ["Using historical index returns for an equities market over a 20-year period, an analyst has calculated the average annual return as 5.60% and the holding period return as 170%. The compound annual index return over the period is closest to:", ["A) 2.69%.", "B) 5.09%.", "C) 5.24%."]], ["A country's central bank is concerned about inflation and the economy overheating. To help reduce this risk, the central bank is most likely to ue of a forward contract? The forward contract value:", ["A) will increase.", "B) will decrease.", "C) may increase or decrease."]], ["A provision that ensures investors in an alternative investment fund will not pay twice for the same gains is:", ["A) a clawback.", "B) a hard hurdle rate.", "C) a high-water mark."]], ["In a transaction referred to as a management buyout (MBO):", ["A) management sells its shares to an investor group attempting to gain control.", "B) management buys a controlling interest in a public company to gain control of the board.", "C) an investor group that includes management buys all shares and they no longer trade on an exchange."]], ["A stock has beta 0.9, estimated return 10%. Risk-free rate 7%, expected market return 11%. According to CAPM, this stock:", ["A) is overvalued.", "B) is undervalued.", "C) is properly valued."]], ["For a 5-year pure discount bond callable at par after two years, which yield measure will be lowest?", ["A) Current yield.", "B) Yield to first call.", "C) Yield to maturity."]], ["An investor who chooses a fund-of-funds rather than an individual hedge fund is least likely concerned with:", ["A) diversification among hedge fund strategies.", "B) minimizing management and incentive fees.", "C) the manager's expertise in selecting hedge funds."]], ["In which step of the portfolio management process does an investment manager rebalance the portfolio to its target asset allocation percentages?", ["A) Analysis step.", "B) Feedback step.", "C) Execution step."]], ["Moore Company stock is trading at $40. An investor attempting to protect against losses of more than 10% on a short position should place a:", ["A) stop buy order at $44.", "B) stop sell order at $36.", "C) limit buy order at $44."]], ["Which statement most accurately represents the positions of parties to a derivatives contract?", ["A) A call option imposes an obligation to buy the underlying security.", "B) A forward contract imposes an obligation on the seller but not the buyer.", "C) Both a put writer and a call writer have an obligation to exchange the underlying asset."]], ["Under which conditions are market values of securities most likely to be persistently greater than their intrinsic values?", ["A) Short selling is restricted.", "B) Transactions costs are high.", "C) Arbitrage trading is restricted."]], ["In what way is approximate convexity different from effective convexity?", ["A) Effective convexity takes embedded options into account, while approximate convexity does not.", "B) Effective convexity results in a more accurate estimate of an option-free bond's change in price than approximate convexity.", "C) Approximate convexity can be used with an unequal increase and decrease in yield, while effective convexity can only be used with an equal increase or decrease in yield."]], ["A multi-market index is most likely to overweight countries that have recently experienced high equity market returns if it weights securities by:", ["A) dividend yield, and weights country index returns by market capitalization.", "B) dividend yield, and weights country index returns by gross domestic product.", "C) market capitalization, and weights country index returns by gross domestic product."]], ["Which portion of an investment policy statement is most likely to state any restriction on portfolio leverage?", ["A) Procedures.", "B) Investment guidelines.", "C) Duties and responsibilities."]], ["Accrued interest is the difference between a coupon bond's:", ["A) flat price and full price.", "B) clean price and flat price.", "C) invoice price and dirty price."]], ["Given put-call parity, a synthetic underlying asset can be created by forming a portfolio of a:", ["A) long call, long put, and short risk-free bond.", "B) long call, short put, and long risk-free bond.", "C) short call, long put, and long risk-free bond."]], ["An analyst gathered data: $1 dividend last year, next year's dividend projected 10% higher, stock project const E2=[["A market can be characterized as efficient if assets':", ["A) book values equal their market values.", "B) intrinsic values equal their book values.", "C) market values equal their intrinsic values."]], ["A direct investment in a cryptocurrency is said to occur when:", ["A) a transaction is recorded on the blockchain.", "B) the purchase of a cryptocurrency stock is settled.", "C) an investor takes a position in a cryptocurrency futures contract."]], ["A professional organization most appropriately enforces upon its members:", ["A) legal standards only.", "B) ethical standards only.", "C) both legal and ethical standards."]], ["A website produces content that it allows the public to view for free. Users may post comments on the site's content if they register with the website and agree to permit it to show them targeted advertisements. The website's business model is best described as being based on:", ["A) hidden revenue.", "B) crowdsourcing.", "C) network effects."]], ["Moe Girard, CFA, works in a large group that decides on recommendations by consensus. Girard does not always agree with the group consensus, but he is confident in the group's analytical ability. To comply with the Code and Standards when the group issues a recommendation with which he disagrees, Girard:", ["A) does not need to take any action.", "B) must request that his name be removed from the group’s report.", "C) should include his independent opinion as an appendix to the group’s report."]], ["Thomas Baker recently passed the Level III CFA examination. Baker is reviewing a draft of the firm's marketing material to be distributed after he receives his CFA charter. One passage reads, \"Baker passed all three Levels of the CFA exam on his first attempts in three consecutive years.\" Is this statement in compliance with CFA Institute Standards?", ["A) Yes, as long as it is a statement of fact.", "B) No, because it implies that Baker has superior ability.", "C) No, because Members or Candidates who passed the exams on their first attempts may not differentiate themselves from those who did not."]], ["Jimmy Deininger, CFA, manages several client portfolios. One of his clients offers him use of a cabin in a vacation spot because the client's investment results under Deininger's management have exceeded the client's goals. Deininger discloses the gift to his employer. With reference to the Standards of Practice, Deininger:", ["A) has complied with the Standards and may accept the gift. is not permitted to accept the gift because he does not have permission from his", "B) employer. has appropriately disclosed the gift to his supervisor, but must also disclose it to his", "C) other clients."]], ["Carlos Mendez, CFA, is beginning an investment advisory relationship with a new client and plans to formulate an investment policy statement (IPS) for the client. According to the Standard concerning suitability, Mendez is least likely to consider the client's:", ["A) regulatory and legal circumstances.", "B) conflicts of interest.", "C) performance measurement benchmarks."]], ["With regard to performance measurement, the Global Investment Performance Standards for firms:", ["A) require time-weighted rates of return.", "B) require money-weighted rates of return.", "C) permit both time-weighted and money-weighted rates of return."]], ["Telling potential investors that a short-term U.S. Treasury fund contains \"guaranteed\" securities:", ["A) does not violate any Standard.", "B) violates the Standards by misrepresenting the securities in the fund. violates the Standards by failing to consider the suitability of the fund for potential", "C) investors."]], ["A portfolio manager of a city's police pension fund owes his duty of loyalty to the:", ["A) city’s taxpayers.", "B) pension trustees.", "C) plan beneficiaries."]], ["Riley and Smith, a broker-dealer, is bringing to market a secondary offering for All Pro Company. One of the reasons All Pro selected the firm to lead the offering is because Riley and Smith has been a market maker for All Pro's stock for the past five years. The firm is in possession of material nonpublic information relevant to All Pro's offering. To be in compliance with the Code and Standards, Riley and Smith:", ["A) may not serve as underwriter for the same stock in which it acts as a market maker. should continue to serve as market maker but take only the contra side of unsolicited", "B) customer trades. should abstain from making a market in All Pro stock during the offering period but", "C) may resume market making activities after the offering."]], ["Matt O'Neill, CFA, is an advisor for Century Investments, a retail financial services firm. Century has a firmwide policy that its advisors recommend the firm's own investment products to clients unless Century does not offer a product suitable for the client's needs. Can O'Neill follow his firm's policy without violating the Code and Standards?", ["A) Yes, if O’Neill discloses this policy to his clients.", "B) Yes, if his firm’s offerings are competitive with other available products.", "C) No, because the policy conflicts with the Standard on loyalty, prudence, and care."]], ["Wayne Sergeant, CFA, is an independent investment advisor who works with individuals. A longtime client asks Sergeant if he can recommend an attorney. Sergeant refers his client to Jim Chapman, a local attorney who is also a friend of Sergeant's. Previously, Chapman had agreed to perform some legal work for Sergeant in exchange for the referral of new clients. Do Sergeant's actions violate CFA Institute Standards of Professional Conduct?", ["A) No, because the client is under no obligation and is still free to select another attorney.", "B) Yes, because Sergeant is making a recommendation that is not independent and objective.", "C) Yes, because Sergeant did not disclose the nature of his arrangement with Chapman to his client."]], ["Which of the following statements is most accurate regarding the GIPS requirement for definition of the firm?", ["A) The firm must be the distinct business entity held out to clients.", "B) If a firm has ofices in different geographical locations, the firm definition may include just the primary location where all the investment decisions are made.", "C) The firm definition may include the corporation or a subsidiary of the corporation, but the firm cannot be defined as simply a “division” of the corporation."]], ["Ron Brenner, CFA, manages portfolios for individuals. One of his clients, John Perlman, offers Brenner several inducements above those provided by his employer to motivate superior future performance in managing his portfolio. Brenner notifies his manager via e-mail about the terms of this offer, and his employer grants permission. According to the Standard on additional compensation arrangements, Brenner:", ["A) must notify “all parties involved,” which includes his other clients.", "B) has taken all the actions required to accept the arrangement. should decline this arrangement because it could cause partiality in the handling of", "C) other client accounts."]], ["Denise Chavez, CFA, is the senior energy analyst for a major brokerage firm. Chavez is also a social and environmental activist, and is opposed to coal-fired power plants. She has been arrested twice for trespassing during organized pickets at some of these power plants. Chavez has recently accepted a volunteer position as Board member of Greensleeves, a foundation that lobbies governments on environmental issues. The position will involve significant volunteer hours, including some travel. Are Chavez's activities consistent with CFA Institute Standards?", ["A) Chavez violated the Standards by being arrested, but the volunteer Board position is not a violation.", "B) The environmental activism is not a violation, but the Standards prohibit Chavez from accepting the Board position.", "C) The activism and subsequent arrests are not a violation, but Chavez must disclose the Board position to her employer."]], ["With respect to a client's confidential information, if a member or candidate believes a client is engaging in illegal activity, the member should most appropriately:", ["A) preserve the client’s confidentiality.", "B) report the client to the appropriate governmental authorities.", "C) seek advice from his firm’s legal counsel or compliance department."]], ["Ray Brown, CFA, gives prospects his firm's marketing materials, not prepared by him, that indicate he has a graduate degree from State University, when in fact he did graduate work there but did not receive a degree. Brown informed the marketing department of this error when he first saw it. Brown has:", ["A) violated the Standards by misrepresenting his qualifications.", "B) not violated the Standards because he has informed his firm of the mistake. not violated the Standards because he did not prepare the marketing materials or", "C) misrepresent his credentials to his firm."]], ["Jenny Pickler, a Level II CFA Candidate, writes an economic forecast containing several interest rate projections. Her firm's investment committee reviews Pickler's report and changes several of the interest rates Pickler had forecast. To comply with CFA Institute Standards, Pickler:", ["A) does not need to take any further action.", "B) should ask that her name be removed from the report. is required to independently review the data supporting the investment committee’s", "C) changes."]], ["Which of the following statements is most accurate about the Standard concerning knowledge of the law? Members and candidates are responsible for violations:", ["A) that are proven by a regulatory authority.", "B) of which they are aware or should be aware.", "C) in which they knowingly participate or assist."]], ["Andrew Pollard, CFA, overhears two executives from a multinational oil company discussing an unexpectedly large earnings increase the company is preparing to announce the following morning. When Pollard gets home that evening, he places an order to buy shares in this oil company. Which of the following best describes this situation?", ["A) Pollard violated the Standards by acting on material nonpublic information.", "B) There is no violation of CFA Institute Standards since this was simply an overheard conversation.", "C) Pollard violated CFA Institute Standards by not contacting counsel for advice before placing the trade."]], ["Recommended procedures for compliance with the Standard concerning misconduct include that firms should:", ["A) adopt a code of ethics and make clear that unethical behavior will not be tolerated.", "B) periodically inform employees of violations and disciplinary actions taken.", "C) check references of potential employees to ensure they are eligible for employment."]], ["Which of the following statements is most accurate? An analyst who changes employers and wants to maintain coverage of a stock:", ["A) may copy supporting records from the prior firm and use them at the new firm. must re-create the supporting records at the new firm with information from public", "B) sources or from the covered firm. may maintain his recommendations at the new firm without re-creating the supporting", "C) documentation if those recommendations had a reasonable basis."]], ["After taking the Level I exam, Willie Winchester posts a comment on a social media website wondering why the exam had no questions about interest rate risk and currency risk. Winchester has:", ["A) violated the Code and Standards by discussing the CFA Program on social media. violated the Code and Standards by disclosing confidential information about the", "B) exam. not violated the Code and Standards because he did not disclose specific exam", "C) questions."]], ["A member provides a client with an investment performance presentation that does not include detailed information, but reflects the member's reasonable efforts to present results that are fair, accurate, and complete. Has the member complied with the Standard related to performance presentation?", ["A) Yes, the member has met the requirements of the Standard.", "B) No, because the performance presentation must comply with Global Investment Performance Standards.", "C) No, because “reasonable efiorts” do not ensure that the presentation is fair, accurate, and complete."]], ["With regard to independent practice by Members and Candidates who are employed, the Code and Standards specify that:", ["A) undertaking independent practice includes preparations to begin such practice. written consent must be obtained from both the employer and clients who may be", "B) affected. members and candidates contemplating independent competitive business must", "C) notify their current employer of the types of services to be rendered, duration, and compensation."]], ["Gary Hoskins, CFA, runs a macro strategy hedge fund. The hedge fund has a short position in July osmium futures. Hoskins attempts to gain control of the available supply of osmium that can be delivered in July, which will cause holders of long July futures to make offsetting trades instead of settling by delivery. Has Hoskins violated the Standard concerning market manipulation?", ["A) Yes.", "B) No, because Hoskins is executing an arbitrage trade.", "C) No, because Hoskins is not manipulating the price of osmium."]], ["Isaac Jones, CFA, is a portfolio manager for a major brokerage firm. Jones wishes to buy Maxima common stock for some of his clients' accounts. Jones also wishes to purchase Maxima for his personal account. In accordance with CFA Institute Standards, Jones may purchase Maxima for his personal account:", ["A) only after completing the transactions for his clients. along with the purchases for his clients, as long as this is disclosed in advance to his", "B) clients and employer. at any time, as long as the execution price is not more favorable than the execution", "C) price received by the clients."]], ["Which of the following statements best describes how GIPS requires portfolios to be grouped into composites?", ["A) All discretionary portfolios must be included in one and only one composite.", "B) All discretionary portfolios must be included in a composite, but only if they are still managed by the firm.", "C) Each composite must include all discretionary portfolios that the firm has managed according to a particular strategy or style."]], ["With respect to the responsibilities of supervisors, the Code and Standards state that those with supervisory responsibility:", ["A) may not delegate supervisory responsibility.", "B) are in violation if an employee under their supervision commits securities fraud. must institute procedures to prevent and detect violations of rules and regulations by", "C) those subject to their supervision."]], ["The Standard concerning suitability recommends that the objectives and constraints of an investment policy statement should be reviewed at least:", ["A) annually.", "B) twice each year.", "C) every two years."]], ["A member or candidate who changes his recommendation on a stock can comply with the Standards by communicating this change to clients according to:", ["A) size of the client.", "B) known interest of the client in the stock.", "C) number of shares of the stock owned by the client."]], ["Long-term shifts in population from one country to a neighboring country are best described as which type of geopolitical risk?", ["A) Event risk.", "B) Thematic risk.", "C) Exogenous risk."]], ["Drags on liquidity are most likely to include:", ["A) inventory obsolescence.", "B) paying vendors too soon.", "C) suppliers requiring payment sooner."]], ["Other things equal, which of the following conditions would place a company highest on a spectrum of financial reporting quality?", ["A) Reported earnings that are not sustainable.", "B) Efiorts by management to keep net income steady over time.", "C) Financial statements that reffect the company’s economic activities accurately but are not in compliance with accounting principles."]], ["A company purchases an asset in the first quarter and decides to capitalize the asset. Compared to expensing the asset cost, capitalizing the asset cost will result in higher cash flows in the first quarter from:", ["A) investing.", "B) financing.", "C) operations."]], ["Assuming annual compounding, the price of a zero-coupon bond with a face value of $1,000, maturing 10 years from today, with a yield to maturity of –1.5% is closest to:", ["A) $860.", "B) $1,015.", "C) $1,160."]], ["If an investor uses a threshold return of 0% in calculating the safety-first ratio, which combination of expected returns and standard deviations is most desirable?", ["A) Expected return of 7% and standard deviation of 9%.", "B) Expected return of 6% and standard deviation of 8%.", "C) Expected return of 4% and standard deviation of 6%."]], ["In periods of rising prices and stable or increasing inventory quantities, compared with companies that use LIFO inventory accounting, companies that use the FIFO method will have:", ["A) higher COGS and lower taxes.", "B) higher net income and higher taxes.", "C) lower inventory balances and lower woworking capital."]], ["Martin Zwingle is making a capital allocation decision with regard to a new project. The initial expense of the project would cause the company's earnings per share for the current year to come in below analysts' expectations. If Zwingle decides against the project, his firm will allocate his division a smaller capital budget next year. Which of these factors are appropriate for Zwingle to include in the capital allocation decision?", ["A) Both of these factors are appropriate.", "B) Neither of these factors is appropriate.", "C) Only one of these factors is appropriate."]], ["A manufacturing plant exhibits diseconomies of scale if long-run average cost (LRAC) is:", ["A) increasing as output increases, and the plant has exceeded its minimum efficient scale.", "B) decreasing as output increases, and the plant is below its minimum efficient scale.", "C) at its lowest level, meaning the plant is at its minimum efficient scale."]], ["Placing a tariff on imports of a good is most likely to decrease:", ["A) producer surplus for domestic producers of the good.", "B) quantity of the good supplied by domestic producers.", "C) quantity of the good demanded in the domestic market."]], ["The standard error of estimate in a simple linear regression is equal to:", ["A) the square root of the mean squared error.", "B) the sum of squares regression divided by the sum of squares total.", "C) the sum of squared errors divided by the degrees of freedom for the error term."]], ["Data for a manufacturing industry indicate that inventories of work in progress are increasing faster than sales. This is most likely to indicate that:", ["A) the business cycle is at a peak.", "B) inventory is becoming obsolete.", "C) firms expect demand to increase."]], ["Consider two currencies, the VKN and the PKR. The PKR is trading at an annual premium of 2.3% relative to the VKN in the forward market. The 1-year risk-free PKR rate is 3.0%. If no arbitrage opportunities are available, the current 1-year risk-free VKN interest rate is closest to:", ["A) 0.7%.", "B) 2.3%.", "C) 5.3%."]], ["Frank Jones is considering three separate investments. Investment 1 pays a stated annual interest rate of 6.1%, compounded annually. Investment 2 pays a stated annual interest rate of 6.0%, compounded monthly. Investment 3 pays a stated annual interest rate of 5.9%, compounded quarterly. Which investment should Smith choose?", ["A) Investment 1.", "B) Investment 2.", "C) Investment 3."]], ["An owner of a business is most likely to have limited liability if he is a:", ["A) shareholder.", "B) sole proprietor.", "C) general partner."]], ["Mullins Company's financial statements include an auditor's report with a qualified opinion. This most likely implies that the:", ["A) auditor is reasonably assured that the financial statements are free of material errors. financial statements include exceptions to the applicable accounting standards but are", "B) presented fairly. financial statements are materially out of compliance with the applicable accounting", "C) standards and are not presented fairly."]], ["Wilmer Jones owns several restaurants in different cities. His restaurants compete on quality of food and service, price, and marketing. Competitors can enter and exit his markets, and there are usually several competitors in each market. His market structure can best be characterized as:", ["A) perfect competition.", "B) monopolistic competition.", "C) oligopoly."]], ["An analyst determines that there is a 60% probability that a stock price will end the year at $12 per share. If there is an equivalent probability that the stock will end the year at either $10 or $16, the expected value of the stock price is:", ["A) $11.20.", "B) $12.40.", "C) $13.60."]], ["When a company grants stock options to employees, the company is required to:", ["A) value the options using the Black-Scholes-Merton model.", "B) disclose how the options affect the income statement and balance sheet.", "C) recognize the fair value of the options as an expense in the period of the grant date."]], ["Tax policy that is designed to minimize its interference with market forces is said to exhibit:", ["A) fairness.", "B) eficiency.", "C) sufficiency."]], ["An appropriate way to address the effectiveness of a company's management in creating value for shareholders is to compare the company's:", ["A) net profit margin to its cost of equity.", "B) weighted average cost of capital to its return on invested capital.", "C) total cost of debt and equity financing to its earnings before interest and taxes."]], ["An IFRS reporting firm holds equity securities as investments and classifies them for financial reporting as measured at fair value through profit and loss. Can the firm reclassify these securities as measured at fair value through other comprehensive income?", ["A) Yes.", "B) No, because IFRS does not permit this classification for equity securities.", "C) No, because the firm did not choose this treatment at the time of purchase."]], ["An analyst who believes a company's financial reporting is aggressive would most likely point out:", ["A) low salvage value estimates for fixed assets.", "B) large valuation allowances for deferred tax assets.", "C) longer useful lives of equipment than those of peer companies."]], ["Which of the following is most accurate regarding information asymmetry in corporations?", ["A) Management has more information than shareholders.", "B) Shareholders have more information than debtholders.", "C) The board of directors has more information than management."]], ["A central bank's policy rate is considered expansionary if it is less than:", ["A) the central bank’s target inflation rate.", "B) the long-term growth rate of real economic output. the sum of the long-term growth rate of real economic output and the target inflation", "C) rate."]], ["Dot Corporation uses accelerated depreciation for tax purposes and straight-line depreciation for financial reporting. The company also earns interest income from tax-free municipal bonds. The most accurate statement is that:", ["A) the interest income will result in a deferred tax asset and the depreciation will result in a deferred tax liability.", "B) the depreciation expense causes a temporary difference between income tax expense and taxes payable, and the interest income creates a permanent difference.", "C) both the depreciation method difference and the interest income create temporary differences."]], ["Which of the following statements is most accurate regarding parametric and nonparametric tests?", ["A) A z-test is an example of a parametric test, while a t-test is nonparametric.", "B) Both kinds of tests assume that the underlying data are normally distributed.", "C) Data that are ranks rather than values are best evaluated using a nonparametric test."]], ["A central bank's long-term policy goal for the exchange rate of its domestic currency is most likely to be to pursue:", ["A) stability.", "B) appreciation.", "C) depreciation."]], ["Bivac Corp. has been experiencing a declining return on equity over the past few years. Selected financial statement ratios for Bivac appear below: Prior Year Current Year Tax Burden 0.60 0.62 Interest Burden 0.80 0.81 EBIT Margin 0.26 0.26 Asset Turnover 1.06 1.06 ROE 0.15 0.14 What is the most likely reason for the decline in Bivac's ROE?", ["A) Leverage has declined.", "B) The tax rate has increased.", "C) Net profit margin has declined."]], ["The capital structure theory that implies an optimal capital structure employing both debt and equity is:", ["A) pecking order theory.", "B) static trade-ofi theory.", "C) Modigliani and Miller with taxes."]], ["An analyst asks a number of her colleagues, who she believes have no emotional investment in the matter, for their views on a particular company. Which bias is the analyst most likely trying to mitigate by seeking these opinions?", ["A) Confirmation bias.", "B) Conservatism bias.", "C) Illusion of control bias."]], ["An analyst is forecasting a company's sales and costs. He notes that the company's product demand is elastic, and that the unit price of its product is expected to increase by 4% over the forecast period. The analyst should forecast the company's revenue to:", ["A) increase.", "B) decrease.", "C) remain constant."]], ["An analyst has calculated the arithmetic, harmonic, and geometric mean using the last 10 years of returns on a stock. Which of these means should the analyst most appropriately use to forecast next year's return on the stock?", ["A) Harmonic mean.", "B) Geometric mean.", "C) Arithmetic mean."]], ["The histogram of returns data for the Accel Equity Fund has a long left tail and is more peaked than a normal distribution. Based on the histogram, the distribution of returns for Accel has:", ["A) positive skewness.", "B) negative skewness.", "C) negative excess kurtosis."]], ["Bill Jones holds ten $1,000 par, 6% bonds maturing in 3 years. Kathy Reed holds 200 shares of common stock from the same company. Which of the following statements is most accurate about their respective investments?", ["A) Both investors have unlimited upside and limited downside exposure.", "B) Jones’s investment has a lower priority of claims than Reed’s investment.", "C) Reed’s investment may return more cash overall than Jones’s investment."]], ["A company understates year-end depreciation. As compared to the properly stated year- end results, what effect will this understatement have on the company's asset turnover ratio?", ["A) No impact.", "B) Decrease.", "C) Increase."]], ["A spot exchange rate is 8.6145 and the 1-year forward quotation is +0.25%. The 1-year forward quotation on a points basis is closest to:", ["A) 2.", "B) 25.", "C) 215."]], ["Thunderbird Company reported net income of $500 million and the company had 100 million common shares outstanding. In addition, Thunderbird had 5 million shares of convertible preferred and 10 million outstanding warrants during the year. Each preferred share pays a dividend of $4 per share and is convertible into three common shares. Each warrant is convertible into one common share at $25 per share. The company's stock traded at an average $50 per share. Thunderbird's diluted earnings per share for the year is closest to:", ["A) $4.00 per share.", "B) $4.20 per share.", "C) $4.80 per share."]], ["The regression line in a simple linear regression model minimizes the sum of the squared differences between:", ["A) the values of the dependent variable and its mean.", "B) the predicted and actual values of the dependent variable.", "C) the model’s errors and the standard error of the dependent variable."]], ["A firm has recently incurred the following costs in relation to two projects. Project 1: Purchase of a copyright for $1,000 6 months ago, although there is now an active market valuing this asset at $1,700. Project 2: Research costs of $4,000 and development costs of $7,000. In addition to these costs, advertising costs associated with the project were $2,000. Under U.S. GAAP, these projects will increase intangible assets on the balance sheet by:", ["A) $1,000.", "B) $8,000.", "C) $12,700."]], ["Which of the following is most likely to improve a company's cash position, other things equal?", ["A) Decreasing days’ payables.", "B) Decreasing inventory turnover.", "C) Decreasing credit terms from 2/60 to 2/45."]], ["During 20X1, Tusa Company sold machinery with an original cost of $100,000, and recognized a $15,000 gain from the sale. At the time of the sale, the accumulated depreciation of the machinery was $80,000. Ignoring taxes, the machinery sale will produce a:", ["A) $15,000 infiow from investing activities.", "B) $20,000 infiow from operating activities.", "C) $35,000 infiow from investing activities."]], ["Peaks and troughs in the business cycle are most likely to appear earliest as measured by the:", ["A) growth cycle.", "B) classical cycle.", "C) growth rate cycle."]], ["For the last few years, firms in an expanding industry have found it more difficult to keep up with consumer demand despite steadily increasing inventory levels. The Consumer Price Index (CPI) has been at a level of 1050, 1060, and 1087 in the last three years. Given this situation, a firm in this industry that seeks to report higher net income would most likely prefer which inventory accounting method?", ["A) LIFO.", "B) FIFO.", "C) Average cost."]], ["Jo Evans analyzes the financial statements of Shubert Company and writes, \"Shubert's earnings, while sustainable, provide an inadequate return to shareholders.\" Evans has expressed a concern with Shubert's:", ["A) quality of reported results only.", "B) financial reporting quality only.", "C) quality of reported results and financial reporting quality."]], ["A project with a conventional cash flow pattern has a net present value of $15,000. If the discount rate used was 6%, the project's internal rate of return is:", ["A) equal to 6%.", "B) less than 6%.", "C) greater than 6%."]], ["A method of estimating the standard error of the sample mean that involves calculating the means of repeated samples, each with one observation omitted from the initial samples, is most appropriately termed the:", ["A) jackknife method.", "B) bootstrap method.", "C) sample reduction method."]], ["Which of the following is the most likely reason why an analyst needs to monitor developments in financial reporting standards?", ["A) Company managements may choose aggressive or conservative accounting policies.", "B) Financial statements might not always present a company’s economic reality accurately.", "C) Changes in accounting standards may require a company to restate its financial statements."]], ["A firm has one actively traded bond issue outstanding, with a 6% coupon and a yield to maturity of 5%. When estimating the firm's weighted average cost of capital (WACC), the appropriate after-tax cost of debt capital is:", ["A) between 5% and 6%.", "B) less than 5%.", "C) equal to 6%."]], ["A decrease in accumulated depreciation is most likely to result from:", ["A) selling or disposing of a long-lived asset.", "B) increasing the salvage value of a long-lived asset.", "C) decreasing the estimated useful life of a long-lived asset."]], ["A national government that wants to increase economic growth through fiscal policy is most likely to:", ["A) decrease the discount rate.", "B) purchase government securities.", "C) increase spending on infrastructure."]], ["The continuously compounded annual rate of return that would increase the value of an investment by 20% in three years is closest to:", ["A) 5.7%.", "B) 6.1%.", "C) 6.7%."]], ["For a test with sample size n of whether two variables are correlated, the critical values are based on:", ["A) n degrees of freedom.", "B) n – 1 degrees of freedom.", "C) n – 2 degrees of freedom."]], ["The following data appear on the balance sheet of a U.S. GAAP reporting company: Gross deferred tax asset at the beginning of the year = $10,500 Gross deferred tax asset at the end of the year = $11,250 Valuation allowance at the beginning of the year = $2,700 Valuation allowance at the end of the year = $3,900 Based only on this information, the company's earnings in future periods are expected to:", ["A) increase.", "B) decrease.", "C) remain relatively stable."]], ["Under Modigliani and Miller's assumptions, if taxes exist and interest costs are tax- deductible, the optimal proportion of debt in a firm's capital structure:", ["A) is 100%.", "B) increases linearly with the tax rate.", "C) depends on the costs of financial distress."]], ["An advantage of a common market, relative to a customs union or a free trade area, is that a common market:", ["A) adopts a single currency.", "B) removes barriers to movement of labor and capital.", "C) establishes common institutions and economic policy."]], ["Hazel Edwards, CFA, is analyzing Collins Footwear, Inc. and obtains the following data for the company's major geographic segments: Asia Europe North America Sales (U.S. dollars) $200 million $300 million $500 million Net profit margin 4.5% 3.0% 1.5% Asset turnover 1.5× 2.5× 4.0× Based on these data, Edwards should conclude that Collins's:", ["A) smallest segment by assets is Asia.", "B) most profitable segment by return on assets is Europe.", "C) most profitable segment by net income is North America."]], ["An investor buys a non-dividend paying stock for $100 at the beginning of the year with 50% initial margin. At the end of the year, the stock price is $95. Deflation of 2% occurred during the year. Which of the following return measures for this investment will be greatest?", ["A) Real return.", "B) Nominal return.", "C) Leveraged return."]], ["While analyzing HMS Inc., Fred Browne notes that the company's liquidity as measured by its quick ratio has decreased over time while its current liabilities have remained constant. This could be explained by:", ["A) a decrease in inventory.", "B) an increase in marketable securities.", "C) a decrease in accounts receivable."]], ["Stephanie Dell is evaluating two stocks (X and Y) using the capital asset pricing model. Dell predicts that the betas for the two stocks will be identical but that the unsystematic risk for Stock X will be greater than for Stock Y. Based on the capital asset pricing model, compared to Stock Y, Stock X will have:", ["A) a higher standard deviation and an expected return equal to Stock Y.", "B) a higher standard deviation and a higher expected return than Stock Y.", "C) both an equal expected return and equal standard deviation to Stock Y."]], ["A hedge fund's lockup period is the time during which:", ["A) the fund is closed to new investors.", "B) an investor may not redeem shares in the fund.", "C) the fund must return cash to an investor who has requested a redemption."]], ["Joe Leoni is an institutional equity trader. He believes that stock price and volume information can help him consistently generate excess returns on his stock picks. Based on this information, Leoni most likely believes that the market:", ["A) is not strong-form efficient.", "B) may be semi-strong or strong-form efficient.", "C) is not weak-form efficient, but may be semi-strong efficient."]], ["Which of the following fintech applications is most likely to use distributed ledger technology?", ["A) Real-time clearing and settlement of securities trades.", "B) High-frequency trading to take advantage of intraday price discrepancies.", "C) Automated review of employees’ voice communications to detect misconduct."]], ["A central clearing mandate for derivatives is most likely to result in:", ["A) increased disclosure of trades.", "B) dispersion of counterparty risk.", "C) standardization of derivatives contracts."]], ["Compared to a normal distribution, historical returns on major asset classes in developed markets have exhibited:", ["A) less frequent large positive deviations.", "B) more frequent large negative deviations.", "C) the expected frequency of large deviations."]], ["A fixed-income investor who is most concerned about high rebalancing fees would prefer to track an index that includes bonds characterized by:", ["A) shorter maturities and frequent new issuances.", "B) longer maturities and frequent new issuances.", "C) longer maturities and infrequent new issuances."]], ["If a company's revenues and cost of goods sold both increase by the same money amount, the company's gross margin will most likely:", ["A) increase.", "B) decrease.", "C) remain the same."]], ["An investor buys a five-year bond with a coupon of 2% and expects to sell it in four years. The investor will be most concerned with decreasing interest rates if the bond's Macaulay duration is:", ["A) equal to 4.", "B) less than 4.", "C) greater than 4."]], ["In the context of private debt, a single loan that combines secured and unsecured classes of debt is best described as:", ["A) mezzanine debt.", "B) unitranche debt.", "C) a leveraged loan."]], ["Which of the following statements about the asset management industry is most accurate?", ["A) Smart beta is a blend of active and passive management.", "B) The market share for active management has been growing over time.", "C) Passive management represents about half of assets under management."]], ["Boswell is less risk-averse than Johnson. Using the same capital allocation line for Boswell and Johnson, Boswell will have:", ["A) a higher risk aversion coefficient than Johnson.", "B) steeper risk-return indifference curves than Johnson.", "C) an optimal portfolio with a higher expected return than Johnson."]], ["In a one-period binomial model for option pricing based on risk neutrality, the probabilities of an up-move or a down-move are:", ["A) equal.", "B) assumed by the modeler.", "C) calculated from the model inputs."]], ["A leveraged buyout fund is best described as a private equity fund that acquires:", ["A) public companies, with the purchase price is largely funded by debt.", "B) public companies, with the purchase price is largely funded by equity.", "C) private companies, with the purchase price is largely funded by equity."]], ["The following data refer to a corporate bond: Par value: $1,000 Maturity: 10 years Coupon rate: 5% Coupon frequency: Semiannual Yield-to-maturity: 6.25% The market value of this bond is closest to:", ["A) $908.", "B) $988.", "C) $1,098."]], ["An organization is concerned it will be unable to continue to operate because it has run out of cash. This is an example of:", ["A) credit risk.", "B) liquidity risk.", "C) solvency risk."]], ["In assessing the pricing power of companies in an industry using Porter's five forces, an analyst will most likely determine that companies have less pricing power when:", ["A) barriers to entry are low.", "B) the threat of substitute products is low.", "C) switching costs for consumers are high."]], ["The portion of a hedge fund's return that is attributable to its exposure to specific sectors is its:", ["A) alpha.", "B) market beta.", "C) strategy beta."]], ["The standard deviation of returns for a portfolio of risky assets is:", ["A) less than the standard deviation of the least risky asset.", "B) greater than the standard deviation of the least risky asset.", "C) less than or equal to the standard deviation of the most risky asset."]], ["A real estate fund manager that specializes in property development is most likely to structure itself as a(n):", ["A) finite-life, closed-end fund.", "B) indefinite-life, open-end fund.", "C) indefinite-life, closed-end fund."]], ["An equal-weighted index has a value of 100 at the beginning of a period. The five securities that make up the index have the following prices for the period: Security Beginning price Ending price 1 20 22 2 80 72 3 130 143 4 250 225 5 320 352 The index value at the end of the period is:", ["A) 101.40.", "B) 101.75.", "C) 102.00."]], ["Institutional investors in alternative assets are most likely to progress from:", ["A) direct investing to co-investing to fund investing.", "B) direct investing to fund investing to co-investing.", "C) fund investing to co-investing to direct investing."]], ["Which of the following investors typically have the lowest need for liquidity?", ["A) Banks.", "B) Mutual funds.", "C) Defined benefit pension plans."]], ["Multilateral trading facilities (MTFs) are most accurately described as:", ["A) exchanges.", "B) block brokers.", "C) alternative trading systems."]], ["An investor holds a bond with a duration gap of +1. If the investor expects interest rates to immediately rise, selling the bond at the end of the investor's investment horizon would result in a:", ["A) loss, because price risk dominates.", "B) loss, because reinvestment risk dominates.", "C) gain, because reinvestment risk dominates."]], ["Infrastructure projects are most likely characterized by high:", ["A) barriers to entry.", "B) business cycle sensitivity.", "C) correlations of returns with public equities."]], ["Bearing unsystematic risk should provide no additional expected return:", ["A) under any circumstances.", "B) if diversification is cost-free.", "C) in a strong-form efficient market."]], ["An economist determines that Argove Industries is a low-cost producer in its industry. As a result, the economist should expect that Argove can earn returns:", ["A) only at its cost of capital.", "B) above its cost of capital both in the short run and long run.", "C) above its cost of capital in the short run, but not in the long run."]], ["During which stage of a portfolio company's development does a venture capital fund provide it with capi
