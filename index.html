: "Cuando una empresa compra un activo, puede registrarlo como gasto inmediato o capitalizarlo, es decir, repartir el costo en varios anos. Esto afecta donde aparece el desembolso en el estado de flujos de efectivo. C) es correcta: al capitalizar, el pago se clasifica como actividad de inversion, no de operaciones, lo que hace que el flujo de caja operativo sea mayor comparado con gastarlo de inmediato. A) es incorrecta: los flujos de inversion bajan al capitalizar porque ahi se registra la salida de dinero. B) es incorrecta: capitalizar o gastar no afecta los flujos de financiamiento, que se relacionan con deuda y capital."}, {"a": "C", "e": "Un bono cupon cero no paga intereses periodicos; se compra con descuento y al vencer se recibe su valor nominal. Su precio se calcula dividiendo el valor nominal entre (1 + rendimiento) elevado a los anos. C) es correcta: con rendimiento negativo de -1.5%, el calculo da 1000 / (0.985)^10 = aproximadamente 1160 dolares, un precio superior al valor nominal. A) es incorrecta: 860 dolares resultaria con un rendimiento positivo; un rendimiento negativo produce un precio mayor que el valor nominal. B) es incorrecta: 1015 dolares subestima el efecto de 10 anos de capitalizacion con tasa negativa."}, {"a": "A", "e": "El ratio de seguridad primero (safety-first ratio o SFRatio) mide que tan lejos esta el retorno esperado del umbral minimo aceptable, ajustado por el riesgo. Se calcula como (retorno esperado - umbral) dividido por la desviacion estandar. Mayor ratio es mejor. A) es correcta: 7%/9% = 0.778, el valor mas alto. B) es incorrecta: 6%/8% = 0.750, menor que A, indicando mayor probabilidad de caer bajo el umbral de 0%. C) es incorrecta: 4%/6% = 0.667, el mas bajo de los tres; aunque tiene menor volatilidad, su retorno esperado es insuficiente para compensar."}, {"a": "B", "e": "FIFO y LIFO son metodos para asignar costos al inventario vendido. FIFO (primero en entrar, primero en salir) asume que se vende primero lo mas antiguo. LIFO (ultimo en entrar, primero en salir) asume que se vende lo mas reciente. B) es correcta: con precios subiendo, FIFO asigna los costos mas antiguos y baratos a lo vendido, resultando en menor costo de ventas, mayor ganancia neta y por lo tanto mayores impuestos que LIFO. A) es incorrecta: FIFO tiene menor costo de ventas, no mayor. C) es incorrecta: FIFO muestra saldos de inventario mas altos, no mas bajos."}, {"a": "B", "e": "Imagina que decides si comprar una maquina nueva para tu negocio. Lo unico que importa es si esa maquina genera mas dinero del que cuesta, es decir, su valor presente neto (VPN: la diferencia entre lo que ganaras y lo que gastaras, ajustado al valor del dinero hoy). Que las ganancias por accion (EPS, beneficio dividido entre acciones) bajen temporalmente o que te reduzcan el presupuesto futuro son presiones externas, no criterios financieros validos. B es correcta porque ninguno de esos factores debe influir: las decisiones de inversion se basan solo en el VPN. A es incorrecta porque ambos factores son irrelevantes para una decision racional. C es incorrecta porque ninguno de los dos es apropiado, no solo uno."}, {"a": "C", "e": "Piensa en una fabrica como una panaderia: al principio, producir mas panes reduce el costo por unidad, pero si crece demasiado, el desorden y la burocracia hacen que cada pan cueste mas. Las deseconomias de escala ocurren cuando el costo promedio a largo plazo (LRAC) sube al aumentar la produccion. La escala minima efficiente (MES) es el punto donde ese costo esta en su nivel mas bajo. C es correcta: deseconomias significan LRAC creciente, y MES es el LRAC minimo. A es incorrecta porque describe economias de escala (costo bajando). B es incorrecta porque un LRAC decreciente en todo el rango describe un monopolio natural, no deseconomias."}, {"a": "C", "e": "Un arancel es un impuesto que el gobierno cobra a productos importados, como si pusieras un peaje a la fruta extranjera. Esto sube el precio del bien en el mercado local. Segun la ley de demanda, cuando el precio sube, los consumidores compran menos. C es correcta: el arancel reduce la cantidad demandada porque el precio mas alto desanima al comprador. A es incorrecta porque el excedente del productor local (su ganancia extra) aumenta, ya que vende a precios mas altos gracias a la proteccion. B es incorrecta porque los productores nacionales producen mas, no menos, al beneficiarse del precio elevado."}, {"a": "A", "e": "En una regresion lineal simple (metodo para predecir una variable a partir de otra), el error estandar de estimacion (SEE) mide cuanto se desvian los datos reales de la linea de prediccion, como medir cuanto se alejan los dardos del centro de la diana. Se calcula como la raiz cuadrada del error cuadratico medio (MSE), que es la suma de errores al cuadrado dividida entre los grados de libertad (n-2). A es correcta: SEE = raiz de MSE. B es incorrecta porque SSR/SST es el R-cuadrado, que mide proporcion de variacion explicada. C es incorrecta porque describe el MSE, no el SEE; falta aplicar la raiz cuadrada."}, {"a": "A", "e": "Imagina una fabrica que produce mas camisas de las que vende: las camisas a medio hacer se acumulan. Cuando los inventarios de productos en proceso crecen mas rapido que las ventas en toda una industria, significa que se esta produciendo mas de lo que el mercado absorbe. Esto es tipico del pico del ciclo economico (el punto mas alto de actividad antes de una caida). A es correcta: la sobreproduccion respecto a la demanda senala un pico. B es incorrecta porque la obsolescencia es un problema puntual de ciertos productos, no una tendencia industrial general. C es incorrecta porque si esperaran mas demanda, acumularian productos terminados, no semiterminados."}, {"a": "C", "e": "La paridad de tasas de interes cubiertas funciona como un equilibrio: si una moneda se vende mas cara a futuro (prima forward), es porque su tasa de interes es mas baja. El PKR cotiza con prima del 2.3% sobre el VKN, y su tasa es 3.0%. Para hallar la tasa VKN se multiplica: (1.03)(1.023) - 1 = 5.37%, cercano a 5.3%. C es correcta. A es incorrecta porque 0.7% resulta de restar incorrectamente 3.0% - 2.3%, ignorando la formula multiplicativa de paridad. B es incorrecta porque 2.3% es solo la prima forward, no la tasa de interes del VKN; la tasa correcta combina ambos factores."}, {"a": "B", "e": "Cuando un banco ofrece intereses, importa con que frecuencia se capitalizan (se suman al capital para generar mas intereses). La tasa efectiva anual (EAR) refleja el rendimiento real. Inversion 1: 6.1% anual, EAR = 6.1%. Inversion 2: 6.0% mensual, EAR = (1+0.06/12)^12 - 1 = 6.168%. Inversion 3: 5.9% trimestral, EAR = (1+0.059/4)^4 - 1 = 6.045%. B es correcta: la Inversion 2 tiene el mayor rendimiento real. A es incorrecta porque 6.1% es menor que 6.168%. C es incorrecta porque 6.045% es la mas baja de las tres opciones."}, {"a": "A", "e": "Piensa en cuanto arriesgas de tu bolsillo segun como participes en un negocio. La responsabilidad limitada significa que solo puedes perder lo que invertiste, no tu casa ni tus ahorros personales. A es correcta: un accionista (dueno de acciones de una empresa) solo arriesga el dinero que pago por sus acciones. B es incorrecta: un propietario unico (persona que es duena sola del negocio) responde con todos sus bienes personales por las deudas del negocio, es decir, tiene responsabilidad ilimitada. C es incorrecta: un socio general (quien gestiona una sociedad) tambien tiene responsabilidad ilimitada sobre las deudas."}, {"a": "B", "e": "Cuando un auditor revisa los estados financieros de una empresa, emite una opinion sobre su fiabilidad. Una opinion calificada (qualified opinion) es como decir: hay algunos problemas puntuales, pero en general los numeros son razonables. B es correcta: los estados financieros tienen excepciones especificas a las normas contables, pero en conjunto se presentan de forma justa. A es incorrecta porque describe una opinion limpia (sin salvedades), donde el auditor confirma que todo esta libre de errores importantes. C es incorrecta porque describe una opinion adversa, que indica problemas graves y generalizados en los estados financieros."}, {"a": "B", "e": "Piensa en una calle con varios restaurantes: cada uno intenta diferenciarse por su menu, servicio o precio, pero cualquiera puede abrir o cerrar libremente. Eso es competencia monopolistica, donde hay muchos competidores con productos diferenciados y libre entrada al mercado. B es correcta: los restaurantes de Jones compiten diferenciandose, con varios rivales y sin barreras de entrada. A es incorrecta porque en competencia perfecta todos venden productos identicos, sin diferenciacion. C es incorrecta porque un oligopolio tiene pocos competidores grandes y barreras de entrada significativas, lo opuesto a lo descrito."}, {"a": "B", "e": "El valor esperado es como calcular el promedio ponderado de resultados posibles segun su probabilidad. Aqui hay 60% de que la accion valga $12, y el 40% restante se reparte igual: 20% para $10 y 20% para $16. B) Correcta: E(V) = 0.60x12 + 0.20x10 + 0.20x16 = 7.20 + 2.00 + 3.20 = $12.40. A) Incorrecta: $11.20 solo saldria con ponderaciones erroneas que dan demasiado peso a los valores bajos. C) Incorrecta: $13.60 sobreestima el resultado porque asigna demasiado peso a $16, cuando la mayor probabilidad corresponde a $12."}, {"a": "B", "e": "Cuando una empresa da opciones sobre acciones a sus empleados, debe informar al publico como afectan sus finanzas. Piensa en ello como una etiqueta de ingredientes: el inversor necesita saber que contiene. B) Correcta: la norma exige divulgar el impacto de las opciones en el estado de resultados y el balance general. A) Incorrecta: no se obliga a usar el modelo Black-Scholes-Merton (una formula especifica de valoracion); la empresa puede elegir otro modelo apropiado. C) Incorrecta: el gasto no se registra todo en la fecha de otorgamiento, sino que se distribuye durante el periodo de adquisicion de derechos."}, {"a": "B", "e": "Imagina que los impuestos son como reglas de transito: idealmente no deberian desviar a los conductores de la ruta mas logica. La eficiencia tributaria busca exactamente eso. B) Correcta: una politica fiscal efficiente minimiza su interferencia con las fuerzas del mercado, dejando que los precios asignen recursos sin distorsion. A) Incorrecta: la equidad se refiere a que la carga fiscal se reparta justamente entre contribuyentes, no a evitar distorsiones de mercado. C) Incorrecta: la suficiencia se refiere a que el sistema recaude lo necesario para financiar el gasto publico, sin relacion con la interferencia en el mercado."}, {"a": "B", "e": "Para saber si la gerencia crea valor, hay que comparar lo que cuesta financiar la empresa con lo que genera. Es como comparar el interes de un prestamo con la ganancia del negocio que financio. B) Correcta: si el retorno sobre capital invertido (ROIC) supera el costo promedio ponderado de capital (WACC), la gerencia crea valor economico. A) Incorrecta: comparar margen neto con costo del capital propio mezcla medidas incompatibles. C) Incorrecta: comparar costo total de financiamiento con ganancias antes de intereses e impuestos no ajusta por impuestos ni estructura de capital."}, {"a": "C", "e": "Bajo las normas NIIF, clasificar acciones de inversion es como elegir carril en una autopista: algunas decisiones deben tomarse al inicio y no pueden cambiarse despues. C) Correcta: la opcion de medir acciones a valor razonable con cambios en otro resultado integral debe elegirse al comprar el titulo y es irrevocable. Si no se eligio entonces, no se puede reclasificar despues. A) Incorrecta: no es posible reclasificar porque la decision debia tomarse al momento de la compra. B) Incorrecta: las NIIF si permiten esa clasificacion para acciones, pero solo si se elige en el reconocimiento inicial."}, {"a": "C", "e": "Un reporte financiero agresivo es como inflar el curriculum: se presentan las cifras de forma optimista para que las ganancias parezcan mayores. C) Correcta: asignar vidas utiles mas largas a los equipos reduce la depreciacion anual (el gasto por desgaste), lo que infla las ganancias reportadas frente a empresas comparables. A) Incorrecta: valores residuales bajos aumentan la depreciacion y reducen ganancias, lo cual es conservador, no agresivo. B) Incorrecta: provisiones grandes para activos fiscales diferidos reflejan cautela al asumir que algunos beneficios fiscales no se realizaran, lo opuesto a ser agresivo."}, {"a": "A", "e": "La asimetria de informacion es cuando una parte sabe mas que la otra, como un vendedor de autos usados que conoce los defectos que el comprador no ve. A) Correcta: en una empresa, la gerencia maneja las operaciones diarias y conoce detalles internos que los accionistas externos no tienen, generando el llamado problema de agencia. B) Incorrecta: accionistas y acreedores son ambos externos; ninguno tiene necesariamente mas informacion que el otro. C) Incorrecta: el directorio supervisa pero no gestiona dia a dia, por lo que la gerencia posee mas informacion operativa que el directorio."}, {"a": "C", "e": "La tasa de politica monetaria del banco central es como el acelerador de la economia. Si esta por debajo de la tasa neutral, la politica es expansionaria y estimula el crecimiento. C) Correcta: la tasa neutral se calcula sumando el crecimiento real de largo plazo mas la meta de inflacion. Si la tasa de politica es menor, se considera expansionaria segun la regla de Taylor. A) Incorrecta: comparar solo con la inflacion objetivo omite el componente de crecimiento real. B) Incorrecta: comparar solo con el crecimiento real omite la inflacion objetivo. Se necesitan ambos componentes."}, {"a": "C", "e": "Dot Corporation usa depreciacion acelerada para impuestos y lineal para reportes, y ademas invierte en bonos municipales libres de impuestos. Esto genera dos tipos de diferencias contables. C) Correcta: la depreciacion distinta crea una diferencia temporal (se revierte con el tiempo) entre gasto fiscal y contable. Los intereses exentos de bonos municipales crean una diferencia permanente porque nunca se gravaran. A) Incorrecta: no se necesita cuenta de provision de valuacion para estos casos. B) Incorrecta: los intereses exentos no generan un activo fiscal diferido sino una diferencia permanente."}, {"a": "C", "e": "Las pruebas estadisticas se dividen en parametricas (que asumen una distribucion conocida, como la normal) y no parametricas (que no requieren ese supuesto). Piensa en las no parametricas como herramientas mas flexibles. C) Correcta: cuando los datos son rangos u ordenamientos en vez de valores numericos, las pruebas no parametricas son las mas adecuadas. A) Incorrecta: tanto la prueba z como la prueba t son parametricas; ambas asumen normalidad. B) Incorrecta: solo las pruebas parametricas asumen distribucion normal; las no parametricas funcionan sin ese supuesto."}, {"a": "A", "e": "Imagina que el banco central es como un capitán que mantiene el barco estable. Su meta a largo plazo para el tipo de cambio (el precio de su moneda frente a otras) es la estabilidad. A) Correcto: Un tipo de cambio estable da certeza a empresas que comercian internacionalmente y atrae inversión extranjera. B) Incorrecto: Una apreciación continua (que la moneda suba de valor) encarecería las exportaciones y dañaría la competitividad del país. C) Incorrecto: Una depreciación continua (que la moneda pierda valor) provocaría inflación importada y erosionaría el poder de compra de los ciudadanos."}, {"a": "A", "e": "El ROE (rentabilidad sobre el patrimonio) se puede descomponer con la fórmula DuPont en cinco factores multiplicados entre sí: carga fiscal, carga de intereses, margen operativo, rotación de activos y apalancamiento. A) Correcto: La carga fiscal mejoró (0.60 a 0.62), la carga de intereses mejoró (0.80 a 0.81), y el margen y la rotación no cambiaron. Si el ROE bajó de 0.15 a 0.14, el único factor restante, el apalancamiento (uso de deuda), tuvo que disminuir. B) Incorrecto: La carga fiscal subió, lo que indica que los impuestos bajaron, no subieron. C) Incorrecto: El margen neto no cayó porque sus componentes mejoraron o se mantuvieron."}, {"a": "B", "e": "Piensa en financiar una empresa como equilibrar una balanza: la deuda da ventajas fiscales, pero demasiada deuda aumenta el riesgo de quiebra. B) Correcto: La teoría del trade-off estático busca ese punto óptimo donde el ahorro fiscal de la deuda (escudo fiscal) se equilibra con los costos de dificultades financieras, resultando en una mezcla ideal de deuda y capital propio. A) Incorrecto: La teoría del orden jerárquico solo establece preferencias de financiamiento (primero ganancias retenidas, luego deuda, luego acciones), sin definir un punto óptimo. C) Incorrecto: Modigliani y Miller con impuestos, sin considerar costos de quiebra, concluye que lo óptimo es usar 100% deuda, no una mezcla."}, {"a": "A", "e": "Imagina que buscas opiniones solo de amigos que piensan igual que tú: nunca verás el panorama completo. Eso es el sesgo de confirmación. A) Correcto: La analista consulta colegas sin interés emocional para contrarrestar su tendencia natural a buscar solo información que confirme lo que ya cree sobre la empresa. B) Incorrecto: El sesgo de conservadurismo es resistirse a actualizar opiniones ante nueva evidencia; no se combate buscando opiniones diversas, sino procesando mejor datos nuevos. C) Incorrecto: La ilusión de control es creer que puedes influir en resultados que no controlas; no tiene relación con consultar otras perspectivas."}, {"a": "B", "e": "La elasticidad de la demanda mide cuánto cambia la cantidad comprada cuando cambia el precio. Si la demanda es elástica (elasticidad mayor a 1), los consumidores reaccionan mucho a cambios de precio. B) Correcto: Al subir el precio un 4%, la cantidad demandada cae más de un 4% porque la demanda es elástica. El ingreso total (precio por cantidad) disminuye porque se pierden más ventas de las que compensa el mayor precio. A) Incorrecto: El ingreso solo aumentaría si la demanda fuera inelástica, donde la cantidad baja poco al subir el precio. C) Incorrecto: El ingreso se mantendría constante solo con elasticidad unitaria (exactamente igual a 1)."}, {"a": "C", "e": "Existen tres tipos de promedio: aritmético (suma y divide), geométrico (considera el efecto compuesto) y armónico (promedio de razones). Cada uno tiene un uso específico en finanzas. C) Correcto: La media aritmética es el mejor estimador para pronosticar el rendimiento de un solo periodo futuro, porque da el valor esperado sin sesgo de una variable aleatoria. A) Incorrecto: La media armónica se usa para promediar ratios como precio/ganancia o en estrategias de compra periódica, no para proyectar rendimientos. B) Incorrecto: La media geométrica mide bien el crecimiento compuesto histórico, pero subestima el rendimiento esperado para un único periodo futuro."}, {"a": "B", "e": "Un histograma muestra cómo se distribuyen los rendimientos. La asimetría (sesgo) indica si hay más valores extremos a un lado. La curtosis mide qué tan puntiaguda es la distribución comparada con la normal. B) Correcto: Una cola izquierda larga significa sesgo negativo: hay más rendimientos extremos negativos (pérdidas grandes). La distribución más puntiaguda indica curtosis positiva. A) Incorrecto: El sesgo positivo tendría cola larga a la derecha, no a la izquierda. C) Incorrecto: Una distribución más puntiaguda que la normal tiene exceso de curtosis positivo (leptocúrtica), no negativo. La curtosis negativa sería más aplanada."}, {"a": "C", "e": "Jones tiene bonos (préstamos a la empresa con pagos fijos) y Reed tiene acciones (participación en la empresa con potencial de ganancia ilimitado). C) Correcto: Las acciones de Reed pueden generar más efectivo total que los bonos de Jones si la empresa crece mucho, porque las acciones no tienen techo de ganancia. A) Incorrecto: Solo las acciones tienen potencial ilimitado de ganancia; los bonos están limitados a sus cupones fijos más el capital. B) Incorrecto: Los bonos tienen mayor prioridad de cobro que las acciones en caso de quiebra. Jones cobra antes que Reed, no después."}, {"a": "B", "e": "La depreciación es el desgaste que se registra cada año sobre los activos de una empresa, como maquinaria o edificios. Subestimarla es como no reconocer todo el desgaste real. B) Correcto: Si se registra menos depreciación, los activos netos quedan inflados (más altos de lo real). La rotación de activos se calcula como ventas divididas entre activos totales. Con un denominador más grande y ventas iguales, el resultado es menor. A) Incorrecto: Sí hay impacto porque los activos cambian. C) Incorrecto: El ratio disminuye, no aumenta, porque el denominador es mayor de lo que debería ser."}, {"a": "C", "e": "Los puntos forward expresan la diferencia entre el tipo de cambio a futuro y el tipo de cambio al contado (spot), medida en la última cifra decimal de la cotización. C) Correcto: Se multiplica el spot (8.6145) por la prima forward (0.25% = 0.0025), dando 0.021536. Expresado en puntos (moviendo el decimal cuatro posiciones): 0.0215 × 10,000 ≈ 215 puntos. A) Incorrecto: 2 puntos equivaldrían a solo 0.0002, una prima de apenas 0.002%, muy inferior al 0.25%. B) Incorrecto: 25 puntos equivaldrían a 0.0025, una prima de apenas 0.029%, también muy inferior al 0.25% indicado."}, {"a": "B", "e": "Imagina que repartes una pizza entre más personas: cada porción es más pequeña. El EPS diluido (ganancia por acción diluida) mide cuánto gana cada acción si todos los valores convertibles se transforman en acciones comunes. Primero, el EPS básico: ingreso neto $500M menos dividendos preferentes ($5M×$4=$20M) da $480M entre 100M acciones = $4.80. Para el diluido, si las preferentes se convierten, sumamos los $20M al ingreso y añadimos 15M acciones (5M×3). Los warrants (derechos de compra) agregan 5M acciones netas usando el método de autocartera. EPS diluido = $500M/120M ≈ $4.17, cercano a $4.20. B es correcta. A ($4.00) subestima el cálculo. C ($4.80) es el básico sin dilución."}, {"a": "B", "e": "Piensa en trazar la mejor línea recta a través de puntos en un gráfico. La regresión lineal simple busca la recta que mejor se ajuste a los datos. El método de mínimos cuadrados minimiza la suma de las diferencias al cuadrado entre los valores reales de la variable dependiente (lo observado) y los valores predichos por la recta. B es correcta porque describe exactamente este criterio. A es incorrecta: comparar valores con su media calcula la variación total, no el ajuste de la recta. C es incorrecta: no existe un criterio que minimice errores contra el error estándar; eso no tiene sentido estadístico."}, {"a": "A", "e": "Bajo las normas contables estadounidenses (US GAAP), no todo gasto se convierte en activo. Los activos intangibles son bienes sin forma física, como patentes o derechos de autor. El derecho de autor comprado se registra a su costo original de $1,000, sin revaluar aunque ahora valga más. Los gastos de investigación ($4,000) y desarrollo ($7,000) se registran como gasto inmediato bajo GAAP. La publicidad ($2,000) también se gasta. Solo el derecho de autor incrementa los intangibles. A ($1,000) es correcta. B ($8,000) incluiría erróneamente el desarrollo. C ($12,700) revaluaría el derecho de autor y capitalizaría todo, lo cual GAAP no permite."}, {"a": "C", "e": "La posición de efectivo de una empresa es como el saldo de tu cuenta bancaria: mejora cuando entra dinero más rápido o sale más lento. Reducir los términos de crédito de 2/60 a 2/45 significa que los clientes deben pagar en 45 días en vez de 60, así el dinero llega antes. C es correcta. A es incorrecta: reducir los días de cuentas por pagar significa pagar a proveedores más rápido, lo que saca efectivo antes y empeora la posición. B es incorrecta: menor rotación de inventario significa vender más lento, dejando dinero atrapado en productos sin vender, lo cual perjudica la liquidez."}, {"a": "C", "e": "Cuando vendes un bien usado, el dinero que recibes es el precio de venta, no solo la ganancia. El valor en libros de la maquinaria es su costo original ($100,000) menos la depreciación acumulada (desgaste contable, $80,000), o sea $20,000. La ganancia de $15,000 significa que vendieron por encima del valor en libros. Precio de venta = $20,000 + $15,000 = $35,000. La venta de activos fijos se clasifica como actividad de inversión en el flujo de efectivo. C es correcta ($35,000 en inversión). A solo cuenta la ganancia, no el total recibido. B clasifica erróneamente la venta como actividad operativa."}, {"a": "C", "e": "El ciclo económico tiene picos (momentos altos) y valles (momentos bajos). Existen tres formas de medirlo. El ciclo de tasa de crecimiento detecta cambios antes que los demás porque mide si la economía acelera o desacelera, sin esperar caídas reales. C es correcta. A, el ciclo de crecimiento, mide desviaciones respecto a la tendencia de largo plazo; detecta cambios después del ciclo de tasa de crecimiento pero antes del clásico. B, el ciclo clásico, es el más lento porque necesita caídas absolutas en la producción económica para señalar un valle, no basta con desaceleración."}, {"a": "B", "e": "Cuando los precios suben, el método contable para valorar inventario afecta las ganancias reportadas. FIFO (primero en entrar, primero en salir) asigna los costos más antiguos y baratos a las ventas, dejando menores costos y mayores ganancias. LIFO (último en entrar, primero en salir) hace lo opuesto: usa costos recientes y más altos, reduciendo ganancias. El costo promedio queda entre ambos. Como el índice de precios sube (1050, 1060, 1087), la empresa que quiere reportar mayor ingreso neto prefiere FIFO. B es correcta. A reportaría menos ganancias. C daría un resultado intermedio, inferior a FIFO."}, {"a": "A", "e": "En análisis financiero hay dos conceptos distintos: la calidad de los reportes financieros (si los estados son precisos y confiables) y la calidad de los resultados (si las ganancias dan buen retorno a los accionistas). Evans dice que las ganancias de Shubert son sostenibles, lo que indica buena calidad de reportes. Pero el retorno es inadecuado, señalando un problema con la calidad de los resultados. A es correcta: solo hay preocupación por la calidad de resultados. B es incorrecta porque la calidad de reportes parece buena. C es incorrecta porque no hay problema con ambas, solo con los resultados."}, {"a": "C", "e": "El VPN (valor presente neto) mide si un proyecto genera valor. La TIR (tasa interna de retorno) es la tasa de descuento que hace que el VPN sea exactamente cero. Si al usar una tasa de 6% el VPN es positivo ($15,000), significa que el proyecto rinde más del 6%. Para llevar el VPN a cero necesitaríamos una tasa mayor. Por tanto, la TIR es mayor que 6%. C es correcta. A es incorrecta: si la TIR fuera 6%, el VPN sería cero, no $15,000. B es incorrecta: si la TIR fuera menor al 6%, el VPN sería negativo, no positivo."}, {"a": "A", "e": "Imagina que quieres saber cuán preciso es tu promedio. El método jackknife (navaja) estima el error estándar de la media recalculando el promedio varias veces, cada vez quitando una observación diferente de la muestra original. Así mide cuánto cambia el resultado al excluir cada dato. A es correcta. B es incorrecta: el método bootstrap (arranque) funciona diferente, tomando miles de muestras aleatorias con reemplazo de los datos originales, sin omitir observaciones sistemáticamente. C es incorrecta: el término reducción de muestra no existe como método estadístico reconocido."}, {"a": "B", "e": "Imagina que lees el manual de un auto: si las reglas para escribirlo cambian, el manual puede no describir bien el auto real. Los estados financieros funcionan igual. Un analista debe vigilar las normas contables porque esos reportes no siempre reflejan la realidad economica de la empresa (B es correcta). La opcion A menciona politicas agresivas o conservadoras, que son un problema valido, pero son decisiones de la gerencia, no la razon principal para seguir los estandares. La opcion C habla de reexpresion de estados, que es una consecuencia de cambios normativos, no el motivo central para monitorearlos. Lo esencial es que la informacion represente fielmente la situacion real."}, {"a": "B", "e": "Piensa en el costo real de un prestamo: no es solo lo que pagas, sino lo que pagas despues de descontar el ahorro fiscal. El WACC (costo promedio ponderado de capital) usa el rendimiento al vencimiento (YTM) del bono, que es 5%, no el cupon de 6%. Ademas se ajusta por impuestos: 5% multiplicado por (1 menos la tasa impositiva). Como cualquier tasa de impuesto positiva reduce el resultado, el costo queda por debajo de 5%, por eso B es correcta. La opcion A (entre 5% y 6%) ignora el ajuste fiscal. La opcion C usa el cupon (6%), que es la tasa historica pactada, no el costo actual de mercado."}, {"a": "A", "e": "La depreciacion acumulada es como un contador que suma el desgaste registrado de un activo a lo largo del tiempo. Cuando vendes o desechas ese activo (opcion A), eliminas del balance tanto el activo como toda su depreciacion acumulada, por eso esta disminuye. Eso hace que A sea correcta. La opcion B, aumentar el valor residual (lo que valdra al final), solo reduce la depreciacion futura pero no borra la ya registrada. La opcion C, reducir la vida util, hace que se deprecie mas rapido cada periodo, lo que incrementa la depreciacion acumulada en vez de reducirla."}, {"a": "C", "e": "Imagina que el gobierno es como el administrador de una ciudad: puede gastar directamente en obras o puede manejar el dinero en circulacion. La politica fiscal se refiere al gasto y los impuestos del gobierno. Gastar en infraestructura (opcion C) es politica fiscal expansiva que estimula el crecimiento directamente, por eso es correcta. La opcion A, bajar la tasa de descuento, es una herramienta del banco central (politica monetaria), no del gobierno. La opcion B, comprar valores gubernamentales en el mercado, tambien es politica monetaria (operaciones de mercado abierto del banco central). Solo C es accion fiscal."}, {"a": "B", "e": "La capitalizacion continua es como si los intereses se sumaran a tu inversion en cada instante, sin pausas. Para hallar la tasa continuamente compuesta que da 20% de ganancia en 3 anos, usamos la formula: r = ln(1.20) / 3, donde ln es el logaritmo natural. Esto da 0.18232 / 3 = 0.0608, es decir aproximadamente 6.1%, por eso B es correcta. La opcion A (5.7%) subestima el calculo. La opcion C (6.7%) se acerca a la tasa discreta anual (1.20 elevado a 1/3 menos 1), que siempre es mayor que la tasa continua equivalente."}, {"a": "C", "e": "Los grados de libertad son como los espacios libres que quedan despues de usar datos para estimar parametros. En una prueba de correlacion entre dos variables con una muestra de tamano n, se estiman dos parametros (intercepto y pendiente de la recta), asi que se pierden 2 grados de libertad, quedando n-2. Por eso C es correcta. La opcion A (n grados) no descuenta ningun parametro estimado, lo cual es incorrecto. La opcion B (n-1) se usa en pruebas de una sola media o varianza, donde solo se estima un parametro; aqui hay dos variables, por lo que se restan dos."}, {"a": "B", "e": "Un activo fiscal diferido es un beneficio tributario futuro, como un cupon de descuento que usaras despues. La provision de valuacion indica cuanto de ese beneficio crees que no podras aprovechar. Aqui la provision subio de $2,700 a $3,900, un aumento del 44%. Esto significa que la empresa espera generar menos ganancias futuras para usar esos beneficios fiscales, por eso B es correcta. Si esperara mas ganancias (opcion A), la provision bajaria porque confiaria en aprovechar mas beneficios. La opcion C (estabilidad) no encaja con un aumento tan significativo en la provision."}, {"a": "A", "e": "Modigliani y Miller (MM) crearon un modelo teorico sobre como financiar una empresa. Cuando incluyen impuestos, los intereses de la deuda son deducibles, creando un escudo fiscal (ahorro tributario). Bajo estos supuestos, cada dolar extra de deuda aumenta el valor de la firma, asi que lo optimo seria 100% deuda (opcion A es correcta). La opcion B dice que aumenta linealmente con la tasa impositiva, pero el resultado optimo siempre es 100% deuda sin importar la tasa. La opcion C menciona costos de dificultades financieras, pero ese concepto no existe en el modelo MM con impuestos; pertenece a la teoria del trade-off."}, {"a": "B", "e": "La integracion economica entre paises tiene niveles, como escalones. Un area de libre comercio elimina aranceles entre miembros. Una union aduanera anade un arancel comun externo. Un mercado comun va mas alla: permite que trabajadores y capitales se muevan libremente entre paises miembros. Por eso B es correcta. La opcion A, adoptar una moneda unica, corresponde a una union monetaria, un nivel superior. La opcion C, crear instituciones y politicas economicas comunes, es propio de una union economica, que tambien esta por encima del mercado comun."}, {"a": "B", "e": "El retorno sobre activos (ROA) mide cuanto beneficio genera cada dolar invertido en activos. Se calcula como margen neto multiplicado por rotacion de activos. Asia: 4.5% x 1.5 = 6.75%. Europa: 3.0% x 2.5 = 7.50%. Norteamerica: 1.5% x 4.0 = 6.00%. Europa tiene el mayor ROA, por eso B es correcta. La opcion A dice que Asia es el segmento mas pequeno en activos, pero activos = ventas / rotacion: Asia=133M, Europa=120M, NA=125M; el mas pequeno es Europa. La opcion C dice que NA es mas rentable por ingreso neto, pero NA genera solo $7.5M frente a $9M de Asia y Europa."}, {"a": "A", "e": "Imagina que pides prestado para comprar algo: si sale mal, pierdes el doble. Aquí un inversor compra una acción a $100 con margen del 50% (es decir, pone solo $50 de su bolsillo). La acción baja a $95. El retorno nominal (ganancia sobre el precio) es -5%. El retorno apalancado (sobre los $50 invertidos) es -10%, porque el margen duplica la pérdida. Ahora, hubo deflación del 2% (los precios generales bajaron), lo que mejora el poder adquisitivo. El retorno real ajusta por esto: aproximadamente -3.06%. A) Correcta: el retorno real (-3.06%) es el menos negativo de los tres. B) Incorrecta: el nominal (-5%) es peor. C) Incorrecta: el apalancado (-10%) es el peor de todos."}, {"a": "C", "e": "El quick ratio (razón rápida) mide si una empresa puede pagar sus deudas de corto plazo sin vender inventario. Se calcula: (Efectivo + Valores negociables + Cuentas por cobrar) dividido entre Pasivos corrientes. Es como revisar cuánto dinero líquido tienes para cubrir tus facturas. Si este ratio baja y los pasivos no cambiaron, algo del numerador disminuyó. C) Correcta: menos cuentas por cobrar (dinero que te deben clientes) reduce directamente el numerador. A) Incorrecta: el inventario NO se incluye en el quick ratio, así que su cambio no lo afecta. B) Incorrecta: más valores negociables subirían el ratio, no lo bajarían."}, {"a": "B", "e": "El modelo CAPM dice que el retorno esperado de una acción depende solo de su beta (sensibilidad al mercado general), no del riesgo particular de la empresa. Piensa en beta como el riesgo que no puedes eliminar diversificando. Si dos acciones tienen el mismo beta, el CAPM les asigna el mismo retorno esperado. Pero la desviación estándar (variabilidad total) sí incluye el riesgo no sistemático (propio de cada empresa). B) Correcta: X tiene más riesgo propio, así que mayor desviación estándar, pero igual retorno esperado que Y. A) Incorrecta: el retorno esperado es igual, no mayor para X. C) Incorrecta: solo la desviación estándar es mayor para X, no el retorno."}, {"a": "B", "e": "Un fondo de cobertura (hedge fund) es un vehículo de inversión privado. El período de bloqueo (lockup period) es como un contrato donde prometes no retirar tu dinero durante cierto tiempo. Esto permite al gestor invertir sin preocuparse por retiros repentinos que lo obliguen a vender en mal momento. B) Correcta: durante el lockup, el inversor no puede redimir (recuperar) sus participaciones. A) Incorrecta: cerrar el fondo a nuevos inversores es otra cosa distinta, se llama fondo cerrado. C) Incorrecta: el plazo para devolver el dinero tras solicitar retiro se llama período de notificación (notice period), no lockup."}, {"a": "C", "e": "La eficiencia del mercado tiene tres niveles. La forma débil dice que los precios pasados ya están reflejados en el precio actual. La semi-fuerte incluye toda la información pública. La fuerte incluye hasta información privilegiada. Leoni cree que usando datos históricos de precios y volúmenes puede ganar más que el mercado. C) Correcta: si la información histórica sirve para ganar, el mercado no es efficiente en forma débil, pero podría ser semi-fuerte si otra información pública sí está reflejada. A) Incorrecta: la forma fuerte se refiere a información privilegiada, no relevante aquí. B) Incorrecta: si los precios históricos predicen retornos, tampoco puede ser semi-fuerte ni fuerte."}, {"a": "A", "e": "La tecnología de registro distribuido (conocida como blockchain) es como un libro contable compartido entre muchos participantes, donde todos ven las mismas transacciones sin necesitar un intermediario central. A) Correcta: esta tecnología permite compensar y liquidar operaciones de valores en tiempo real, eliminando intermediarios y acelerando el proceso. B) Incorrecta: el trading de alta frecuencia usa algoritmos ultrarrápidos y servidores especializados, no blockchain. C) Incorrecta: revisar comunicaciones de empleados para detectar malas conductas usa inteligencia artificial y procesamiento de lenguaje natural, no registros distribuidos."}, {"a": "C", "e": "Cuando compras un derivado (contrato financiero cuyo valor depende de otro activo), existe riesgo de que la otra parte no cumpla. Una cámara de compensación central (CCP) es como un árbitro obligatorio que se pone en medio de cada operación. Para funcionar, necesita que los contratos sean uniformes. C) Correcta: el mandato de compensación centralizada estandariza los contratos de derivados para que la CCP pueda procesarlos efficientemente. A) Incorrecta: mayor divulgación no es el efecto principal. B) Incorrecta: el riesgo de contraparte se concentra en la CCP, no se dispersa entre muchos participantes."}, {"a": "B", "e": "La distribución normal (campana de Gauss) predice que las caídas extremas son muy raras. Pero en la realidad de los mercados financieros, las crisis y desplomes ocurren más seguido de lo que esa campana sugiere. Esto se llama tener colas gruesas (mayor probabilidad en los extremos) y sesgo negativo (más eventos extremos negativos). B) Correcta: históricamente ha habido más caídas grandes de lo esperado bajo normalidad. A) Incorrecta: las subidas grandes también han sido más frecuentes que lo normal, no menos. C) Incorrecta: la frecuencia real de eventos extremos supera lo que predice la distribución normal."}, {"a": "C", "e": "Rebalancear un portafolio de bonos significa comprar y vender para que siga reflejando su índice de referencia. Cada compra o venta genera costos (comisiones). Es como reorganizar tu estantería: cuanto menos cambie, menos trabajo tienes. C) Correcta: bonos con vencimientos largos permanecen más tiempo en el índice, y pocas emisiones nuevas significan pocos cambios en su composición, reduciendo el rebalanceo y sus costos. A) Incorrecta: vencimientos cortos obligan a reemplazar bonos frecuentemente al vencer. B) Incorrecta: aunque los vencimientos largos ayudan, las emisiones frecuentes cambian constantemente el índice."}, {"a": "A", "e": "El margen bruto es el porcentaje de cada peso de ingreso que queda tras pagar el costo de los productos vendidos. Se calcula: (Ingresos - Costo de ventas) / Ingresos. Si ambos suben en el mismo monto absoluto (digamos $10), la ganancia bruta no cambia, pero los ingresos totales son mayores. Como el costo de ventas siempre es menor que los ingresos, el costo como proporción del ingreso baja, y por tanto el margen sube. A) Correcta: el margen bruto aumenta porque la proporción del costo sobre ingresos disminuye. B) Incorrecta: el margen no baja. C) Incorrecta: las proporciones relativas sí cambian aunque el monto absoluto sea igual."}, {"a": "C", "e": "Imagina que prestas dinero y planeas recuperarlo en 4 años. La duración de Macaulay mide cuánto tarda un bono en devolverte tu inversión en promedio. Si esa duración es mayor a 4 años, el precio del bono reacciona más fuerte ante cambios en tasas de interés (riesgo de precio). Con tasas bajando, aunque el precio sube, hay incertidumbre sobre la venta futura. C es correcta: duración mayor al horizonte significa que el riesgo de precio domina. A es incorrecta: si la duración iguala al horizonte (4 años), los efectos se compensan y el inversor queda protegido. B es incorrecta: con duración menor a 4, el problema principal sería reinvertir cupones a tasas más bajas, no el precio."}, {"a": "B", "e": "Piensa en pedir un solo préstamo que mezcla una parte con garantía (como una hipoteca respaldada por tu casa) y otra sin garantía. Eso es deuda unitranche: un préstamo único que combina tramos garantizados y no garantizados en una sola estructura, simplificando el financiamiento. B es correcta por esa definición. A es incorrecta: la deuda mezzanine es deuda subordinada (se paga después de la deuda principal), pero no combina clases garantizadas y no garantizadas en un solo préstamo. C es incorrecta: un préstamo apalancado se otorga a empresas muy endeudadas o con baja calificación crediticia, sin importar si mezcla clases de deuda."}, {"a": "A", "e": "En la industria de inversiones existen estrategias activas (un gestor elige inversiones) y pasivas (se replica un índice automáticamente). Smart beta es una mezcla de ambas: sigue reglas fijas como un índice (parte pasiva), pero selecciona acciones según factores específicos como valor o baja volatilidad en vez de solo tamaño de empresa (parte activa). A es correcta por eso. B es incorrecta: la gestión activa ha perdido cuota de mercado en los últimos años, no la ha ganado, porque los fondos pasivos crecieron mucho. C es incorrecta: la gestión pasiva aún representa menos de la mitad de los activos gestionados globalmente."}, {"a": "C", "e": "Imagina dos personas eligiendo entre una cuenta segura y una inversión arriesgada. Boswell tolera más riesgo que Johnson. Ambos usan la misma línea de asignación de capital (CAL), que muestra combinaciones de riesgo y retorno disponibles. C es correcta: Boswell, al tolerar más riesgo, elige un punto más alto en la CAL con mayor retorno esperado y mayor riesgo. A es incorrecta: el coefficiente de aversión al riesgo de Boswell es menor, no mayor, porque acepta más riesgo. B es incorrecta: las curvas de indiferencia de Boswell son más planas, no más empinadas; curvas empinadas significan que se exige mucho retorno extra por cada unidad de riesgo adicional."}, {"a": "C", "e": "El modelo binomial imagina que el precio de un activo solo puede subir o bajar en cada período, como un árbol con dos ramas. Bajo neutralidad al riesgo (donde todos los activos rinden la tasa libre de riesgo), las probabilidades de subida y bajada se calculan con una fórmula matemática usando los datos del modelo: la tasa libre de riesgo y los factores de subida y bajada. C es correcta: las probabilidades se derivan de los datos, no se inventan. A es incorrecta: no tienen que ser iguales; dependen de la relación entre la tasa y los factores. B es incorrecta: el modelador no las asume libremente, se calculan para garantizar consistencia con el mercado."}, {"a": "A", "e": "Imagina comprar una empresa usando principalmente dinero prestado, como comprar una casa con una hipoteca grande. Un fondo de compra apalancada (leveraged buyout o LBO) hace exactamente eso: adquiere empresas que cotizan en bolsa financiando la mayor parte del precio con deuda. Luego mejora la empresa y busca venderla con ganancia. A es correcta por esa definición. B es incorrecta: la característica clave del LBO es usar deuda, no capital propio, como fuente principal de financiamiento. C es incorrecta: los LBO típicamente compran empresas públicas (que cotizan en bolsa), no privadas, y usan deuda, no capital propio."}, {"a": "A", "e": "Para valorar un bono, descontamos sus pagos futuros. Este bono paga cupones semestrales de $25 (5% dividido entre 2, por $1,000). Son 20 pagos en 10 años. La tasa de descuento semestral es 3.125% (6.25% entre 2). Calculando el valor presente de todos los cupones más el valor nominal al vencimiento, obtenemos aproximadamente $908. A es correcta. B ($988) es incorrecta: resultaría de usar una tasa de descuento demasiado baja o calcular mal los períodos. C ($1,098) es incorrecta: implicaría que el bono vale más que su valor nominal, pero como el cupón (5%) es menor que el rendimiento exigido (6.25%), el bono debe valer menos de $1,000."}, {"a": "B", "e": "Imagina un negocio que tiene propiedades y equipos valiosos pero no tiene efectivo para pagar las cuentas de este mes. Eso es riesgo de liquidez: no poder cumplir obligaciones inmediatas por falta de dinero disponible, aunque se tengan activos. B es correcta porque la empresa no puede operar por quedarse sin efectivo. A es incorrecta: el riesgo de crédito es cuando otra parte no te paga lo que te debe, no cuando tú te quedas sin efectivo. C es incorrecta: el riesgo de solvencia ocurre cuando las deudas totales superan los activos totales; aquí la empresa puede tener activos suficientes pero no puede convertirlos rápidamente en efectivo."}, {"a": "A", "e": "Las cinco fuerzas de Porter analizan qué tan fácil es para las empresas fijar precios altos. Piensa en un mercado como un castillo: si las murallas (barreras de entrada) son bajas, cualquiera puede entrar a competir, obligando a bajar precios. A es correcta: barreras de entrada bajas significan más competidores potenciales y menos poder para fijar precios. B es incorrecta: si hay pocos productos sustitutos, los consumidores no tienen alternativas y las empresas pueden cobrar más. C es incorrecta: si cambiar de proveedor es costoso para el consumidor, las empresas mantienen clientes cautivos y pueden cobrar precios más altos."}, {"a": "C", "e": "Un fondo de cobertura (hedge fund) genera retornos de varias fuentes. El beta estratégico es la parte del retorno que viene de estar expuesto a sectores o estrategias específicas, como invertir en tecnología o en empresas en fusión. C es correcta por esa definición. A es incorrecta: alfa es el retorno extra generado únicamente por la habilidad del gestor, sin relación con exposición a mercados o sectores. B es incorrecta: el beta de mercado mide cuánto se mueve el fondo junto con el mercado general, no su exposición a sectores particulares. El beta estratégico captura exposiciones más específicas que el mercado amplio."}, {"a": "C", "e": "Imagina que mezclas ingredientes en una receta: el resultado no es más fuerte que el ingrediente más intenso. La desviación estándar mide cuánto varían los rendimientos respecto al promedio. Cuando combinamos activos en un portafolio, la diversificación (efecto de que no todos suben o bajan juntos) reduce el riesgo total. C) es correcta porque la desviación estándar del portafolio siempre es menor o igual a la del activo más riesgoso, gracias a que las correlaciones entre activos son menores a 1. A) es incorrecta porque el portafolio puede tener mayor riesgo que el activo menos riesgoso si se concentra en activos volátiles. B) es incorrecta porque con correlaciones negativas, el portafolio podría tener menos riesgo que cualquier activo individual."}, {"a": "A", "e": "Piensa en un proyecto de construcción: tiene inicio, desarrollo y fin. Un fondo de desarrollo inmobiliario funciona igual: compra terreno, construye, vende y reparte ganancias. A) es correcta porque este ciclo requiere un fondo de vida finita (con fecha de término) y cerrado (donde los inversores no pueden retirar dinero antes de tiempo, ya que los activos son propiedades ilíquidas). B) es incorrecta porque un fondo abierto de vida indefinida sirve para propiedades que generan rentas estables, no para construir y vender. C) es incorrecta porque la vida indefinida no encaja con un proyecto que tiene principio y fin definidos."}, {"a": "C", "e": "Un índice equiponderado es como dar el mismo voto a cada acción, sin importar su precio. Se calcula el rendimiento de cada valor y se promedia. Los rendimientos son: valor 1: +10%, valor 2: -10%, valor 3: +10%, valor 4: -10%, valor 5: +10%. El promedio es (10-10+10-10+10)/5 = 2%. El índice sube de 100 a 100×1.02 = 102. C) es correcta con ese cálculo. A) 101.40 es incorrecta porque no refleja el promedio simple correcto de los cinco rendimientos. B) 101.75 es incorrecta porque probablemente resulta de ponderar por precio en vez de dar peso igual a cada acción."}, {"a": "C", "e": "Invertir en activos alternativos es como aprender a nadar: primero con instructor, luego acompañado, y al final solo. Los inversores institucionales siguen esa progresión natural. C) es correcta: primero invierten a través de fondos (menos control pero más guía), luego coinvierten junto al gestor del fondo para pagar menos comisiones, y finalmente invierten directamente cuando ya tienen experiencia suficiente. A) es incorrecta porque invertir directamente requiere la mayor experiencia, no se hace primero. B) es incorrecta porque la coinversión es un paso intermedio, no el último."}, {"a": "C", "e": "La liquidez es la facilidad para convertir inversiones en efectivo rápidamente. Piensa en quién necesita dinero disponible de inmediato y quién puede esperar. C) es correcta: los planes de pensión de beneficio definido (donde la empresa promete pagos futuros al jubilado) tienen obligaciones predecibles a largo plazo, así que pueden invertir en activos difíciles de vender sin problema. A) es incorrecta: los bancos necesitan mucha liquidez para devolver depósitos a clientes y cumplir regulaciones. B) es incorrecta: los fondos mutuos deben tener liquidez alta porque los inversores pueden pedir su dinero de vuelta cualquier día."}, {"a": "C", "e": "Imagina un mercado tradicional como una plaza pública donde todos compran y venden. Los sistemas de negociación multilateral (MTF por sus siglas en inglés) son como mercados paralelos electrónicos que funcionan fuera de esas plazas oficiales. C) es correcta: los MTF se clasifican como sistemas de negociación alternativos, plataformas electrónicas que permiten comprar y vender valores fuera de las bolsas tradicionales. A) es incorrecta: los MTF no son bolsas formales, tienen regulación distinta y menos obligaciones. B) es incorrecta: los intermediarios de bloques facilitan operaciones grandes entre instituciones, algo diferente a una plataforma multilateral."}, {"a": "A", "e": "La brecha de duración mide si un bono es más sensible al precio o a la reinversión de cupones. Cuando es positiva (+1), significa que la duración del bono (sensibilidad al precio) supera el horizonte del inversor. A) es correcta: si las tasas suben con brecha positiva, el precio del bono cae más de lo que se gana reinvirtiendo cupones a tasas mayores, generando una pérdida neta al vender. B) es incorrecta: el riesgo de reinversión dominaría solo si la brecha fuera negativa. C) es incorrecta: aunque la reinversión mejora, el efecto negativo del precio es mayor, por lo que hay pérdida, no ganancia."}, {"a": "A", "e": "Piensa en construir una autopista o una planta de energía: requiere enormes cantidades de dinero, permisos del gobierno y años de construcción. Eso dificulta que nuevos competidores entren al negocio. A) es correcta: los proyectos de infraestructura tienen altas barreras de entrada por su gran inversión inicial y complejidad regulatoria. B) es incorrecta: la infraestructura provee servicios esenciales como agua y electricidad, con demanda estable que no depende mucho del ciclo económico. C) es incorrecta: los retornos de infraestructura tienen baja correlación con las acciones públicas, lo que los hace útiles para diversificar."}, {"a": "B", "e": "El riesgo no sistemático es el riesgo propio de una empresa, como que su fábrica se incendie. La diversificación significa repartir inversiones entre muchos activos para reducir ese riesgo. B) es correcta: si diversificar no tiene costo, cualquier inversor racional eliminaría ese riesgo gratis, así que el mercado no paga una prima extra por asumirlo. A) es incorrecta: si diversificar tiene costos reales como comisiones, podría justificarse alguna compensación por mantener riesgo no sistemático. C) es incorrecta: la eficiencia de mercado en forma fuerte se refiere a cómo se refleja la información en los precios, no a la compensación por riesgo eliminable."}, {"a": "B", "e": "Ser el productor más barato de una industria es como tener una tienda con los costos más bajos del barrio: aunque haya competencia, siempre puedes ofrecer precios rentables. El costo de capital es el rendimiento mínimo que exigen los inversores. B) es correcta: un productor de bajo costo tiene una ventaja competitiva sostenible que le permite ganar más que su costo de capital tanto a corto como a largo plazo. A) es incorrecta: ganar solo el costo de capital describe a empresas sin ventaja en mercados muy competitivos. C) es incorrecta: a diferencia de ventajas temporales, la estructura de costos bajos se mantiene en el tiempo."}, {"a": "C", "e": "Imagina que una empresa es como un cohete: primero se construye (etapa formativa), luego vuela (expansión), y finalmente se prepara para aterrizar en la bolsa. La etapa mezzanine es esa fase final donde el fondo de capital de riesgo inyecta dinero para alistar a la empresa para su oferta pública inicial (salir a venderse en bolsa). C es correcta porque mezzanine significa preparación directa para el estreno bursátil. A es incorrecta porque la etapa tardía financia expansión de empresas ya operativas, pero no las prepara específicamente para cotizar en bolsa. B es incorrecta porque la etapa formativa cubre las fases iniciales: la idea semilla y los primeros pasos del negocio."}, {"a": "B", "e": "Gestionar riesgos es como conducir un auto: no buscas eliminar todo peligro (eso significaría no conducir nunca), sino manejar con prudencia dentro de límites aceptables. B es correcta porque la gestión de riesgos NO busca minimizar todos los riesgos; intentar eliminarlos todos sería demasiado costoso e impediría obtener ganancias. El objetivo es mantener los riesgos dentro de un nivel tolerable. A es incorrecta porque medir los riesgos sí es una función clave del proceso. C es incorrecta porque identificar cuánto riesgo puede aceptar la organización (tolerancia al riesgo) también es un paso esencial de este proceso."}, {"a": "B", "e": "El ratio de Treynor mide cuánto rendimiento extra obtienes por cada unidad de riesgo sistemático (el riesgo del mercado general que no puedes diversificar). Se calcula dividiendo el exceso de retorno entre el beta del portafolio. B es correcta: un Treynor de 9.29 frente a 8.78 del mercado indica que el portafolio generó más retorno por unidad de riesgo de mercado, es decir, superó al mercado. A es incorrecta porque este ratio no mide si hay más o menos riesgo, sino la eficiencia del rendimiento respecto al riesgo. C es incorrecta porque describe el concepto de alfa de Jensen, que es otra medida diferente."}, {"a": "C", "e": "Imagina que una empresa crea una caja separada e independiente para guardar ciertos activos. Esa caja es una entidad de propósito especial protegida contra quiebra. C es correcta: MB Trust es legalmente independiente de Mountie Bank, así que sus bonos no comparten orden de prioridad de pago; cada entidad tiene sus propios activos y acreedores. A es incorrecta porque la prioridad de pago solo existe entre deudas de la misma entidad, y aquí son entidades distintas. B es incorrecta porque el término pari passu (igual prioridad) solo aplica entre obligaciones dentro de una misma entidad, no entre entidades separadas."}, {"a": "A", "e": "La hipótesis de mercado efficiente dice que los precios reflejan cierta información. En su forma débil, solo reflejan precios pasados. En la semi-fuerte, reflejan toda la información pública. El análisis fundamental estudia estados financieros y reportes públicos para encontrar oportunidades. A es correcta: solo bajo la forma débil el análisis fundamental puede dar ventaja, porque la información pública aún no está totalmente reflejada en los precios. B es incorrecta porque en la forma semi-fuerte toda información pública ya está en los precios, haciendo inútil el análisis fundamental. C es incorrecta porque sí existe una forma compatible: la débil."}, {"a": "A", "e": "Un recibo de depósito (DR) es como un certificado que representa acciones de una empresa extranjera pero se compra y vende en tu mercado local. Cuando es patrocinado, la empresa emisora participa activamente en su creación. A es correcta: en un DR patrocinado, el inversor recibe derechos de voto sobre las acciones que representa el certificado. B es incorrecta porque los DRs se negocian en la moneda local del mercado donde cotizan, así que no necesitas conseguir moneda extranjera. C es incorrecta porque una ventaja principal de los DRs es que el banco depositario se encarga de las regulaciones del país del emisor."}, {"a": "C", "e": "Para evaluar si un préstamo sobre una propiedad comercial es riesgoso, necesitas saber si la propiedad genera suficiente dinero para pagar su deuda. C es correcta: el costo del servicio de deuda (los pagos periódicos del préstamo) es necesario para calcular el ratio de cobertura del servicio de deuda, que divide los ingresos netos de la propiedad entre dichos pagos. A es incorrecta porque la deuda total del dueño incluye otras propiedades y no sirve para analizar una propiedad específica. B es incorrecta porque el último precio de venta puede estar desactualizado y no se usa directamente en estos ratios crediticios."}, {"a": "A", "e": "Una declaración de política de inversión (IPS) tiene dos partes principales: objetivos (rentabilidad y riesgo) y restricciones (impuestos, liquidez, leyes, etc.). A es correcta: la frase sobre probabilidad de pérdidas describe tolerancia al riesgo, que pertenece a la sección de objetivos, no a las restricciones. Por eso es la menos probable de aparecer en restricciones. B es incorrecta porque las consideraciones fiscales (preferir ganancias de capital sobre dividendos por impuestos altos) sí son una restricción válida del IPS. C es incorrecta porque las limitaciones religiosas sobre inversiones (no invertir en valores que paguen interés) son restricciones legales o únicas del IPS."}, {"a": "C", "e": "Las acciones preferentes son como un bono que paga un dividendo fijo para siempre, sin importar cuánto crezcan las ganancias de la empresa. C es correcta: para valorarlas, simplemente divides el dividendo fijo entre la tasa de retorno requerida, como una perpetuidad. El crecimiento de ganancias mencionado es irrelevante para el dividendo fijo preferente. A es incorrecta porque un múltiplo precio-ganancia se usa para acciones comunes, no para preferentes con dividendo fijo. B es incorrecta porque un modelo de dividendos con múltiples etapas de crecimiento aplica a acciones comunes cuyo dividendo cambia, no a preferentes con pago constante."}, {"a": "B", "e": "Carlson quiere proteger su portafolio de acciones contra caídas repentinas sin vender sus acciones, como quien compra un seguro para su casa sin mudarse. B es correcta: vender futuros del S&P 500 crea una cobertura; si el mercado baja, la ganancia en la posición corta de futuros compensa las pérdidas del portafolio. A es incorrecta porque vender opciones de venta (puts) te obliga a comprar acciones si el precio cae, lo cual aumenta tu exposición a pérdidas en vez de protegerte. C es incorrecta porque comprar un contrato a plazo (forward) aumentaría la exposición al mercado en lugar de reducirla."}, {"a": "B", "e": "Imagina que quieres trazar el precio futuro de manzanas a lo largo del tiempo: necesitas comparar el mismo tipo de manzana en distintas fechas. Una curva de rendimiento forward (que muestra tasas de interés futuras esperadas) se construye usando tasas forward del mismo plazo (tenor) en diferentes momentos. B es correcta: usa tasas a 1 año dentro de 1 año y a 1 año dentro de 2 años, mismo tenor, distintos puntos. A es incorrecta porque mezcla tenores de 1 y 2 años desde el mismo punto. C es incorrecta porque combina una tasa a 1 año y otra a 2 años desde puntos distintos, mezclando tenores."}, {"a": "C", "e": "Piensa en un médico que antes de tratar a un paciente necesita conocer su historial completo. El IPS (Declaración de Política de Inversión) cumple esa función: documenta las necesidades, objetivos y limitaciones del cliente. C es correcta porque la razón principal del IPS es que el gestor entienda claramente la situación del cliente para tomar decisiones adecuadas. A es incorrecta porque el IPS no busca minimizar el riesgo, sino gestionarlo según el perfil del cliente. B es incorrecta porque el IPS no trata de que el cliente conozca los procedimientos de la firma, sino de definir las directrices de inversión."}, {"a": "B", "e": "En fondos alternativos, la comisión de incentivo (porcentaje que cobra el gestor sobre ganancias) depende del tipo de umbral mínimo. Un soft hurdle (umbral blando) cobra sobre todo el rendimiento si se supera el umbral; un hard hurdle (umbral duro) cobra solo sobre lo que excede el umbral. B es correcta: con umbral blando del 6%, al superar el 8%, la comisión es 20% sobre el 8% completo, es decir 1.6%. A es incorrecta: con umbral duro del 5%, solo se cobra sobre el exceso (3%), dando 0.6%. C es incorrecta: con umbral duro del 7%, se cobra sobre el exceso (1%), dando apenas 0.2%."}, {"a": "B", "e": "Imagina un préstamo que automáticamente se transforma en participación del negocio si las cosas van mal. Los bonos convertibles contingentes (CoCos) funcionan así: se convierten automáticamente en acciones cuando ocurre un evento predefinido, como que el capital del banco caiga por debajo de cierto nivel. B es correcta porque la conversión es automática y obligatoria. A es incorrecta porque los CoCos no se vuelven convertibles con opción del tenedor, sino que la conversión ocurre sin elección. C es incorrecta porque el evento no cambia el ratio de conversión, sino que provoca la conversión total del bono en acciones."}, {"a": "B", "e": "En una elección normal votas una vez por puesto. El voto acumulativo permite sumar todos tus votos y dárselos a un solo candidato, como concentrar toda tu fuerza en una apuesta. Con 600 acciones y 3 asientos, el total de votos es 600 × 3 = 1,800. B es correcta: el inversor puede dar los 1,800 votos a un solo candidato. A es incorrecta porque 600 votos sería el máximo solo en votación estatutaria (un voto por acción por asiento). C es incorrecta porque describe la votación estatutaria, no la acumulativa, donde se pueden concentrar todos los votos."}, {"a": "B", "e": "Reconstitución significa actualizar los componentes de un índice, como renovar los productos de una tienda. Un índice de materias primas (commodities) incluye productos como oro o petróleo que no vencen ni desaparecen como empresas o bonos. B es correcta porque las materias primas son estables y rara vez necesitan cambios en el índice. A es incorrecta porque los índices de acciones cambian frecuentemente por fusiones, quiebras o nuevas emisiones. C es incorrecta porque los índices de renta fija requieren actualización constante ya que los bonos vencen y se emiten nuevos continuamente."}, {"a": "C", "e": "El CAPM (modelo de valoración de activos) calcula el rendimiento esperado según el riesgo. Primero, el rendimiento esperado es (62-54)/54 = 14.81%. La fórmula CAPM dice: rendimiento = tasa libre de riesgo + beta × (rendimiento del mercado - tasa libre de riesgo). Sustituyendo: 14.81% = 8% + beta × (12%-8%). Entonces beta = 6.81%/4% = 1.70. C es correcta. A es incorrecta porque beta 1.5 daría un rendimiento de 14%, equivalente a un precio de $61.56. B es incorrecta porque beta 1.6 daría 14.4%, equivalente a $61.78, no $62."}, {"a": "B", "e": "Una opción put es un contrato que da derecho a vender un activo a un precio fijo. Su valor tiene dos partes: valor intrínseco (ganancia inmediata) y valor temporal (posibilidad de ganar más antes del vencimiento). La volatilidad (cuánto varía el precio del activo) aumenta el valor temporal porque hay más probabilidad de movimientos favorables. B es correcta: mayor volatilidad incrementa el valor temporal. A es incorrecta porque subir el precio de ejercicio aumenta el valor intrínseco, no el temporal. C es incorrecta porque bajar el precio del activo aumenta el valor intrínseco pero puede reducir el valor temporal."}, {"a": "B", "e": "Las inversiones alternativas (como fondos de cobertura, capital privado o bienes raíces) son como tiendas especializadas frente a un supermercado general. B es correcta: las alternativas tienen más especialización del gestor, no menos, ya que requieren conocimiento específico en áreas complejas. Decir que tienen menos especialización es lo menos probable. A es incorrecta como respuesta porque las alternativas sí cobran comisiones más altas (por ejemplo, estructura 2 y 20). C es incorrecta como respuesta porque las alternativas sí tienden a tener carteras más concentradas con menos posiciones que un fondo tradicional diversificado."}, {"a": "B", "e": "Comprar una acción es como comprar una entrada: la pagas hoy pero la recibes días después. La liquidación (cuando oficialmente te registran como dueño) tarda dos días hábiles (T+2). Si compras en la fecha de registro (record date, fecha en que se verifica quién es accionista para recibir el dividendo), no serás dueño registrado a tiempo. B es correcta: la orden se liquida después de la record date, así que no recibirás el dividendo. A es incorrecta porque comprar después de la fecha de declaración no impide recibir el dividendo. C es incorrecta porque ejecutar la orden no equivale a ser dueño registrado."}, {"a": "C", "e": "Las calificadoras de riesgo clasifican los bonos como si fueran una libreta de notas escolar: los que aprueban son \"grado de inversión\" y los que no, \"grado especulativo\". La frontera está en Baa3/BBB−. C) Correcta: Hawk tiene Baa3/BBB−, justo el último escalón aprobatorio (grado de inversión), mientras Osprey tiene Ba1/BB+, el primer escalón reprobatorio (grado especulativo o high yield). A) Incorrecta: el riesgo crediticio total incluye la probabilidad de impago y la pérdida en caso de impago; solo con la calificación no se puede concluir sobre ambos factores. B) Incorrecta: la severidad de pérdida depende de garantías y antigüedad de la deuda, no solo de la calificación."}, {"a": "B", "e": "Imagina que solo mides la estatura de los jugadores que quedan en un torneo: los eliminados desaparecen de tus datos. Así funcionan los sesgos en fondos de cobertura. B) Correcta: el sesgo de supervivencia elimina fondos que fracasaron y el sesgo de relleno retroactivo solo incluye fondos exitosos. Esto sobreestima los rendimientos (parecen mejores de lo real) y subestima el riesgo (la volatilidad de los fracasados no se registra). A) Incorrecta: el riesgo se subestima, no se sobreestima, porque los fondos más volátiles desaparecen. C) Incorrecta: los rendimientos se sobreestiman, no se subestiman, porque solo quedan los ganadores."}, {"a": "B", "e": "Piensa en un termómetro financiero: cada medida griega indica una sensibilidad diferente de un derivado (instrumento cuyo valor depende de otro activo). B) Correcta: delta mide cuánto cambia el valor del derivado cuando el precio del activo subyacente varía en una unidad. Es la sensibilidad directa entre ambos precios. A) Incorrecta: beta mide el riesgo de un activo respecto al mercado general, no la sensibilidad de un derivado frente a su activo subyacente. C) Incorrecta: gamma mide cuánto cambia el propio delta cuando varía el precio del subyacente; es la sensibilidad del delta, no la sensibilidad directa del valor del derivado."}, {"a": "A", "e": "Para valorar una acción con dividendos crecientes se usa el modelo de Gordon: Valor = D1 / (k − g), como calcular cuánto vale una renta que crece cada año. Primero: g (crecimiento) = ROE × retención = 10% × 70% = 7%. Luego: k (tasa requerida) = tasa libre de riesgo (4%+5%) + beta × prima de mercado = 9% + 1.4×(14%−9%) = 16%. D1 = $4 × 0.30 × 1.07 = $1.284. Valor = $1.284 / 0.09 ≈ $14.27, cercano a $14.39. A) Correcta. B) Incorrecta: resultaría de usar una tasa de descuento demasiado baja. C) Incorrecta: implicaría omitir gran parte de la prima de riesgo en el cálculo."}, {"a": "C", "e": "Un bono es como un préstamo: si el cupón (interés que paga) supera lo que el mercado exige (rendimiento al vencimiento o YTM), vale más que su valor nominal (prima); si es menor, vale menos (descuento). C) Correcta: el Bono X paga cupón de 7.25%, inferior al YTM de 7.60%, así que cotiza con descuento. El Bono Y paga 8.00%, superior al YTM, así que cotiza con prima. A) Incorrecta: el Bono X no cotiza con prima porque su cupón es menor que el YTM. B) Incorrecta: invierte la situación; es el Bono Y el que cotiza con prima, no el X."}, {"a": "A", "e": "La paridad put-call es una ecuación que relaciona opciones, acciones y bonos como una balanza financiera: S + P − C = valor presente del precio de ejercicio. Para crear una posición corta sintética en un bono libre de riesgo se necesita: comprar un put, vender un call y vender la acción. A) Correcta: el inversor compra la opción put (derecho a vender a precio fijo). B) Incorrecta: el call se vende, no se compra, en esta estrategia. C) Incorrecta: la acción subyacente se vende en corto, no se compra, para replicar la posición corta en el bono."}, {"a": "A", "e": "Piensa en una alarma que solo se activa si la temperatura sube a cierto nivel. Una orden stop de compra funciona igual: se activa únicamente cuando el precio alcanza el nivel indicado. A) Correcta: la orden stop de compra a $17 permanece inactiva mientras el precio esté debajo; cuando llega a $17 se ejecuta automáticamente. Sirve para comprar solo si se confirma la tendencia alcista. B) Incorrecta: una orden límite de compra a $17 se ejecutaría inmediatamente al precio actual de $15, ya que $15 es menor que el límite máximo de $17. C) Incorrecta: una orden de mercado se ejecuta al instante al precio vigente, sin esperar."}, {"a": "C", "e": "Imagina que hoy una manzana cuesta $1 pero el contrato para comprarla en tres meses cuesta $1.10; eso es contango, refleja costos de almacenamiento y financiamiento. C) Correcta: contango ocurre cuando el precio spot (precio actual de entrega inmediata) es menor que los precios de los contratos de futuros, generando una curva ascendente. A) Incorrecta: cuando el precio spot supera a los futuros se llama backwardation, que es lo opuesto al contango. B) Incorrecta: si spot y futuros son iguales no hay contango ni backwardation; esta situación casi nunca se da en la práctica."}, {"a": "C", "e": "Piensa en una cascada de vasos: el agua llena primero el vaso de arriba y solo al desbordarse pasa al siguiente. Así funciona una estructura en cascada (waterfall) en bonos titulizados. C) Correcta: esta estructura divide la emisión en tramos (tranches) con diferente prioridad; los tramos senior cobran primero y los subordinados absorben las primeras pérdidas. Es una mejora crediticia interna. A) Incorrecta: es una mejora interna, no externa; las externas son garantías de terceros o seguros. B) Incorrecta: no mejora la calificación de toda la emisión; solo los tramos senior obtienen mejor nota a costa de los subordinados."}, {"a": "A", "e": "Comprar una opción put es como pagar un seguro: si no lo necesitas, solo pierdes la prima. El comprador del put pagó $10 de prima por el derecho a vender a $75. A) Correcta: si al vencimiento el precio de la acción es $75 o más, la opción no se ejerce y la pérdida máxima es la prima pagada ($10). El comprador de cualquier opción nunca pierde más que la prima. B) Incorrecta: $65 ($75 − $10) es la ganancia máxima si la acción cae a $0, no la pérdida máxima. C) Incorrecta: la pérdida ilimitada aplica al vendedor de un call descubierto, no al comprador de un put."}, {"a": "A", "e": "La duración de un portafolio de bonos es como calcular la nota promedio de un curso: cada nota (duración) se pondera por su peso relativo. Aquí, la duración mide cuánto cambia el precio de un bono ante cambios en tasas de interés. Se pondera cada bono por su valor de mercado (precio completo), no por su valor nominal. Los pesos son: 2.4/7.2=0.333, 3.6/7.2=0.500 y 1.2/7.2=0.167. Duración = 0.333×4.625 + 0.500×7.322 + 0.167×9.300 = 6.75, cercano a 6.6. A es correcta. B (6.8) resulta de ponderar erróneamente por valor nominal. C (7.0) resulta de promediar sin ponderar."}, {"a": "B", "e": "Las empresas compiten como restaurantes: unas bajan precios, otras ofrecen platos únicos. Aquí la empresa mejora su eficiencia para producir más barato y reducir precios, buscando robar clientes a la competencia. Esto es liderazgo en costos (competir por precio bajo) y es ofensiva porque ataca activamente la cuota de mercado rival. B es correcta. A es incorrecta porque la diferenciación se basa en características únicas del producto (calidad, innovación), no en reducir costos. C es incorrecta porque una estrategia defensiva protege lo que ya se tiene, pero aquí la empresa busca ganar terreno nuevo."}, {"a": "B", "e": "Los bancos obtienen dinero de varias fuentes, como una tienda que puede pedir prestado a distintos proveedores. Los depósitos en cuenta corriente son dinero que los clientes dejan en el banco y por el cual reciben poco o ningún interés, lo que los convierte en la fuente más barata. B es correcta. A es incorrecta porque los fondos interbancarios (préstamos entre bancos) se cobran a tasas de mercado, más altas que el costo casi nulo de las cuentas corrientes. C es incorrecta porque los fondos del banco central se obtienen a tasas de política monetaria, generalmente superiores al costo de los depósitos de clientes."}, {"a": "A", "e": "Imagina que tener aceite de oliva en tu despensa te da tranquilidad ante posible escasez, aunque no ganes dinero con él. Eso es el rendimiento por conveniencia: los beneficios no monetarios de poseer un activo físico, como asegurar producción continua. A es correcta. B es incorrecta porque los beneficios monetarios (como dividendos o cupones, es decir pagos periódicos en efectivo) se tratan por separado y no forman parte del rendimiento por conveniencia. C es incorrecta porque descontar los costos de almacenamiento describe el rendimiento por conveniencia neto, no el concepto puro."}, {"a": "C", "e": "Imagina que dos cocineros en un restaurante preparan platos opuestos que se anulan entre sí: uno añade sal y otro la quita. Así ocurre cuando varios gestores de inversión toman posiciones activas que se cancelan mutuamente. El enfoque núcleo-satélite lo resuelve: el núcleo es gestión pasiva (replica el mercado) y los satélites son apuestas activas diferenciadas que no se contradicen. C es correcta. A es incorrecta porque el presupuesto de riesgo asigna límites de riesgo pero no evita posiciones opuestas. B es incorrecta porque la asignación táctica ajusta pesos por clase de activo según expectativas, sin resolver la duplicación entre gestores."}, {"a": "C", "e": "La convexidad mide cómo se curva la relación entre el precio de un bono y las tasas de interés, como la curvatura de un arco. Mayor convexidad significa que el bono gana más cuando bajan las tasas y pierde menos cuando suben. Dos factores la aumentan: mayor plazo y menor cupón (pago periódico de intereses). El bono cupón cero a 10 años no paga nada hasta el vencimiento, maximizando ambos factores. C es correcta. A es incorrecta porque un bono a solo 2 años tiene poca duración y poca convexidad. B es incorrecta porque a 5 años con cupón del 4% tiene menos convexidad que el cupón cero a 10 años."}, {"a": "A", "e": "El diferencial de rendimiento (spread) es la prima extra que pagan los bonos corporativos sobre los bonos del gobierno, como un recargo por mayor riesgo. Cuando la economía se frena, las empresas ganan menos y el riesgo de impago sube, así que los inversores exigen mayor prima. A es correcta. B es incorrecta porque con alto crecimiento del PIB las empresas prosperan, el riesgo de impago baja y los diferenciales se comprimen. C es incorrecta porque menor oferta de bonos nuevos significa más demanda relativa por los existentes, lo que comprime los diferenciales en vez de ampliarlos."}, {"a": "B", "e": "Un mercado de llamada funciona como una subasta programada: se acumulan todas las órdenes de compra y venta y se ejecutan juntas a un único precio que equilibra oferta y demanda en un momento específico. B es correcta. A es incorrecta porque negociar en cualquier momento mientras el mercado está abierto describe un mercado continuo, donde las operaciones ocurren constantemente, no en intervalos programados. C es incorrecta porque precios fijados por subasta continua o por cotizaciones de intermediarios (bid-ask) describe mercados continuos dirigidos por órdenes o por creadores de mercado, no un mercado de llamada."}, {"a": "A", "e": "El valor de empresa es como el precio total de comprar una casa: pagas el precio de venta pero también asumes la hipoteca pendiente, aunque descuentas el efectivo que viene incluido. Se calcula como: capitalización bursátil (valor de las acciones en bolsa) más deuda menos efectivo disponible. A es correcta porque representa el costo real de adquirir una empresa. B es incorrecta porque el valor de mercado de las acciones es solo una parte; ignora la deuda que el comprador asumiría. C es incorrecta porque sumar acciones más deuda sin restar el efectivo sobreestima el costo real de la adquisición."}, {"a": "C", "e": "Un fondo de capital privado funciona como un proyecto de construcción: primero se compromete el dinero y luego se va solicitando conforme se encuentran oportunidades. El período de disposición es cuando el fondo selecciona inversiones y solicita a los inversores el capital que prometieron aportar (llamadas de capital). C es correcta. A es incorrecta porque el período de aviso es el tiempo que un inversor debe notificar antes de poder retirar su dinero del fondo. B es incorrecta porque el período de bloqueo es el tiempo durante el cual un inversor no puede solicitar el retiro de su participación."}, {"a": "B", "e": "Imagina que prestas dinero por etapas: cada año a una tasa diferente. La tasa spot a 4 años (7.5%) combina cuatro tasas forward consecutivas. Usando la fórmula (1+S4)^4 = (1+S1)(1+f1)(1+f2)(1+f3), conocemos tres de las cuatro tasas: 6.0%, 7.3% y 8.9%. Despejamos la faltante: (1.075)^4 / [(1.06)(1.073)(1.089)] = 1.0782, es decir 7.8%. B es correcta. A es incorrecta porque 7.3% es la tasa forward del año 1 al 2, no del año 2 al 3. C (8.0%) no corresponde al resultado matemático correcto del despeje."}, {"a": "C", "e": "Una opción put (derecho a vender) funciona como un seguro: pagas una prima para protegerte si el precio baja. Aquí el precio de ejercicio es 23 y el activo vale 20, así que el valor intrínseco (ganancia inmediata al ejercer) es 3. Pero la prima siempre incluye además el valor temporal, que refleja la posibilidad de que el activo se mueva más a tu favor en los 6 meses restantes. Por eso la prima total supera 3. C es correcta. A es incorrecta porque ignora el valor temporal. B es incorrecta porque la prima nunca puede ser menor al
